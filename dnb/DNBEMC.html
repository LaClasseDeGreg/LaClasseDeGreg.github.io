vote."}, {"mot": "Liste d'émargement", "definition": "Registre que signe chaque électeur après avoir voté, pour empêcher tout double vote."}, {"mot": "Scrutin majoritaire à deux tours", "definition": "Mode d'élection où il faut la majorité absolue au premier tour pour être élu, sinon un second tour départage les candidats arrivés en tête."}, {"mot": "Scrutin proportionnel", "definition": "Mode d'élection où les sièges sont répartis entre les listes en proportion des voix obtenues (utilisé aux élections européennes)."}, {"mot": "Référendum", "definition": "Vote par lequel les citoyens répondent directement par oui ou par non à une question posée par le pouvoir."}, {"mot": "Abstention", "definition": "Fait, pour un électeur inscrit, de ne pas aller voter. Elle progresse depuis les années 1980, surtout chez les jeunes."}, {"mot": "Procuration", "definition": "Procédure permettant à un électeur absent de confier son vote à un autre électeur qui vote en son nom."}, {"mot": "Vote blanc", "definition": "Bulletin vide ou enveloppe vide exprimant un refus des choix proposés ; comptabilisé séparément depuis 2014 mais non reconnu comme suffrage exprimé."}], "notions_essentielles": ["Le droit de vote est une conquête : suffrage universel masculin en 1848, vote des femmes en 1944 (ordonnance du 21 avril), majorité à 18 ans en 1974.", "Le suffrage français est universel, égal, secret (isoloir obligatoire depuis 1913) et libre.", "Les élections couvrent toutes les échelles : municipales (maire, 6 ans), présidentielle (5 ans, suffrage direct depuis 1962), législatives (577 députés), européennes (proportionnelle).", "Le référendum permet la démocratie directe ; le vote par procuration permet de voter en cas d'absence.", "L'abstention, record chez les jeunes, est le grand défi démocratique : s'abstenir, c'est laisser les autres décider à sa place."]}}, {"id": 4, "titre": "Les institutions de la Ve République", "activite1_fiche": {"introduction": "La Constitution du 4 octobre 1958 organise les pouvoirs de la Ve République selon le principe de la séparation des pouvoirs, théorisé par Montesquieu au XVIIIe siècle : le pouvoir exécutif applique les lois, le pouvoir législatif les vote, le pouvoir judiciaire les fait respecter. Connaître les institutions, c'est comprendre qui décide, qui contrôle et comment une loi est fabriquée. Problématique : comment les institutions de la Ve République organisent-elles et équilibrent-elles les pouvoirs ?", "partie1_titre": "I. Le pouvoir exécutif : le président de la République et le gouvernement", "partie1_contenu": "A. Le président de la République, clé de voûte des institutions. Élu pour 5 ans au suffrage universel direct (depuis 1962), le président veille au respect de la Constitution (article 5). Il nomme le Premier ministre, préside le Conseil des ministres, promulgue les lois, peut dissoudre l'Assemblée nationale et soumettre un projet au référendum. Il est le chef des armées et négocie les traités. L'article 16 lui donne des pouvoirs exceptionnels en cas de crise grave.\n\nB. Le gouvernement conduit la politique de la nation. Dirigé par le Premier ministre, nommé par le président, le gouvernement détermine et conduit la politique de la nation (article 20). Les ministres préparent les projets de loi, dirigent les administrations et appliquent les lois par des décrets. Le gouvernement est responsable devant l'Assemblée nationale, qui peut le renverser par une motion de censure.\n\nC. Un exécutif à deux têtes. La Ve République est un régime semi-présidentiel : président et Premier ministre se partagent l'exécutif. Quand ils sont du même camp, le président domine ; en cas de cohabitation (majorités opposées, comme en 1986, 1993 et 1997), le Premier ministre conduit la politique intérieure et le président conserve un rôle majeur en politique étrangère et en défense.", "partie2_titre": "II. Le pouvoir législatif : le Parlement vote la loi", "partie2_contenu": "A. Deux assemblées. Le Parlement comprend deux chambres : l'Assemblée nationale, composée de 577 députés élus pour 5 ans au suffrage universel direct, et le Sénat, composé de 348 sénateurs élus pour 6 ans au suffrage indirect par les grands électeurs (essentiellement des élus locaux). L'Assemblée siège au palais Bourbon, le Sénat au palais du Luxembourg.\n\nB. Voter la loi et contrôler le gouvernement. Le Parlement vote les lois et le budget de l'État. Il contrôle aussi l'action du gouvernement : questions au gouvernement, commissions d'enquête, et, pour l'Assemblée nationale seulement, possibilité de renverser le gouvernement par une motion de censure votée à la majorité absolue.\n\nC. Le parcours d'une loi. Une loi naît d'un projet de loi (déposé par le gouvernement) ou d'une proposition de loi (déposée par des parlementaires). Le texte est examiné en commission, puis débattu et amendé en séance. Il fait la navette entre l'Assemblée et le Sénat jusqu'à l'adoption d'un texte identique ; en cas de désaccord persistant, l'Assemblée nationale a le dernier mot. La loi peut être contrôlée par le Conseil constitutionnel, puis elle est promulguée par le président et publiée au Journal officiel.", "partie3_titre": "III. Des pouvoirs contrôlés et équilibrés", "partie3_contenu": "A. L'autorité judiciaire, gardienne des libertés. La justice est indépendante de l'exécutif et du législatif : les juges appliquent la loi de manière impartiale. Cette indépendance protège les citoyens de l'arbitraire : nul ne peut être puni qu'en vertu d'une loi et après un procès équitable.\n\nB. Le Conseil constitutionnel, gardien de la Constitution. Composé de neuf membres nommés pour neuf ans (par le président de la République et les présidents des deux assemblées), le Conseil constitutionnel vérifie que les lois respectent la Constitution. Depuis la révision de 2008, tout justiciable peut le saisir à l'occasion d'un procès grâce à la question prioritaire de constitutionnalité (QPC). Il veille aussi à la régularité de l'élection présidentielle et des référendums.\n\nC. Des contre-pouvoirs nécessaires à la démocratie. La séparation des pouvoirs s'accompagne de contre-pouvoirs : la presse libre, qui informe et enquête ; les syndicats et les associations, qui défendent des intérêts collectifs ; le Défenseur des droits, qui protège les citoyens face aux administrations ; et les élections, qui permettent de sanctionner ou de reconduire les gouvernants. Cet équilibre empêche la concentration du pouvoir, danger que Montesquieu résumait ainsi : tout homme qui a du pouvoir est porté à en abuser.", "conclusion": "Les institutions de la Ve République organisent les pouvoirs selon le principe de séparation hérité de Montesquieu : un exécutif fort à deux têtes, président élu au suffrage universel direct et gouvernement responsable devant l'Assemblée ; un Parlement bicaméral qui vote la loi et contrôle le gouvernement ; une justice indépendante et un Conseil constitutionnel gardien de la Constitution. Les contre-pouvoirs, presse, associations, élections, complètent cet équilibre. Comprendre ces institutions, c'est se donner les moyens de participer en citoyen éclairé à la vie démocratique."}, "activite2_quiz": [{"question": "Quel philosophe du XVIIIe siècle a théorisé la séparation des pouvoirs ?", "options": ["Voltaire", "Montesquieu", "Rousseau", "Diderot"], "correcte": 1, "explication": "Dans De l'esprit des lois (1748), Montesquieu défend la séparation des pouvoirs exécutif, législatif et judiciaire pour éviter la tyrannie : ce principe fonde nos institutions."}, {"question": "Quels sont les trois pouvoirs séparés dans une démocratie ?", "options": ["Militaire, religieux, économique", "Exécutif, législatif, judiciaire", "National, régional, local", "Présidentiel, ministériel, royal"], "correcte": 1, "explication": "L'exécutif applique les lois, le législatif les vote, le judiciaire les fait respecter : leur séparation empêche la concentration du pouvoir entre les mêmes mains."}, {"question": "Comment le président de la République est-il élu ?", "options": ["Par les députés", "Au suffrage universel direct pour 5 ans", "Par tirage au sort", "Par le Sénat pour 7 ans"], "correcte": 1, "explication": "Depuis la réforme de 1962, le président est élu au suffrage universel direct ; depuis 2000, son mandat est de 5 ans (quinquennat), renouvelable une fois consécutivement."}, {"question": "Qui nomme le Premier ministre ?", "options": ["L'Assemblée nationale", "Le président de la République", "Le Sénat", "Le Conseil constitutionnel"], "correcte": 1, "explication": "Le président de la République nomme le Premier ministre (article 8 de la Constitution), en tenant compte de la majorité de l'Assemblée nationale."}, {"question": "Selon l'article 20 de la Constitution, qui détermine et conduit la politique de la nation ?", "options": ["Le président seul", "Le gouvernement", "Le Sénat", "Les préfets"], "correcte": 1, "explication": "L'article 20 confie au gouvernement, dirigé par le Premier ministre, la détermination et la conduite de la politique de la nation : il dispose de l'administration et de la force armée."}, {"question": "De quelles chambres le Parlement français est-il composé ?", "options": ["L'Assemblée nationale et le Sénat", "L'Assemblée et le Conseil d'État", "La Chambre des communes et la Chambre des lords", "Le Congrès et la Cour suprême"], "correcte": 0, "explication": "Le Parlement est bicaméral : l'Assemblée nationale (577 députés, palais Bourbon) et le Sénat (348 sénateurs, palais du Luxembourg) votent la loi."}, {"question": "Combien y a-t-il de sénateurs et comment sont-ils élus ?", "options": ["577, au suffrage direct", "348, au suffrage indirect par les grands électeurs", "100, nommés par le président", "925, par tirage au sort"], "correcte": 1, "explication": "Les 348 sénateurs sont élus pour 6 ans au suffrage universel indirect par les grands électeurs, essentiellement des élus locaux : le Sénat représente les collectivités territoriales."}, {"question": "Quelle est la différence entre un projet et une proposition de loi ?", "options": ["Aucune", "Le projet vient du gouvernement, la proposition vient des parlementaires", "Le projet vient du président, la proposition du peuple", "Le projet est secret, la proposition est publique"], "correcte": 1, "explication": "Un projet de loi est déposé par le gouvernement, une proposition de loi par un ou plusieurs parlementaires. Les deux suivent ensuite le même parcours d'examen et de vote."}, {"question": "Comment appelle-t-on les allers-retours d'un texte de loi entre l'Assemblée et le Sénat ?", "options": ["Le va-et-vient", "La navette parlementaire", "Le ping-pong législatif", "La promenade"], "correcte": 1, "explication": "La navette parlementaire désigne les allers-retours du texte entre les deux chambres jusqu'à l'adoption d'une version identique. En cas de désaccord durable, l'Assemblée nationale a le dernier mot."}, {"question": "Qui promulgue les lois ?", "options": ["Le Premier ministre", "Le président de la République", "Le président du Sénat", "Le Conseil constitutionnel"], "correcte": 1, "explication": "Après son adoption (et un éventuel contrôle du Conseil constitutionnel), la loi est promulguée par le président de la République puis publiée au Journal officiel : elle entre alors en vigueur."}, {"question": "Comment l'Assemblée nationale peut-elle renverser le gouvernement ?", "options": ["Par une motion de censure votée à la majorité absolue", "Par un simple courrier", "Par un référendum", "Elle ne le peut pas"], "correcte": 0, "explication": "L'Assemblée nationale peut renverser le gouvernement en adoptant une motion de censure à la majorité absolue de ses membres : c'est l'arme du contrôle parlementaire."}, {"question": "Combien de membres composent le Conseil constitutionnel ?", "options": ["3", "9, nommés pour 9 ans", "577", "Un seul juge"], "correcte": 1, "explication": "Le Conseil constitutionnel compte neuf membres nommés pour neuf ans, par tiers, par le président de la République et les présidents de l'Assemblée nationale et du Sénat."}, {"question": "Qu'est-ce que la question prioritaire de constitutionnalité (QPC) ?", "options": ["Une question posée au gouvernement le mercredi", "La possibilité pour tout justiciable de contester, lors d'un procès, une loi qui violerait la Constitution", "Un examen scolaire", "Une pétition en ligne"], "correcte": 1, "explication": "Créée par la révision constitutionnelle de 2008, la QPC permet à tout citoyen, à l'occasion d'un procès, de demander au Conseil constitutionnel de vérifier qu'une loi respecte les droits garantis par la Constitution."}, {"question": "Pourquoi l'indépendance de la justice est-elle essentielle ?", "options": ["Pour que les juges soient mieux payés", "Pour protéger les citoyens de l'arbitraire et garantir des procès équitables", "Pour ralentir les procès", "Elle n'est pas essentielle"], "correcte": 1, "explication": "Une justice indépendante des pouvoirs exécutif et législatif juge de manière impartiale : nul ne peut être puni qu'en vertu d'une loi et après un procès équitable. C'est une garantie fondamentale des libertés."}, {"question": "Lequel de ces acteurs est un contre-pouvoir dans une démocratie ?", "options": ["La presse libre", "L'armée d'un dictateur", "La censure", "La police politique"], "correcte": 0, "explication": "La presse libre, les syndicats, les associations ou le Défenseur des droits sont des contre-pouvoirs : ils informent, alertent et limitent les abus, complétant la séparation des pouvoirs."}], "activite3_etude": {"document_type": "texte", "document_titre": "Extraits de la Constitution du 4 octobre 1958 : la répartition des pouvoirs", "document_texte": "« Article 5. Le Président de la République veille au respect de la Constitution. Il assure, par son arbitrage, le fonctionnement régulier des pouvoirs publics ainsi que la continuité de l'État. [...]\n\nArticle 8. Le Président de la République nomme le Premier ministre. [...]\n\nArticle 20. Le Gouvernement détermine et conduit la politique de la nation. Il dispose de l'administration et de la force armée. Il est responsable devant le Parlement [...].\n\nArticle 24. Le Parlement vote la loi. Il contrôle l'action du Gouvernement. Il évalue les politiques publiques. Il comprend l'Assemblée nationale et le Sénat. Les députés à l'Assemblée nationale [...] sont élus au suffrage direct. Le Sénat [...] est élu au suffrage indirect. Il assure la représentation des collectivités territoriales de la République. »", "document_source": "Constitution de la Ve République, 4 octobre 1958 (extraits des articles 5, 8, 20 et 24, version en vigueur).", "questions": ["Présentez le document : nature, date, rôle de ce texte dans les institutions.", "D'après l'article 5, quel est le rôle du président de la République ?", "Quels articles montrent que le pouvoir exécutif a deux têtes ? Expliquez la relation entre elles.", "D'après l'article 24, quelles sont les trois missions du Parlement et quelles sont ses deux chambres ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que la Constitution de 1958 organise la séparation et l'équilibre des pouvoirs."], "corrections": ["Ce document rassemble des extraits de la Constitution de la Ve République, promulguée le 4 octobre 1958. La Constitution est la norme suprême : elle organise les pouvoirs publics, définit leurs compétences et leurs relations. Les articles cités répartissent les rôles entre le président, le gouvernement et le Parlement.", "Selon l'article 5, le président de la République veille au respect de la Constitution et assure, par son arbitrage, le fonctionnement régulier des pouvoirs publics et la continuité de l'État. Il est donc placé au-dessus des autres institutions comme un arbitre garant de leur bon fonctionnement : c'est la clé de voûte du régime.", "Les articles 8 et 20 montrent l'exécutif à deux têtes : l'article 8 donne au président le pouvoir de nommer le Premier ministre, et l'article 20 confie au gouvernement la détermination et la conduite de la politique de la nation. Le président choisit donc le chef du gouvernement, mais c'est le gouvernement qui gouverne au quotidien ; il est de plus responsable devant le Parlement, qui peut le renverser.", "L'article 24 confie au Parlement trois missions : voter la loi, contrôler l'action du gouvernement et évaluer les politiques publiques. Il précise ses deux chambres : l'Assemblée nationale, élue au suffrage direct, et le Sénat, élu au suffrage indirect, qui représente les collectivités territoriales.", "Exemple de rédaction : La Constitution de 1958 organise une véritable séparation des pouvoirs, conforme au principe de Montesquieu. Le pouvoir exécutif est partagé entre le président, arbitre garant des institutions selon l'article 5, et le gouvernement, qui conduit la politique de la nation selon l'article 20. Le pouvoir législatif appartient au Parlement, qui selon l'article 24 vote la loi, contrôle le gouvernement et évalue les politiques publiques, à travers deux chambres élues différemment, ce qui équilibre la représentation. Les pouvoirs se contrôlent mutuellement : le gouvernement est responsable devant le Parlement, qui peut le censurer, tandis que le président peut dissoudre l'Assemblée nationale ; le Conseil constitutionnel vérifie en outre que les lois respectent la Constitution. Cet équilibre des pouvoirs protège la démocratie : aucune institution ne peut gouverner seule et sans contrôle."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, présentez les institutions de la Ve République et montrez comment elles assurent la séparation et l'équilibre des pouvoirs.", "plan": {"introduction": "Contexte : la Constitution du 4 octobre 1958 fonde la Ve République et organise ses pouvoirs. Définition : la séparation des pouvoirs, théorisée par Montesquieu, distingue exécutif, législatif et judiciaire. Problématique : comment les institutions organisent-elles et équilibrent-elles les pouvoirs ? Annonce du plan : d'abord l'exécutif et le législatif et leurs relations, puis les organes de contrôle et les contre-pouvoirs.", "partie1": "I. Un exécutif fort face à un Parlement qui vote la loi et contrôle. Argument 1 : le président, élu pour 5 ans au suffrage universel direct (depuis 1962), arbitre des institutions (article 5) : il nomme le Premier ministre, peut dissoudre l'Assemblée, promulgue les lois, chef des armées. Argument 2 : le gouvernement, dirigé par le Premier ministre, détermine et conduit la politique de la nation (article 20) ; en cohabitation (1986, 1993, 1997), il domine la politique intérieure. Argument 3 : le Parlement bicaméral (577 députés élus au suffrage direct, 348 sénateurs au suffrage indirect) vote la loi après la navette parlementaire et contrôle le gouvernement : questions, commissions d'enquête, motion de censure.", "partie2": "II. Des pouvoirs contrôlés et des contre-pouvoirs. Argument 1 : l'autorité judiciaire indépendante garantit des procès équitables et protège les libertés contre l'arbitraire. Argument 2 : le Conseil constitutionnel (9 membres, 9 ans) vérifie la conformité des lois à la Constitution ; depuis 2008, la question prioritaire de constitutionnalité permet à tout justiciable de le saisir. Argument 3 : les contre-pouvoirs complètent l'équilibre : presse libre, syndicats et associations, Défenseur des droits, et surtout les élections régulières qui permettent aux citoyens de sanctionner les gouvernants.", "conclusion": "Bilan : la Ve République repose sur un exécutif fort mais contrôlé par un Parlement législateur, une justice indépendante, un Conseil constitutionnel et des contre-pouvoirs : la séparation des pouvoirs protège la démocratie. Ouverture : cet équilibre institutionnel garantit les libertés, dont la laïcité, principe fondamental étudié ensuite."}, "correction_complete": "La Constitution du 4 octobre 1958 fonde la Ve République et organise ses institutions selon le principe de la séparation des pouvoirs, théorisé par Montesquieu au XVIIIe siècle : l'exécutif applique les lois, le législatif les vote, le judiciaire les fait respecter. Comment les institutions de la Ve République organisent-elles et équilibrent-elles ces pouvoirs ? Nous présenterons d'abord l'exécutif et le législatif et leurs relations, puis les organes de contrôle et les contre-pouvoirs qui complètent l'équilibre démocratique.\n\nLa Ve République associe un exécutif fort à un Parlement qui légifère et contrôle. Le président de la République, élu pour cinq ans au suffrage universel direct depuis la réforme de 1962, est l'arbitre des institutions selon l'article 5 : il nomme le Premier ministre, préside le Conseil des ministres, promulgue les lois, peut dissoudre l'Assemblée nationale et commande les armées. Le gouvernement, dirigé par le Premier ministre, détermine et conduit la politique de la nation selon l'article 20 : il prépare les projets de loi et dirige l'administration. Cet exécutif à deux têtes varie selon les majorités : en cohabitation, comme en 1986, 1993 ou 1997, le Premier ministre domine la politique intérieure. Face à l'exécutif, le Parlement comprend deux chambres : l'Assemblée nationale, avec ses 577 députés élus au suffrage direct, et le Sénat, avec ses 348 sénateurs élus au suffrage indirect. Il vote la loi au terme de la navette parlementaire entre les deux chambres, l'Assemblée ayant le dernier mot, et contrôle le gouvernement par les questions, les commissions d'enquête et, ultime recours, la motion de censure qui peut le renverser.\n\nCes pouvoirs sont eux-mêmes contrôlés, et des contre-pouvoirs complètent l'équilibre. L'autorité judiciaire, indépendante de l'exécutif et du législatif, garantit que nul ne soit puni qu'en vertu d'une loi et après un procès équitable : elle protège les citoyens de l'arbitraire. Le Conseil constitutionnel, composé de neuf membres nommés pour neuf ans, vérifie que les lois respectent la Constitution ; depuis la révision de 2008, la question prioritaire de constitutionnalité permet à tout justiciable de le saisir à l'occasion d'un procès. Enfin, la démocratie vit par ses contre-pouvoirs : la presse libre informe et enquête, les syndicats et les associations défendent les intérêts collectifs, le Défenseur des droits protège les citoyens face aux administrations, et les élections régulières permettent au peuple de sanctionner ou de reconduire ses gouvernants.\n\nAinsi, la Ve République organise un exécutif fort mais encadré : le Parlement vote la loi et peut renverser le gouvernement, la justice indépendante et le Conseil constitutionnel veillent au respect du droit, et les contre-pouvoirs limitent tout abus. Cette séparation et cet équilibre des pouvoirs, garanties essentielles de la démocratie, protègent les grands principes républicains, au premier rang desquels la laïcité."}, "activite5_vocabulaire": {"termes": [{"mot": "Séparation des pouvoirs", "definition": "Principe théorisé par Montesquieu : les pouvoirs exécutif, législatif et judiciaire doivent être confiés à des organes distincts pour éviter la tyrannie."}, {"mot": "Pouvoir exécutif", "definition": "Pouvoir d'appliquer les lois et de conduire la politique du pays, partagé en France entre le président de la République et le gouvernement."}, {"mot": "Pouvoir législatif", "definition": "Pouvoir de voter les lois, exercé par le Parlement (Assemblée nationale et Sénat)."}, {"mot": "Promulgation", "definition": "Acte par lequel le président de la République signe une loi adoptée, qui est ensuite publiée au Journal officiel et entre en vigueur."}, {"mot": "Navette parlementaire", "definition": "Allers-retours d'un texte de loi entre l'Assemblée nationale et le Sénat jusqu'à l'adoption d'une version identique."}, {"mot": "Motion de censure", "definition": "Vote par lequel l'Assemblée nationale peut renverser le gouvernement à la majorité absolue de ses membres."}, {"mot": "Conseil constitutionnel", "definition": "Institution de neuf membres nommés pour neuf ans, chargée de vérifier la conformité des lois à la Constitution."}, {"mot": "QPC", "definition": "Question prioritaire de constitutionnalité (2008) : permet à tout justiciable de contester, lors d'un procès, une loi contraire aux droits garantis par la Constitution."}, {"mot": "Cohabitation", "definition": "Situation où le président et la majorité de l'Assemblée nationale sont de camps opposés : le Premier ministre conduit alors la politique intérieure."}, {"mot": "Contre-pouvoir", "definition": "Acteur qui limite et contrôle le pouvoir : presse libre, syndicats, associations, Défenseur des droits."}], "notions_essentielles": ["La Constitution du 4 octobre 1958 organise les pouvoirs selon le principe de séparation théorisé par Montesquieu.", "L'exécutif a deux têtes : le président (élu 5 ans au suffrage direct, article 5 : arbitre) et le gouvernement (article 20 : conduit la politique de la nation).", "Le Parlement bicaméral (577 députés, 348 sénateurs) vote la loi après la navette parlementaire et peut renverser le gouvernement par une motion de censure.", "Le Conseil constitutionnel (9 membres) vérifie la conformité des lois à la Constitution ; la QPC (2008) ouvre ce contrôle aux citoyens.", "Justice indépendante, presse libre, associations et élections sont les contre-pouvoirs qui équilibrent la démocratie."]}}, {"id": 5, "titre": "La laïcité, un principe fondamental de la République", "activite1_fiche": {"introduction": "La laïcité est l'un des quatre grands principes de la République inscrits à l'article 1er de la Constitution. Souvent mal comprise, elle n'est dirigée contre aucune religion : elle garantit au contraire à chacun la liberté de croire ou de ne pas croire, et assure la neutralité de l'État envers toutes les convictions. Née d'une longue histoire de conflits entre l'Église et l'État, la laïcité française repose sur la grande loi du 9 décembre 1905. Problématique : qu'est-ce que la laïcité, comment s'est-elle construite et comment s'applique-t-elle aujourd'hui, notamment à l'école ?", "partie1_titre": "I. La construction historique de la laïcité française", "partie1_contenu": "A. Une longue marche depuis la Révolution. Sous l'Ancien Régime, le catholicisme est religion d'État. La Révolution proclame en 1789 la liberté de conscience : nul ne doit être inquiété pour ses opinions, même religieuses (article 10 de la Déclaration des droits de l'homme et du citoyen). Le XIXe siècle est marqué par des allers-retours entre influence de l'Église et sécularisation de la société.\n\nB. L'école laïque de Jules Ferry. Dans les années 1880, la IIIe République fait de l'école le premier terrain de la laïcité : les lois Jules Ferry rendent l'école primaire gratuite (1881) puis obligatoire et laïque (1882). L'instruction religieuse est remplacée par l'instruction morale et civique ; en 1886, le personnel enseignant des écoles publiques est laïcisé.\n\nC. La loi du 9 décembre 1905, socle de la laïcité. Après de vifs débats, la loi de séparation des Églises et de l'État est adoptée le 9 décembre 1905. Son article 1er garantit la liberté de conscience et le libre exercice des cultes ; son article 2 dispose que la République ne reconnaît, ne salarie ni ne subventionne aucun culte. L'État devient neutre : la religion relève désormais de la sphère privée et de la liberté de chacun.", "partie2_titre": "II. Ce que la laïcité garantit et ce qu'elle exige", "partie2_contenu": "A. Une triple garantie. La laïcité garantit d'abord la liberté de conscience : chacun est libre de croire, de ne pas croire, de changer de religion. Elle garantit ensuite l'égalité de tous devant la loi, quelles que soient leurs convictions : aucune religion n'est privilégiée ni discriminée. Elle assure enfin la neutralité de l'État et des services publics : les agents publics ne doivent manifester aucune préférence religieuse dans l'exercice de leurs fonctions.\n\nB. La liberté de culte et ses limites. Chacun peut pratiquer sa religion librement, en privé comme en public (lieux de culte, processions déclarées), tant que l'ordre public est respecté. La laïcité n'interdit pas la religion : elle interdit à l'État de s'en mêler et aux religions d'imposer leurs règles à la loi commune. La loi de la République s'applique à tous, croyants ou non.\n\nC. Laïcité et vivre-ensemble. La laïcité permet à des citoyens de toutes convictions de vivre ensemble : elle est un cadre commun, pas une opinion parmi d'autres. Elle protège aussi bien le croyant, libre de pratiquer, que l'athée ou l'agnostique, libres de ne pas croire. Elle exige en retour la tolérance : respecter les convictions des autres et accepter la critique des idées, y compris religieuses, qui fait partie de la liberté d'expression.", "partie3_titre": "III. La laïcité à l'école : un cadre protecteur", "partie3_contenu": "A. Pourquoi une laïcité renforcée à l'école ? L'école publique accueille des enfants en construction, qu'il faut protéger des pressions et des prosélytismes. Elle doit transmettre des savoirs fondés sur la raison et la science, et former des citoyens libres de leur jugement. C'est pourquoi la laïcité s'y applique de manière renforcée.\n\nB. Les règles en vigueur. Les enseignants et tous les personnels sont soumis à une stricte neutralité : ils ne manifestent pas leurs convictions religieuses ou politiques. La loi du 15 mars 2004 interdit aux élèves des écoles, collèges et lycées publics le port de signes ou tenues manifestant ostensiblement une appartenance religieuse. Les contenus d'enseignement ne peuvent être contestés au nom de croyances : on étudie les faits religieux de manière objective, sans en pratiquer aucun.\n\nC. La Charte de la laïcité. Depuis 2013, la Charte de la laïcité à l'école, affichée dans tous les établissements publics, explique en quinze articles le sens de la laïcité : elle protège la liberté de conscience des élèves, garantit l'égalité entre tous et rappelle que la laïcité offre aux élèves les conditions pour forger leur personnalité et exercer leur libre arbitre. La laïcité n'est pas une contrainte mais une protection : elle fait de l'école un lieu où chacun est accueilli pour ce qu'il est, à l'abri des pressions.", "conclusion": "La laïcité, principe constitutionnel forgé par l'histoire, de la liberté de conscience proclamée en 1789 aux lois scolaires de Jules Ferry et à la grande loi de séparation du 9 décembre 1905, garantit la liberté de croire ou de ne pas croire, l'égalité de tous quelles que soient leurs convictions et la neutralité de l'État. À l'école, où elle s'applique de manière renforcée depuis la loi de 2004 et la Charte de 2013, elle protège les élèves des pressions et leur permet de construire librement leur jugement. Loin d'être dirigée contre les religions, la laïcité est le cadre qui permet à tous, croyants et non-croyants, de vivre ensemble dans la République."}, "activite2_quiz": [{"question": "Dans quel article de la Constitution la laïcité est-elle inscrite ?", "options": ["L'article 1er", "L'article 16", "L'article 49-3", "Elle n'y figure pas"], "correcte": 0, "explication": "L'article 1er de la Constitution de 1958 proclame que la France est une République indivisible, laïque, démocratique et sociale, et qu'elle respecte toutes les croyances."}, {"question": "Quel texte de 1789 proclame la liberté de conscience ?", "options": ["La Constitution de 1958", "L'article 10 de la Déclaration des droits de l'homme et du citoyen", "La loi de 1905", "Le Code civil"], "correcte": 1, "explication": "L'article 10 de la Déclaration de 1789 affirme que nul ne doit être inquiété pour ses opinions, même religieuses : c'est la naissance de la liberté de conscience en France."}, {"question": "Quelles lois ont rendu l'école publique gratuite, obligatoire et laïque ?", "options": ["Les lois Jules Ferry de 1881-1882", "La loi de 2004", "Les lois Defferre", "La loi de 1901"], "correcte": 0, "explication": "Les lois Jules Ferry rendent l'école primaire gratuite (1881), puis obligatoire et laïque (1882) : l'instruction religieuse y est remplacée par l'instruction morale et civique."}, {"question": "Que dit la loi du 9 décembre 1905 ?", "options": ["Elle interdit toutes les religions", "Elle sépare les Églises et l'État : la République garantit la liberté de conscience mais ne reconnaît, ne salarie ni ne subventionne aucun culte", "Elle crée une religion d'État", "Elle oblige à aller à la messe"], "correcte": 1, "explication": "La loi de 1905 est le socle de la laïcité : liberté de conscience et libre exercice des cultes (article 1er), neutralité de l'État qui ne reconnaît, ne salarie ni ne subventionne aucun culte (article 2)."}, {"question": "La laïcité est-elle dirigée contre les religions ?", "options": ["Oui, elle les interdit", "Non : elle garantit la liberté de croire ou de ne pas croire et la neutralité de l'État", "Oui, sauf une", "Elle interdit seulement les églises"], "correcte": 1, "explication": "La laïcité n'est dirigée contre aucune religion : elle protège la liberté de conscience de tous, croyants et non-croyants, et impose la neutralité à l'État, pas aux citoyens."}, {"question": "Que garantit la liberté de conscience ?", "options": ["Le droit de croire, de ne pas croire et de changer de conviction", "Le droit de tout faire", "Le droit d'imposer sa religion aux autres", "Le droit de ne pas respecter la loi"], "correcte": 0, "explication": "La liberté de conscience garantit à chacun le droit de croire, de ne pas croire, de changer de religion ou de conviction : c'est le coeur de la laïcité."}, {"question": "Qu'impose la neutralité de l'État aux agents publics ?", "options": ["D'être athées", "De ne manifester aucune préférence religieuse ou politique dans leurs fonctions", "De porter un uniforme religieux", "De prier au travail"], "correcte": 1, "explication": "Les agents publics (enseignants, policiers, personnels de mairie...) représentent l'État : ils sont tenus à une stricte neutralité religieuse et politique dans l'exercice de leurs fonctions."}, {"question": "La loi de la République s'applique-t-elle aux croyants ?", "options": ["Non, leurs règles religieuses passent avant", "Oui : la loi commune s'applique à tous, croyants ou non", "Seulement le dimanche", "Seulement aux fonctionnaires"], "correcte": 1, "explication": "En République laïque, la loi commune s'impose à tous : aucune règle religieuse ne peut être invoquée pour s'y soustraire. C'est la condition de l'égalité entre les citoyens."}, {"question": "Que dit la loi du 15 mars 2004 ?", "options": ["Elle interdit aux élèves des établissements publics le port de signes religieux ostensibles", "Elle interdit la religion en France", "Elle rend la prière obligatoire à l'école", "Elle supprime les cours d'histoire"], "correcte": 0, "explication": "La loi du 15 mars 2004 interdit, dans les écoles, collèges et lycées publics, le port de signes ou tenues manifestant ostensiblement une appartenance religieuse, afin de protéger les élèves des pressions."}, {"question": "Qu'est-ce que la Charte de la laïcité à l'école ?", "options": ["Un texte de 2013, affiché dans les établissements publics, qui explique la laïcité en quinze articles", "Un règlement de cantine", "Une loi de 1905", "Un manuel de mathématiques"], "correcte": 0, "explication": "Depuis 2013, la Charte de la laïcité, affichée dans tous les établissements publics, explique en quinze articles ce que la laïcité garantit aux élèves et ce qu'elle exige de chacun."}, {"question": "Pourquoi la laïcité est-elle renforcée à l'école ?", "options": ["Pour embêter les élèves", "Pour protéger des élèves en construction des pressions et leur permettre de forger librement leur jugement", "Parce que les professeurs n'aiment pas la religion", "Ce n'est pas le cas"], "correcte": 1, "explication": "L'école accueille des enfants et des adolescents en construction : la laïcité les protège des prosélytismes et garantit un enseignement fondé sur la raison, pour former des citoyens libres."}, {"question": "Peut-on étudier les religions à l'école laïque ?", "options": ["Non, c'est interdit", "Oui : on enseigne les faits religieux de manière objective, sans en pratiquer aucun", "Oui, mais une seule religion", "Seulement à l'université"], "correcte": 1, "explication": "La laïcité n'empêche pas d'étudier les faits religieux : en histoire ou en lettres, on les aborde comme des faits de civilisation, de manière objective et sans prosélytisme."}, {"question": "Un élève peut-il contester un cours au nom de ses croyances ?", "options": ["Oui, toujours", "Non : les contenus d'enseignement, fondés sur les savoirs, ne peuvent être contestés au nom de convictions", "Oui, le vendredi", "Oui, si ses parents écrivent un mot"], "correcte": 1, "explication": "Les programmes (sciences, histoire, EPS...) reposent sur des savoirs établis : aucune conviction ne permet de refuser un enseignement. C'est l'un des articles de la Charte de la laïcité."}, {"question": "Qui la laïcité protège-t-elle ?", "options": ["Seulement les athées", "Seulement les croyants", "Tous : croyants, athées et agnostiques, égaux devant la loi", "Personne"], "correcte": 2, "explication": "La laïcité protège tout le monde : le croyant, libre de pratiquer sa religion, comme le non-croyant, libre de ne pas croire. Tous sont égaux devant la loi, quelles que soient leurs convictions."}, {"question": "La critique des religions est-elle autorisée en France ?", "options": ["Non, c'est un délit", "Oui : la liberté d'expression permet de critiquer les idées et les croyances, mais pas d'injurier les personnes ou d'inciter à la haine", "Oui, sauf le dimanche", "Non, depuis 1905"], "correcte": 1, "explication": "On peut critiquer, moquer ou caricaturer des idées et des croyances (délit de blasphème aboli) ; en revanche, la loi punit l'injure envers les personnes et l'incitation à la haine contre les croyants."}], "activite3_etude": {"document_type": "texte", "document_titre": "La loi du 9 décembre 1905 et la Charte de la laïcité à l'école", "document_texte": "« Loi du 9 décembre 1905 concernant la séparation des Églises et de l'État.\nArticle 1er. La République assure la liberté de conscience. Elle garantit le libre exercice des cultes sous les seules restrictions édictées ci-après dans l'intérêt de l'ordre public.\nArticle 2. La République ne reconnaît, ne salarie ni ne subventionne aucun culte. [...]\n\nCharte de la laïcité à l'école (2013), extraits.\nArticle 1. La France est une République indivisible, laïque, démocratique et sociale. [...]\nArticle 6. La laïcité de l'École offre aux élèves les conditions pour forger leur personnalité, exercer leur libre arbitre et faire l'apprentissage de la citoyenneté. Elle les protège de tout prosélytisme [...].\nArticle 9. La laïcité implique le rejet de toutes les violences et de toutes les discriminations, garantit l'égalité entre les filles et les garçons [...]. »", "document_source": "Loi du 9 décembre 1905 (articles 1er et 2) et Charte de la laïcité à l'école, ministère de l'Éducation nationale, 2013 (extraits).", "questions": ["Présentez les deux textes : nature, dates, auteurs.", "D'après les articles 1er et 2 de la loi de 1905, que garantit la République et que s'interdit-elle ?", "D'après l'article 6 de la Charte, que la laïcité offre-t-elle aux élèves et de quoi les protège-t-elle ?", "Que rejette et que garantit la laïcité selon l'article 9 de la Charte ?", "Rédaction (6 à 8 lignes) : à l'aide des documents et de vos connaissances, montrez que la laïcité est une liberté et une protection, et non une contrainte dirigée contre les religions."], "corrections": ["Le premier texte est un extrait de la loi du 9 décembre 1905 de séparation des Églises et de l'État, votée par le Parlement de la IIIe République : c'est le texte fondateur de la laïcité française. Le second est un extrait de la Charte de la laïcité à l'école, publiée en 2013 par le ministère de l'Éducation nationale et affichée dans tous les établissements publics.", "L'article 1er de la loi de 1905 garantit deux choses : la liberté de conscience (croire ou ne pas croire) et le libre exercice des cultes, dans le respect de l'ordre public. L'article 2 énonce ce que la République s'interdit : elle ne reconnaît, ne salarie ni ne subventionne aucun culte, c'est-à-dire qu'elle est neutre et ne privilégie aucune religion.", "Selon l'article 6 de la Charte, la laïcité de l'école offre aux élèves les conditions pour forger leur personnalité, exercer leur libre arbitre et apprendre la citoyenneté. Elle les protège de tout prosélytisme, c'est-à-dire des pressions qui chercheraient à leur imposer des convictions.", "Selon l'article 9, la laïcité implique le rejet de toutes les violences et de toutes les discriminations, et elle garantit l'égalité entre les filles et les garçons. La laïcité est donc liée aux autres valeurs républicaines : égalité et fraternité.", "Exemple de rédaction : Contrairement à une idée reçue, la laïcité n'est pas une arme contre les religions : les deux textes montrent qu'elle est d'abord une liberté et une protection. La loi de 1905 commence par garantir la liberté de conscience et le libre exercice des cultes : chacun peut croire, ne pas croire et pratiquer librement. Ce qu'elle limite, c'est le pouvoir de l'État sur les religions et des religions sur l'État : la République, neutre, ne reconnaît ni ne finance aucun culte, ce qui assure l'égalité de tous, croyants comme non-croyants. À l'école, la Charte de 2013 prolonge cette logique protectrice : la laïcité offre aux élèves un espace à l'abri du prosélytisme où ils peuvent forger librement leur jugement, et elle garantit l'égalité, notamment entre filles et garçons. La laïcité est donc le cadre commun qui permet à des citoyens de toutes convictions de vivre ensemble dans la même République."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, expliquez ce que garantit la laïcité en France et montrez comment elle s'applique à l'école.", "plan": {"introduction": "Contexte : la laïcité est l'un des quatre principes de la République (article 1er de la Constitution), fruit d'une longue histoire. Définition : la laïcité est la séparation de l'État et des religions, garantissant la liberté de conscience. Problématique : que garantit la laïcité et comment s'applique-t-elle à l'école ? Annonce du plan : d'abord les garanties de la laïcité, construites par l'histoire, puis son application renforcée à l'école.", "partie1": "I. Une triple garantie construite par l'histoire. Argument 1 : la liberté de conscience, proclamée dès 1789 (article 10 de la DDHC) : croire, ne pas croire, changer de conviction ; et le libre exercice des cultes (article 1er de la loi de 1905). Argument 2 : la neutralité de l'État : depuis la loi du 9 décembre 1905, la République ne reconnaît, ne salarie ni ne subventionne aucun culte ; les agents publics sont neutres. Argument 3 : l'égalité de tous devant la loi, quelles que soient les convictions : la loi commune s'applique à tous, et la critique des idées religieuses est libre tandis que l'injure aux personnes et l'incitation à la haine sont punies.", "partie2": "II. À l'école, une laïcité renforcée et protectrice. Argument 1 : un héritage : les lois Jules Ferry (1881-1882) créent l'école gratuite, obligatoire et laïque, premier terrain de la laïcité républicaine. Argument 2 : des règles précises : neutralité stricte des personnels ; loi du 15 mars 2004 interdisant aux élèves les signes religieux ostensibles dans les établissements publics ; contenus d'enseignement fondés sur les savoirs, qu'aucune croyance ne peut contester. Argument 3 : une protection : la Charte de la laïcité (2013) rappelle que la laïcité protège les élèves du prosélytisme, leur permet de forger leur libre arbitre et garantit l'égalité, notamment entre filles et garçons.", "conclusion": "Bilan : la laïcité garantit la liberté de conscience, la neutralité de l'État et l'égalité de tous ; à l'école, elle protège les élèves et forme des citoyens libres. Ouverture : la laïcité est inséparable du combat plus large pour l'égalité et contre les discriminations."}, "correction_complete": "La laïcité est l'un des quatre grands principes de la République, inscrits à l'article 1er de la Constitution : la France est une République indivisible, laïque, démocratique et sociale. Fruit d'une longue histoire, la laïcité désigne la séparation de l'État et des religions, au service de la liberté de conscience. Que garantit-elle exactement, et comment s'applique-t-elle à l'école ? Nous présenterons d'abord ses garanties, avant d'étudier son application renforcée dans les établissements scolaires.\n\nLa laïcité offre une triple garantie, construite par l'histoire. Elle garantit d'abord la liberté de conscience, proclamée dès 1789 par l'article 10 de la Déclaration des droits de l'homme et du citoyen : chacun est libre de croire, de ne pas croire ou de changer de conviction, et l'article 1er de la loi du 9 décembre 1905 y ajoute le libre exercice des cultes, dans le respect de l'ordre public. Elle impose ensuite la neutralité de l'État : selon l'article 2 de cette même loi de séparation, la République ne reconnaît, ne salarie ni ne subventionne aucun culte, et ses agents, enseignants, policiers, personnels des mairies, ne manifestent aucune préférence religieuse dans leurs fonctions. Elle garantit enfin l'égalité de tous devant la loi, quelles que soient les convictions : la loi commune s'applique à tous, croyants ou non, aucune règle religieuse ne pouvant s'y substituer ; la critique des idées et des croyances reste libre, tandis que l'injure faite aux personnes et l'incitation à la haine sont punies.\n\nÀ l'école, la laïcité s'applique de manière renforcée, car elle y est une protection. L'école publique est historiquement le premier terrain de la laïcité : les lois Jules Ferry la rendent gratuite en 1881, puis obligatoire et laïque en 1882. Aujourd'hui, des règles précises s'y appliquent : les personnels sont tenus à une stricte neutralité ; la loi du 15 mars 2004 interdit aux élèves des écoles, collèges et lycées publics le port de signes manifestant ostensiblement une appartenance religieuse ; et les contenus d'enseignement, fondés sur les savoirs scientifiques, ne peuvent être contestés au nom d'aucune croyance. La Charte de la laïcité, affichée dans tous les établissements depuis 2013, en explique le sens : la laïcité protège les élèves de tout prosélytisme, leur offre les conditions pour forger leur personnalité et exercer leur libre arbitre, et garantit l'égalité, notamment entre les filles et les garçons.\n\nAinsi, la laïcité garantit la liberté de conscience, la neutralité de l'État et l'égalité de tous les citoyens, et son application renforcée à l'école protège les élèves pour en faire des citoyens libres de leur jugement. Loin d'être une contrainte dirigée contre les religions, elle est le cadre commun du vivre-ensemble, inséparable du combat plus large pour l'égalité et contre toutes les discriminations."}, "activite5_vocabulaire": {"termes": [{"mot": "Laïcité", "definition": "Principe de séparation de l'État et des religions qui garantit la liberté de conscience, la neutralité de l'État et l'égalité de tous, quelles que soient leurs convictions."}, {"mot": "Liberté de conscience", "definition": "Droit de croire, de ne pas croire ou de changer de conviction, proclamé par l'article 10 de la Déclaration de 1789."}, {"mot": "Liberté de culte", "definition": "Droit de pratiquer librement sa religion, en privé comme en public, dans le respect de l'ordre public."}, {"mot": "Neutralité", "definition": "Obligation pour l'État et ses agents de ne privilégier ni manifester aucune conviction religieuse ou politique."}, {"mot": "Loi de 1905", "definition": "Loi du 9 décembre 1905 séparant les Églises et l'État : la République garantit la liberté de conscience mais ne reconnaît, ne salarie ni ne subventionne aucun culte."}, {"mot": "Sécularisation", "definition": "Recul progressif de l'influence de la religion sur la société et les institutions."}, {"mot": "Prosélytisme", "definition": "Attitude consistant à chercher à imposer ou à propager ses convictions auprès des autres, dont l'école protège les élèves."}, {"mot": "Signe religieux ostensible", "definition": "Signe ou tenue manifestant de façon visible et volontaire une appartenance religieuse, interdit aux élèves des établissements publics par la loi du 15 mars 2004."}, {"mot": "Charte de la laïcité", "definition": "Texte de 2013 en quinze articles, affiché dans les établissements scolaires publics, qui explique ce que la laïcité garantit et exige."}, {"mot": "Blasphème", "definition": "Critique ou moquerie d'une religion. Le délit de blasphème n'existe pas en droit français : on peut critiquer les croyances, pas injurier les personnes."}], "notions_essentielles": ["La laïcité est inscrite à l'article 1er de la Constitution : la France est une République indivisible, laïque, démocratique et sociale.", "Son socle est la loi du 9 décembre 1905 : liberté de conscience et de culte, neutralité de l'État qui ne reconnaît, ne salarie ni ne subventionne aucun culte.", "La laïcité protège tous les citoyens, croyants et non-croyants, égaux devant la loi commune qui s'applique à tous.", "À l'école, la laïcité est renforcée : lois Ferry (1881-1882), neutralité des personnels, loi du 15 mars 2004 sur les signes ostensibles, Charte de la laïcité (2013).", "La laïcité n'est pas dirigée contre les religions : c'est une liberté et une protection qui rendent possible le vivre-ensemble."]}}, {"id": 6, "titre": "L'égalité et la lutte contre les discriminations", "activite1_fiche": {"introduction": "L'égalité est la deuxième valeur de la devise républicaine. Proclamée dès 1789, les hommes naissent et demeurent libres et égaux en droits, elle signifie que tous les citoyens ont les mêmes droits et les mêmes devoirs, quelles que soient leur origine, leur religion, leur apparence ou leur situation. Pourtant, les discriminations existent encore : à l'embauche, au logement, à l'école, dans la rue ou sur les réseaux sociaux. La République les combat par le droit, des institutions et l'éducation. Problématique : comment la République garantit-elle l'égalité et lutte-t-elle contre les discriminations ?", "partie1_titre": "I. L'égalité, un principe proclamé et progressivement élargi", "partie1_contenu": "A. Un héritage de la Révolution. L'article 1er de la Déclaration des droits de l'homme et du citoyen du 26 août 1789 proclame que les hommes naissent et demeurent libres et égaux en droits. La Révolution abolit les privilèges de la noblesse et du clergé : la loi devient la même pour tous. L'article 1er de la Constitution de 1958 assure l'égalité devant la loi de tous les citoyens sans distinction d'origine, de race ou de religion.\n\nB. Des conquêtes successives. L'égalité s'est élargie par étapes : abolition définitive de l'esclavage en 1848 (décret porté par Victor Schoelcher), suffrage universel masculin la même année, droit de vote des femmes en 1944, égalité salariale entre femmes et hommes affirmée par la loi dès 1972, parité en politique (loi de 2000), reconnaissance des droits des personnes handicapées (loi de 2005 sur l'accessibilité), mariage pour tous en 2013.\n\nC. Égalité en droits, inégalités en faits. L'égalité juridique n'efface pas toutes les inégalités réelles : écarts de revenus, inégalités femmes-hommes (salaires, partage des tâches, accès aux responsabilités), inégalités territoriales et sociales d'accès à l'éducation, à la santé ou à l'emploi. La République sociale cherche à les réduire par l'école gratuite, la protection sociale et la redistribution.", "partie2_titre": "II. Les discriminations : les reconnaître pour les combattre", "partie2_contenu": "A. Qu'est-ce qu'une discrimination ? Une discrimination est un traitement défavorable d'une personne fondé sur un critère interdit par la loi, dans une situation prévue par la loi (embauche, logement, accès à un service...). Le droit français reconnaît plus de 25 critères de discrimination : origine, sexe, handicap, âge, apparence physique, religion, orientation sexuelle, état de santé, lieu de résidence, etc. La discrimination est un délit puni jusqu'à 3 ans d'emprisonnement et 45 000 euros d'amende (5 ans et 75 000 euros pour un agent public ou un lieu accueillant du public).\n\nB. Des formes multiples. Les discriminations peuvent être directes (refuser un emploi à une personne à cause de son origine) ou indirectes (une règle en apparence neutre qui désavantage un groupe). Elles s'accompagnent souvent de racisme, d'antisémitisme, de sexisme, d'homophobie ou de mépris de classe, et prospèrent sur les préjugés et les stéréotypes : des idées toutes faites attribuées à un groupe entier.\n\nC. Le harcèlement, une violence punie. Le harcèlement, moral, sexuel ou scolaire, est une forme de violence répétée qui vise à rabaisser une personne. Le harcèlement scolaire, y compris le cyberharcèlement, est un délit depuis la loi du 2 mars 2022. Le numéro 3018 permet aux victimes et aux témoins de cyberharcèlement de demander de l'aide, et le 3020 pour le harcèlement scolaire.", "partie3_titre": "III. Les acteurs et les outils de la lutte contre les discriminations", "partie3_contenu": "A. La loi et la justice. La loi interdit et punit les discriminations, les injures racistes ou sexistes et l'incitation à la haine. Les victimes peuvent porter plainte ; les associations antiracistes ou féministes peuvent se porter partie civile. La loi impose aussi des obligations positives : accessibilité des bâtiments aux personnes handicapées, index de l'égalité professionnelle dans les entreprises, parité sur les listes électorales.\n\nB. Le Défenseur des droits. Créé par la révision constitutionnelle de 2008 et installé en 2011, le Défenseur des droits est une autorité indépendante que toute personne peut saisir gratuitement. Il aide les victimes de discriminations à faire valoir leurs droits, mène des enquêtes (testings), propose des réformes et défend particulièrement les droits des enfants.\n\nC. L'éducation et l'engagement de chacun. La lutte contre les discriminations commence par l'éducation : apprendre à repérer ses propres préjugés, refuser les insultes et les moqueries, réagir en témoin face au harcèlement. Au collège, les ambassadeurs contre le harcèlement, les journées de sensibilisation et l'EMC y contribuent. Les associations (SOS Racisme, la LICRA, des associations féministes ou de défense des personnes handicapées) agissent au quotidien. L'égalité n'est pas qu'une affaire de lois : c'est un comportement de chaque citoyen.", "conclusion": "L'égalité, proclamée en 1789 et élargie par des conquêtes successives, de l'abolition de l'esclavage en 1848 au vote des femmes en 1944 et à la parité, est au coeur du pacte républicain. Mais l'égalité en droits n'empêche pas les discriminations, délits punis par la loi et fondés sur plus de 25 critères interdits. La République les combat par la justice, par le Défenseur des droits, par l'école et grâce à l'engagement des associations et de chaque citoyen. Refuser une moquerie, signaler un harcèlement, dépasser ses préjugés : la lutte pour l'égalité se joue aussi dans les gestes de tous les jours."}, "activite2_quiz": [{"question": "Que proclame l'article 1er de la Déclaration des droits de l'homme et du citoyen de 1789 ?", "options": ["Les hommes naissent et demeurent libres et égaux en droits", "La France est un empire", "Le roi est sacré", "Le travail rend libre"], "correcte": 0, "explication": "L'article 1er de la Déclaration du 26 août 1789 fonde l'égalité juridique : les hommes naissent et demeurent libres et égaux en droits. La Révolution abolit les privilèges."}, {"question": "En quelle année l'esclavage a-t-il été définitivement aboli en France ?", "options": ["1789", "1848", "1944", "1905"], "correcte": 1, "explication": "Le décret du 27 avril 1848, porté par Victor Schoelcher, abolit définitivement l'esclavage dans les colonies françaises."}, {"question": "Qu'est-ce qu'une discrimination ?", "options": ["Une simple impolitesse", "Un traitement défavorable fondé sur un critère interdit par la loi, dans une situation prévue par la loi", "Un désaccord politique", "Une critique d'un film"], "correcte": 1, "explication": "Une discrimination est un traitement défavorable (refus d'embauche, de logement, de service...) fondé sur un critère interdit : origine, sexe, handicap, religion, orientation sexuelle, etc."}, {"question": "Combien de critères de discrimination le droit français reconnaît-il environ ?", "options": ["3", "Plus de 25", "Aucun", "200"], "correcte": 1, "explication": "La loi française reconnaît plus de 25 critères de discrimination interdits : origine, sexe, âge, handicap, apparence physique, religion, orientation sexuelle, état de santé, lieu de résidence..."}, {"question": "La discrimination est-elle punie par la loi ?", "options": ["Non, c'est juste immoral", "Oui : c'est un délit puni jusqu'à 3 ans de prison et 45 000 euros d'amende", "Oui, d'une simple contravention", "Seulement si la victime est célèbre"], "correcte": 1, "explication": "La discrimination est un délit puni jusqu'à 3 ans d'emprisonnement et 45 000 euros d'amende, et jusqu'à 5 ans et 75 000 euros quand elle est commise par un agent public ou dans un lieu accueillant du public."}, {"question": "Qu'est-ce qu'un stéréotype ?", "options": ["Une chaîne hi-fi", "Une idée toute faite attribuée à un groupe entier de personnes", "Une loi", "Un type de discrimination puni de prison"], "correcte": 1, "explication": "Un stéréotype est une idée toute faite, simplificatrice, attribuée à tout un groupe (les filles sont..., les jeunes de tel quartier sont...). Les stéréotypes nourrissent les préjugés et les discriminations."}, {"question": "Quelle est la différence entre discrimination directe et indirecte ?", "options": ["Aucune", "La directe vise ouvertement une personne pour un critère interdit ; l'indirecte est une règle en apparence neutre qui désavantage un groupe", "La directe est légale", "L'indirecte n'existe pas"], "correcte": 1, "explication": "Refuser un emploi à cause de l'origine est une discrimination directe ; exiger sans justification une taille minimale qui exclut la plupart des femmes est une discrimination indirecte."}, {"question": "Depuis quelle loi le harcèlement scolaire est-il un délit ?", "options": ["La loi du 2 mars 2022", "La loi de 1905", "La loi de 1881", "Il n'est pas puni"], "correcte": 0, "explication": "La loi du 2 mars 2022 fait du harcèlement scolaire un délit, y compris le cyberharcèlement, avec des peines aggravées selon la gravité des conséquences pour la victime."}, {"question": "Quel numéro permet de signaler un cyberharcèlement ?", "options": ["Le 3018", "Le 18", "Le 115", "Le 3615"], "correcte": 0, "explication": "Le 3018 est le numéro national gratuit pour les victimes et témoins de violences numériques et de cyberharcèlement ; le 3020 concerne le harcèlement scolaire en général."}, {"question": "Qu'est-ce que le Défenseur des droits ?", "options": ["Un avocat payant", "Une autorité indépendante, créée par la révision de 2008, que toute personne peut saisir gratuitement", "Un ministre", "Un juge d'assises"], "correcte": 1, "explication": "Le Défenseur des droits, autorité indépendante issue de la révision constitutionnelle de 2008 et installée en 2011, aide gratuitement les victimes de discriminations et défend les droits des enfants."}, {"question": "Qu'est-ce qu'un testing ?", "options": ["Un examen scolaire", "Une enquête qui compare les réponses faites à des candidatures identiques sauf sur un critère (nom, adresse...) pour prouver une discrimination", "Un test de produits", "Un entraînement sportif"], "correcte": 1, "explication": "Le testing consiste à envoyer des candidatures identiques en ne changeant qu'un critère (nom à consonance étrangère, adresse...) : les écarts de réponses prouvent la discrimination à l'embauche ou au logement."}, {"question": "Que prévoit la loi de 2000 sur la parité ?", "options": ["L'égalité des salaires", "L'égal accès des femmes et des hommes aux mandats électoraux, avec des listes alternant femmes et hommes", "L'interdiction de voter pour les hommes", "La retraite à 60 ans"], "correcte": 1, "explication": "La loi du 6 juin 2000 favorise l'égal accès des femmes et des hommes aux mandats : aux scrutins de liste, les listes doivent alterner candidats féminins et masculins."}, {"question": "Que prévoit la loi de 2005 pour les personnes handicapées ?", "options": ["Rien de particulier", "L'égalité des droits et des chances, notamment l'accessibilité des bâtiments et des transports", "L'interdiction de travailler", "Une carte de réduction uniquement"], "correcte": 1, "explication": "La loi du 11 février 2005 pour l'égalité des droits et des chances impose notamment l'accessibilité des lieux publics, de l'école et des transports aux personnes en situation de handicap."}, {"question": "Que peut faire un témoin de harcèlement au collège ?", "options": ["Rire avec les autres", "Ne rien faire pour ne pas avoir d'ennuis", "Refuser de participer, soutenir la victime et alerter un adulte ou les ambassadeurs contre le harcèlement", "Filmer la scène pour la diffuser"], "correcte": 2, "explication": "Le témoin a un rôle décisif : en refusant de rire, en soutenant la victime et en alertant un adulte, il brise l'isolement de la victime. Le silence et la diffusion d'images aggravent le harcèlement."}, {"question": "Pourquoi dit-on que l'égalité en droits ne suffit pas ?", "options": ["Parce que la loi est inutile", "Parce que des inégalités réelles persistent (revenus, femmes-hommes, territoires) que la République sociale cherche à réduire", "Parce que l'égalité est interdite", "Parce que tout le monde est déjà égal en fait"], "correcte": 1, "explication": "L'égalité juridique n'efface pas les inégalités de fait : écarts de salaires entre femmes et hommes, inégalités sociales et territoriales. L'école gratuite, la protection sociale et la redistribution visent à les réduire."}], "activite3_etude": {"document_type": "texte", "document_titre": "Un testing révèle des discriminations à l'embauche", "document_texte": "« Pour mesurer les discriminations à l'embauche, des chercheurs ont envoyé, pendant plusieurs mois, des milliers de candidatures fictives en réponse à de vraies offres d'emploi. Les CV étaient strictement identiques : même âge, mêmes diplômes, même expérience. Une seule chose changeait : le nom du candidat, tantôt à consonance française, tantôt à consonance étrangère, ou bien l'adresse, tantôt dans un quartier favorisé, tantôt dans un quartier populaire. Les résultats sont sans appel : à compétences égales, le candidat au nom à consonance étrangère reçoit nettement moins de réponses positives ; dans certaines études, il doit envoyer presque deux fois plus de candidatures pour décrocher un entretien. L'adresse joue aussi : habiter certains quartiers fait baisser les chances d'être rappelé. Ces discriminations sont pourtant des délits, punis par la loi. À la suite de ces enquêtes, le Défenseur des droits a rappelé les entreprises à leurs obligations et certaines ont été poursuivies en justice. »", "document_source": "Texte adapté à des fins pédagogiques d'études de testing sur les discriminations à l'embauche (Défenseur des droits, travaux universitaires, années 2010-2020).", "questions": ["Présentez le document : nature, sujet, méthode décrite.", "En quoi consiste la méthode du testing ? Pourquoi est-elle efficace pour prouver une discrimination ?", "Quels critères de discrimination cette enquête met-elle en évidence ? Citez les résultats.", "Que risquent les entreprises qui discriminent ? Quelle institution est intervenue ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que les discriminations contredisent les valeurs républicaines et expliquez comment la République les combat."], "corrections": ["Ce document est un texte adapté d'études de testing menées sur les discriminations à l'embauche, notamment par le Défenseur des droits et des chercheurs universitaires dans les années 2010-2020. Il décrit la méthode utilisée et présente les résultats de ces enquêtes.", "Le testing consiste à envoyer des candidatures fictives strictement identiques (âge, diplômes, expérience) en ne faisant varier qu'un seul critère : le nom ou l'adresse. La méthode est efficace car elle isole le critère testé : si deux CV identiques reçoivent des réponses différentes, la seule explication possible est la discrimination, ce qui en fait une preuve solide.", "L'enquête met en évidence deux critères : l'origine, révélée par le nom à consonance étrangère, et le lieu de résidence. Les résultats sont nets : à compétences égales, le candidat au nom à consonance étrangère reçoit nettement moins de réponses positives, devant parfois envoyer presque deux fois plus de candidatures pour obtenir un entretien, et habiter certains quartiers fait baisser les chances d'être rappelé.", "La discrimination à l'embauche est un délit : elle est punie jusqu'à 3 ans d'emprisonnement et 45 000 euros d'amende. Le document indique que le Défenseur des droits, autorité indépendante que toute victime peut saisir gratuitement, a rappelé les entreprises à leurs obligations et que certaines ont été poursuivies en justice.", "Exemple de rédaction : Les discriminations contredisent frontalement les valeurs républicaines : l'article 1er de la Déclaration de 1789 proclame que les hommes naissent et demeurent libres et égaux en droits, et la Constitution garantit l'égalité sans distinction d'origine. Or le testing décrit dans le document prouve qu'à compétences strictement égales, un nom ou une adresse suffisent à écarter un candidat : c'est la négation de l'égalité et de la fraternité. La République combat ces pratiques par plusieurs moyens : la loi en fait un délit sévèrement puni ; le Défenseur des droits enquête, aide gratuitement les victimes et alerte les entreprises ; la justice condamne les employeurs fautifs ; et l'éducation apprend dès le collège à repérer préjugés et stéréotypes. La lutte pour l'égalité repose ainsi à la fois sur le droit, sur des institutions et sur la vigilance de chaque citoyen."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que l'égalité est un principe fondamental de la République et expliquez comment celle-ci lutte contre les discriminations.", "plan": {"introduction": "Contexte : l'égalité est la deuxième valeur de la devise républicaine, mais les discriminations persistent. Définitions : l'égalité signifie les mêmes droits et devoirs pour tous ; une discrimination est un traitement défavorable fondé sur un critère interdit. Problématique : comment la République garantit-elle l'égalité et combat-elle les discriminations ? Annonce du plan : d'abord l'égalité comme principe conquis et élargi, puis les outils de la lutte contre les discriminations.", "partie1": "I. L'égalité, un principe proclamé et progressivement élargi. Argument 1 : un héritage révolutionnaire : article 1er de la Déclaration de 1789 (les hommes naissent et demeurent libres et égaux en droits), abolition des privilèges ; article 1er de la Constitution de 1958 (égalité devant la loi sans distinction). Argument 2 : des conquêtes successives : abolition de l'esclavage en 1848 (Schoelcher), vote des femmes en 1944, parité (loi de 2000), loi handicap de 2005, mariage pour tous en 2013. Argument 3 : l'égalité en droits n'efface pas les inégalités de fait (salaires femmes-hommes, inégalités sociales et territoriales) : la République sociale les réduit par l'école gratuite et la protection sociale.", "partie2": "II. Une lutte contre les discriminations par le droit, les institutions et l'éducation. Argument 1 : la loi punit : la discrimination est un délit (jusqu'à 3 ans de prison et 45 000 euros d'amende), fondé sur plus de 25 critères interdits ; le harcèlement scolaire est un délit depuis la loi du 2 mars 2022 (numéros 3018 et 3020). Argument 2 : des institutions agissent : le Défenseur des droits (révision de 2008), saisi gratuitement, aide les victimes et mène des testings qui prouvent les discriminations à l'embauche ; la justice condamne ; les associations (LICRA, SOS Racisme) se portent partie civile. Argument 3 : l'éducation et l'engagement : EMC, ambassadeurs contre le harcèlement, déconstruction des préjugés et des stéréotypes ; chaque citoyen est acteur de l'égalité.", "conclusion": "Bilan : proclamée en 1789 et élargie par deux siècles de conquêtes, l'égalité reste un combat : la République y répond par le droit pénal, le Défenseur des droits, la justice et l'éducation. Ouverture : ce combat rejoint l'engagement citoyen, moteur de la vie démocratique."}, "correction_complete": "L'égalité est la deuxième valeur de la devise républicaine : elle signifie que tous les citoyens ont les mêmes droits et les mêmes devoirs, quelles que soient leur origine, leur religion ou leur situation. Pourtant, les discriminations, traitements défavorables fondés sur des critères interdits par la loi, persistent dans l'emploi, le logement ou à l'école. Comment la République garantit-elle l'égalité et combat-elle les discriminations ? Nous montrerons d'abord que l'égalité est un principe conquis et sans cesse élargi, avant de présenter les outils de la lutte contre les discriminations.\n\nL'égalité est d'abord un principe proclamé par la Révolution et progressivement élargi. L'article 1er de la Déclaration des droits de l'homme et du citoyen du 26 août 1789 affirme que les hommes naissent et demeurent libres et égaux en droits : les privilèges de la noblesse et du clergé sont abolis, la loi devient la même pour tous. L'article 1er de la Constitution de 1958 garantit aujourd'hui l'égalité devant la loi sans distinction d'origine, de race ou de religion. Cette égalité s'est construite par conquêtes successives : abolition définitive de l'esclavage en 1848 grâce au décret porté par Victor Schoelcher, droit de vote des femmes en 1944, loi de 2000 sur la parité en politique, loi de 2005 sur les droits des personnes handicapées, mariage pour tous en 2013. Mais l'égalité en droits n'efface pas les inégalités de fait : écarts de salaires entre femmes et hommes, inégalités sociales et territoriales d'accès à l'éducation ou à la santé. La République sociale cherche à les réduire par l'école gratuite, la protection sociale et la redistribution.\n\nContre les discriminations, la République mobilise le droit, des institutions et l'éducation. La loi punit sévèrement : la discrimination est un délit passible de 3 ans d'emprisonnement et de 45 000 euros d'amende, fondé sur plus de 25 critères interdits, de l'origine au handicap en passant par l'orientation sexuelle ; le harcèlement scolaire, y compris en ligne, est un délit depuis la loi du 2 mars 2022, et les numéros 3018 et 3020 viennent en aide aux victimes. Des institutions agissent ensuite : le Défenseur des droits, autorité indépendante issue de la révision constitutionnelle de 2008, peut être saisi gratuitement par toute victime ; ses enquêtes par testing, candidatures identiques où seul le nom ou l'adresse change, prouvent les discriminations à l'embauche et conduisent des entreprises devant la justice, tandis que des associations comme la LICRA ou SOS Racisme se portent partie civile. L'éducation, enfin, est décisive : l'EMC, les ambassadeurs contre le harcèlement et le travail sur les préjugés et les stéréotypes forment des citoyens capables de refuser l'injustice au quotidien.\n\nAinsi, l'égalité, proclamée en 1789 et élargie par deux siècles de conquêtes, demeure un combat permanent que la République mène par le droit pénal, le Défenseur des droits, la justice et l'école. Ce combat n'appartient pas qu'aux institutions : il repose sur l'engagement de chaque citoyen, moteur de la vie démocratique."}, "activite5_vocabulaire": {"termes": [{"mot": "Égalité", "definition": "Principe selon lequel tous les citoyens ont les mêmes droits et les mêmes devoirs, proclamé par la Déclaration de 1789."}, {"mot": "Discrimination", "definition": "Traitement défavorable d'une personne fondé sur un critère interdit par la loi (origine, sexe, handicap, religion...) dans une situation prévue par la loi. C'est un délit."}, {"mot": "Préjugé", "definition": "Opinion adoptée sans examen, souvent négative, à l'égard d'une personne ou d'un groupe."}, {"mot": "Stéréotype", "definition": "Idée toute faite et simplificatrice attribuée à l'ensemble d'un groupe de personnes."}, {"mot": "Racisme", "definition": "Idéologie qui hiérarchise les êtres humains selon leur origine et conduit au mépris, à la haine ou aux discriminations. Les injures racistes sont punies par la loi."}, {"mot": "Sexisme", "definition": "Attitude de mépris ou de discrimination fondée sur le sexe, le plus souvent envers les femmes."}, {"mot": "Harcèlement", "definition": "Violences répétées (paroles, gestes, messages) visant à rabaisser une personne. Le harcèlement scolaire est un délit depuis la loi du 2 mars 2022."}, {"mot": "Cyberharcèlement", "definition": "Harcèlement commis sur internet et les réseaux sociaux. Le 3018 est le numéro d'aide aux victimes."}, {"mot": "Défenseur des droits", "definition": "Autorité indépendante créée par la révision de 2008, que toute personne peut saisir gratuitement pour défendre ses droits face aux discriminations ou aux administrations."}, {"mot": "Testing", "definition": "Méthode d'enquête comparant des candidatures identiques sauf sur un critère (nom, adresse) pour prouver une discrimination."}], "notions_essentielles": ["L'égalité est proclamée par l'article 1er de la Déclaration de 1789 : les hommes naissent et demeurent libres et égaux en droits.", "Elle s'est élargie par conquêtes : abolition de l'esclavage (1848, Schoelcher), vote des femmes (1944), parité (2000), loi handicap (2005), mariage pour tous (2013).", "La discrimination est un délit (jusqu'à 3 ans de prison, 45 000 euros d'amende) fondé sur plus de 25 critères interdits.", "Le Défenseur des droits (2008) aide gratuitement les victimes ; les testings prouvent les discriminations à l'embauche.", "Le harcèlement scolaire est un délit depuis la loi du 2 mars 2022 ; numéros utiles : 3018 (cyberharcèlement) et 3020 (harcèlement scolaire)."]}}, {"id": 7, "titre": "La Défense nationale et la sécurité des Français", "activite1_fiche": {"introduction": "Protéger le territoire, la population et les intérêts de la nation : telle est la mission de la Défense nationale. Face à des menaces qui ont changé, terrorisme, cyberattaques, conflits armés aux portes de l'Europe, la France a adapté sa défense : armée professionnelle depuis la suspension du service militaire en 1997, dissuasion nucléaire, opérations extérieures, alliances. Chaque citoyen participe à cet effort, notamment à travers le parcours de citoyenneté. Problématique : comment la Défense nationale protège-t-elle les Français et quel rôle les citoyens y jouent-ils ?", "partie1_titre": "I. Une défense globale face à des menaces nouvelles", "partie1_contenu": "A. Des menaces diversifiées. Les menaces ne se limitent plus aux guerres entre États : le terrorisme a frappé la France à plusieurs reprises, notamment en 2015 (attentats de janvier contre Charlie Hebdo et l'Hyper Cacher, attentats du 13 novembre à Paris et Saint-Denis) ; les cyberattaques visent hôpitaux, entreprises et administrations ; s'y ajoutent les trafics, les pandémies, les catastrophes naturelles et le retour de la guerre en Europe avec l'invasion de l'Ukraine en 2022.\n\nB. Une défense globale. Face à ces menaces, la défense est dite globale : elle est militaire (les armées), mais aussi civile (sécurité civile, pompiers, plan Vigipirate, opération Sentinelle qui déploie des soldats sur le territoire depuis 2015), économique (protection des entreprises stratégiques) et culturelle (défense des valeurs de la République, lutte contre la désinformation).\n\nC. Qui décide ? Le président de la République est le chef des armées (article 15 de la Constitution) : il décide de l'engagement des forces et de l'emploi éventuel de l'arme nucléaire. Le gouvernement dispose de la force armée (article 20), et le Parlement autorise les déclarations de guerre et la prolongation des interventions extérieures au-delà de quatre mois. Le budget de la défense est voté chaque année par le Parlement.", "partie2_titre": "II. Les moyens de la Défense nationale", "partie2_contenu": "A. Une armée professionnelle. Depuis la décision de 1996 et la loi de 1997 suspendant le service national, la France dispose d'une armée de métier : environ 200 000 militaires d'active répartis entre l'armée de Terre, la Marine nationale, l'armée de l'Air et de l'Espace, auxquels s'ajoutent la Gendarmerie et les réservistes de la Garde nationale, citoyens volontaires qui consacrent une partie de leur temps à la défense.\n\nB. La dissuasion nucléaire et les capacités d'intervention. La France est l'une des rares puissances nucléaires : sa force de dissuasion, sous-marins lanceurs d'engins et composante aéroportée, vise à empêcher toute agression majeure contre ses intérêts vitaux. Ses armées interviennent aussi à l'extérieur (OPEX) : opérations au Sahel contre les groupes djihadistes (Serval en 2013 puis Barkhane), participation aux missions de l'ONU et de l'OTAN, protection du flanc est de l'Europe.\n\nC. Des alliances et une défense européenne. La France est membre fondateur de l'OTAN, l'alliance de défense collective des pays occidentaux : une attaque contre un membre est considérée comme une attaque contre tous (article 5 du traité). Elle est aussi membre permanent du Conseil de sécurité de l'ONU et promeut une défense européenne plus autonome : coopérations industrielles, missions communes de l'Union européenne.", "partie3_titre": "III. Le citoyen, acteur de la Défense : le parcours de citoyenneté", "partie3_contenu": "A. Les trois étapes du parcours de citoyenneté. Depuis la suspension du service militaire, le lien armée-nation passe par le parcours de citoyenneté : 1) l'enseignement de défense au collège (en 3ème, en EMC et en histoire) et au lycée ; 2) le recensement obligatoire en mairie à 16 ans, qui permet l'inscription automatique sur les listes électorales à 18 ans ; 3) la Journée défense et citoyenneté (JDC), obligatoire entre 16 et 18 ans (avant 25 ans au plus tard), où les jeunes découvrent les enjeux de la défense, les métiers des armées et passent des tests. L'attestation de JDC est exigée pour s'inscrire aux examens et concours publics (brevet, baccalauréat, permis de conduire) avant 25 ans.\n\nB. S'engager pour la défense et la sécurité. Les citoyens peuvent s'engager : carrières militaires, réserve opérationnelle de la Garde nationale, service civique, ou Service national universel (SNU) proposé aux jeunes volontaires de 15 à 17 ans avec un séjour de cohésion et une mission d'intérêt général. Les pompiers volontaires, les secouristes et les bénévoles de la sécurité civile participent aussi à la protection de la population.\n\nC. L'esprit de défense au quotidien. La défense repose enfin sur des comportements citoyens : respecter les consignes de sécurité (alerte attentat, exercices PPMS au collège), signaler les contenus dangereux, se former aux gestes qui sauvent, résister à la désinformation. Connaître les menaces et les institutions qui protègent, c'est déjà participer à la résilience de la nation, c'est-à-dire à sa capacité à résister aux crises et à s'en relever.", "conclusion": "Face à des menaces transformées, terrorisme, cyberattaques, retour de la guerre en Europe, la Défense nationale est devenue globale : militaire avec une armée professionnelle et la dissuasion nucléaire, mais aus
