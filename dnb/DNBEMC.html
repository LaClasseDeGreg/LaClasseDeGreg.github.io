si civile, économique et culturelle, sous l'autorité du président de la République, chef des armées. Le citoyen en est un acteur à part entière : le parcours de citoyenneté, enseignement de défense, recensement à 16 ans, Journée défense et citoyenneté, maintient le lien entre l'armée et la nation, et chacun peut s'engager, de la réserve au service civique. La sécurité de tous repose sur l'engagement de chacun."}, "activite2_quiz": [{"question": "Quelle est la mission de la Défense nationale ?", "options": ["Organiser les élections", "Protéger le territoire, la population et les intérêts de la nation", "Gérer les impôts", "Construire des autoroutes"], "correcte": 1, "explication": "La Défense nationale a pour mission de protéger le territoire, la population et les intérêts fondamentaux de la nation contre toutes les menaces."}, {"question": "Qui est le chef des armées en France ?", "options": ["Le Premier ministre", "Le président de la République (article 15 de la Constitution)", "Le ministre des Armées", "Un général"], "correcte": 1, "explication": "L'article 15 de la Constitution fait du président de la République le chef des armées : il décide de l'engagement des forces et de l'emploi éventuel de l'arme nucléaire."}, {"question": "Que signifie l'expression défense globale ?", "options": ["Une défense uniquement militaire", "Une défense qui est à la fois militaire, civile, économique et culturelle", "Une défense mondiale dirigée par l'ONU", "La défense des océans"], "correcte": 1, "explication": "La défense globale mobilise tous les domaines : les armées, mais aussi la sécurité civile, la protection économique et la défense des valeurs face à la désinformation."}, {"question": "Quels attentats ont frappé la France en 2015 ?", "options": ["Aucun", "Les attentats de janvier (Charlie Hebdo, Hyper Cacher) et du 13 novembre (Paris et Saint-Denis)", "Seulement des cyberattaques", "Des attentats en 1995 uniquement"], "correcte": 1, "explication": "En janvier 2015, les attentats contre Charlie Hebdo et l'Hyper Cacher, puis le 13 novembre 2015 les attaques de Paris et Saint-Denis (Bataclan, terrasses, Stade de France) ont endeuillé la France."}, {"question": "Qu'est-ce que l'opération Sentinelle ?", "options": ["Une mission spatiale", "Le déploiement de soldats sur le territoire national pour protéger la population depuis 2015", "Un jeu vidéo", "Une opération au Sahel"], "correcte": 1, "explication": "Lancée après les attentats de janvier 2015, l'opération Sentinelle déploie des milliers de militaires sur le territoire pour protéger les lieux sensibles, en complément du plan Vigipirate."}, {"question": "Depuis quand la France a-t-elle une armée entièrement professionnelle ?", "options": ["Depuis 1905", "Depuis la suspension du service national décidée en 1996-1997", "Depuis 2022", "Elle ne l'est pas"], "correcte": 1, "explication": "La professionnalisation décidée en 1996 et la loi de 1997 suspendent le service militaire obligatoire : la France dispose depuis d'une armée de métier complétée par des réservistes."}, {"question": "Quelles sont les composantes des armées françaises ?", "options": ["L'armée de Terre, la Marine nationale et l'armée de l'Air et de l'Espace", "Uniquement la police", "La légion romaine", "Les casques bleus uniquement"], "correcte": 0, "explication": "Les forces armées comprennent l'armée de Terre, la Marine nationale et l'armée de l'Air et de l'Espace, auxquelles s'ajoutent la Gendarmerie nationale et les réservistes."}, {"question": "À quoi sert la dissuasion nucléaire française ?", "options": ["À gagner toutes les guerres", "À empêcher toute agression majeure contre les intérêts vitaux de la France", "À produire de l'électricité", "À explorer l'espace"], "correcte": 1, "explication": "La force de dissuasion (sous-marins lanceurs d'engins, composante aéroportée) vise à dissuader tout État d'attaquer la France : la menace de représailles rend l'agression trop coûteuse."}, {"question": "Qu'est-ce qu'une OPEX ?", "options": ["Une opération extérieure menée par les armées françaises hors du territoire", "Un exercice scolaire", "Une opération boursière", "Un plan d'urgence à l'école"], "correcte": 0, "explication": "Les opérations extérieures (OPEX) sont les interventions des armées françaises à l'étranger, comme Serval en 2013 puis Barkhane au Sahel contre les groupes djihadistes."}, {"question": "Qu'est-ce que l'OTAN ?", "options": ["Une organisation humanitaire", "L'alliance de défense collective des pays occidentaux : une attaque contre un membre est une attaque contre tous", "Une agence spatiale", "Un traité de commerce"], "correcte": 1, "explication": "L'Organisation du traité de l'Atlantique Nord, fondée en 1949, repose sur la défense collective (article 5) : ses membres se défendent mutuellement en cas d'agression."}, {"question": "Quelles sont les trois étapes du parcours de citoyenneté ?", "options": ["Permis, bac, travail", "L'enseignement de défense, le recensement à 16 ans et la Journée défense et citoyenneté", "École, collège, lycée", "Vote, impôts, retraite"], "correcte": 1, "explication": "Le parcours de citoyenneté comprend l'enseignement de défense (au collège et au lycée), le recensement obligatoire en mairie à 16 ans et la Journée défense et citoyenneté (JDC)."}, {"question": "Que permet le recensement à 16 ans ?", "options": ["De passer le permis poids lourd", "D'être convoqué à la JDC et d'être inscrit automatiquement sur les listes électorales à 18 ans", "De partir à la retraite", "De devenir maire"], "correcte": 1, "explication": "Le recensement en mairie à 16 ans déclenche la convocation à la JDC et permet l'inscription automatique sur les listes électorales à la majorité."}, {"question": "Pourquoi l'attestation de JDC est-elle importante ?", "options": ["Elle ne sert à rien", "Elle est exigée avant 25 ans pour s'inscrire aux examens et concours publics (brevet, bac, permis)", "Elle donne droit à un salaire", "Elle remplace la carte d'identité"], "correcte": 1, "explication": "L'attestation de participation à la JDC est demandée avant 25 ans pour s'inscrire au brevet, au baccalauréat, aux concours publics ou au permis de conduire."}, {"question": "Qu'est-ce que la Garde nationale ?", "options": ["L'armée de Napoléon", "L'ensemble des réservistes volontaires qui consacrent une partie de leur temps à la défense et à la sécurité", "Un club de sport", "La police municipale"], "correcte": 1, "explication": "Créée en 2016, la Garde nationale regroupe les réservistes des armées, de la gendarmerie et de la police : des citoyens volontaires qui renforcent les forces de sécurité."}, {"question": "Comment un citoyen peut-il contribuer à la sécurité au quotidien ?", "options": ["En ne faisant rien", "En respectant les consignes de sécurité, en se formant aux gestes qui sauvent et en résistant à la désinformation", "En diffusant des rumeurs", "En ignorant les exercices d'alerte"], "correcte": 1, "explication": "L'esprit de défense passe par des comportements simples : suivre les consignes (exercices PPMS, alertes), apprendre les gestes de premiers secours, vérifier l'information : c'est la résilience de la nation."}], "activite3_etude": {"document_type": "texte", "document_titre": "La Journée défense et citoyenneté racontée par des élèves de 3ème", "document_texte": "« Convoqués un mardi sur la base militaire voisine, nous étions une centaine de jeunes de 16 et 17 ans, raconte Lina. La journée a commencé par une présentation des menaces : terrorisme, cyberattaques, guerres aux frontières de l'Europe. Des militaires nous ont expliqué l'organisation de la défense : le président chef des armées, le rôle du Parlement, la dissuasion nucléaire, les opérations extérieures. On a aussi passé des tests de lecture : ceux qui ont des difficultés sont orientés vers des dispositifs d'aide. L'après-midi, on nous a présenté les métiers des armées, de mécanicien à médecin militaire, et les formes d'engagement : réserve, service civique, SNU. On a terminé par une initiation aux gestes qui sauvent. À la fin, on nous a remis l'attestation : sans elle, impossible de s'inscrire au bac ou au permis avant 25 ans. Je pensais m'ennuyer, conclut Karim, mais j'ai compris que la défense n'est pas que l'affaire des soldats : c'est aussi la nôtre. »", "document_source": "Texte adapté à des fins pédagogiques de témoignages recueillis lors de Journées défense et citoyenneté (ministère des Armées, presse régionale, années 2010-2020).", "questions": ["Présentez le document : nature, sujet, personnes citées.", "À quelle étape du parcours de citoyenneté cette journée correspond-elle ? Rappelez les deux autres étapes.", "Quels contenus sont abordés pendant la JDC d'après le texte ?", "Pourquoi l'attestation remise en fin de journée est-elle indispensable aux jeunes ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez la phrase de Karim : la défense n'est pas que l'affaire des soldats, c'est aussi la nôtre."], "corrections": ["Ce document est un texte adapté de témoignages de jeunes participants à une Journée défense et citoyenneté, recueillis par le ministère des Armées et la presse régionale. Deux élèves, Lina et Karim, racontent le déroulement de la journée à laquelle ils ont été convoqués sur une base militaire.", "Cette journée correspond à la troisième étape du parcours de citoyenneté : la Journée défense et citoyenneté (JDC), obligatoire pour tous les jeunes Français. Les deux autres étapes sont l'enseignement de défense, dispensé au collège (en 3ème) et au lycée, et le recensement obligatoire en mairie à l'âge de 16 ans.", "La JDC aborde plusieurs contenus : la présentation des menaces actuelles (terrorisme, cyberattaques, guerres aux frontières de l'Europe), l'organisation de la défense (président chef des armées, rôle du Parlement, dissuasion nucléaire, opérations extérieures), des tests de lecture avec orientation des jeunes en difficulté vers des dispositifs d'aide, la découverte des métiers des armées et des formes d'engagement (réserve, service civique, SNU), et une initiation aux gestes qui sauvent.", "L'attestation de participation à la JDC est indispensable car elle est exigée, avant l'âge de 25 ans, pour s'inscrire aux examens et concours soumis au contrôle de l'autorité publique : brevet, baccalauréat, concours de la fonction publique, et permis de conduire. Sans elle, ces inscriptions sont impossibles.", "Exemple de rédaction : La phrase de Karim résume l'esprit de la défense globale. Depuis la suspension du service militaire en 1997, la France a une armée professionnelle : les citoyens ne sont plus soldats, mais la défense reste l'affaire de tous. D'abord parce que la nation décide démocratiquement de sa défense : le président élu est le chef des armées et le Parlement vote le budget et autorise les interventions. Ensuite parce que les menaces actuelles, terrorisme, cyberattaques, désinformation, visent directement la population : chacun contribue à la sécurité en respectant les consignes, en se formant aux gestes qui sauvent et en vérifiant l'information. Enfin parce que tout citoyen peut s'engager : réserve de la Garde nationale, service civique, SNU, sécurité civile. Le parcours de citoyenneté, dont la JDC est l'aboutissement, entretient précisément ce lien entre l'armée et la nation : la résilience du pays repose sur l'engagement de chacun."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que la Défense nationale s'est adaptée à des menaces nouvelles et que le citoyen reste un acteur essentiel de la défense.", "plan": {"introduction": "Contexte : terrorisme, cyberattaques et retour de la guerre en Europe ont transformé les menaces pesant sur la France. Définition : la Défense nationale protège le territoire, la population et les intérêts de la nation ; elle est dite globale. Problématique : comment la défense s'est-elle adaptée et quel rôle le citoyen y joue-t-il ? Annonce du plan : d'abord une défense transformée face aux menaces nouvelles, puis le citoyen acteur de la défense.", "partie1": "I. Une défense adaptée à des menaces nouvelles. Argument 1 : des menaces diversifiées : attentats de 2015 (janvier et 13 novembre), cyberattaques contre hôpitaux et administrations, invasion de l'Ukraine en 2022 ; réponses sur le territoire : plan Vigipirate et opération Sentinelle. Argument 2 : des moyens professionnels et dissuasifs : armée de métier depuis la suspension du service national (1997), environ 200 000 militaires, dissuasion nucléaire qui protège les intérêts vitaux, OPEX comme Serval puis Barkhane au Sahel. Argument 3 : un cadre démocratique et des alliances : le président chef des armées (article 15), le Parlement qui contrôle, l'OTAN (défense collective, article 5) et la construction d'une défense européenne.", "partie2": "II. Le citoyen, acteur essentiel de la défense. Argument 1 : le parcours de citoyenneté maintient le lien armée-nation : enseignement de défense en 3ème, recensement à 16 ans, Journée défense et citoyenneté dont l'attestation est exigée pour le brevet, le bac ou le permis avant 25 ans. Argument 2 : des engagements volontaires : réserve de la Garde nationale (créée en 2016), service civique, SNU, pompiers volontaires et sécurité civile. Argument 3 : l'esprit de défense au quotidien : respecter les consignes (PPMS, alertes), se former aux gestes qui sauvent, résister à la désinformation : autant de comportements qui construisent la résilience de la nation.", "conclusion": "Bilan : face au terrorisme, aux cyberattaques et au retour de la guerre, la France a bâti une défense globale, professionnelle et alliée, dans laquelle le citoyen garde un rôle central, du parcours de citoyenneté à l'engagement volontaire. Ouverture : cet engagement pour la sécurité collective rejoint toutes les autres formes d'engagement citoyen."}, "correction_complete": "Les menaces qui pèsent sur la France ont profondément changé : attentats terroristes, cyberattaques massives, retour de la guerre sur le continent européen. La Défense nationale, dont la mission est de protéger le territoire, la population et les intérêts de la nation, a dû s'adapter, sans que le citoyen cesse d'en être un acteur essentiel. Comment la défense s'est-elle transformée, et quel rôle chacun y joue-t-il ? Nous présenterons d'abord l'adaptation de la défense aux menaces nouvelles, puis la place du citoyen dans cette défense.\n\nLa défense française s'est d'abord adaptée à des menaces diversifiées. Le terrorisme a frappé durement le pays en 2015, avec les attentats de janvier contre Charlie Hebdo et l'Hyper Cacher puis ceux du 13 novembre à Paris et Saint-Denis : l'État a répondu sur le territoire par le plan Vigipirate et l'opération Sentinelle, qui déploie des milliers de soldats pour protéger la population. Les cyberattaques contre les hôpitaux et les administrations, ainsi que l'invasion de l'Ukraine en 2022, rappellent que la guerre n'a pas disparu : la défense est devenue globale, à la fois militaire, civile, économique et culturelle. Ses moyens sont professionnels : depuis la suspension du service national en 1997, la France dispose d'une armée de métier d'environ 200 000 militaires, complétée par les réservistes ; sa dissuasion nucléaire protège ses intérêts vitaux, et ses armées interviennent en opérations extérieures, comme Serval en 2013 puis Barkhane au Sahel. Le tout s'exerce dans un cadre démocratique : le président de la République est le chef des armées selon l'article 15 de la Constitution, le Parlement vote le budget et autorise les interventions prolongées, et la France s'appuie sur l'OTAN, fondée sur la défense collective, tout en promouvant une défense européenne.\n\nLe citoyen demeure pourtant au coeur de cette défense. Le parcours de citoyenneté maintient le lien entre l'armée et la nation : l'enseignement de défense, dispensé notamment en classe de 3ème, le recensement obligatoire en mairie à 16 ans, qui permet l'inscription automatique sur les listes électorales, et la Journée défense et citoyenneté, dont l'attestation est exigée avant 25 ans pour s'inscrire au brevet, au baccalauréat ou au permis de conduire. Chacun peut ensuite s'engager volontairement : dans la réserve de la Garde nationale créée en 2016, dans le service civique, dans le Service national universel ou chez les pompiers volontaires. Enfin, l'esprit de défense se vit au quotidien : respecter les consignes de sécurité et les exercices PPMS au collège, se former aux gestes qui sauvent, vérifier l'information pour résister à la désinformation : autant de comportements qui construisent la résilience de la nation, sa capacité à résister aux crises et à s'en relever.\n\nAinsi, face à des menaces transformées, la France a bâti une défense globale, professionnelle et alliée, sous contrôle démocratique. Mais cette défense ne serait rien sans les citoyens : du parcours de citoyenneté à l'engagement volontaire, la sécurité de tous repose sur l'implication de chacun, comme toutes les formes d'engagement qui font vivre la République."}, "activite5_vocabulaire": {"termes": [{"mot": "Défense nationale", "definition": "Ensemble des moyens visant à protéger le territoire, la population et les intérêts de la nation contre les menaces."}, {"mot": "Défense globale", "definition": "Conception de la défense qui associe les dimensions militaire, civile, économique et culturelle."}, {"mot": "Dissuasion nucléaire", "definition": "Stratégie consistant à empêcher toute agression majeure par la menace de représailles nucléaires. La France en est dotée."}, {"mot": "OPEX", "definition": "Opération extérieure : intervention des armées françaises hors du territoire national (ex. : Serval puis Barkhane au Sahel)."}, {"mot": "OTAN", "definition": "Organisation du traité de l'Atlantique Nord (1949) : alliance de défense collective où une attaque contre un membre est une attaque contre tous."}, {"mot": "Plan Vigipirate", "definition": "Plan national de vigilance et de protection contre la menace terroriste, avec des niveaux d'alerte."}, {"mot": "Opération Sentinelle", "definition": "Déploiement de militaires sur le territoire national depuis 2015 pour protéger la population et les lieux sensibles."}, {"mot": "Parcours de citoyenneté", "definition": "Trois étapes obligatoires : enseignement de défense, recensement en mairie à 16 ans, Journée défense et citoyenneté."}, {"mot": "JDC", "definition": "Journée défense et citoyenneté : journée obligatoire où les jeunes découvrent la défense ; son attestation est exigée pour les examens avant 25 ans."}, {"mot": "Résilience", "definition": "Capacité de la nation à résister à une crise (attentat, cyberattaque, catastrophe) et à s'en relever."}], "notions_essentielles": ["La Défense nationale est globale : militaire, civile, économique et culturelle, face au terrorisme (attentats de 2015), aux cyberattaques et au retour de la guerre en Europe (Ukraine, 2022).", "Le président de la République est le chef des armées (article 15) ; le Parlement contrôle et vote le budget.", "Depuis la suspension du service national (1997), la France a une armée professionnelle, dotée de la dissuasion nucléaire et engagée en OPEX ; elle est membre de l'OTAN.", "Le parcours de citoyenneté comprend l'enseignement de défense, le recensement à 16 ans et la JDC, dont l'attestation est exigée pour le brevet, le bac et le permis avant 25 ans.", "Chaque citoyen contribue à la résilience : engagement (réserve, SNU, service civique), gestes qui sauvent, respect des consignes, lutte contre la désinformation."]}}, {"id": 8, "titre": "L'engagement citoyen : s'engager pour les autres et pour la société", "activite1_fiche": {"introduction": "La démocratie ne vit pas seulement par le vote : elle a besoin de citoyens qui s'engagent. S'engager, c'est consacrer du temps, de l'énergie ou des compétences à une cause qui dépasse son intérêt personnel : aider les autres, défendre des droits, protéger l'environnement, animer la vie locale. En France, des millions de personnes sont bénévoles dans des associations, militent dans des syndicats ou des partis, ou servent la collectivité par le service civique. Cet engagement est possible dès le collège. Problématique : pourquoi et comment les citoyens, y compris les plus jeunes, peuvent-ils s'engager dans la société ?", "partie1_titre": "I. Pourquoi s'engager ? Le sens de l'engagement", "partie1_contenu": "A. Faire vivre la fraternité et la solidarité. L'engagement met en pratique la troisième valeur de la devise républicaine : la fraternité. Distribuer des repas avec les Restos du coeur (fondés par Coluche en 1985), accompagner des personnes âgées isolées, soutenir des élèves en difficulté : autant d'actions qui créent du lien et réduisent les détresses que les institutions seules ne peuvent traiter.\n\nB. Défendre des droits et des causes. S'engager, c'est aussi peser sur les décisions : les syndicats défendent les salariés depuis la loi de 1884 qui les a autorisés ; les associations de défense des droits (droits de l'homme, lutte contre le racisme, droits des femmes, des consommateurs) alertent et agissent en justice ; les ONG comme Médecins sans frontières ou Amnesty International agissent à l'échelle internationale ; les mouvements pour le climat mobilisent la jeunesse.\n\nC. Un bénéfice pour soi et pour la démocratie. L'engagement forme le citoyen : il apprend à coopérer, à débattre, à organiser, à prendre des responsabilités. Il renforce aussi la démocratie : une société où les citoyens s'engagent est plus solidaire, plus vigilante face aux injustices et plus capable de faire entendre la diversité des opinions. L'engagement est reconnu : il peut être valorisé dans les parcours scolaires et professionnels.", "partie2_titre": "II. Les formes de l'engagement", "partie2_contenu": "A. Le bénévolat associatif. La liberté d'association est garantie par la grande loi du 1er juillet 1901 : il suffit d'être deux pour créer une association à but non lucratif. La France compte environ 1,5 million d'associations actives et des millions de bénévoles, dans tous les domaines : sport, culture, solidarité, environnement, éducation populaire. Le bénévole donne son temps gratuitement, par choix.\n\nB. Les engagements encadrés : service civique et volontariats. Le service civique, créé par la loi de 2010, permet aux jeunes de 16 à 25 ans (30 ans pour les personnes en situation de handicap) d'accomplir une mission d'intérêt général de 6 à 12 mois, indemnisée, dans une association ou une collectivité : solidarité, environnement, éducation, sport. D'autres volontariats existent : sapeurs-pompiers volontaires, réserve civique, Service national universel pour les 15-17 ans.\n\nC. L'engagement politique et syndical. Adhérer à un parti politique, militer pendant les campagnes, se présenter aux élections : l'engagement politique est le moteur de la démocratie représentative. L'engagement syndical défend les droits des travailleurs : négociations, grève (droit constitutionnel), représentation du personnel. Signer une pétition, manifester (liberté garantie sous réserve de déclaration), participer à un débat public ou à un budget participatif sont d'autres manières de peser sur les décisions.", "partie3_titre": "III. S'engager dès le collège", "partie3_contenu": "A. Dans l'établissement. Le collège est une première école de l'engagement : être délégué de classe (élu chaque année, il représente ses camarades aux conseils de classe), siéger au conseil de la vie collégienne (CVC), devenir ambassadeur contre le harcèlement, animer le foyer ou l'association sportive, participer aux éco-délégués qui portent les projets de développement durable.\n\nB. En dehors du collège. Dès l'adolescence, on peut être bénévole dans un club sportif ou une association (avec l'accord des parents pour les mineurs), participer à un conseil municipal des jeunes, s'engager chez les jeunes sapeurs-pompiers, suivre une formation aux premiers secours (PSC1), ou rejoindre des mouvements d'éducation populaire et de jeunesse.\n\nC. Un engagement responsable. S'engager suppose des qualités : la fiabilité (tenir ses engagements), l'écoute et le respect des autres, l'esprit d'équipe, et le discernement, notamment sur les réseaux sociaux où l'on peut soutenir des causes mais où il faut vérifier l'information avant de la partager. L'engagement des élèves est valorisé : il développe des compétences reconnues et peut être présenté à l'oral du brevet à travers le parcours citoyen.", "conclusion": "L'engagement citoyen donne vie aux valeurs républicaines, la fraternité d'abord : bénévolat associatif rendu possible par la loi de 1901, service civique créé en 2010, engagement syndical et politique, mobilisations pour le climat ou contre les discriminations. Dès le collège, chacun peut s'engager : délégué, ambassadeur contre le harcèlement, éco-délégué, bénévole ou jeune sapeur-pompier. En s'engageant, le citoyen ne rend pas seulement service aux autres : il se forme, fait vivre la démocratie et prépare la société de demain. La République a besoin de l'engagement de tous."}, "activite2_quiz": [{"question": "Qu'est-ce que l'engagement citoyen ?", "options": ["Un contrat de travail", "Le fait de consacrer du temps ou des compétences à une cause d'intérêt général", "Une obligation légale punie d'amende", "Un placement financier"], "correcte": 1, "explication": "S'engager, c'est donner de son temps, de son énergie ou de ses compétences pour une cause qui dépasse son intérêt personnel : solidarité, droits, environnement, vie locale."}, {"question": "Quelle valeur de la devise républicaine l'engagement met-il particulièrement en pratique ?", "options": ["La liberté", "L'égalité", "La fraternité", "La propriété"], "correcte": 2, "explication": "L'engagement solidaire (aider, accompagner, soutenir) met en oeuvre la fraternité : le lien qui unit les membres de la nation au-delà de leurs différences."}, {"question": "Quelle loi garantit la liberté d'association en France ?", "options": ["La loi du 1er juillet 1901", "La loi de 1905", "La loi de 2004", "La loi de 2022"], "correcte": 0, "explication": "La loi du 1er juillet 1901 garantit la liberté d'association : deux personnes suffisent pour créer une association à but non lucratif. C'est l'une des grandes libertés républicaines."}, {"question": "Combien la France compte-t-elle environ d'associations actives ?", "options": ["1 500", "15 000", "Environ 1,5 million", "150 millions"], "correcte": 2, "explication": "Environ 1,5 million d'associations sont actives en France, animées par des millions de bénévoles, dans le sport, la culture, la solidarité ou l'environnement."}, {"question": "Qui a fondé les Restos du coeur, et en quelle année ?", "options": ["L'abbé Pierre en 1954", "Coluche en 1985", "Victor Hugo en 1862", "Le gouvernement en 2000"], "correcte": 1, "explication": "L'humoriste Coluche a fondé les Restos du coeur en 1985 pour distribuer des repas aux plus démunis : l'association mobilise chaque année des dizaines de milliers de bénévoles."}, {"question": "Qu'est-ce qu'un bénévole ?", "options": ["Un salarié d'association", "Une personne qui donne gratuitement son temps pour une cause, par choix", "Un fonctionnaire", "Un élu local"], "correcte": 1, "explication": "Le bénévole agit gratuitement et librement, sans rémunération, contrairement au salarié ; son engagement repose sur la volonté d'être utile."}, {"question": "Qu'est-ce que le service civique ?", "options": ["Le service militaire obligatoire", "Une mission d'intérêt général de 6 à 12 mois, indemnisée, pour les 16-25 ans, créée en 2010", "Un stage de 3ème", "Un emploi à vie dans la fonction publique"], "correcte": 1, "explication": "Créé par la loi de 2010, le service civique permet aux jeunes de 16 à 25 ans (30 ans en situation de handicap) d'effectuer une mission d'intérêt général indemnisée dans une association ou une collectivité."}, {"question": "Depuis quelle loi les syndicats sont-ils autorisés en France ?", "options": ["La loi de 1884", "La loi de 1901", "La loi de 2010", "Ils sont interdits"], "correcte": 0, "explication": "La loi Waldeck-Rousseau de 1884 autorise les syndicats professionnels : ils défendent les droits et les intérêts des salariés (salaires, conditions de travail)."}, {"question": "Le droit de grève est-il protégé en France ?", "options": ["Non, la grève est interdite", "Oui, c'est un droit à valeur constitutionnelle", "Seulement pour les patrons", "Seulement le week-end"], "correcte": 1, "explication": "Le droit de grève est reconnu par le préambule de la Constitution de 1946, repris par celle de 1958 : c'est un droit fondamental des travailleurs, encadré par la loi."}, {"question": "Qu'est-ce qu'une ONG ?", "options": ["Une entreprise publique", "Une organisation non gouvernementale qui agit pour une cause, souvent à l'échelle internationale", "Un parti politique", "Une agence de l'État"], "correcte": 1, "explication": "Une ONG est une organisation indépendante des États qui agit pour une cause : Médecins sans frontières pour l'aide humanitaire, Amnesty International pour les droits de l'homme."}, {"question": "Quel est le rôle du délégué de classe ?", "options": ["Faire les devoirs des autres", "Représenter ses camarades, notamment au conseil de classe, et faire le lien avec les adultes", "Punir les élèves", "Remplacer les professeurs absents"], "correcte": 1, "explication": "Élu chaque année par sa classe, le délégué représente ses camarades au conseil de classe, transmet leurs demandes et participe à la vie démocratique de l'établissement."}, {"question": "Qu'est-ce qu'un éco-délégué ?", "options": ["Un délégué qui fait des économies", "Un élève élu qui porte les projets de développement durable de son établissement", "Un employé de mairie", "Un délégué payé en euros"], "correcte": 1, "explication": "Les éco-délégués, élus dans chaque classe, animent les actions de développement durable du collège : tri des déchets, économies d'énergie, biodiversité, sensibilisation."}, {"question": "Qu'est-ce que le CVC ?", "options": ["Le conseil de la vie collégienne, instance où des élèves élus participent aux décisions de l'établissement", "Un contrôle de vie de classe", "Un club de vélo", "Un examen"], "correcte": 0, "explication": "Le conseil de la vie collégienne réunit des élèves élus, des adultes de l'établissement et des parents pour améliorer la vie au collège : projets, climat scolaire, aménagements."}, {"question": "Que faut-il vérifier avant de relayer une cause sur les réseaux sociaux ?", "options": ["Le nombre de likes", "La fiabilité de l'information et de sa source", "Rien du tout", "La couleur de l'image"], "correcte": 1, "explication": "L'engagement en ligne exige du discernement : vérifier la source et la véracité d'une information avant de la partager évite de propager rumeurs et fausses nouvelles."}, {"question": "Comment l'engagement d'un collégien peut-il être valorisé au brevet ?", "options": ["Il ne compte pas", "Il peut être présenté à l'oral du DNB à travers le parcours citoyen", "Il donne 20/20 automatiquement", "Il remplace toutes les épreuves"], "correcte": 1, "explication": "L'oral du DNB peut porter sur le parcours citoyen : un engagement comme délégué, éco-délégué ou bénévole peut y être présenté et valorisé."}], "activite3_etude": {"document_type": "texte", "document_titre": "Une année de service civique : le témoignage de Mehdi, 19 ans", "document_texte": "« Après le bac, je ne savais pas trop quoi faire. J'ai vu une annonce d'une association d'aide aux devoirs de mon quartier qui cherchait des volontaires en service civique. J'ai signé pour huit mois : vingt-six heures par semaine, une indemnité d'environ 600 euros par mois, et une mission claire : accompagner des collégiens en difficulté, trois soirs par semaine, et organiser des sorties culturelles. Au début, je doutais : est-ce que j'allais savoir expliquer les maths à des élèves de 5ème ? Mais j'ai été formé, suivi par un tuteur, et j'ai appris à préparer une séance, à parler devant un groupe, à gérer les conflits. J'ai aussi suivi la formation aux premiers secours, comprise dans le service civique. Le plus fort, c'est de voir une élève qui détestait l'école me dire qu'elle a eu 14 à son contrôle. Aujourd'hui, je veux devenir professeur. Le service civique ne m'a pas seulement occupé : il m'a donné confiance et un projet. Et l'attestation compte dans mon dossier pour entrer à l'université. »", "document_source": "Texte adapté à des fins pédagogiques de témoignages de volontaires publiés par l'Agence du service civique (années 2010-2020).", "questions": ["Présentez le document : nature, auteur du témoignage, sujet.", "Décrivez la mission de Mehdi : durée, temps hebdomadaire, indemnité, contenu.", "Quelles compétences Mehdi a-t-il développées grâce à son engagement ?", "En quoi ce témoignage montre-t-il que l'engagement est utile à la fois aux autres et à celui qui s'engage ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que la République encourage l'engagement des jeunes et expliquez pourquoi."], "corrections": ["Ce document est un témoignage de Mehdi, un jeune homme de 19 ans, adapté de récits de volontaires publiés par l'Agence du service civique. Il y raconte son année d'engagement dans une association d'aide aux devoirs de son quartier, après l'obtention de son baccalauréat.", "La mission de Mehdi a duré huit mois, à raison de vingt-six heures par semaine, avec une indemnité d'environ 600 euros par mois. Son contenu : accompagner des collégiens en difficulté trois soirs par semaine pour l'aide aux devoirs et organiser des sorties culturelles. Il a été formé et suivi par un tuteur, et a reçu la formation aux premiers secours.", "Mehdi a développé de nombreuses compétences : préparer une séance de travail, parler devant un groupe, gérer les conflits, expliquer des notions scolaires, ainsi que les gestes de premiers secours. Il a aussi gagné en confiance en lui et a construit un projet professionnel : devenir professeur.", "Le témoignage montre la double utilité de l'engagement. Pour les autres : les collégiens accompagnés progressent, comme cette élève qui détestait l'école et obtient 14 à un contrôle. Pour celui qui s'engage : Mehdi a acquis des compétences, de la confiance, un projet d'avenir, et son attestation est valorisée dans son dossier universitaire. L'engagement n'est pas un sacrifice : c'est un échange.", "Exemple de rédaction : La République encourage activement l'engagement des jeunes parce qu'elle y gagne doublement. Elle a d'abord créé des cadres : la loi de 1901 garantit la liberté d'association, et la loi de 2010 a institué le service civique, mission d'intérêt général indemnisée et encadrée par un tuteur, comme le montre le parcours de Mehdi ; au collège, les fonctions de délégué, d'éco-délégué ou d'ambassadeur contre le harcèlement, et le parcours citoyen valorisé à l'oral du brevet, jouent le même rôle. Elle encourage cet engagement car il rend des services que l'État seul ne peut assurer, ici l'accompagnement scolaire de collégiens en difficulté, et parce qu'il forme des citoyens : Mehdi apprend à transmettre, à coopérer, à se projeter. Une démocratie vivante a besoin de citoyens engagés : en soutenant l'engagement des jeunes, la République prépare la société solidaire de demain."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que l'engagement citoyen prend des formes variées et qu'il est essentiel à la vie démocratique.", "plan": {"introduction": "Contexte : la démocratie ne vit pas seulement par le vote ; elle repose aussi sur l'engagement des citoyens. Définition : s'engager, c'est consacrer du temps ou des compétences à une cause d'intérêt général. Problématique : quelles formes prend l'engagement citoyen et pourquoi est-il essentiel à la démocratie ? Annonce du plan : d'abord la diversité des formes d'engagement, puis son rôle essentiel pour la société et la démocratie.", "partie1": "I. Des formes d'engagement variées, accessibles à tous. Argument 1 : le bénévolat associatif, permis par la loi du 1er juillet 1901 : environ 1,5 million d'associations et des millions de bénévoles (Restos du coeur fondés par Coluche en 1985, clubs sportifs, associations culturelles ou environnementales). Argument 2 : les engagements encadrés : service civique (loi de 2010, mission indemnisée de 6 à 12 mois pour les 16-25 ans), SNU, sapeurs-pompiers volontaires, réserve civique. Argument 3 : l'engagement politique et syndical : syndicats autorisés depuis 1884, droit de grève constitutionnel, partis, pétitions et manifestations ; et dès le collège : délégués, CVC, éco-délégués, ambassadeurs contre le harcèlement.", "partie2": "II. Un engagement essentiel à la société et à la démocratie. Argument 1 : il fait vivre la fraternité : distribution de repas, soutien scolaire, aide aux personnes isolées : l'engagement répond à des besoins que les institutions seules ne couvrent pas. Argument 2 : il permet de défendre des droits et de peser sur les décisions : associations antiracistes, mouvements pour le climat, ONG comme Médecins sans frontières ou Amnesty International, syndicats. Argument 3 : il forme le citoyen et renforce la démocratie : coopérer, débattre, prendre des responsabilités ; un engagement valorisé jusque dans le parcours citoyen présenté à l'oral du DNB.", "conclusion": "Bilan : du bénévolat au service civique, de l'action syndicale aux fonctions de délégué, l'engagement prend mille formes et irrigue la démocratie : il concrétise la fraternité, défend les droits et forme les citoyens. Ouverture : pour s'engager de façon éclairée, encore faut-il être bien informé : c'est l'enjeu de l'éducation aux médias."}, "correction_complete": "La démocratie ne se résume pas au vote : entre deux élections, elle vit par l'engagement de millions de citoyens qui donnent de leur temps pour les autres et pour la société. S'engager, c'est consacrer du temps, de l'énergie ou des compétences à une cause d'intérêt général qui dépasse son intérêt personnel. Quelles formes cet engagement prend-il, et pourquoi est-il essentiel à la vie démocratique ? Nous présenterons d'abord la diversité des formes d'engagement, avant de montrer leur rôle décisif pour la société et la démocratie.\n\nL'engagement citoyen prend des formes très variées, accessibles à tous. La plus répandue est le bénévolat associatif, rendu possible par la loi du 1er juillet 1901 qui garantit la liberté d'association : la France compte environ 1,5 million d'associations actives, animées par des millions de bénévoles, des Restos du coeur fondés par Coluche en 1985 aux clubs sportifs, en passant par les associations culturelles et environnementales. Des engagements encadrés existent aussi : le service civique, créé par la loi de 2010, propose aux jeunes de 16 à 25 ans une mission d'intérêt général indemnisée de six à douze mois ; s'y ajoutent le Service national universel, les sapeurs-pompiers volontaires ou la réserve civique. L'engagement peut enfin être politique et syndical : les syndicats, autorisés depuis la loi de 1884, défendent les salariés, le droit de grève a valeur constitutionnelle, et chacun peut adhérer à un parti, signer une pétition ou manifester. Cet apprentissage commence dès le collège : délégués de classe, conseil de la vie collégienne, éco-délégués et ambassadeurs contre le harcèlement font vivre la démocratie scolaire.\n\nCet engagement est essentiel à la société comme à la démocratie. Il fait d'abord vivre la fraternité, troisième valeur de la devise : distribuer des repas, accompagner des élèves en difficulté ou des personnes âgées isolées répond à des besoins que les institutions seules ne peuvent couvrir. Il permet ensuite de défendre des droits et de peser sur les décisions : les associations de lutte contre le racisme agissent en justice, les mouvements pour le climat mobilisent la jeunesse, les ONG comme Médecins sans frontières ou Amnesty International interviennent à l'échelle internationale, les syndicats négocient les conditions de travail. Il forme enfin le citoyen : s'engager, c'est apprendre à coopérer, à débattre, à organiser et à prendre des responsabilités ; cette formation est reconnue, puisque l'engagement peut être présenté à l'oral du brevet à travers le parcours citoyen. Une démocratie où les citoyens s'engagent est plus solidaire, plus vigilante face aux injustices et plus vivante.\n\nAinsi, du bénévolat associatif au service civique, de l'action syndicale aux fonctions de délégué au collège, l'engagement citoyen prend mille formes et irrigue toute la vie démocratique : il concrétise la fraternité, défend les droits et forme les citoyens de demain. Encore faut-il, pour s'engager de manière éclairée, savoir s'informer : c'est tout l'enjeu de l'éducation aux médias et à l'information."}, "activite5_vocabulaire": {"termes": [{"mot": "Engagement", "definition": "Fait de consacrer du temps, de l'énergie ou des compétences à une cause d'intérêt général, au service des autres ou de la société."}, {"mot": "Bénévole", "definition": "Personne qui agit gratuitement et librement au service d'une cause, sans rémunération."}, {"mot": "Association", "definition": "Groupement de personnes réunies autour d'un projet commun à but non lucratif. La liberté d'association est garantie par la loi du 1er juillet 1901."}, {"mot": "Service civique", "definition": "Dispositif créé en 2010 permettant aux 16-25 ans d'accomplir une mission d'intérêt général indemnisée de 6 à 12 mois."}, {"mot": "Syndicat", "definition": "Organisation qui défend les droits et les intérêts des travailleurs, autorisée en France depuis la loi de 1884."}, {"mot": "ONG", "definition": "Organisation non gouvernementale : association indépendante des États agissant pour une cause, souvent internationale (Médecins sans frontières, Amnesty International)."}, {"mot": "Pétition", "definition": "Demande écrite collective adressée aux pouvoirs publics pour obtenir une décision ou alerter sur une cause."}, {"mot": "Délégué de classe", "definition": "Élève élu par sa classe pour représenter ses camarades, notamment au conseil de classe."}, {"mot": "Éco-délégué", "definition": "Élève élu chargé de porter les projets de développement durable de son établissement."}, {"mot": "Parcours citoyen", "definition": "Parcours éducatif qui rassemble les actions et engagements citoyens de l'élève, de l'école au lycée ; il peut être présenté à l'oral du DNB."}], "notions_essentielles": ["S'engager, c'est servir une cause d'intérêt général : l'engagement fait vivre la fraternité républicaine.", "La loi du 1er juillet 1901 garantit la liberté d'association : environ 1,5 million d'associations et des millions de bénévoles en France.", "Le service civique (loi de 2010) offre aux 16-25 ans une mission d'intérêt général indemnisée de 6 à 12 mois.", "Syndicats (autorisés en 1884), partis, pétitions, manifestations et ONG permettent de défendre des droits et de peser sur les décisions.", "Dès le collège, on s'engage : délégué, CVC, éco-délégué, ambassadeur contre le harcèlement ; cet engagement peut être valorisé à l'oral du DNB (parcours citoyen)."]}}, {"id": 9, "titre": "Les médias, l'information et l'opinion : s'informer en citoyen", "activite1_fiche": {"introduction": "Pour voter, débattre et s'engager, le citoyen doit être informé. La liberté d'expression et la liberté de la presse, conquises par la Révolution et garanties par la grande loi du 29 juillet 1881, sont des piliers de la démocratie. Mais l'ère d'internet et des réseaux sociaux a bouleversé l'information : chacun peut publier, les fausses nouvelles circulent vite, et les algorithmes enferment parfois dans des bulles. Apprendre à s'informer est devenu une compétence citoyenne essentielle. Problématique : pourquoi la liberté de l'information est-elle vitale en démocratie, et comment s'informer de manière fiable à l'heure des réseaux sociaux ?", "partie1_titre": "I. La liberté d'expression et de la presse, piliers de la démocratie", "partie1_contenu": "A. Une liberté fondamentale conquise. L'article 11 de la Déclaration des droits de l'homme et du citoyen de 1789 proclame que la libre communication des pensées et des opinions est un des droits les plus précieux de l'homme. La loi du 29 juillet 1881 sur la liberté de la presse en fait une réalité : tout journal peut paraître sans autorisation préalable ni censure. Cette liberté distingue les démocraties des dictatures, où la presse est contrôlée et les journalistes emprisonnés.\n\nB. Une liberté encadrée par la loi. La liberté d'expression n'autorise pas tout : la loi de 1881 et les textes ultérieurs punissent la diffamation (accuser sans preuve), l'injure, l'incitation à la haine ou à la violence, l'apologie du terrorisme et la contestation des crimes contre l'humanité. On peut critiquer des idées, des religions, des gouvernements ; on ne peut pas appeler à la haine contre des personnes.\n\nC. Le rôle démocratique des journalistes. Les journalistes informent, enquêtent et révèlent ce que les pouvoirs voudraient cacher : on parle de la presse comme d'un quatrième pouvoir et d'un contre-pouvoir. Leur métier obéit à une déontologie : vérifier les faits, croiser les sources, protéger ses sources, séparer les faits du commentaire, rectifier ses erreurs. Le pluralisme des médias, garanti par l'Arcom (qui a remplacé le CSA en 2022), permet au citoyen de confronter les points de vue.", "partie2_titre": "II. Internet et les réseaux sociaux : une révolution de l'information", "partie2_contenu": "A. Des opportunités démocratiques. Internet a démocratisé l'accès à l'information et à la parole : chacun peut s'informer en continu, publier, témoigner, interpeller les responsables, lancer des pétitions ou documenter des événements que les médias traditionnels ne couvrent pas. Les réseaux sociaux ont joué un rôle dans des mobilisations citoyennes partout dans le monde.\n\nB. Des dangers nouveaux. Cette ouverture a un revers : les fausses nouvelles (infox ou fake news) se propagent plus vite que les démentis ; la désinformation, parfois organisée par des États ou des groupes, manipule les opinions ; les théories du complot proposent des explications simplistes et trompeuses ; les deepfakes fabriquent de fausses images et vidéos de plus en plus crédibles. Le harcèlement et les discours de haine prospèrent aussi en ligne.\n\nC. Les algorithmes et la bulle de filtre. Les réseaux sociaux ne montrent pas tout : leurs algorithmes sélectionnent les contenus qui retiennent l'attention et qui correspondent à nos goûts. À force de ne voir que ce qui nous conforte, on risque de s'enfermer dans une bulle de filtre où l'on ne rencontre plus d'opinions différentes : un danger pour le débat démocratique, qui suppose la confrontation des idées.", "partie3_titre": "III. S'informer en citoyen : vérifier, croiser, exercer son esprit critique", "partie3_contenu": "A. Les bons réflexes face à une information. Avant de croire ou de partager : identifier la source (qui publie ? un média reconnu, un site inconnu, un compte anonyme ?), vérifier la date (une vieille image ressort souvent hors contexte), croiser avec d'autres sources fiables, se méfier des titres sensationnels conçus pour faire cliquer (putaclic) et des images dont on peut vérifier l'origine par la recherche inversée.\n\nB. Distinguer les types de contenus. Un fait peut être vérifié ; une opinion est un jugement personnel, légitime mais discutable ; une publicité cherche à vendre ; une rumeur n'est pas sourcée. Les médias sérieux distinguent l'information du commentaire. Des services de vérification des faits (fact-checking) aident à démêler le vrai du faux.\n\nC. Une éducation aux médias pour tous. L'éducation aux médias et à l'information (EMI), portée à l'école notamment avec le CLEMI et la Semaine de la presse, forme des citoyens capables d'exercer leur esprit critique : comprendre comment l'information est fabriquée, qui la finance, comment fonctionnent les algorithmes. S'informer auprès de sources variées et fiables, débattre en respectant les autres, signaler les contenus haineux : c'est ainsi que chaque citoyen protège, à son échelle, la qualité du débat démocratique.", "conclusion": "La liberté d'expression, proclamée en 1789, et la liberté de la presse, garantie par la loi du 29 juillet 1881, sont des piliers de la démocratie : sans information libre et pluraliste, pas de citoyens éclairés ni de contre-pouvoir. Internet et les réseaux sociaux ont démultiplié l'accès à l'information mais aussi les dangers : infox, théories du complot, bulles de filtre. Face à eux, le citoyen dispose d'armes : vérifier les sources, croiser les informations, distinguer faits et opinions, se former à l'éducation aux médias. S'informer sérieusement n'est pas un luxe : c'est la condition d'un vote libre, d'un débat de qualité et d'une démocratie en bonne santé."}, "activite2_quiz": [{"question": "Quel article de la Déclaration de 1789 proclame la liberté d'expression ?", "options": ["L'article 11", "L'article 49-3", "L'article 1905", "Aucun"], "correcte": 0, "explication": "L'article 11 de la Déclaration des droits de l'homme et du citoyen proclame que la libre communication des pensées et des opinions est un des droits les plus précieux de l'homme."}, {"question": "Quelle grande loi garantit la liberté de la presse en France ?", "options": ["La loi du 29 juillet 1881", "La loi de 1905", "La loi de 2004", "La loi de 1791"], "correcte": 0, "explication": "La loi du 29 juillet 1881 sur la liberté de la presse permet à tout journal de paraître sans autorisation préalable ni censure : c'est l'un des piliers de la démocratie française."}, {"question": "Qu'est-ce que la diffamation ?", "options": ["Un compliment", "Le fait d'accuser publiquement une personne d'un fait précis sans preuve, puni par la loi", "Une critique de film", "Un débat télévisé"], "correcte": 1, "explication": "La diffamation consiste à porter atteinte à l'honneur d'une personne en lui imputant un fait précis non prouvé : elle est punie par la loi de 1881, comme l'injure et l'incitation à la haine."}, {"question": "Pourquoi parle-t-on de la presse comme d'un quatrième pouvoir ?", "options": ["Parce qu'elle vote les lois", "Parce qu'en informant et en enquêtant, elle contrôle les autres pouvoirs et révèle ce qu'ils voudraient cacher", "Parce qu'elle dirige l'armée", "Parce qu'elle rend la justice"], "correcte": 1, "explication": "Aux côtés des pouvoirs exécutif, législatif et judiciaire, la presse joue un rôle de contre-pouvoir : ses enquêtes révèlent les abus et obligent les puissants à rendre des comptes."}, {"question": "Quelles sont les règles de déontologie des journalistes ?", "options": ["Publier le plus vite possible sans vérifier", "Vérifier les faits, croiser les sources, protéger ses sources, séparer faits et commentaires, rectifier ses erreurs", "Inventer des témoignages", "Ne citer que des anonymes"], "correcte": 1, "explication": "La déontologie journalistique impose la vérification des faits, le croisement et la protection des sources, la distinction entre faits et opinions, et la rectification des erreurs."}, {"question": "Quelle autorité veille au pluralisme des médias audiovisuels depuis 2022 ?", "options": ["L'Arcom (qui a remplacé le CSA)", "La SNCF", "Le Conseil constitutionnel", "L'ONU"], "correcte": 0, "explication": "L'Arcom (Autorité de régulation de la communication audiovisuelle et numérique), née en 2022 de la fusion du CSA et de la Hadopi, veille notamment au pluralisme et à la protection des publics."}, {"question": "Qu'est-ce qu'une infox (fake news) ?", "options": ["Une information vérifiée", "Une fausse information fabriquée ou déformée, souvent pour tromper ou manipuler", "Un journal télévisé", "Une publicité honnête"], "correcte": 1, "explication": "Une infox est une information fausse, fabriquée ou sortie de son contexte, diffusée pour tromper, faire le buzz ou manipuler l'opinion. Elle circule souvent plus vite que les démentis."}, {"question": "Qu'est-ce qu'une théorie du complot ?", "options": ["Une enquête de police", "Un récit qui prétend tout expliquer par l'action secrète d'un petit groupe, sans preuves vérifiables", "Une loi secrète", "Un genre de film uniquement"], "correcte": 1, "explication": "Les théories du complot proposent des explications simplistes : un groupe caché manipulerait les événements. Elles rejettent les preuves et se nourrissent de coïncidences : l'esprit critique permet de les démonter."}, {"question": "Qu'est-ce qu'un deepfake ?", "options": ["Un poisson des profondeurs", "Une image ou une vidéo truquée par intelligence artificielle, imitant une personne de façon très réaliste", "Un réseau social", "Un antivirus"], "correcte": 1, "explication": "Les deepfakes sont des vidéos ou des sons fabriqués par intelligence artificielle qui font dire ou faire n'importe quoi à une personne : une menace croissante pour l'information."}, {"question": "Qu'est-ce que la bulle de filtre ?", "options": ["Un jeu vidéo", "L'enfermement dans des contenus choisis par les algorithmes qui confortent nos opinions", "Un filtre photo", "Une bulle de savon"], "correcte": 1, "explication": "Les algorithmes des réseaux sociaux nous montrent surtout ce qui nous plaît déjà : à force, on ne rencontre plus d'opinions différentes. Cette bulle de filtre appauvrit le débat démocratique."}, {"question": "Quel est le premier réflexe face à une information douteuse ?", "options": ["La partager immédiatement", "Identifier la source : qui publie, avec quelle fiabilité ?", "La commenter avec colère", "Fermer les yeux"], "correcte": 1, "explication": "Avant de croire ou de partager, on identifie la source : média reconnu ou site inconnu, auteur identifiable ou compte anonyme, présence de preuves. Puis on croise avec d'autres sources fiables."}, {"question": "Comment vérifier l'origine d'une image qui circule ?", "options": ["C'est impossible", "Par la recherche d'image inversée, qui retrouve ses publications antérieures", "En comptant les pixels", "En demandant à un ami"], "correcte": 1, "explication": "La recherche d'image inversée permet de retrouver où et quand une image a déjà été publiée : on découvre souvent qu'une photo ancienne ressort hors contexte."}, {"question": "Quelle est la différence entre un fait et une opinion ?", "options": ["Aucune", "Un fait peut être vérifié ; une opinion est un jugement personnel, discutable", "L'opinion est toujours fausse", "Le fait est toujours secret"], "correcte": 1, "explication": "Un fait est vérifiable (un chiffre, un événement) ; une opinion est un avis, légitime mais discutable. Les médias sérieux séparent l'information du commentaire : le citoyen doit savoir les distinguer."}, {"question": "Qu'est-ce que le fact-checking ?", "options": ["Un sport", "La vérification des faits et des déclarations par des journalistes spécialisés", "Un virus informatique", "Une publicité"], "correcte": 1, "explication": "Le fact-checking (vérification des faits) consiste à contrôler l'exactitude des déclarations publiques et des contenus viraux : de nombreux médias ont des équipes dédiées."}, {"question": "Qu'est-ce que l'EMI ?", "options": ["L'éducation aux médias et à l'information, qui forme l'esprit critique des élèves", "Une émission de téléréalité", "Un examen médical", "Une monnaie européenne"], "correcte": 0, "explication": "L'éducation aux médias et à l'information, portée notamment par le CLEMI et la Semaine de la presse à l'école, apprend aux élèves à comprendre la fabrique de l'information et à exercer leur esprit critique."}], "activite3_etude": {"document_type": "texte", "document_titre": "Anatomie d'une fausse nouvelle : comment une infox a circulé plus vite que la vérité", "document_texte": "« Tout commence un samedi soir par la photo d'un supermarché aux rayons vides, publiée par un compte anonyme avec ce message : Pénurie générale dès lundi, les médias vous le cachent ! Partagez avant censure ! En quelques heures, l'image est partagée des dizaines de milliers de fois, reprise par des comptes complotistes qui y voient la preuve d'un plan secret. Des clients inquiets se ruent dans les magasins. Le lundi, des journalistes spécialisés en vérification mènent l'enquête : la recherche d'image inversée révèle que la photo a été prise trois ans plus tôt, dans un autre pays, lors d'une grève des transporteurs. Aucune pénurie n'est annoncée nulle part ; les enseignes démentent. Mais le démenti, publié par plusieurs rédactions, est dix fois moins partagé que la rumeur. Les chercheurs qui étudient les réseaux sociaux le confirment : les fausses nouvelles, plus surprenantes et plus émouvantes, voyagent plus vite et plus loin que les vraies, car les algorithmes favorisent ce qui fait réagir. »", "document_source": "Texte adapté à des fins pédagogiques d'enquêtes de services de vérification des faits et d'études sur la diffusion des fausses nouvelles (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, sources mobilisées.", "Relevez les indices qui auraient dû éveiller la méfiance dès la publication initiale.", "Comment les journalistes ont-ils démontré que l'information était fausse ?", "Pourquoi le démenti a-t-il moins circulé que la rumeur ? Quel rôle jouent les algorithmes ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez quels réflexes le citoyen doit adopter face à une information virale."], "corrections": ["Ce document est un texte adapté d'enquêtes de services de vérification des faits (fact-checking) et d'études scientifiques sur la diffusion des fausses nouvelles. Il reconstitue le parcours d'une infox : une photo de rayons vides accompagnée d'une annonce de pénurie, depuis sa publication jusqu'à son démenti.", "Plusieurs indices auraient dû éveiller la méfiance : la source est un compte anonyme, donc invérifiable ; le message joue sur l'émotion et l'urgence (Partagez avant censure !) ; il accuse les médias de cacher la vérité, argument typique des théories du complot ; et il n'apporte aucune preuve : une photo seule, sans lieu ni date, ne prouve rien.", "Les journalistes ont appliqué les méthodes de vérification : la recherche d'image inversée a montré que la photo datait de trois ans plus tôt et provenait d'un autre pays, lors d'une grève des transporteurs ; ils ont ensuite croisé les sources en interrogeant les enseignes, qui ont démenti toute pénurie. L'information était donc une image sortie de son contexte.", "Le démenti a été dix fois moins partagé que la rumeur car les fausses nouvelles, plus surprenantes et plus émouvantes, font davantage réagir : or les algorithmes des réseaux sociaux favorisent précisément les contenus qui suscitent des réactions. La vérité, moins spectaculaire, circule moins vite et moins loin.", "Exemple de rédaction : Face à une information virale, le citoyen doit d'abord résister à l'émotion et à l'urgence : les infox sont précisément conçues pour faire réagir et partager sans réfléchir, comme le montre le Partagez avant censure du document. Le premier réflexe est d'identifier la source : un compte anonyme sans preuves n'a aucune valeur face à des médias identifiés et responsables. Il faut ensuite vérifier : la recherche d'image inversée aurait immédiatement révélé que la photo était ancienne et étrangère, et le croisement avec d'autres sources fiables aurait montré qu'aucune pénurie n'était annoncée. Il faut enfin s'interroger sur la logique du récit : accuser les médias de tout cacher est la marque des théories du complot. Ne pas partager une information douteuse, c'est déjà protéger le débat démocratique : sur les réseaux, chaque citoyen est responsable de ce qu'il diffuse."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que la liberté de l'information est un pilier de la démocratie et expliquez comment le citoyen peut s'informer de manière fiable à l'heure des réseaux sociaux.", "plan": {"introduction": "Contexte : pour voter et débattre, le citoyen doit être informé ; or internet a bouleversé l'information. Définitions : la liberté de la presse est le droit d'informer sans censure ; une infox est une fausse information. Problématique : pourquoi la liberté de l'information est-elle vitale et comment s'informer de façon fiable aujourd'hui ? Annonce du plan : d'abord la liberté de l'information comme pilier démocratique, puis les défis des réseaux sociaux et les réflexes du citoyen éclairé.", "partie1": "I. La liberté de l'information, pilier de la démocratie. Argument 1 : une liberté fondamentale : article 11 de la Déclaration de 1789, loi du 29 juillet 1881 sur la liberté de la presse (ni autorisation préalable ni censure) ; son absence caractérise les dictatures. Argument 2 : une liberté encadrée : la loi punit la diffamation, l'injure, l'incitation à la haine et l'apologie du terrorisme : on critique des idées, pas des personnes. Argument 3 : la presse, quatrième pouvoir : les journalistes enquêtent et révèlent les abus, selon une déontologie (vérifier, croiser, protéger les sources) ; l'Arcom (2022) garantit le pluralisme.", "partie2": "II. S'informer en citoyen à l'heure des réseaux sociaux. Argument 1 : des opportunités et des dangers : information en continu et parole pour tous, mais infox qui circulent plus vite que les démentis, théories du complot, deepfakes, et bulles de filtre créées par les algorithmes qui enferment dans ses opinions. Argument 2 : des réflexes de vérification : identifier la source, vérifier la date, croiser les informations, recherche d'image inversée, recourir au fact-checking ; distinguer les faits (vérifiables) des opinions (discutables). Argument 3 : une éducation aux médias : l'EMI, le CLEMI et la Semaine de la presse forment l'esprit critique ; le citoyen responsable ne partage pas sans vérifier et signale les contenus haineux.", "conclusion": "Bilan : garantie depuis 1789 et 1881, la liberté de l'information nourrit la démocratie, mais les réseaux sociaux exigent un citoyen formé, capable de vérifier, croiser et distinguer faits et opinions. Ouverture : s'informer sérieusement est la condition de toutes les autres pratiques citoyennes, du vote à l'engagement."}, "correction_complete": "Pour voter, débattre et s'engager en connaissance de cause, le citoyen doit être informé : l'information libre est l'oxygène de la démocratie. Or internet et les réseaux sociaux ont bouleversé la manière dont elle circule. Pourquoi la liberté de l'information est-elle vitale en démocratie, et comment le citoyen peut-il s'informer de manière fiable aujourd'hui ? Nous montrerons d'abord que cette liberté est un pilier démocratique, avant d'examiner les défis des réseaux sociaux et les réflexes du citoyen éclairé.\n\nLa liberté de l'information est d'abord un pilier de la démocratie. C'est une liberté fondamentale conquise par la Révolution : l'article 11 de la Déclaration des droits de l'homme et du citoyen de 1789 proclame la libre communication des pensées et des opinions, et la loi du 29 juillet 1881 sur la liberté de la presse permet à tout journal de paraître sans autorisation préalable ni censure. Son absence caractérise les dictatures, où les journalistes sont surveillés ou emprisonnés. Cette liberté est encadrée : la loi punit la diffamation, l'injure, l'incitation à la haine et l'apologie du terrorisme ; on peut critiquer des idées, des religions ou des gouvernements, mais pas appeler à la haine contre des personnes. Libres et responsables, les journalistes jouent un rôle de quatrième pouvoir : leurs enquêtes révèlent les abus que les puissants voudraient cacher, selon une déontologie exigeante, vérifier les faits, croiser et protéger les sources, séparer l'information du commentaire ; depuis 2022, l'Arcom veille au pluralisme des médias.\n\nÀ l'heure des réseaux sociaux, s'informer exige de nouveaux réflexes. Internet a démocratisé l'accès à l'information et donné la parole à tous, mais il a aussi démultiplié les dangers : les infox, plus émouvantes que les vraies nouvelles, circulent plus vite que les démentis, car les algorithmes favorisent ce qui fait réagir ; les théories du complot et les deepfakes brouillent la frontière entre vrai et faux ; et les bulles de filtre enferment chacun dans des contenus qui confortent ses opinions, appauvrissant le débat. Face à cela, le citoyen dispose d'armes simples : identifier la source d'une information, vérifier sa date, la croiser avec d'autres sources fiables, utiliser la recherche d'image inversée et les services de fact-checking, et toujours distinguer les faits, vérifiables, des opinions, discutables. L'éducation aux médias et à l'information, portée à l'école par le CLEMI et la Semaine de la presse, forme cet esprit critique : le citoyen responsable ne partage pas sans vérifier et signale les contenus haineux.\n\nAinsi, la liberté de l'information, garantie depuis 1789 et organisée par la loi de 1881, demeure un pilier de la démocratie, mais sa vitalité dépend désormais de citoyens formés, capables de vérifier, de croiser et de douter méthodiquement. S'informer sérieusement n'est pas une option : c'est la condition de toutes les autres pratiques citoyennes, du vote éclairé à l'engagement."}, "activite5_vocabulaire": {"termes": [{"mot": "Liberté de la presse", "definition": "Droit de publier et d'informer sans autorisation préalable ni censure, garanti par la loi du 29 juillet 1881."}, {"mot": "Censure", "definition": "Contrôle et interdiction de publications par un pouvoir. Elle est interdite en démocratie et systématique dans les dictatures."}, {"mot": "Diffamation", "definition": "Fait d'imputer publiquement à une personne un fait précis portant atteinte à son honneur, sans preuve. C'est un délit."}, {"mot": "Pluralisme", "definition": "Existence de médias nombreux et d'opinions diverses, qui permet au citoyen de confronter les points de vue. L'Arcom y veille depuis 2022."}, {"mot": "Déontologie", "definition": "Ensemble des règles professionnelles des journalistes : vérifier les faits, croiser et protéger les sources, séparer faits et commentaires."}, {"mot": "Infox (fake news)", "definition": "Fausse information fabriquée ou sortie de son contexte, diffusée pour tromper, manipuler ou faire le buzz."}, {"mot": "Théorie du complot", "definition": "Récit sans preuves qui prétend expliquer les événements par l'action secrète d'un petit groupe et rejette toute vérification."}, {"mot": "Bulle de filtre", "definition": "Enfermement dans des contenus sélectionnés par les algorithmes, qui confortent nos opinions et masquent les points de vue différents."}, {"mot": "Fact-checking", "definition": "Vérification journalistique des faits et des déclarations publiques pour démêler le vrai du faux."}, {"mot": "EMI", "definition": "Éducation aux médias et à l'information : apprentissages qui forment l'esprit critique des élèves face à l'information (CLEMI, Semaine de la presse)."}], "notions_essentielles": ["La liberté d'expression (article 11 de la Déclaration de 1789) et la liberté de la presse (loi du 29 juillet 1881) sont des piliers de la démocratie.", "Cette liberté est encadrée : diffamation, injure, incitation à la haine et apologie du terrorisme sont des délits.", "Les journalistes, quatrième pouvoir, obéissent à une déontologie : vérifier, croiser et protéger les sources ; l'Arcom (2022) garantit le pluralisme.", "Les réseaux sociaux propagent infox, théories du complot et deepfakes ; les algorithmes créent des bulles de filtre.", "Réflexes du citoyen : identifier la source, vérifier la date, croiser les informations, recherche d'image inversée, distinguer faits et opinions ; l'EMI forme l'esprit critique."]}}];

/* ---------- STATE ---------- */
function loadState(){
  try{ return JSON.parse(localStorage.getItem('dnb_emc')||'{}'); }catch(e){ return {}; }
}
function saveState(s){ try{ localStorage.setItem('dnb_emc', JSON.stringify(s)); }catch(e){} }
let state = loadState();
if(!state.completed) state.completed = [];
if(!state.xp) state.xp = 0;

/* ---------- UTILS ---------- */
function esc(t){ const d=document.createElement('div'); d.textContent=t==null?'':t; return d.innerHTML; }
function boldDates(html){
  return html.replace(/\b(1[6-9]\d{2}|20\d{2})\b/g,'<strong>$1</strong>')
             .replace(/\b(\d{1,2})(er)?\s+(janvier|février|mars|avril|mai|juin|juillet|août|septembre|octobre|novembre|décembre)\b/gi,'<strong>$&</strong>');
}
function paras(txt){
  return (txt||'').split(/\n\n+/).map(function(p){return '<p>'+boldDates(esc(p))+'</p>';}).join('');
}
function randEnc(){ return ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]; }
function appEl(){ return document.getElementById('app'); }
function printHeaderHTML(chap, act){
  return '<div class="print-header">Révisions DNB EMC 3ème · Chapitre '+chap.id+' : '+esc(chap.titre)+' · '+esc(act)+'<br>Gregory CRON · laclassedegreg@gmail.com · www.linkedin.com/in/gregorycron</div>';
}
function xpPop(msg){
  const e=document.createElement('div'); e.className='xp-pop'; e.textContent=msg;
  document.body.appendChild(e); setTimeout(function(){e.remove();},2600);
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  appEl().innerHTML =
  '<div class="login-wrap"><div class="login-card">'+
    '<div class="emoji">🎓</div>'+
    '<h1>Révisions du Brevet<br>EMC 3ème</h1>'+
    '<p>9 chapitres, 45 activités complètes pour préparer le DNB.<br>Entre ton prénom pour commencer.</p>'+
    '<input id="prenom" type="text" placeholder="Ton prénom" maxlength="30" autocomplete="given-name">'+
    '<button class="btn" onclick="doLogin()">C\'est parti !</button>'+
  '</div></div>';
  const inp=document.getElementById('prenom');
  inp.focus();
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
}
function doLogin(){
  const v=document.getElementById('prenom').value.trim();
  if(!v){ document.getElementById('prenom').style.borderColor='#e74c3c'; return; }
  state.prenom=v; saveState(state); renderHome();
}

/* ---------- HOME ---------- */
function goHome(){ if(state.prenom){renderHome();}else{renderLogin();} window.scrollTo(0,0); }
function renderHome(){
  const done = state.completed.length;
  const pct = Math.round(done/CHAPTERS.length*100);
  const badges = [
    {ico:'🥉',nom:'Badge Bronze',cond:'3 chapitres validés',won:done>=3},
    {ico:'🥈',nom:'Badge Argent',cond:'6 chapitres validés',won:done>=6},
    {ico:'🥇',nom:'Badge Or',cond:'9 chapitres validés',won:done>=9}
  ];
  let h = '<div class="hello"><h1>Bonjour '+esc(state.prenom)+' 👋</h1>'+
    '<div style="font-size:.88rem;color:var(--ink-soft)">⭐ '+state.xp+' XP · '+done+'/9 chapitres validés</div></div>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="badges">'+badges.map(function(b){
      return '<div class="badge '+(b.won?'won':'')+'"><span class="ico">'+b.ico+'</span><span><strong>'+b.nom+'</strong><br><span style="color:var(--ink-soft)">'+b.cond+'</span></span></div>';
    }).join('')+'</div>'+
    '<div class="progress-bar"><div style="width:'+pct+'%"></div></div>'+
    '<div class="chapters">'+CHAPTERS.map(function(c,i){
      const isDone=state.completed.indexOf(c.id)>=0;
      return '<div class="chap-card '+(isDone?'done':'')+'" style="animation-delay:'+(i*0.05)+'s" tabindex="0" role="button" '+
        'onclick="renderChapter('+c.id+')" onkeydown="if(event.key===\'Enter\')renderChapter('+c.id+')">'+
        '<div class="chap-num">'+(isDone?'✓':c.id)+'</div>'+
        '<div><h3>'+esc(c.titre)+'</h3><div class="state">'+(isDone?'Chapitre validé !':'5 activités à découvrir')+'</div></div></div>';
    }).join('')+'</div>';
  appEl().innerHTML = h;
}

/* ---------- CHAPTER ---------- */
const ACTS = [
  {ico:'📖',nom:'Fiche de révision'},
  {ico:'❓',nom:'Quiz'},
  {ico:'🔍',nom:'Étude de documents'},
  {ico:'✍️',nom:'Développement construit'},
  {ico:'🎮',nom:'Notions essentielles'}
];
let currentChap=null;
function renderChapter(id, actIdx){
  if(actIdx===undefined) actIdx=0;
  currentChap = CHAPTERS.filter(function(c){return c.id===id;})[0];
  appEl().innerHTML =
    '<div class="crumb"><a onclick="goHome()">Accueil</a> › Chapitre '+id+'</div>'+
    '<h1 class="chap-title">Chapitre '+id+' · '+esc(currentChap.titre)+'</h1>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="activities">'+ACTS.map(function(a,i){
      return '<div class="act-tab '+(i===actIdx?'active':'')+'" tabindex="0" role="button" '+
        'onclick="renderChapter('+id+','+i+')" onkeydown="if(event.key===\'Enter\')renderChapter('+id+','+i+')">'+
        '<span class="ico">'+a.ico+'</span>'+a.nom+'</div>';
    }).join('')+'</div>'+
    '<div id="actPanel"></div>';
  [renderFiche,renderQuiz,renderEtude,renderDev,renderVocab][actIdx]();
  window.scrollTo(0,0);
}

/* ---------- ACT 1 : FICHE ---------- */
function renderFiche(){
  const f=currentChap.activite1_fiche;
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+printHeaderHTML(currentChap,'Fiche de révision')+
    '<h2>📖 Fiche de révision</h2>'+
    '<h3>Introduction</h3>'+paras(f.introduction)+
    '<h3>'+esc(f.partie1_titre)+'</h3>'+paras(f.partie1_contenu)+
    '<h3>'+esc(f.partie2_titre)+'</h3>'+paras(f.partie2_contenu)+
    '<h3>'+esc(f.partie3_titre)+'</h3>'+paras(f.partie3_contenu)+
    '<h3>Conclusion</h3>'+paras(f.conclusion)+
    '<div class="retenir"><h4>🎯 À retenir absolument</h4><ul>'+
      currentChap.activite5_vocabulaire.notions_essentielles.map(function(n){return '<li>'+boldDates(esc(n))+'</li>';}).join('')+

    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 2 : QUIZ ---------- */
let quizIdx=0, quizScore=0;
function renderQuiz(){ quizIdx=0; quizScore=0; showQuizQ(); }
function showQuizQ(){
  const qz=currentChap.activite2_quiz;
  if(quizIdx>=qz.length){ showQuizScore(); return; }
  const q=qz[quizIdx];
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<div class="quiz-head"><h2>❓ Quiz</h2><span class="quiz-count">Question '+(quizIdx+1)+' / '+qz.length+'</span></div>'+
    '<div class="quiz-q">'+esc(q.question)+'</div>'+
    q.options.map(function(o,i){return '<button class="quiz-opt" onclick="answerQuiz('+i+')">'+esc(o)+'</button>';}).join('')+
    '<div class="quiz-expl" id="expl"></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" id="btnNext" style="display:none" onclick="quizIdx++;showQuizQ()">Question suivante →</button></div>'+
  '</div>';
}
function answerQuiz(i){
  const q=currentChap.activite2_quiz[quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b,j){
    b.disabled=true;
    if(j===q.correcte) b.classList.add('good');
    else if(j===i) b.classList.add('bad');
  });
  if(i===q.correcte) quizScore++;
  const ex=document.getElementById('expl');
  ex.innerHTML='<strong>'+(i===q.correcte?'✅ Bonne réponse !':'❌ Pas tout à fait.')+'</strong> '+boldDates(esc(q.explication));
  ex.classList.add('show');
  const btn=document.getElementById('btnNext');
  btn.style.display='inline-block';
  btn.textContent = (quizIdx+1<currentChap.activite2_quiz.length) ? 'Question suivante →' : 'Voir mon score 🏁';
}
function showQuizScore(){
  const total=currentChap.activite2_quiz.length;
  const sur20=Math.round(quizScore/total*20);
  let msg;
  if(sur20>=16) msg='Excellent travail, tu maîtrises ce chapitre ! 🌟';
  else if(sur20>=12) msg='Bon travail ! Relis la fiche pour consolider les points manqués. 👍';
  else if(sur20>=8) msg='Tu es sur la bonne voie. Reprends la fiche de révision puis retente le quiz !';
  else msg='Ce chapitre mérite une relecture attentive de la fiche. Courage, tu vas y arriver !';
  if(state.completed.indexOf(currentChap.id)<0){
    state.completed.push(currentChap.id);
    state.xp += 20;
    saveState(state);
    xpPop('🎉 Chapitre validé · +20 XP');
    const d=state.completed.length;
    if(d===3) setTimeout(function(){xpPop('🥉 Badge Bronze débloqué !');},2800);
    if(d===6) setTimeout(function(){xpPop('🥈 Badge Argent débloqué !');},2800);
    if(d===9) setTimeout(function(){xpPop('🥇 Badge Or débloqué ! Tu es prêt(e) pour le DNB !');},2800);
  }
  document.getElementById('actPanel').innerHTML =
  '<div class="panel"><div class="quiz-score">'+
    '<div class="big">'+sur20+' / 20</div>'+
    '<p>('+quizScore+' bonnes réponses sur '+total+')</p>'+
    '<p style="margin:14px 0">'+msg+'</p>'+
    '<button class="btn btn-small" onclick="renderQuiz()">🔄 Refaire le quiz</button> '+
    '<button class="btn btn-small btn-ghost" onclick="renderChapter('+currentChap.id+',0)">📖 Relire la fiche</button>'+
  '</div></div>';
}

/* ---------- ACT 3 : ETUDE ---------- */
function toggleCorr(btn){
  const c=btn.nextElementSibling;
  c.classList.toggle('show');
  btn.textContent = c.classList.contains('show') ? 'Masquer la correction' : 'Voir la correction';
}
function renderEtude(){
  const e=currentChap.activite3_etude;
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+printHeaderHTML(currentChap,'Étude de documents')+
    '<h2>🔍 Étude de documents</h2>'+
    '<div class="methodo"><strong>Méthode DNB :</strong> 1) Présenter le document (nature, auteur, date, contexte). 2) Analyser son contenu en citant le texte et en mobilisant les notions et les lois du cours. 3) Élargir : montrer ce que le document révèle des valeurs et principes de la République.</div>'+
    '<h3>'+esc(e.document_titre)+'</h3>'+
    '<div class="doc-box">'+paras(e.document_texte)+'<span class="src">'+esc(e.document_source)+'</span></div>'+
    e.questions.map(function(q,i){
      return '<div class="q-item"><span class="qnum">Question '+(i+1)+'.</span> '+esc(q)+
        '<br><button class="btn-corr" onclick="toggleCorr(this)">Voir la correction</button>'+
        '<div class="corr">'+paras(e.corrections[i])+'</div></div>';
    }).join('')+
    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 5 : VOCAB ---------- */
let matchSel=null, matchDone=0, matchAwarded=false;
function shuffled(a){ return a.slice().sort(function(){return Math.random()-.5;}); }
function renderVocab(){
  const v=currentChap.activite5_vocabulaire;
  matchSel=null; matchDone=0; matchAwarded=false;
  const pool=shuffled(v.termes).slice(0,5);
  const mots=shuffled(pool);
  const defs=shuffled(pool);
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<h2>🎮 Notions essentielles</h2>'+
    '<div class="retenir"><h4>🎯 Les notions essentielles du chapitre</h4><ul>'+
      v.notions_essentielles.map(function(n){return '<li>'+boldDates(esc(n))+'</li>';}).join('')+
    '</ul></div>'+
    '<h3>🃏 Cartes de vocabulaire (clique pour retourner)</h3>'+
    '<div class="vocab-grid">'+v.termes.map(function(t){
      return '<div class="flip" tabindex="0" role="button" onclick="this.classList.toggle(\'on\')" onkeydown="if(event.key===\'Enter\')this.classList.toggle(\'on\')">'+
        '<div class="flip-inner"><div class="flip-face flip-front">'+esc(t.mot)+'</div>'+
        '<div class="flip-face flip-back">'+esc(t.definition)+'</div></div></div>';
    }).join('')+'</div>'+
    '<div class="match-zone"><h3>⚡ Défi association (+10 XP)</h3>'+
      '<p style="font-size:.88rem;color:var(--ink-soft)">Clique sur un mot, puis sur sa définition. Associe les 5 paires !</p>'+
      '<div class="match-cols">'+
        '<div>'+mots.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="mot" onclick="matchClick(this)">'+esc(t.mot)+'</div>';}).join('')+'</div>'+
        '<div>'+defs.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="def" onclick="matchClick(this)">'+esc(t.definition)+'</div>';}).join('')+'</div>'+
      '</div><p id="matchMsg" style="margin-top:12px;font-weight:600"></p>'+
    '</div>'+
  '</div>';
}
function matchClick(el){
  if(el.classList.contains('ok')) return;
  if(!matchSel){ matchSel=el; el.classList.add('sel'); return; }
  if(matchSel===el){ el.classList.remove('sel'); matchSel=null; return; }
  if(matchSel.dataset.type===el.dataset.type){
    matchSel.classList.remove('sel'); matchSel=el; el.classList.add('sel'); return;
  }
  const a=matchSel;
  if(a.dataset.mot===el.dataset.mot){
    a.classList.remove('sel'); a.classList.add('ok'); el.classList.add('ok');
    matchDone++;
    if(matchDone===5){
      document.getElementById('matchMsg').textContent='🎉 Bravo, les 5 paires sont associées !';
      if(!matchAwarded){ matchAwarded=true; state.xp+=10; saveState(state); xpPop('⭐ +10 XP'); }
    }
  }else{
    a.classList.remove('sel'); a.classList.add('ko'); el.classList.add('ko');
    setTimeout(function(){a.classList.remove('ko');el.classList.remove('ko');},600);
  }
  matchSel=null;
}

/* ---------- INIT ---------- */
if(state.prenom){ renderHome(); } else { renderLogin(); }
