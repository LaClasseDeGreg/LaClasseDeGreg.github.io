<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions DNB - EMC 3ème</title>
<style>
:root{
  --primary:#6c5ce7;
  --primary-dark:#5a4bd1;
  --gradient:linear-gradient(135deg,#6c5ce7 0%,#4834a8 100%);
  --ink:#1e2340;
  --ink-soft:#5a6080;
  --bg:#f6f5fb;
  --card:#ffffff;
  --gold:#f0b429;
  --success:#2eb872;
  --error:#e74c3c;
  --radius:14px;
  --shadow:0 4px 18px rgba(30,35,64,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{direction:ltr}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;direction:ltr;text-align:left}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif}

/* ---------- HEADER ---------- */
header{position:sticky;top:0;z-index:50;background:var(--gradient);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
header .brand{font-family:Georgia,serif;font-size:1.05rem;font-weight:bold;letter-spacing:.3px}
header .contacts{display:flex;gap:14px;font-size:.78rem;flex-wrap:wrap;justify-content:flex-end}
header .contacts a{color:#fff;text-decoration:none;opacity:.92;border-bottom:1px solid rgba(255,255,255,.4)}
header .contacts a:hover,header .contacts a:focus{opacity:1;border-bottom-color:#fff}
#btnHome{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:30px;cursor:pointer;font-size:.85rem;transition:background .2s}
#btnHome:hover,#btnHome:focus{background:rgba(255,255,255,.32)}

main{max-width:980px;margin:0 auto;padding:22px 16px 70px}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 34px;max-width:430px;width:100%;text-align:center;animation:rise .5s ease}
.login-card .emoji{font-size:3rem}
.login-card h1{font-size:1.5rem;margin:14px 0 6px}
.login-card p{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px}
.login-card input{width:100%;padding:13px 16px;border:2px solid #ded9f5;border-radius:10px;font-size:1rem;margin-bottom:14px;transition:border .2s}
.login-card input:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-block;background:var(--gradient);color:#fff;border:none;padding:13px 30px;border-radius:30px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(108,92,231,.4)}
.btn:hover,.btn:focus{transform:translateY(-2px);box-shadow:0 6px 18px rgba(108,92,231,.5)}
.btn:active{transform:translateY(0)}
.btn-ghost{background:#fff;color:var(--primary);border:2px solid var(--primary);box-shadow:none}
.btn-small{padding:8px 18px;font-size:.85rem}

/* ---------- HOME / MENU ---------- */
.hello{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.hello h1{font-size:1.45rem}
.encour{background:#fff;border-left:5px solid var(--primary);border-radius:10px;padding:12px 16px;margin:14px 0 22px;color:var(--ink-soft);font-style:italic;box-shadow:var(--shadow)}
.badges{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.badge{background:var(--card);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);font-size:.85rem;opacity:.38;filter:grayscale(1);transition:all .4s}
.badge.won{opacity:1;filter:none;border:2px solid var(--gold)}
.badge .ico{font-size:1.4rem}
.progress-bar{background:#e3dff6;border-radius:20px;height:12px;overflow:hidden;margin:4px 0 26px}
.progress-bar div{height:100%;background:var(--gradient);border-radius:20px;transition:width .6s ease;min-width:0}
.chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.chap-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;display:flex;gap:14px;align-items:flex-start;border:2px solid transparent;transition:transform .18s,border-color .18s,box-shadow .18s;animation:rise .45s ease backwards}
.chap-card:hover,.chap-card:focus{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 24px rgba(108,92,231,.22)}
.chap-num{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-family:Georgia,serif;font-size:1.1rem}
.chap-card.done .chap-num{background:var(--success)}
.chap-card h3{font-size:.97rem;line-height:1.35}
.chap-card .state{font-size:.76rem;color:var(--ink-soft);margin-top:5px}
.chap-card.done .state{color:var(--success);font-weight:600}

/* ---------- CHAPTER VIEW ---------- */
.crumb{font-size:.82rem;color:var(--ink-soft);margin-bottom:8px}
.crumb a{color:var(--primary);cursor:pointer;text-decoration:none}
.chap-title{font-size:1.35rem;margin-bottom:18px}
.activities{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:26px}
.act-tab{background:var(--card);border:2px solid #e3dff6;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;font-size:.84rem;font-weight:600}
.act-tab .ico{font-size:1.5rem;display:block;margin-bottom:6px}
.act-tab:hover{border-color:var(--primary);transform:translateY(-2px)}
.act-tab.active{background:var(--gradient);color:#fff;border-color:transparent}

/* ---------- CONTENT PANELS ---------- */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;animation:rise .35s ease}
.panel h2{font-size:1.25rem;margin-bottom:16px;color:var(--primary-dark)}
.panel h3{font-size:1.05rem;margin:22px 0 10px;color:var(--ink)}
.panel p{margin-bottom:13px;text-align:justify}
.retenir{background:#efecfd;border:2px solid var(--primary);border-radius:12px;padding:16px 18px;margin:20px 0}
.retenir h4{color:var(--primary-dark);margin-bottom:10px;font-family:Georgia,serif}
.retenir li{margin:7px 0 7px 18px}
.doc-box{background:#faf8f2;border:1px solid #e7e0c9;border-left:5px solid var(--gold);border-radius:10px;padding:18px 20px;margin:16px 0;font-family:Georgia,serif}
.doc-box .src{display:block;margin-top:12px;font-size:.82rem;color:var(--ink-soft);font-style:italic;font-family:'Segoe UI',sans-serif}
.q-item{margin:18px 0;padding:16px;background:#f8f7fd;border-radius:10px}
.q-item .qnum{font-weight:700;color:var(--primary-dark)}
.corr{display:none;margin-top:12px;padding:14px;background:#e9f8f0;border-left:4px solid var(--success);border-radius:8px;font-size:.93rem}
.corr.show{display:block;animation:rise .3s ease}
.btn-corr{margin-top:10px;background:#fff;border:2px solid var(--success);color:var(--success);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:.83rem;font-weight:600;transition:all .15s}
.btn-corr:hover{background:var(--success);color:#fff}
.methodo{background:#fff7e8;border:1px solid #f0ddb0;border-radius:10px;padding:14px 18px;margin:16px 0;font-size:.9rem}
.methodo strong{color:#a97800}
.pdf-bar{margin-top:24px;text-align:right}

/* ---------- QUIZ ---------- */
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.quiz-count{font-size:.85rem;color:var(--ink-soft)}
.quiz-q{font-size:1.08rem;font-weight:600;margin-bottom:18px}
.quiz-opt{display:block;width:100%;text-align:left;background:#f8f7fd;border:2px solid #e3dff6;border-radius:10px;padding:13px 16px;margin:9px 0;cursor:pointer;font-size:.95rem;transition:all .15s;font-family:inherit;color:inherit}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);background:#efecfd}
.quiz-opt:disabled{cursor:default}
.quiz-opt.good{background:#e9f8f0;border-color:var(--success);font-weight:600}
.quiz-opt.bad{background:#fdecea;border-color:var(--error)}
.quiz-expl{display:none;margin-top:14px;padding:14px;background:#efecfd;border-left:4px solid var(--primary);border-radius:8px;font-size:.92rem}
.quiz-expl.show{display:block;animation:rise .3s ease}
.quiz-score{text-align:center;padding:30px 10px}
.quiz-score .big{font-size:3rem;font-family:Georgia,serif;color:var(--primary-dark);font-weight:bold}
.quiz-score .btn{margin:6px}

/* ---------- VOCAB ---------- */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin:18px 0}
.flip{perspective:900px;height:185px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flip.on .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center}
.flip-front{background:var(--gradient);color:#fff;font-family:Georgia,serif;font-size:1.12rem;font-weight:bold}
.flip-back{background:#fff;border:2px solid var(--primary);transform:rotateY(180deg);font-size:.78rem;line-height:1.4;overflow-y:auto}
.match-zone{margin-top:26px}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.match-item{background:#f8f7fd;border:2px solid #e3dff6;border-radius:10px;padding:11px 13px;cursor:pointer;font-size:.84rem;transition:all .15s}
.match-item.sel{border-color:var(--primary);background:#efecfd}
.match-item.ok{border-color:var(--success);background:#e9f8f0;opacity:.6;cursor:default}
.match-item.ko{border-color:var(--error);background:#fdecea}
.xp-pop{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#5a4300;padding:12px 26px;border-radius:30px;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:99;animation:rise .4s ease}

/* ---------- PLAN DEV ---------- */
.plan-step{border-left:3px solid var(--primary);padding:4px 0 4px 18px;margin:14px 0}
.plan-step h4{color:var(--primary-dark);margin-bottom:6px;font-family:Georgia,serif}
.sujet-box{background:var(--gradient);color:#fff;border-radius:12px;padding:18px 22px;font-size:1.02rem;font-weight:600;margin-bottom:20px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:600px){
  header{flex-direction:column;align-items:flex-start}
  header .contacts{justify-content:flex-start}
  .panel{padding:18px}
  .match-cols{grid-template-columns:1fr}
}

/* ---------- PRINT ---------- */
@media print{
  header,.pdf-bar,.activities,.crumb,#btnHome,.btn,.btn-corr,.quiz-opt,.xp-pop,.encour{display:none!important}
  body{background:#fff}
  .panel{box-shadow:none;padding:0}
  .corr,.quiz-expl{display:block!important}
  main{max-width:100%;padding:0}
  .print-header{display:block!important;border-bottom:2px solid #6c5ce7;padding-bottom:8px;margin-bottom:16px;font-size:.85rem;color:#555}
}
.print-header{display:none}
</style>
</head>

const CHAPTERS = [{"id": 1, "titre": "Les valeurs, les principes et les symboles de la République française", "activite1_fiche": {"introduction": "La République française repose sur des valeurs héritées de la Révolution française de 1789 : la liberté, l'égalité et la fraternité. Ces valeurs sont mises en oeuvre par de grands principes inscrits dans la Constitution, et incarnées par des symboles que chaque citoyen connaît : le drapeau tricolore, La Marseillaise, Marianne ou le 14 juillet. Connaître ces valeurs, principes et symboles, c'est comprendre ce qui unit les Français au-delà de leurs différences. Problématique : quelles sont les valeurs, les principes et les symboles de la République française, et que signifient-ils ?", "partie1_titre": "I. Les valeurs de la République : liberté, égalité, fraternité", "partie1_contenu": "A. La liberté. Héritée de la Déclaration des droits de l'homme et du citoyen du 26 août 1789, la liberté est la première valeur de la République. Elle comprend les libertés individuelles (liberté de conscience, d'aller et venir) et les libertés collectives (liberté d'expression, de la presse, de réunion, d'association, de manifestation). La liberté n'est pas absolue : elle s'arrête là où commence celle des autres, et la loi peut l'encadrer pour protéger la société.\n\nB. L'égalité. L'égalité signifie que tous les citoyens ont les mêmes droits et les mêmes devoirs, quelle que soit leur origine, leur religion, leur sexe ou leur fortune. L'article 1er de la Constitution de 1958 affirme que la France assure l'égalité devant la loi de tous les citoyens sans distinction d'origine, de race ou de religion. L'égalité reste un combat : les discriminations sont interdites et punies par la loi.\n\nC. La fraternité. La fraternité est le lien de solidarité qui unit les membres de la nation. Elle se traduit concrètement par la Sécurité sociale (créée en 1945), les aides aux plus démunis, la solidarité nationale lors des catastrophes, ou encore l'engagement associatif. La devise complète, Liberté, Égalité, Fraternité, figure sur les frontons des mairies et des écoles.", "partie2_titre": "II. Les grands principes de la République", "partie2_contenu": "A. Une République indivisible et laïque. L'article 1er de la Constitution du 4 octobre 1958 proclame : La France est une République indivisible, laïque, démocratique et sociale. Indivisible signifie que la loi est la même sur tout le territoire et que la souveraineté appartient au peuple tout entier. Laïque signifie que l'État est séparé des religions (loi du 9 décembre 1905) : il garantit la liberté de conscience et ne reconnaît, ne salarie ni ne subventionne aucun culte.\n\nB. Une République démocratique. Le pouvoir appartient au peuple, qui l'exerce par ses représentants élus et par le référendum. Le suffrage est universel : tous les citoyens majeurs votent, les hommes depuis 1848, les femmes depuis 1944. La devise de la République selon la Constitution est Liberté, Égalité, Fraternité, et son principe : gouvernement du peuple, par le peuple et pour le peuple.\n\nC. Une République sociale. La République cherche à réduire les inégalités sociales : droit au travail, à la protection sociale, à l'éducation gratuite. L'école publique, gratuite et laïque depuis les lois Jules Ferry de 1881-1882, est un pilier de ce principe : elle doit donner à chaque enfant les mêmes chances de réussir.", "partie3_titre": "III. Les symboles qui incarnent la République", "partie3_contenu": "A. Le drapeau tricolore et l'hymne national. Le drapeau bleu, blanc, rouge est né pendant la Révolution : il associe le blanc, couleur du roi, au bleu et au rouge, couleurs de Paris. La Marseillaise, chant de guerre composé par Rouget de Lisle en 1792, est devenue l'hymne national. Ces deux symboles sont inscrits dans l'article 2 de la Constitution.\n\nB. Marianne et la devise. Marianne, femme coiffée du bonnet phrygien (bonnet des esclaves affranchis dans l'Antiquité), incarne la République et la liberté. Son buste figure dans toutes les mairies et son visage sur les timbres. La devise Liberté, Égalité, Fraternité, héritée de la Révolution, est le résumé des valeurs républicaines.\n\nC. Le 14 juillet et les autres symboles. La fête nationale du 14 juillet rappelle à la fois la prise de la Bastille en 1789 et la fête de la Fédération de 1790. Le coq gaulois, le faisceau de licteur ou le sceau de la République complètent ces symboles. Ils sont présents dans les grandes cérémonies (commémorations, défilé du 14 juillet) et rassemblent les citoyens autour d'une histoire et de valeurs communes.", "conclusion": "La République française repose sur trois valeurs fondamentales, liberté, égalité, fraternité, mises en oeuvre par les principes inscrits à l'article 1er de la Constitution : une République indivisible, laïque, démocratique et sociale. Ses symboles, drapeau tricolore, Marseillaise, Marianne, 14 juillet, devise, incarnent cet héritage né de la Révolution de 1789 et rassemblent les citoyens. Connaître et comprendre ces repères, c'est se donner les moyens de les faire vivre : les valeurs républicaines ne sont jamais acquises, elles se défendent et se transmettent."}, "activite2_quiz": [{"question": "Quelle est la devise de la République française ?", "options": ["Travail, Famille, Patrie", "Liberté, Égalité, Fraternité", "Unité, Justice, Liberté", "Dieu et mon droit"], "correcte": 1, "explication": "La devise Liberté, Égalité, Fraternité, héritée de la Révolution française, est inscrite à l'article 2 de la Constitution et figure sur les frontons des bâtiments publics."}, {"question": "De quel texte fondateur de 1789 les valeurs républicaines sont-elles héritées ?", "options": ["La Constitution de 1958", "La Déclaration des droits de l'homme et du citoyen du 26 août 1789", "Le Code civil", "L'édit de Nantes"], "correcte": 1, "explication": "La Déclaration des droits de l'homme et du citoyen, adoptée le 26 août 1789, proclame la liberté et l'égalité des hommes : elle fonde les valeurs de la République."}, {"question": "Que proclame l'article 1er de la Constitution de 1958 ?", "options": ["La France est une monarchie constitutionnelle", "La France est une République indivisible, laïque, démocratique et sociale", "La France est un empire", "La France n'a pas de Constitution"], "correcte": 1, "explication": "L'article 1er définit les grands principes : République indivisible (même loi partout), laïque (séparée des religions), démocratique (pouvoir au peuple) et sociale (réduction des inégalités)."}, {"question": "Que signifie le principe d'indivisibilité de la République ?", "options": ["La France ne peut pas avoir de régions", "La loi est la même sur tout le territoire et la souveraineté appartient au peuple entier", "Le territoire ne peut jamais changer", "Les Français doivent tous penser pareil"], "correcte": 1, "explication": "Indivisible signifie que la loi républicaine s'applique de la même manière partout et pour tous : la souveraineté appartient au peuple tout entier, pas à une partie de celui-ci."}, {"question": "Quelle loi a instauré la laïcité en séparant les Églises et l'État ?", "options": ["La loi du 9 décembre 1905", "La loi de 1881 sur la presse", "La loi de 1936 sur les congés payés", "La loi Veil de 1975"], "correcte": 0, "explication": "La loi du 9 décembre 1905 sépare les Églises et l'État : la République garantit la liberté de conscience mais ne reconnaît, ne salarie ni ne subventionne aucun culte."}, {"question": "Depuis quand les femmes votent-elles en France ?", "options": ["1789", "1848", "1944", "1974"], "correcte": 2, "explication": "Le droit de vote des femmes est accordé par l'ordonnance du 21 avril 1944 ; elles votent pour la première fois en 1945. Les hommes votaient au suffrage universel depuis 1848."}, {"question": "La liberté d'expression est-elle absolue en France ?", "options": ["Oui, on peut tout dire", "Non : la loi interdit notamment l'injure, la diffamation et l'incitation à la haine", "Oui, mais seulement sur internet", "Non, elle n'existe pas"], "correcte": 1, "explication": "La liberté d'expression est fondamentale mais encadrée : la loi punit l'injure, la diffamation, l'incitation à la haine ou à la violence. La liberté s'arrête là où commence celle des autres."}, {"question": "Quelle institution créée en 1945 illustre la valeur de fraternité ?", "options": ["La Sécurité sociale", "La Bourse de Paris", "L'Académie française", "Le Tour de France"], "correcte": 0, "explication": "La Sécurité sociale, créée en 1945, organise la solidarité nationale : chacun cotise selon ses moyens et reçoit selon ses besoins (maladie, retraite, famille)."}, {"question": "Quelles lois ont rendu l'école publique gratuite et laïque ?", "options": ["Les lois Jules Ferry de 1881-1882", "La loi de 1905", "Les lois Defferre de 1982", "La loi de 2004"], "correcte": 0, "explication": "Les lois Jules Ferry (1881-1882) rendent l'école primaire publique gratuite, obligatoire et laïque : un pilier de la République sociale et de l'égalité des chances."}, {"question": "D'où viennent les trois couleurs du drapeau français ?", "options": ["Du drapeau américain", "Du blanc royal associé au bleu et au rouge, couleurs de Paris", "Des couleurs de l'arc-en-ciel", "Du drapeau romain"], "correcte": 1, "explication": "Né pendant la Révolution, le drapeau tricolore associe le blanc, couleur de la monarchie, au bleu et au rouge, couleurs de la ville de Paris : il symbolise l'union du roi et du peuple, puis la nation."}, {"question": "Qui a composé La Marseillaise, et en quelle année ?", "options": ["Victor Hugo en 1848", "Rouget de Lisle en 1792", "Napoléon en 1804", "Hector Berlioz en 1830"], "correcte": 1, "explication": "La Marseillaise est un chant de guerre révolutionnaire composé par Rouget de Lisle en 1792 à Strasbourg. Chantée par les volontaires marseillais, elle est devenue l'hymne national."}, {"question": "Qui est Marianne ?", "options": ["La première présidente de la République", "La figure féminine qui incarne la République, coiffée du bonnet phrygien", "Une reine de France", "L'épouse de Napoléon"], "correcte": 1, "explication": "Marianne incarne la République et la liberté. Son bonnet phrygien rappelle celui des esclaves affranchis de l'Antiquité. Son buste figure dans toutes les mairies."}, {"question": "Que commémore la fête nationale du 14 juillet ?", "options": ["La victoire de 1918", "La prise de la Bastille (1789) et la fête de la Fédération (1790)", "Le sacre de Napoléon", "La Libération de Paris"], "correcte": 1, "explication": "Le 14 juillet rappelle à la fois la prise de la Bastille du 14 juillet 1789, symbole de la fin de l'absolutisme, et la fête de la Fédération du 14 juillet 1790, symbole de l'unité nationale."}, {"question": "Dans quel article de la Constitution les symboles de la République sont-ils inscrits ?", "options": ["L'article 2", "L'article 16", "L'article 49-3", "Ils ne sont écrits nulle part"], "correcte": 0, "explication": "L'article 2 de la Constitution de 1958 fixe la langue (le français), le drapeau tricolore, l'hymne (La Marseillaise), la devise et le principe de la République."}, {"question": "Pourquoi dit-on que les valeurs républicaines ne sont jamais définitivement acquises ?", "options": ["Parce qu'elles changent chaque année", "Parce qu'elles doivent être défendues, appliquées et transmises en permanence", "Parce qu'elles sont secrètes", "Parce qu'elles n'existent plus"], "correcte": 1, "explication": "Liberté, égalité et fraternité restent des combats quotidiens : lutte contre les discriminations, défense de la liberté d'expression, solidarité. Chaque génération doit les faire vivre."}], "activite3_etude": {"document_type": "texte", "document_titre": "L'article 1er et l'article 2 de la Constitution du 4 octobre 1958", "document_texte": "« Article 1er. La France est une République indivisible, laïque, démocratique et sociale. Elle assure l'égalité devant la loi de tous les citoyens sans distinction d'origine, de race ou de religion. Elle respecte toutes les croyances. Son organisation est décentralisée. La loi favorise l'égal accès des femmes et des hommes aux mandats électoraux et fonctions électives, ainsi qu'aux responsabilités professionnelles et sociales.\n\nArticle 2. La langue de la République est le français. L'emblème national est le drapeau tricolore, bleu, blanc, rouge. L'hymne national est La Marseillaise. La devise de la République est Liberté, Égalité, Fraternité. Son principe est : gouvernement du peuple, par le peuple et pour le peuple. »", "document_source": "Constitution de la Ve République, 4 octobre 1958 (articles 1er et 2, version en vigueur).", "questions": ["Présentez le document : nature, date, importance dans la vie politique française.", "Relevez dans l'article 1er les quatre grands principes de la République et expliquez brièvement chacun d'eux.", "Quels éléments de l'article 1er garantissent l'égalité entre les citoyens ?", "Quels symboles de la République l'article 2 fixe-t-il ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez comment la Constitution traduit les valeurs républicaines en principes et en symboles."], "corrections": ["Ce document est un extrait de la Constitution de la Ve République, promulguée le 4 octobre 1958. La Constitution est le texte fondamental qui organise les pouvoirs publics et définit les principes de la République : tous les autres textes (lois, décrets) doivent la respecter. Les articles 1er et 2 en sont les articles d'ouverture, les plus symboliques.", "L'article 1er énonce quatre principes : indivisible, la loi est la même sur tout le territoire et la souveraineté appartient au peuple entier ; laïque, l'État est séparé des religions et respecte toutes les croyances ; démocratique, le pouvoir appartient au peuple qui l'exerce par le vote ; sociale, la République cherche à réduire les inégalités et à protéger les plus faibles.", "L'article 1er garantit l'égalité de plusieurs manières : il assure l'égalité devant la loi de tous les citoyens sans distinction d'origine, de race ou de religion ; il affirme le respect de toutes les croyances ; et il précise que la loi favorise l'égal accès des femmes et des hommes aux mandats électoraux et aux responsabilités professionnelles et sociales, c'est-à-dire la parité.", "L'article 2 fixe les symboles officiels de la République : la langue française, le drapeau tricolore bleu, blanc, rouge, l'hymne national La Marseillaise, la devise Liberté, Égalité, Fraternité, et le principe du gouvernement du peuple, par le peuple et pour le peuple.", "Exemple de rédaction : La Constitution de 1958 traduit les valeurs républicaines héritées de 1789 en règles juridiques et en symboles officiels. Les valeurs de liberté, d'égalité et de fraternité deviennent des principes dans l'article 1er : la République y est définie comme indivisible, laïque, démocratique et sociale, et l'égalité devant la loi y est garantie sans distinction d'origine, de race ou de religion, jusqu'à la parité entre femmes et hommes. L'article 2 donne ensuite à ces valeurs des symboles visibles par tous : le drapeau tricolore, La Marseillaise, la devise Liberté, Égalité, Fraternité et la langue française. Ainsi, la Constitution fait le lien entre l'héritage révolutionnaire et la vie quotidienne des citoyens : les valeurs ne restent pas des idées abstraites, elles deviennent des règles qui s'imposent à tous et des emblèmes qui rassemblent la nation."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, présentez les valeurs et les principes de la République française et montrez comment ses symboles les incarnent.", "plan": {"introduction": "Contexte : la République française est née de la Révolution de 1789, qui a proclamé les droits de l'homme. Définitions : une valeur est un idéal partagé ; un principe est une règle qui met en oeuvre cet idéal ; un symbole le représente. Problématique : quelles sont les valeurs et les principes de la République, et comment ses symboles les incarnent-ils ? Annonce du plan : d'abord les valeurs et principes, puis les symboles qui les font vivre.", "partie1": "I. Des valeurs mises en oeuvre par de grands principes. Argument 1 : les trois valeurs, liberté, égalité, fraternité, sont héritées de la Déclaration des droits de l'homme et du citoyen du 26 août 1789. Argument 2 : l'article 1er de la Constitution de 1958 les traduit en principes : République indivisible, laïque (loi de séparation du 9 décembre 1905), démocratique (suffrage universel : hommes en 1848, femmes en 1944) et sociale (Sécurité sociale créée en 1945, école gratuite et laïque depuis les lois Ferry de 1881-1882). Argument 3 : ces valeurs sont vivantes et encadrées : la liberté d'expression est protégée mais limitée par la loi (injure, incitation à la haine), l'égalité passe par la lutte contre les discriminations et la parité.", "partie2": "II. Des symboles qui incarnent et rassemblent. Argument 1 : les symboles officiels sont fixés par l'article 2 de la Constitution : le drapeau tricolore (blanc royal uni au bleu et au rouge de Paris), La Marseillaise (Rouget de Lisle, 1792), la devise Liberté, Égalité, Fraternité. Argument 2 : Marianne, coiffée du bonnet phrygien des affranchis, incarne la République dans toutes les mairies ; le 14 juillet commémore la prise de la Bastille (1789) et la fête de la Fédération (1790). Argument 3 : ces symboles rassemblent les citoyens dans les cérémonies (défilé du 14 juillet, commémorations) et rappellent que la République est un héritage commun à transmettre.", "conclusion": "Bilan : liberté, égalité et fraternité, traduites en principes par la Constitution et incarnées par des symboles partagés, fondent l'identité républicaine française. Ouverture : ces valeurs s'exercent concrètement à travers la citoyenneté, étudiée dans le chapitre suivant."}, "correction_complete": "La République française est l'héritière de la Révolution de 1789, qui a proclamé les droits de l'homme et renversé l'absolutisme. Elle repose sur des valeurs, des idéaux partagés, mises en oeuvre par des principes juridiques et représentées par des symboles connus de tous. Quelles sont ces valeurs et ces principes, et comment les symboles de la République les incarnent-ils ? Nous présenterons d'abord les valeurs et les principes républicains, avant de montrer le rôle des symboles qui les font vivre.\n\nLa République repose sur trois valeurs fondamentales, liberté, égalité, fraternité, héritées de la Déclaration des droits de l'homme et du citoyen du 26 août 1789. Ces valeurs sont traduites en principes par l'article 1er de la Constitution du 4 octobre 1958 : la France y est définie comme une République indivisible, laïque, démocratique et sociale. Indivisible, car la loi est la même pour tous sur tout le territoire ; laïque, depuis la loi de séparation des Églises et de l'État du 9 décembre 1905, qui garantit la liberté de conscience ; démocratique, car le pouvoir appartient au peuple, qui vote au suffrage universel, masculin depuis 1848 et féminin depuis 1944 ; sociale, enfin, car la République réduit les inégalités grâce à la Sécurité sociale créée en 1945 et à l'école publique gratuite et laïque issue des lois Jules Ferry de 1881-1882. Ces valeurs restent vivantes et exigeantes : la liberté d'expression est protégée mais encadrée par la loi, qui punit l'injure et l'incitation à la haine, et l'égalité se prolonge dans la lutte contre les discriminations et la parité entre les femmes et les hommes.\n\nLes symboles de la République incarnent ces valeurs et rassemblent les citoyens. L'article 2 de la Constitution fixe les symboles officiels : le drapeau tricolore, né de l'union du blanc royal et du bleu et du rouge de Paris pendant la Révolution ; La Marseillaise, chant composé par Rouget de Lisle en 1792 et devenu hymne national ; la devise Liberté, Égalité, Fraternité, inscrite au fronton des mairies et des écoles. Marianne, coiffée du bonnet phrygien des esclaves affranchis de l'Antiquité, incarne la République dans toutes les mairies et sur les timbres. La fête nationale du 14 juillet commémore à la fois la prise de la Bastille de 1789 et la fête de la Fédération de 1790 : son défilé et ses cérémonies rassemblent chaque année les Français autour de leur histoire commune. Par ces emblèmes, les valeurs abstraites deviennent visibles et partagées.\n\nAinsi, la République française repose sur les valeurs de liberté, d'égalité et de fraternité, traduites en principes par sa Constitution et incarnées par des symboles qui unissent les citoyens. Cet héritage n'est jamais définitivement acquis : c'est en exerçant leur citoyenneté que les Français le font vivre, comme le montre l'étude de la nationalité et de la citoyenneté française et européenne."}, "activite5_vocabulaire": {"termes": [{"mot": "Valeur", "definition": "Idéal partagé par une société, qui guide ses règles et ses comportements : liberté, égalité, fraternité pour la République française."}, {"mot": "Principe", "definition": "Règle fondamentale qui met en oeuvre les valeurs : la France est une République indivisible, laïque, démocratique et sociale (article 1er de la Constitution)."}, {"mot": "Symbole", "definition": "Image, objet ou chant qui représente la République : drapeau tricolore, Marseillaise, Marianne, devise, 14 juillet."}, {"mot": "Constitution", "definition": "Texte fondamental qui organise les pouvoirs publics et définit les principes de la République. Celle de la Ve République date du 4 octobre 1958."}, {"mot": "Laïcité", "definition": "Principe de séparation de l'État et des religions (loi du 9 décembre 1905) : l'État garantit la liberté de conscience et ne favorise aucun culte."}, {"mot": "Démocratie", "definition": "Régime politique dans lequel le pouvoir appartient au peuple, qui l'exerce par le vote et par ses représentants élus."}, {"mot": "Suffrage universel", "definition": "Droit de vote accordé à tous les citoyens majeurs, sans condition de fortune : aux hommes depuis 1848, aux femmes depuis 1944."}, {"mot": "Marianne", "definition": "Figure féminine coiffée du bonnet phrygien qui incarne la République française et la liberté."}, {"mot": "Bonnet phrygien", "definition": "Bonnet porté dans l'Antiquité par les esclaves affranchis, devenu symbole de liberté pendant la Révolution française."}, {"mot": "Fraternité", "definition": "Valeur de solidarité qui unit les membres de la nation : elle se traduit par la Sécurité sociale, l'entraide et l'engagement."}], "notions_essentielles": ["Les trois valeurs de la République, liberté, égalité, fraternité, sont héritées de la Déclaration des droits de l'homme et du citoyen du 26 août 1789.", "L'article 1er de la Constitution de 1958 définit la France comme une République indivisible, laïque, démocratique et sociale.", "La laïcité repose sur la loi de séparation des Églises et de l'État du 9 décembre 1905.", "Le suffrage est universel : les hommes votent depuis 1848, les femmes depuis 1944.", "Les symboles fixés par l'article 2 de la Constitution (drapeau tricolore, Marseillaise, devise) et Marianne, le 14 juillet ou le coq incarnent la République et rassemblent les citoyens."]}}, {"id": 2, "titre": "La nationalité et la citoyenneté française et européenne", "activite1_fiche": {"introduction": "Être citoyen français, c'est appartenir à une communauté politique : la nation. La citoyenneté donne des droits, civils, politiques et sociaux, mais impose aussi des devoirs. Elle est liée à la nationalité, qui s'acquiert de plusieurs manières. Depuis le traité de Maastricht de 1992, les Français sont également citoyens européens, ce qui leur ouvre des droits supplémentaires dans toute l'Union européenne. Problématique : comment devient-on citoyen français, et quels droits et devoirs la citoyenneté française et européenne donne-t-elle ?", "partie1_titre": "I. La nationalité française : comment l'acquiert-on ?", "partie1_contenu": "A. Le droit du sang et le droit du sol. La nationalité française s'acquiert d'abord par la filiation, c'est le droit du sang : est français l'enfant dont au moins un parent est français, quel que soit son lieu de naissance. Elle s'acquiert aussi par le droit du sol : un enfant né en France de parents étrangers devient automatiquement français à sa majorité s'il réside en France (avec des conditions de résidence), et peut le devenir dès 13 ou 16 ans sur demande.\n\nB. La naturalisation et le mariage. Un étranger majeur peut demander la naturalisation : elle est accordée par l'État sous conditions (en général cinq ans de résidence régulière, connaissance de la langue française, adhésion aux valeurs de la République). Le mariage avec un Français ou une Française permet aussi, après plusieurs années d'union, de demander la nationalité par déclaration.\n\nC. Nationalité et citoyenneté : un lien étroit. En France, la citoyenneté découle de la nationalité : tout Français majeur est citoyen, sauf décision de justice le privant de ses droits civiques. La citoyenneté repose sur l'adhésion aux valeurs communes de la République, pas sur l'origine : c'est une conception ouverte de la nation, héritée de la Révolution française.", "partie2_titre": "II. Les droits et les devoirs du citoyen français", "partie2_contenu": "A. Des droits civils, politiques et sociaux. Le citoyen français jouit de droits civils (liberté d'expression, de conscience, droit à la justice, à la vie privée), de droits politiques (voter à partir de 18 ans, être élu, adhérer à un parti, participer à un référendum) et de droits sociaux (droit à l'éducation, à la santé, à la protection sociale, droit de grève et droit syndical).\n\nB. Des devoirs envers la communauté. La citoyenneté impose des devoirs : respecter les lois, payer ses impôts qui financent les services publics, participer à la Défense (recensement à 16 ans, Journée défense et citoyenneté), être juré d'assises si l'on est tiré au sort, respecter les droits et les libertés des autres. Voter est un droit, mais aussi un devoir civique, même s'il n'est pas obligatoire en France.\n\nC. Une citoyenneté active au quotidien. Être citoyen ne se limite pas à voter : c'est aussi s'informer, débattre en respectant les opinions différentes, s'engager dans une association, un syndicat, un conseil de jeunes, aider les autres. La citoyenneté se vit dès le collège : élection des délégués de classe, conseil de la vie collégienne, respect du règlement intérieur.", "partie3_titre": "III. Une citoyenneté européenne qui complète la citoyenneté nationale", "partie3_contenu": "A. Une citoyenneté créée par le traité de Maastricht. Depuis le traité de Maastricht, signé en 1992, toute personne ayant la nationalité d'un État membre de l'Union européenne est aussi citoyenne de l'Union. Cette citoyenneté européenne s'ajoute à la citoyenneté nationale : elle ne la remplace pas.\n\nB. Des droits concrets dans toute l'Union. Le citoyen européen peut circuler, séjourner, étudier et travailler librement dans les 27 États membres. Il peut voter et se présenter aux élections municipales et aux élections européennes dans le pays de l'UE où il réside, même s'il n'en a pas la nationalité. Il bénéficie de la protection diplomatique de tout État membre dans les pays tiers, peut adresser des pétitions au Parlement européen et participer à une initiative citoyenne européenne.\n\nC. Une citoyenneté encore en construction. Le sentiment d'appartenance européenne progresse grâce à Erasmus, à l'euro ou à la libre circulation, mais il reste inégal : la participation aux élections européennes est souvent plus faible qu'aux scrutins nationaux. Faire vivre la citoyenneté européenne, c'est aussi s'informer sur l'Union et participer à ses choix démocratiques.", "conclusion": "La nationalité française s'acquiert par le droit du sang, le droit du sol, la naturalisation ou le mariage : elle ouvre la citoyenneté, qui donne des droits civils, politiques et sociaux et impose des devoirs envers la communauté nationale. Depuis le traité de Maastricht de 1992, cette citoyenneté se double d'une citoyenneté européenne qui permet de circuler, d'étudier, de travailler et de voter dans toute l'Union. Être citoyen, à l'échelle française comme à l'échelle européenne, c'est exercer activement ses droits et assumer ses devoirs : la démocratie ne vit que par la participation de tous."}, "activite2_quiz": [{"question": "Qu'est-ce que le droit du sang ?", "options": ["Être français parce qu'on est né sur le sol français", "Être français parce qu'au moins un de ses parents est français", "Devenir français par mariage", "Devenir français par décision de justice"], "correcte": 1, "explication": "Le droit du sang (filiation) attribue la nationalité française à tout enfant dont au moins un parent est français, quel que soit son lieu de naissance."}, {"question": "Qu'est-ce que le droit du sol ?", "options": ["Posséder une terre en France", "La possibilité pour un enfant né en France de parents étrangers de devenir français", "Être français parce qu'on parle français", "Un impôt foncier"], "correcte": 1, "explication": "Le droit du sol permet à un enfant né en France de parents étrangers de devenir français, automatiquement à 18 ans s'il réside en France, ou plus tôt sur demande (dès 13 ou 16 ans sous conditions)."}, {"question": "Qu'est-ce que la naturalisation ?", "options": ["Un retour à la nature", "L'attribution de la nationalité française à un étranger qui en fait la demande, sous conditions", "La perte de la nationalité", "Un type de visa touristique"], "correcte": 1, "explication": "La naturalisation est accordée par l'État à un étranger majeur sous conditions : résidence régulière (en général cinq ans), connaissance du français, adhésion aux valeurs de la République."}, {"question": "À quel âge obtient-on le droit de vote en France ?", "options": ["16 ans", "18 ans", "21 ans", "25 ans"], "correcte": 1, "explication": "La majorité civique est fixée à 18 ans depuis 1974. Tout citoyen français majeur inscrit sur les listes électorales peut voter."}, {"question": "Parmi ces droits, lequel est un droit politique ?", "options": ["Le droit à la santé", "Le droit de vote et d'éligibilité", "Le droit à la vie privée", "Le droit de grève"], "correcte": 1, "explication": "Les droits politiques permettent de participer au pouvoir : voter, être élu, adhérer à un parti, participer à un référendum. Le droit à la santé est un droit social, la vie privée un droit civil."}, {"question": "Le vote est-il obligatoire en France ?", "options": ["Oui, sous peine d'amende", "Non : c'est un droit et un devoir civique, mais il n'est pas obligatoire", "Oui, mais seulement pour la présidentielle", "Non, il est interdit de voter deux fois de suite"], "correcte": 1, "explication": "En France, voter n'est pas une obligation légale (contrairement à la Belgique par exemple) : c'est un droit et un devoir civique laissé à la responsabilité de chacun."}, {"question": "Quel devoir citoyen peut-on être appelé à exercer en justice ?", "options": ["Être avocat", "Être juré d'assises si l'on est tiré au sort", "Être juge", "Payer les amendes des autres"], "correcte": 1, "explication": "Les jurés des cours d'assises sont des citoyens tirés au sort sur les listes électorales : participer à la justice est un devoir civique auquel on ne peut se soustraire sans motif sérieux."}, {"question": "À quel âge le recensement citoyen est-il obligatoire ?", "options": ["À 16 ans", "À 18 ans", "À 21 ans", "Il n'existe plus"], "correcte": 0, "explication": "Tout jeune Français doit se faire recenser à la mairie à 16 ans : c'est la première étape du parcours de citoyenneté, avant la Journée défense et citoyenneté."}, {"question": "Quel traité a créé la citoyenneté européenne ?", "options": ["Le traité de Rome (1957)", "Le traité de Maastricht (1992)", "Le traité de Versailles (1919)", "Les accords de Schengen"], "correcte": 1, "explication": "Le traité de Maastricht, signé en 1992, crée la citoyenneté de l'Union : toute personne ayant la nationalité d'un État membre est aussi citoyenne européenne."}, {"question": "La citoyenneté européenne remplace-t-elle la citoyenneté nationale ?", "options": ["Oui, complètement", "Non : elle s'y ajoute et la complète", "Oui, mais seulement pour les jeunes", "Non, elle n'existe pas vraiment"], "correcte": 1, "explication": "La citoyenneté européenne s'ajoute à la citoyenneté nationale sans la remplacer : on est citoyen européen parce qu'on est citoyen d'un État membre."}, {"question": "À quelles élections un citoyen européen peut-il voter dans son pays de résidence (sans en avoir la nationalité) ?", "options": ["À toutes les élections", "Aux élections municipales et européennes", "À l'élection présidentielle", "À aucune élection"], "correcte": 1, "explication": "Un citoyen de l'UE résidant en France peut voter et se présenter aux élections municipales et européennes ; les élections nationales (présidentielle, législatives) restent réservées aux nationaux."}, {"question": "Quel droit la citoyenneté européenne donne-t-elle dans les 27 États membres ?", "options": ["Circuler, séjourner, étudier et travailler librement", "Ne pas payer d'impôts", "Devenir automatiquement fonctionnaire", "Voter à toutes les élections nationales"], "correcte": 0, "explication": "La libre circulation est le droit le plus concret du citoyen européen : vivre, étudier (Erasmus) et travailler dans n'importe quel pays de l'Union."}, {"question": "Que peut faire un citoyen européen pour interpeller les institutions de l'UE ?", "options": ["Rien du tout", "Adresser une pétition au Parlement européen ou soutenir une initiative citoyenne européenne", "Élire directement la Commission", "Dissoudre le Parlement européen"], "correcte": 1, "explication": "Le citoyen européen peut pétitionner le Parlement européen et participer à une initiative citoyenne européenne, qui demande à la Commission de proposer une loi si elle réunit un million de signatures."}, {"question": "Comment un collégien peut-il déjà exercer une forme de citoyenneté ?", "options": ["En votant à la présidentielle", "En élisant ses délégués de classe et en participant à la vie de l'établissement", "En payant des impôts", "En conduisant une voiture"], "correcte": 1, "explication": "L'élection des délégués, le conseil de la vie collégienne, le respect du règlement et l'engagement dans les projets de l'établissement sont un apprentissage concret de la citoyenneté."}, {"question": "Sur quoi repose la conception française de la nation, héritée de la Révolution ?", "options": ["Sur l'origine ethnique des habitants", "Sur l'adhésion aux valeurs communes de la République", "Sur la religion", "Sur la fortune"], "correcte": 1, "explication": "La nation française se définit par l'adhésion à des valeurs et à un projet communs, non par l'origine : c'est une conception ouverte, qui permet à des personnes d'origines diverses de devenir françaises."}], "activite3_etude": {"document_type": "texte", "document_titre": "Une cérémonie d'accueil dans la citoyenneté française", "document_texte": "« Ce jeudi, dans la salle des fêtes de la préfecture décorée du drapeau tricolore et du portrait de Marianne, soixante-douze personnes venues de vingt-trois pays sont devenues françaises. Devant leurs familles, elles ont écouté La Marseillaise, puis la préfète a rappelé le sens de la cérémonie : Vous avez choisi la France, et la France vous a choisis. Désormais, vous avez les mêmes droits et les mêmes devoirs que tous vos concitoyens : vous voterez, vous pourrez être élus, et vous devrez respecter les lois de la République et ses valeurs, la liberté, l'égalité, la fraternité et la laïcité. Chaque nouveau citoyen a reçu un livret contenant la Déclaration des droits de l'homme et du citoyen de 1789, la Constitution et les paroles de l'hymne national. Beaucoup avaient préparé cette naturalisation pendant des années : apprentissage du français, preuves d'insertion professionnelle, entretien sur les valeurs républicaines. À la sortie, une jeune femme résumait son émotion : Maintenant, je pourrai voter. Ma voix compte. »", "document_source": "Texte adapté à des fins pédagogiques de comptes rendus de cérémonies d'accueil dans la citoyenneté française publiés par la presse régionale (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, lieu de la scène.", "Par quelle procédure ces personnes sont-elles devenues françaises ? Quelles conditions ont-elles dû remplir ?", "Relevez les symboles de la République présents dans la cérémonie. Pourquoi sont-ils mis en avant ?", "Quels droits et quels devoirs la préfète rappelle-t-elle aux nouveaux citoyens ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez ce que signifie devenir citoyen français."], "corrections": ["Ce document est un texte adapté de comptes rendus de presse régionale décrivant une cérémonie d'accueil dans la citoyenneté française, qui se déroule dans une préfecture. Il raconte le moment où soixante-douze personnes étrangères, originaires de vingt-trois pays, reçoivent officiellement la nationalité française.", "Ces personnes sont devenues françaises par naturalisation : c'est l'État qui accorde la nationalité à un étranger qui en fait la demande. Le texte mentionne les conditions remplies : l'apprentissage du français, des preuves d'insertion professionnelle et un entretien portant sur les valeurs républicaines. La procédure a souvent demandé plusieurs années de préparation.", "Plusieurs symboles sont présents : le drapeau tricolore, le portrait de Marianne, La Marseillaise et le livret contenant la Déclaration de 1789, la Constitution et l'hymne national. Ils sont mis en avant car la cérémonie marque l'entrée dans une communauté de valeurs : les symboles rendent visible cette appartenance nouvelle à la nation.", "La préfète rappelle les droits politiques des nouveaux citoyens : voter et pouvoir être élus, avec les mêmes droits que tous leurs concitoyens. Elle rappelle aussi leurs devoirs : respecter les lois de la République et ses valeurs, la liberté, l'égalité, la fraternité et la laïcité. Droits et devoirs sont indissociables dans la citoyenneté.", "Exemple de rédaction : Devenir citoyen français, c'est entrer dans une communauté politique fondée sur des valeurs partagées, et non sur une origine. Le document le montre : les soixante-douze naturalisés viennent de vingt-trois pays différents, mais tous ont choisi la France en apprenant sa langue et en adhérant à ses valeurs, vérifiées lors d'un entretien. La cérémonie, entourée des symboles de la République, drapeau, Marianne, Marseillaise, marque cette entrée solennelle dans la nation. Devenir citoyen, c'est recevoir des droits, d'abord politiques, comme le dit la jeune femme émue de pouvoir enfin voter : Ma voix compte. Mais c'est aussi accepter des devoirs : respecter les lois, la laïcité et les droits des autres. La citoyenneté française repose ainsi sur un engagement réciproque entre la personne et la République."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, expliquez comment s'acquiert la nationalité française et montrez que la citoyenneté donne des droits et impose des devoirs, à l'échelle nationale comme à l'échelle européenne.", "plan": {"introduction": "Contexte : en France, la citoyenneté est liée à la nationalité et repose sur l'adhésion aux valeurs républicaines. Définitions : la nationalité est l'appartenance juridique à un État ; la citoyenneté est la participation à la vie politique avec des droits et des devoirs. Problématique : comment devient-on citoyen français et que signifie l'être, en France et en Europe ? Annonce du plan : d'abord l'acquisition de la nationalité, puis les droits et devoirs du citoyen français et européen.", "partie1": "I. Devenir français : plusieurs voies d'accès à la nationalité. Argument 1 : le droit du sang : est français l'enfant dont au moins un parent est français. Argument 2 : le droit du sol : l'enfant né en France de parents étrangers devient français à 18 ans s'il y réside (ou plus tôt sur demande). Argument 3 : la naturalisation (cinq ans de résidence, maîtrise du français, adhésion aux valeurs, cérémonie d'accueil) et le mariage avec un Français permettent aussi d'acquérir la nationalité : la nation française se définit par l'adhésion à des valeurs, non par l'origine.", "partie2": "II. Une citoyenneté faite de droits et de devoirs, élargie à l'Europe. Argument 1 : des droits civils (libertés), politiques (voter dès 18 ans, être élu) et sociaux (éducation, santé, grève). Argument 2 : des devoirs : respecter les lois, payer l'impôt, participer à la Défense (recensement à 16 ans, Journée défense et citoyenneté), être juré d'assises ; voter est un devoir civique même s'il n'est pas obligatoire. Argument 3 : depuis le traité de Maastricht (1992), le citoyen français est aussi citoyen européen : libre circulation, droit de vote aux élections municipales et européennes dans son pays de résidence, pétition au Parlement européen, initiative citoyenne.", "conclusion": "Bilan : la nationalité française s'acquiert par la filiation, la naissance en France, la naturalisation ou le mariage ; elle ouvre une citoyenneté faite de droits et de devoirs, complétée depuis 1992 par la citoyenneté européenne. Ouverture : ces droits ne vivent que si les citoyens les exercent, notamment par le vote et l'engagement."}, "correction_complete": "En France, la citoyenneté découle de la nationalité : tout Français majeur est citoyen et participe à la souveraineté nationale. La nationalité est l'appartenance juridique à un État, tandis que la citoyenneté désigne la participation à la vie politique, avec des droits et des devoirs. Comment devient-on citoyen français, et que signifie l'être, à l'échelle nationale comme à l'échelle européenne ? Nous étudierons d'abord les voies d'acquisition de la nationalité, puis les droits et les devoirs du citoyen.\n\nLa nationalité française s'acquiert par plusieurs voies. La première est le droit du sang : est français tout enfant dont au moins un parent est français, quel que soit son lieu de naissance. La deuxième est le droit du sol : un enfant né en France de parents étrangers devient automatiquement français à sa majorité s'il réside en France, et peut le devenir dès 13 ou 16 ans sur demande. Un étranger majeur peut également obtenir la naturalisation, accordée par l'État sous conditions : environ cinq ans de résidence régulière, la maîtrise de la langue française et l'adhésion aux valeurs de la République, vérifiée lors d'un entretien ; les nouveaux Français sont accueillis lors d'une cérémonie où leur sont remis les textes fondateurs. Enfin, le mariage avec un Français ou une Française ouvre, après plusieurs années d'union, l'accès à la nationalité par déclaration. Cette diversité des voies d'accès montre que la nation française se définit par l'adhésion à des valeurs communes, et non par l'origine.\n\nLa citoyenneté ainsi acquise donne des droits et impose des devoirs. Le citoyen jouit de droits civils, comme les libertés d'expression et de conscience, de droits politiques, voter dès 18 ans, être élu, participer aux référendums, et de droits sociaux, comme le droit à l'éducation, à la santé ou de grève. En retour, il doit respecter les lois, payer l'impôt qui finance les services publics, participer à la Défense, avec le recensement à 16 ans et la Journée défense et citoyenneté, et siéger comme juré d'assises s'il est tiré au sort ; voter, sans être obligatoire, demeure un devoir civique essentiel. Depuis le traité de Maastricht de 1992, cette citoyenneté nationale se double d'une citoyenneté européenne : le citoyen français peut circuler, étudier et travailler librement dans les 27 États membres, voter aux élections municipales et européennes dans son pays de résidence, adresser des pétitions au Parlement européen et soutenir une initiative citoyenne européenne.\n\nAinsi, la nationalité française, acquise par la filiation, la naissance en France, la naturalisation ou le mariage, ouvre une citoyenneté faite de droits et de devoirs indissociables, élargie depuis 1992 à l'échelle européenne. Mais ces droits ne valent que s'ils sont exercés : c'est par le vote, l'information et l'engagement que les citoyens font vivre la démocratie."}, "activite5_vocabulaire": {"termes": [{"mot": "Nationalité", "definition": "Lien juridique qui rattache une personne à un État. La nationalité française s'acquiert par filiation, naissance en France, naturalisation ou mariage."}, {"mot": "Citoyenneté", "definition": "Appartenance à une communauté politique, qui donne des droits (notamment politiques) et impose des devoirs."}, {"mot": "Droit du sang", "definition": "Attribution de la nationalité par la filiation : est français l'enfant dont au moins un parent est français."}, {"mot": "Droit du sol", "definition": "Possibilité pour un enfant né en France de parents étrangers de devenir français, automatiquement à 18 ans sous conditions de résidence."}, {"mot": "Naturalisation", "definition": "Attribution de la nationalité française par l'État à un étranger qui en fait la demande, sous conditions de résidence, de langue et d'adhésion aux valeurs."}, {"mot": "Droits civiques", "definition": "Droits politiques du citoyen : voter, être élu, participer aux référendums. Un juge peut en priver une personne condamnée."}, {"mot": "Devoir civique", "definition": "Obligation morale ou légale du citoyen envers la communauté : respecter les lois, payer l'impôt, voter, être juré."}, {"mot": "Citoyenneté européenne", "definition": "Citoyenneté créée par le traité de Maastricht (1992) : elle s'ajoute à la citoyenneté nationale et donne des droits dans toute l'Union."}, {"mot": "Traité de Maastricht", "definition": "Traité signé en 1992 qui crée l'Union européenne, la citoyenneté européenne et programme la monnaie unique."}, {"mot": "Initiative citoyenne européenne", "definition": "Procédure permettant à un million de citoyens européens de demander à la Commission de proposer une loi."}], "notions_essentielles": ["La nationalité française s'acquiert par le droit du sang, le droit du sol, la naturalisation ou le mariage : la nation se définit par l'adhésion aux valeurs, pas par l'origine.", "Le citoyen français a des droits civils, politiques (voter à 18 ans, être élu) et sociaux.", "Il a aussi des devoirs : respecter les lois, payer l'impôt, participer à la Défense (recensement à 16 ans, JDC), être juré d'assises.", "Le traité de Maastricht (1992) crée la citoyenneté européenne, qui s'ajoute à la citoyenneté nationale.", "Le citoyen européen peut circuler et travailler dans les 27 États membres et voter aux élections municipales et européennes dans son pays de résidence."]}}, {"id": 3, "titre": "Le droit de vote et les élections : la vie démocratique", "activite1_fiche": {"introduction": "Dans une démocratie, le pouvoir appartient au peuple, qui l'exerce principalement par le vote. En France, le droit de vote a été conquis progressivement : suffrage universel masculin en 1848, vote des femmes en 1944, majorité à 18 ans en 1974. Les élections rythment la vie démocratique et permettent aux citoyens de choisir leurs représentants à toutes les échelles, de la commune à l'Europe. Mais la montée de l'abstention pose la question de la vitalité de notre démocratie. Problématique : comment le vote permet-il aux citoyens d'exercer leur souveraineté, et quels défis la démocratie française doit-elle relever ?", "partie1_titre": "I. Le droit de vote, une longue conquête", "partie1_contenu": "A. Du suffrage censitaire au suffrage universel masculin. Sous la Révolution puis au XIXe siècle, le droit de vote est longtemps censitaire : seuls les hommes payant un certain montant d'impôt (le cens) peuvent voter. La IIe République instaure le suffrage universel masculin le 5 mars 1848 : tous les hommes de plus de 21 ans votent, quelle que soit leur fortune.\n\nB. Le vote des femmes et l'abaissement de la majorité. Il faut attendre l'ordonnance du 21 avril 1944, prise par le Gouvernement provisoire du général de Gaulle, pour que les femmes obtiennent le droit de vote ; elles votent pour la première fois aux élections municipales d'avril 1945. En 1974, la majorité électorale est abaissée de 21 à 18 ans. Depuis 1992, les citoyens européens résidant en France votent aux élections municipales et européennes.\n\nC. Les caractères du suffrage en France. Le suffrage est universel (tous les citoyens majeurs), égal (une personne, une voix), secret (l'isoloir, rendu obligatoire en 1913, protège la liberté du vote) et libre. Pour voter, il faut être français (ou européen pour certaines élections), majeur, inscrit sur les listes électorales et jouir de ses droits civiques.", "partie2_titre": "II. Des élections à toutes les échelles", "partie2_contenu": "A. Les élections locales. Les élections municipales désignent les conseillers municipaux, qui élisent le maire, pour 6 ans. Les élections départementales et régionales désignent les conseillers qui gèrent collèges, routes, lycées, transports régionaux. Ces élus de proximité gèrent le quotidien des habitants.\n\nB. Les élections nationales. L'élection présidentielle, au suffrage universel direct depuis 1962, désigne le président de la République pour 5 ans (quinquennat depuis 2000), au scrutin majoritaire à deux tours. Les élections législatives élisent les 577 députés de l'Assemblée nationale pour 5 ans, également au scrutin majoritaire à deux tours. Les sénateurs, eux, sont élus au suffrage indirect par les grands électeurs. Le référendum permet enfin aux citoyens de répondre directement à une question.\n\nC. Les élections européennes. Tous les 5 ans, les citoyens de l'Union élisent leurs députés européens au suffrage universel direct, à la proportionnelle. Le Parlement européen vote les lois européennes avec le Conseil : ces élections donnent aux citoyens une voix dans les décisions de l'Union.", "partie3_titre": "III. Voter : un acte démocratique menacé par l'abstention", "partie3_contenu": "A. Le déroulement du vote, garant de la démocratie. Le jour du scrutin, l'électeur présente sa carte électorale ou une pièce d'identité, prend plusieurs bulletins et une enveloppe, passe obligatoirement par l'isoloir, dépose son enveloppe dans l'urne transparente et signe la liste d'émargement. Le dépouillement est public, assuré par des citoyens. Ces règles garantissent la sincérité du scrutin. L'électeur absent peut voter par procuration.\n\nB. La montée préoccupante de l'abstention. Depuis les années 1980, l'abstention progresse à presque toutes les élections, atteignant des records aux scrutins locaux et européens, particulièrement chez les jeunes. Les causes sont multiples : défiance envers les responsables politiques, sentiment que le vote ne change rien, désintérêt, difficultés d'inscription sur les listes.\n\nC. Faire vivre la démocratie au-delà du vote. La démocratie ne se limite pas aux élections : pétitions, débats publics, conseils citoyens, budgets participatifs des communes, engagement associatif et syndical permettent de participer entre deux scrutins. Mais le vote reste l'acte central : s'abstenir, c'est laisser les autres décider à sa place. Blanc ou nul, le vote exprime au moins une participation ; le vote blanc est comptabilisé séparément depuis 2014, sans être reconnu comme suffrage exprimé.", "conclusion": "Le droit de vote, conquis par étapes, 1848 pour les hommes, 1944 pour les femmes, 18 ans depuis 1974, est le coeur de la démocratie française. Universel, égal, secret et libre, le suffrage permet aux citoyens de choisir leurs représentants de la commune à l'Europe et de trancher par référendum. Mais la montée de l'abstention fragilise cette souveraineté populaire : la démocratie n'est vivante que si les citoyens s'informent, débattent et votent. Participer aux élections, c'est exercer un droit que des générations ont conquis, et un devoir envers celles qui suivent."}, "activite2_quiz": [{"question": "Qu'est-ce que le suffrage censitaire ?", "options": ["Un vote réservé aux hommes payant un certain montant d'impôt", "Un vote ouvert à tous", "Un vote réservé aux femmes", "Un vote par internet"], "correcte": 0, "explication": "Au XIXe siècle, seuls les hommes payant un impôt minimum (le cens) pouvaient voter : c'est le suffrage censitaire, qui excluait la grande majorité de la population."}, {"question": "En quelle année le suffrage universel masculin est-il instauré en France ?", "options": ["1789", "1848", "1944", "1974"], "correcte": 1, "explication": "La IIe République instaure le suffrage universel masculin le 5 mars 1848 : tous les hommes majeurs votent, sans condition de fortune."}, {"question": "Quand les femmes ont-elles obtenu le droit de vote en France ?", "options": ["En 1848", "Par l'ordonnance du 21 avril 1944", "En 1974", "En 2000"], "correcte": 1, "explication": "L'ordonnance du 21 avril 1944, prise par le Gouvernement provisoire du général de Gaulle, accorde le droit de vote aux femmes, qui votent pour la première fois en avril 1945."}, {"question": "Depuis quand la majorité électorale est-elle fixée à 18 ans ?", "options": ["1944", "1958", "1974", "2002"], "correcte": 2, "explication": "En 1974, sous la présidence de Valéry Giscard d'Estaing, la majorité passe de 21 à 18 ans : les jeunes votent plus tôt."}, {"question": "Quels sont les quatre caractères du suffrage en France ?", "options": ["Universel, égal, secret et libre", "Obligatoire, payant, public et familial", "Censitaire, masculin, indirect et secret", "Local, national, européen et mondial"], "correcte": 0, "explication": "Le suffrage est universel (tous les citoyens majeurs), égal (une personne, une voix), secret (isoloir) et libre (aucune pression ne doit s'exercer sur l'électeur)."}, {"question": "À quoi sert l'isoloir ?", "options": ["À compter les voix", "À garantir le secret du vote", "À vérifier l'identité", "À ranger les bulletins inutilisés"], "correcte": 1, "explication": "L'isoloir, obligatoire depuis 1913, permet à l'électeur de mettre son bulletin sous enveloppe à l'abri des regards : il garantit le secret et donc la liberté du vote."}, {"question": "Pour combien de temps le président de la République est-il élu ?", "options": ["4 ans", "5 ans", "7 ans", "10 ans"], "correcte": 1, "explication": "Depuis le référendum de 2000, le président est élu pour 5 ans (quinquennat), au suffrage universel direct et au scrutin majoritaire à deux tours."}, {"question": "Combien de députés siègent à l'Assemblée nationale ?", "options": ["348", "577", "925", "100"], "correcte": 1, "explication": "L'Assemblée nationale compte 577 députés, élus pour 5 ans au suffrage universel direct lors des élections législatives."}, {"question": "Comment les sénateurs sont-ils élus ?", "options": ["Au suffrage universel direct", "Au suffrage indirect, par les grands électeurs", "Ils sont nommés par le président", "Ils sont tirés au sort"], "correcte": 1, "explication": "Les sénateurs sont élus au suffrage universel indirect par environ 162 000 grands électeurs (essentiellement des élus locaux) : le Sénat représente les collectivités territoriales."}, {"question": "Qui élit le maire d'une commune ?", "options": ["Les habitants directement", "Les conseillers municipaux élus par les habitants", "Le préfet", "Le président de la République"], "correcte": 1, "explication": "Aux élections municipales, les habitants élisent les conseillers municipaux pour 6 ans ; ce sont eux qui élisent ensuite le maire parmi eux."}, {"question": "Qu'est-ce qu'un référendum ?", "options": ["Une élection de députés", "Un vote par lequel les citoyens répondent directement à une question par oui ou par non", "Un sondage d'opinion", "Une pétition en ligne"], "correcte": 1, "explication": "Le référendum est un instrument de démocratie directe : les citoyens tranchent eux-mêmes une question, comme en 2000 pour le quinquennat."}, {"question": "Comment les députés européens sont-ils élus ?", "options": ["Au suffrage universel direct, à la proportionnelle, tous les 5 ans", "Par les chefs d'État", "Par tirage au sort", "Ils ne sont pas élus"], "correcte": 0, "explication": "Tous les 5 ans, les citoyens de l'UE élisent leurs députés européens au suffrage universel direct et à la proportionnelle : le Parlement européen vote les lois de l'Union avec le Conseil."}, {"question": "Que peut faire un électeur absent le jour du vote ?", "options": ["Rien", "Voter par procuration en confiant son vote à un autre électeur", "Voter la semaine suivante", "Envoyer son bulletin par la poste pour toutes les élections"], "correcte": 1, "explication": "Le vote par procuration permet de confier son vote à un électeur de confiance, qui vote en son nom : la démarche se fait notamment auprès de la police, de la gendarmerie ou en ligne."}, {"question": "Qu'est-ce que l'abstention ?", "options": ["Le fait de voter blanc", "Le fait de ne pas aller voter alors qu'on est inscrit", "Le fait de voter deux fois", "Le fait d'annuler une élection"], "correcte": 1, "explication": "L'abstention désigne les électeurs inscrits qui ne se déplacent pas pour voter. Elle progresse depuis les années 1980, surtout chez les jeunes : c'est un défi pour la démocratie."}, {"question": "Le vote blanc est-il reconnu comme un suffrage exprimé ?", "options": ["Oui, il peut faire gagner un candidat", "Non : il est comptabilisé séparément depuis 2014 mais n'entre pas dans les suffrages exprimés", "Oui, depuis 1848", "Le vote blanc est interdit"], "correcte": 1, "explication": "Depuis 2014, les votes blancs sont comptés à part et annoncés dans les résultats, mais ils ne comptent pas dans les suffrages exprimés qui déterminent le vainqueur."}], "activite3_etude": {"document_type": "texte", "document_titre": "Premier vote : le témoignage d'une jeune électrice et le défi de l'abstention", "document_texte": "« J'ai eu 18 ans en janvier, et dimanche dernier j'ai voté pour la première fois, raconte Inès, lycéenne en terminale. J'étais un peu impressionnée : la file devant la table, ma carte électorale toute neuve, les bulletins, l'isoloir obligatoire, et puis le président du bureau qui annonce a voté quand on glisse l'enveloppe dans l'urne. J'ai signé la liste d'émargement et je me suis dit que ma voix comptait autant que celle de n'importe qui. Autour d'elle pourtant, beaucoup de jeunes ont fait un autre choix : dans son bureau de vote, plus d'un électeur inscrit sur deux ne s'est pas déplacé, et chez les 18-24 ans, l'abstention dépasse souvent les deux tiers aux élections locales et européennes. Quand je demande à mes copains pourquoi ils ne votent pas, ils me répondent que ça ne sert à rien ou que les politiques sont tous pareils, regrette Inès. Moi je leur dis : des gens se sont battus pour qu'on ait ce droit. Les femmes ne votent que depuis 1944 ! Si on ne vote pas, on laisse les autres décider pour nous. »", "document_source": "Texte adapté à des fins pédagogiques de reportages de presse sur la participation électorale des jeunes (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, personnage principal.", "Décrivez, à l'aide du texte, les étapes du vote qui garantissent un scrutin sincère et secret.", "Quelles données du texte montrent l'ampleur de l'abstention chez les jeunes ?", "Quelles raisons les jeunes interrogés donnent-ils pour expliquer leur abstention ? Quel argument Inès leur oppose-t-elle ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez pourquoi l'abstention est un défi pour la démocratie et comment y répondre."], "corrections": ["Ce document est un texte adapté de reportages de presse des années 2010-2020. Il rapporte le témoignage d'Inès, une lycéenne de 18 ans qui vote pour la première fois, et le met en regard de l'abstention élevée des jeunes électeurs. Il illustre à la fois le déroulement concret du vote et le principal défi de la démocratie française.", "Le texte décrit les étapes qui garantissent la sincérité du scrutin : la présentation de la carte électorale à la table du bureau, la prise des bulletins, le passage obligatoire par l'isoloir qui assure le secret du vote, le dépôt de l'enveloppe dans l'urne annoncé par le président du bureau (a voté), et la signature de la liste d'émargement qui empêche de voter deux fois.", "Le texte donne deux indications chiffrées : dans le bureau de vote d'Inès, plus d'un électeur inscrit sur deux ne s'est pas déplacé, et chez les 18-24 ans, l'abstention dépasse souvent les deux tiers aux élections locales et européennes. Les jeunes sont donc la classe d'âge qui vote le moins.", "Les jeunes interrogés expliquent leur abstention par le sentiment d'inutilité (ça ne sert à rien) et par la défiance envers les responsables politiques (ils sont tous pareils). Inès leur oppose un argument historique et civique : le droit de vote est une conquête, les femmes ne votent que depuis 1944, et s'abstenir revient à laisser les autres décider à sa place.", "Exemple de rédaction : L'abstention est un défi majeur pour la démocratie car elle affaiblit la légitimité des élus : lorsque plus d'un électeur sur deux ne se déplace pas, comme dans le bureau de vote du document, les décisions sont prises par une minorité de citoyens. Elle creuse aussi les inégalités politiques, car les jeunes et les milieux populaires s'abstiennent davantage : leurs préoccupations risquent d'être moins entendues. Pour y répondre, plusieurs pistes existent : l'éducation civique dès le collège, la simplification de l'inscription sur les listes et du vote par procuration, le développement de la participation entre deux élections (budgets participatifs, conseils citoyens, pétitions). Mais l'essentiel reste la prise de conscience qu'exprime Inès : le vote est une conquête historique, les femmes ne l'ont obtenu qu'en 1944, et s'abstenir, c'est renoncer à sa part de souveraineté."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que le droit de vote est le résultat d'une longue conquête et qu'il reste aujourd'hui un acte essentiel mais fragilisé de la démocratie française.", "plan": {"introduction": "Contexte : en démocratie, la souveraineté appartient au peuple, qui l'exerce d'abord par le vote. Définition : le suffrage universel donne le droit de vote à tous les citoyens majeurs. Problématique : comment le droit de vote a-t-il été conquis, et pourquoi est-il aujourd'hui à la fois essentiel et fragilisé ? Annonce du plan : d'abord la conquête progressive du droit de vote, puis son rôle central et le défi de l'abstention.", "partie1": "I. Une longue conquête démocratique. Argument 1 : du suffrage censitaire (réservé aux hommes riches) au suffrage universel masculin, instauré le 5 mars 1848 par la IIe République. Argument 2 : l'extension aux femmes par l'ordonnance du 21 avril 1944 (premier vote en 1945), puis aux jeunes avec la majorité à 18 ans en 1974 ; les citoyens européens votent aux municipales et aux européennes depuis le traité de Maastricht. Argument 3 : des garanties conquises : suffrage égal (une personne, une voix), secret (isoloir obligatoire depuis 1913) et libre.", "partie2": "II. Un acte central de la démocratie, fragilisé par l'abstention. Argument 1 : le vote permet de choisir ses représentants à toutes les échelles : maire et conseillers municipaux (6 ans), président de la République (5 ans, suffrage direct depuis 1962), 577 députés, députés européens (proportionnelle, tous les 5 ans), et de trancher par référendum. Argument 2 : l'abstention progresse depuis les années 1980, record chez les 18-24 ans aux scrutins locaux et européens ; causes : défiance, sentiment d'inutilité du vote. Argument 3 : des réponses existent : éducation à la citoyenneté, procurations facilitées, démocratie participative (budgets participatifs, pétitions), mais le vote reste l'acte décisif : s'abstenir, c'est laisser les autres décider.", "conclusion": "Bilan : conquis par étapes de 1848 à 1974, le droit de vote universel, égal, secret et libre est le coeur de la démocratie ; l'abstention croissante le fragilise sans le remplacer. Ouverture : la vitalité démocratique dépend aussi des institutions qui organisent les pouvoirs, objet du chapitre suivant."}, "correction_complete": "En démocratie, la souveraineté appartient au peuple : c'est par le vote que les citoyens choisissent leurs représentants et tranchent les grandes questions. Le suffrage universel, qui donne ce droit à tous les citoyens majeurs, n'a pourtant rien d'une évidence : il est le fruit d'une longue conquête. Comment le droit de vote a-t-il été conquis, et pourquoi est-il aujourd'hui à la fois essentiel et fragilisé ? Nous retracerons d'abord cette conquête, avant de montrer le rôle central du vote face au défi de l'abstention.\n\nLe droit de vote est d'abord le résultat d'une longue conquête démocratique. Pendant la première moitié du XIXe siècle, le suffrage est censitaire : seuls les hommes payant un impôt suffisant, le cens, peuvent voter, ce qui exclut l'immense majorité des Français. La IIe République instaure le suffrage universel masculin le 5 mars 1848 : tous les hommes majeurs votent désormais, quelle que soit leur fortune. Il faut pourtant attendre près d'un siècle pour que la moitié de la population accède aux urnes : l'ordonnance du 21 avril 1944, prise par le Gouvernement provisoire du général de Gaulle, accorde le droit de vote aux femmes, qui votent pour la première fois en avril 1945. En 1974, la majorité électorale est abaissée de 21 à 18 ans, et depuis le traité de Maastricht, les citoyens européens résidant en France participent aux élections municipales et européennes. Des garanties essentielles ont aussi été conquises : le suffrage est égal, une personne valant une voix, secret grâce à l'isoloir obligatoire depuis 1913, et libre.\n\nLe vote demeure aujourd'hui l'acte central de la démocratie, mais il est fragilisé. Il permet de choisir ses représentants à toutes les échelles : les conseillers municipaux et le maire pour six ans, le président de la République, élu pour cinq ans au suffrage universel direct depuis 1962, les 577 députés de l'Assemblée nationale, les députés européens élus à la proportionnelle tous les cinq ans ; le référendum permet en outre de trancher directement certaines questions, comme le quinquennat en 2000. Or l'abstention progresse depuis les années 1980 et atteint des records chez les 18-24 ans aux scrutins locaux et européens, où elle dépasse souvent les deux tiers. Défiance envers les responsables politiques et sentiment que le vote ne change rien en sont les principales causes. Des réponses existent : éducation à la citoyenneté dès le collège, procurations facilitées, démocratie participative avec les budgets participatifs et les pétitions. Mais aucune ne remplace le vote : s'abstenir, c'est laisser les autres décider à sa place.\n\nAinsi, le droit de vote, conquis par étapes de 1848 à 1974 et entouré de garanties qui en font un suffrage universel, égal, secret et libre, reste le coeur battant de la démocratie française, que l'abstention croissante fragilise sans pouvoir le remplacer. Sa vitalité dépend aussi du bon fonctionnement des institutions de la Ve République, qui organisent l'exercice des pouvoirs issus de ce vote."}, "activite5_vocabulaire": {"termes": [{"mot": "Suffrage universel", "definition": "Droit de vote accordé à tous les citoyens majeurs sans condition de fortune, de sexe ou d'origine."}, {"mot": "Suffrage censitaire", "definition": "Système qui réservait le droit de vote aux hommes payant un impôt minimum (le cens), en vigueur en France jusqu'en 1848."}, {"mot": "Isoloir", "definition": "Cabine obligatoire depuis 1913 où l'électeur met son bulletin sous enveloppe à l'abri des regards : il garantit le secret du
