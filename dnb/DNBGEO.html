ste avant tout une puissance économique et commerciale : sa politique étrangère exige l'accord de ses membres, qui sont parfois divisés, et sa défense repose encore largement sur les États (et sur l'OTAN). Le Brexit a par ailleurs affaibli l'ensemble européen. Les crises internationales poussent toutefois les Européens à renforcer leur coopération en matière de défense et d'industrie.\n\nC. Des défis pour rester influent. Pour conserver leur rang, la France et l'Europe misent sur leurs atouts : excellence scientifique et industrielle (Airbus, Ariane), transition écologique, normes et valeurs (démocratie, droits de l'homme), francophonie et attractivité culturelle. La puissance ne se mesure plus seulement à la force militaire : l'influence, l'innovation et la capacité d'attraction comptent tout autant.", "conclusion": "L'Union européenne constitue l'un des pôles majeurs de l'économie mondiale : première puissance commerciale, dotée d'une monnaie de rang mondial et d'une forte influence normative. En son sein, la France conserve un statut singulier de puissance mondiale : membre permanent du Conseil de sécurité, puissance nucléaire et maritime, économie de premier plan et rayonnement culturel exceptionnel porté par la francophonie et le tourisme. Cette influence connaît cependant des limites face aux États-Unis et à la Chine : c'est en s'appuyant sur l'Union européenne que la France peut continuer à peser dans un monde devenu multipolaire."}, "activite2_quiz": [{"question": "Quels sont les trois grands pôles de l'économie mondiale ?", "options": ["L'Afrique, l'Océanie et l'Antarctique", "L'Union européenne, l'Amérique du Nord et l'Asie orientale", "La Russie, le Brésil et l'Inde", "Le Royaume-Uni, la Suisse et la Norvège"], "correcte": 1, "explication": "L'économie mondiale s'organise autour de trois pôles majeurs : l'Union européenne, l'Amérique du Nord et l'Asie orientale, qui concentrent l'essentiel des richesses et des échanges."}, {"question": "Quel rang l'Union européenne occupe-t-elle dans le commerce mondial ?", "options": ["Première puissance commerciale mondiale", "Dixième puissance commerciale", "Elle ne fait pas de commerce", "Dernière puissance commerciale"], "correcte": 0, "explication": "L'UE est la première puissance commerciale du monde : elle réalise une part majeure des échanges mondiaux de marchandises et de services."}, {"question": "Quel grand port européen compte parmi les plus actifs du monde ?", "options": ["Marseille", "Rotterdam", "Bordeaux", "Brest"], "correcte": 1, "explication": "Rotterdam, aux Pays-Bas, est le premier port européen et l'un des plus actifs du monde : il constitue la principale porte d'entrée maritime de l'Union européenne."}, {"question": "Quelle place occupe l'euro parmi les monnaies mondiales ?", "options": ["Première monnaie mondiale", "Deuxième monnaie la plus utilisée, derrière le dollar", "Monnaie utilisée uniquement en France", "Monnaie interdite hors d'Europe"], "correcte": 1, "explication": "L'euro est la deuxième monnaie la plus utilisée au monde pour les échanges et les réserves, derrière le dollar américain : un symbole du poids économique européen."}, {"question": "Comment l'UE exerce-t-elle une influence par ses normes ?", "options": ["En imposant sa langue", "Ses règles (environnement, données personnelles) s'imposent aux entreprises qui veulent accéder à son marché", "En envoyant des armées", "Elle n'a aucune influence"], "correcte": 1, "explication": "Pour vendre sur le marché européen de 450 millions de consommateurs, les entreprises du monde entier doivent respecter les normes de l'UE : c'est une influence normative puissante."}, {"question": "Quel statut la France possède-t-elle à l'ONU ?", "options": ["Simple observatrice", "Membre permanent du Conseil de sécurité avec droit de veto", "Elle n'en fait pas partie", "Présidente permanente de l'ONU"], "correcte": 1, "explication": "La France est l'un des cinq membres permanents du Conseil de sécurité de l'ONU (avec les États-Unis, la Russie, la Chine et le Royaume-Uni) et dispose du droit de veto."}, {"question": "Grâce à quoi la France possède-t-elle la deuxième ZEE mondiale ?", "options": ["Grâce à ses territoires ultramarins répartis sur tous les océans", "Grâce à la Méditerranée", "Grâce à ses fleuves", "Grâce à ses lacs de montagne"], "correcte": 0, "explication": "Les outre-mer, dispersés sur tous les océans, donnent à la France une zone économique exclusive de plus de 10 millions de km², la deuxième du monde derrière celle des États-Unis."}, {"question": "Quelle firme française domine l'aéronautique européenne ?", "options": ["Boeing", "Airbus", "Toyota", "Samsung"], "correcte": 1, "explication": "Airbus, dont les avions sont assemblés à Toulouse et à Hambourg, est l'un des deux géants mondiaux de l'aéronautique avec l'américain Boeing : un fleuron de la puissance industrielle française et européenne."}, {"question": "Dans quel secteur LVMH et L'Oréal illustrent-ils la puissance française ?", "options": ["Le luxe et les cosmétiques", "L'automobile", "Le pétrole", "L'informatique"], "correcte": 0, "explication": "Le luxe et les cosmétiques sont des points forts de l'économie française : LVMH, L'Oréal, Hermès ou Chanel diffusent dans le monde entier une image d'excellence associée à la France."}, {"question": "Combien de personnes environ parlent français dans le monde ?", "options": ["30 millions", "Environ 300 millions", "3 milliards", "67 millions"], "correcte": 1, "explication": "Environ 300 millions de personnes parlent français sur les cinq continents, notamment en Afrique : la francophonie est un pilier du rayonnement international de la France."}, {"question": "Qu'est-ce que l'OIF ?", "options": ["L'Organisation internationale de la francophonie", "L'Office international du football", "L'Organisation des îles françaises", "L'Observatoire des forêts"], "correcte": 0, "explication": "L'Organisation internationale de la francophonie regroupe les États et gouvernements ayant le français en partage : elle promeut la langue française et la coopération entre ses membres."}, {"question": "Qu'appelle-t-on le soft power ?", "options": ["La puissance militaire", "La capacité d'influence par la culture, les idées et l'attractivité plutôt que par la force", "Une marque de logiciels", "L'énergie solaire"], "correcte": 1, "explication": "Le soft power (puissance douce) est la capacité d'un pays à influencer les autres par sa culture, ses valeurs, ses médias et son attractivité, sans recourir à la force. La France y excelle : langue, gastronomie, mode, cinéma, tourisme."}, {"question": "Quel rang la France occupe-t-elle dans le tourisme mondial ?", "options": ["Première destination touristique mondiale", "Cinquantième destination", "Elle interdit le tourisme", "Deuxième destination derrière le Luxembourg"], "correcte": 0, "explication": "Avec plus de 90 millions de visiteurs internationaux les meilleures années, la France est la première destination touristique mondiale : Paris, les littoraux, les Alpes et les terroirs attirent le monde entier."}, {"question": "Face à quels géants la puissance française et européenne est-elle limitée ?", "options": ["Les États-Unis et la Chine", "Monaco et le Liechtenstein", "L'Islande et Malte", "Aucun pays"], "correcte": 0, "explication": "Les États-Unis et la Chine dominent l'économie mondiale et le numérique : ni la France ni l'UE ne peuvent rivaliser seules avec ces géants, d'où l'importance de la coopération européenne."}, {"question": "Pourquoi l'Union européenne peine-t-elle à être une puissance politique complète ?", "options": ["Parce qu'elle n'a pas d'économie", "Parce que sa politique étrangère exige l'accord d'États parfois divisés et que sa défense repose encore sur les États membres", "Parce qu'elle est trop petite", "Parce qu'elle n'a pas de monnaie"], "correcte": 1, "explication": "L'UE est une grande puissance économique, mais sa politique étrangère demande l'unanimité d'États parfois divisés, et sa défense repose largement sur les armées nationales et l'OTAN : l'Europe puissance reste en construction."}], "activite3_etude": {"document_type": "texte", "document_titre": "La francophonie, un atout majeur du rayonnement français", "document_texte": "« Le français est aujourd'hui parlé par environ 300 millions de personnes sur les cinq continents : c'est l'une des rares langues présentes dans le monde entier. Langue officielle ou co-officielle dans une trentaine d'États, langue de travail de l'ONU, de l'Union européenne et des Jeux olympiques, le français doit surtout son avenir à l'Afrique : plus de la moitié de ses locuteurs quotidiens vivent sur ce continent, où la jeunesse de la population laisse prévoir une forte croissance du nombre de francophones d'ici 2050. Autour de la langue s'est construit un réseau d'influence sans équivalent : l'Organisation internationale de la francophonie regroupe environ 90 États et gouvernements ; près de 600 lycées français scolarisent des centaines de milliers d'élèves dans le monde ; les Alliances françaises enseignent la langue sur tous les continents ; TV5 Monde, France 24 et RFI diffusent l'information en français. Pour la France, cette communauté de langue est un atout économique, diplomatique et culturel considérable. »", "document_source": "Texte adapté à des fins pédagogiques de rapports de l'Organisation internationale de la francophonie et d'articles de presse (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, source.", "Combien de personnes parlent français dans le monde, et sur quel continent l'avenir de la langue se joue-t-il principalement ? Pourquoi ?", "Relevez dans le texte les institutions et réseaux qui structurent la francophonie.", "Dans quelles grandes organisations internationales le français est-il langue de travail ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez pourquoi la francophonie est un instrument de puissance pour la France."], "corrections": ["Ce document est un texte adapté de rapports de l'Organisation internationale de la francophonie et d'articles de presse des années 2010-2020. Il dresse un état des lieux de la langue française dans le monde et présente les réseaux qui structurent la francophonie, illustrant le rayonnement culturel de la France étudié dans le chapitre.", "Environ 300 millions de personnes parlent français sur les cinq continents. L'avenir de la langue se joue principalement en Afrique : plus de la moitié des locuteurs quotidiens y vivent, et la jeunesse de la population africaine laisse prévoir une forte croissance du nombre de francophones d'ici 2050.", "Le texte cite plusieurs institutions et réseaux : l'Organisation internationale de la francophonie, qui regroupe environ 90 États et gouvernements ; le réseau de près de 600 lycées français à l'étranger ; les Alliances françaises, qui enseignent la langue sur tous les continents ; et les médias internationaux en français, TV5 Monde, France 24 et RFI.", "Le français est langue de travail de grandes organisations internationales : l'ONU, l'Union européenne et les Jeux olympiques. Il est par ailleurs langue officielle ou co-officielle dans une trentaine d'États. Cette présence institutionnelle renforce le poids diplomatique de la France.", "Exemple de rédaction : La francophonie est un instrument de puissance car elle donne à la France une influence qui ne repose ni sur la force militaire ni sur la seule économie : c'est l'exemple type du soft power. Une communauté d'environ 300 millions de locuteurs, appelée à grandir grâce au dynamisme démographique de l'Afrique, constitue d'abord un immense marché pour les entreprises, les médias et les industries culturelles françaises. La langue ouvre ensuite des relais diplomatiques : l'OIF regroupe environ 90 États et gouvernements qui partagent des positions communes, et le français demeure langue de travail de l'ONU et de l'UE. Enfin, les lycées français, les Alliances françaises et les médias comme TV5 Monde ou RFI diffusent la culture et les valeurs françaises auprès des élites et des jeunesses du monde entier. La francophonie prolonge ainsi l'influence française bien au-delà des frontières nationales."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que la France est une puissance mondiale qui s'appuie sur des atouts variés, mais dont l'influence connaît des limites.", "plan": {"introduction": "Contexte : la France, pilier de l'Union européenne, exerce une influence mondiale qui dépasse sa taille (environ 1 % de la population mondiale). Définition : une puissance est un État capable d'influencer les autres acteurs du monde par des moyens politiques, économiques, militaires et culturels. Problématique : sur quels atouts la puissance française repose-t-elle, et quelles sont ses limites ? Annonce du plan : d'abord les atouts multiples de la puissance française, puis ses limites dans un monde dominé par des géants.", "partie1": "I. Une puissance aux atouts multiples. Argument 1 : une puissance politique et militaire : membre permanent du Conseil de sécurité de l'ONU avec droit de veto, arme nucléaire, armée capable d'intervenir loin, réseau diplomatique parmi les plus étendus du monde, deuxième ZEE mondiale grâce aux outre-mer. Argument 2 : une puissance économique : parmi les dix premières économies mondiales, firmes transnationales présentes partout (Airbus, LVMH, L'Oréal, TotalEnergies, Danone). Argument 3 : un rayonnement culturel exceptionnel (soft power) : francophonie (environ 300 millions de locuteurs, OIF), lycées français et Alliances françaises, médias internationaux (TV5 Monde, France 24), gastronomie et mode, première destination touristique mondiale.", "partie2": "II. Une influence qui connaît des limites. Argument 1 : des concurrents géants : face aux États-Unis et à la Chine, la France ne représente qu'environ 1 % de la population mondiale ; le numérique est dominé par les plateformes étrangères. Argument 2 : la nécessité de l'échelle européenne : seule, la France ne peut rivaliser ; l'UE, première puissance commerciale mondiale avec l'euro comme deuxième monnaie mondiale, démultiplie son influence (normes, aide au développement). Argument 3 : mais l'Europe puissance reste inachevée : politique étrangère soumise à l'accord d'États parfois divisés, défense dépendante des États et de l'OTAN, affaiblissement lié au Brexit.", "conclusion": "Bilan : la France demeure une puissance mondiale complète, politique, militaire, économique et culturelle, mais d'un rang moyen face aux géants : son influence passe de plus en plus par l'Union européenne. Ouverture : dans un monde multipolaire, la capacité des Européens à s'unir déterminera leur poids futur."}, "correction_complete": "Avec environ 1 % de la population mondiale, la France exerce pourtant une influence qui dépasse largement sa taille : présente sur tous les océans, écoutée dans les grandes instances internationales, elle demeure l'une des principales puissances de la planète. Une puissance est un État capable d'influencer les autres acteurs du monde par des moyens politiques, économiques, militaires et culturels. Sur quels atouts la puissance française repose-t-elle, et quelles sont ses limites ? Nous présenterons d'abord ses atouts, avant d'analyser les limites de son influence.\n\nLa puissance française repose d'abord sur des atouts multiples. Sur le plan politique et militaire, la France est l'un des cinq membres permanents du Conseil de sécurité de l'ONU, où elle dispose du droit de veto ; elle possède l'arme nucléaire, une armée capable d'intervenir loin de ses frontières et l'un des réseaux diplomatiques les plus étendus du monde. Grâce à ses territoires ultramarins, elle contrôle la deuxième zone économique exclusive mondiale, plus de 10 millions de kilomètres carrés. Sur le plan économique, la France figure parmi les dix premières puissances : ses firmes transnationales rayonnent sur tous les continents, d'Airbus dans l'aéronautique à LVMH et L'Oréal dans le luxe, en passant par TotalEnergies ou Danone. Enfin, son rayonnement culturel est exceptionnel : la langue française est parlée par environ 300 millions de personnes réunies dans la francophonie, les lycées français et les Alliances françaises forment des élèves sur tous les continents, les médias internationaux comme TV5 Monde ou France 24 diffusent sa voix, et la France demeure la première destination touristique mondiale. Ce soft power complète la puissance traditionnelle.\n\nCette influence connaît pourtant des limites réelles. Face aux États-Unis et à la Chine, géants démographiques, économiques et technologiques, la France fait figure de puissance moyenne : le numérique mondial, par exemple, est dominé par des plateformes américaines et asiatiques. C'est pourquoi son influence passe de plus en plus par l'Union européenne : première puissance commerciale mondiale, dotée avec l'euro de la deuxième monnaie de la planète, l'UE impose ses normes aux entreprises du monde entier qui veulent accéder à son marché de 450 millions de consommateurs et demeure le premier donneur d'aide au développement. Mais l'Europe puissance reste inachevée : sa politique étrangère exige l'accord d'États parfois divisés, sa défense repose encore largement sur les armées nationales et sur l'OTAN, et le Brexit l'a affaiblie.\n\nAinsi, la France demeure une puissance mondiale complète, à la fois politique, militaire, économique et culturelle, mais son rang est désormais celui d'une puissance moyenne face aux géants américain et chinois. Son avenir d'influence se joue largement à l'échelle européenne : dans un monde multipolaire, c'est la capacité des Européens à agir ensemble qui déterminera leur poids dans les affaires du monde."}, "activite5_vocabulaire": {"termes": [{"mot": "Puissance", "definition": "État capable d'influencer les autres acteurs du monde par des moyens politiques, économiques, militaires et culturels."}, {"mot": "Soft power", "definition": "Capacité d'influence d'un pays par sa culture, ses valeurs, ses médias et son attractivité, sans recourir à la force."}, {"mot": "Francophonie", "definition": "Ensemble des personnes et des pays qui ont le français en partage : environ 300 millions de locuteurs sur les cinq continents."}, {"mot": "OIF", "definition": "Organisation internationale de la francophonie : elle regroupe environ 90 États et gouvernements et promeut la langue française et la coopération."}, {"mot": "Firme transnationale", "definition": "Grande entreprise présente dans de nombreux pays par ses filiales et ses usines (ex. : Airbus, LVMH, TotalEnergies)."}, {"mot": "Conseil de sécurité de l'ONU", "definition": "Organe chargé du maintien de la paix dans le monde ; la France y est l'un des cinq membres permanents avec droit de veto."}, {"mot": "Droit de veto", "definition": "Droit de bloquer une décision. Au Conseil de sécurité, chaque membre permanent peut empêcher l'adoption d'une résolution."}, {"mot": "ZEE (zone économique exclusive)", "definition": "Espace maritime où un État a des droits exclusifs d'exploitation des ressources. La France possède la deuxième ZEE mondiale grâce à ses outre-mer."}, {"mot": "Monde multipolaire", "definition": "Organisation du monde autour de plusieurs pôles de puissance (États-Unis, Chine, Union européenne, puissances émergentes...)."}, {"mot": "Influence normative", "definition": "Capacité de l'Union européenne à imposer ses règles (environnement, données, sécurité) aux entreprises du monde entier qui veulent accéder à son marché."}], "notions_essentielles": ["L'UE est l'un des trois pôles majeurs de l'économie mondiale : première puissance commerciale, euro deuxième monnaie mondiale, forte influence normative.", "La France est membre permanent du Conseil de sécurité de l'ONU, puissance nucléaire et possède la deuxième ZEE mondiale grâce à ses outre-mer.", "L'économie française rayonne par ses firmes transnationales : Airbus, LVMH, L'Oréal, TotalEnergies, Danone.", "Le soft power français repose sur la francophonie (environ 300 millions de locuteurs, OIF), les lycées français, les médias internationaux et la première place touristique mondiale.", "Cette puissance connaît des limites face aux États-Unis et à la Chine : l'influence française passe de plus en plus par l'échelle européenne, dans un monde multipolaire."]}}];

const ENCOURAGEMENTS = [
  "Chaque révision te rapproche du Brevet. Continue !",
  "Ta régularité fait toute la différence. Bravo de travailler aujourd'hui !",
  "La géographie se comprend avec des exemples : retiens un lieu précis par notion !",
  "Un chapitre à la fois : tu construis ta réussite.",
  "Les croquis et les exemples localisés font gagner des points le jour J.",
  "Tu es capable de réussir ce Brevet. Prouve-le toi à chaque quiz !",
  "Pense échelles : locale, nationale, européenne, mondiale.",
  "Effort d'aujourd'hui, fierté de juillet !"
];

/* ---------- STATE ---------- */
function loadState(){
  try{ return JSON.parse(localStorage.getItem('dnb_geographie')||'{}'); }catch(e){ return {}; }
}
function saveState(s){ try{ localStorage.setItem('dnb_geographie', JSON.stringify(s)); }catch(e){} }
let state = loadState();
if(!state.completed) state.completed = [];
if(!state.xp) state.xp = 0;

/* ---------- UTILS ---------- */
function esc(t){ const d=document.createElement('div'); d.textContent=t==null?'':t; return d.innerHTML; }
function boldDates(html){
  return html.replace(/\b(1[6-9]\d{2}|20\d{2})\b/g,'<strong>$1</strong>')
             .replace(/\b(\d{1,2})(er)?\s+(janvier|février|mars|avril|mai|juin|juillet|août|septembre|octobre|novembre|décembre)\b/gi,'<strong>$&</strong>');
}
function paras(txt){
  return (txt||'').split(/\n\n+/).map(function(p){return '<p>'+boldDates(esc(p))+'</p>';}).join('');
}
function randEnc(){ return ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]; }
function appEl(){ return document.getElementById('app'); }
function printHeaderHTML(chap, act){
  return '<div class="print-header">Révisions DNB Géographie 3ème · Chapitre '+chap.id+' : '+esc(chap.titre)+' · '+esc(act)+'<br>Gregory CRON · laclassedegreg@gmail.com · www.linkedin.com/in/gregorycron</div>';
}
function xpPop(msg){
  const e=document.createElement('div'); e.className='xp-pop'; e.textContent=msg;
  document.body.appendChild(e); setTimeout(function(){e.remove();},2600);
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  appEl().innerHTML =
  '<div class="login-wrap"><div class="login-card">'+
    '<div class="emoji">🎓</div>'+
    '<h1>Révisions du Brevet<br>Géographie 3ème</h1>'+
    '<p>7 chapitres, 35 activités complètes pour préparer le DNB.<br>Entre ton prénom pour commencer.</p>'+
    '<input id="prenom" type="text" placeholder="Ton prénom" maxlength="30" autocomplete="given-name">'+
    '<button class="btn" onclick="doLogin()">C\'est parti !</button>'+
  '</div></div>';
  const inp=document.getElementById('prenom');
  inp.focus();
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
}
function doLogin(){
  const v=document.getElementById('prenom').value.trim();
  if(!v){ document.getElementById('prenom').style.borderColor='#e74c3c'; return; }
  state.prenom=v; saveState(state); renderHome();
}

/* ---------- HOME ---------- */
function goHome(){ if(state.prenom){renderHome();}else{renderLogin();} window.scrollTo(0,0); }
function renderHome(){
  const done = state.completed.length;
  const pct = Math.round(done/CHAPTERS.length*100);
  const badges = [
    {ico:'🥉',nom:'Badge Bronze',cond:'3 chapitres validés',won:done>=3},
    {ico:'🥈',nom:'Badge Argent',cond:'6 chapitres validés',won:done>=6},
    {ico:'🥇',nom:'Badge Or',cond:'7 chapitres validés',won:done>=7}
  ];
  let h = '<div class="hello"><h1>Bonjour '+esc(state.prenom)+' 👋</h1>'+
    '<div style="font-size:.88rem;color:var(--ink-soft)">⭐ '+state.xp+' XP · '+done+'/7 chapitres validés</div></div>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="badges">'+badges.map(function(b){
      return '<div class="badge '+(b.won?'won':'')+'"><span class="ico">'+b.ico+'</span><span><strong>'+b.nom+'</strong><br><span style="color:var(--ink-soft)">'+b.cond+'</span></span></div>';
    }).join('')+'</div>'+
    '<div class="progress-bar"><div style="width:'+pct+'%"></div></div>'+
    '<div class="chapters">'+CHAPTERS.map(function(c,i){
      const isDone=state.completed.indexOf(c.id)>=0;
      return '<div class="chap-card '+(isDone?'done':'')+'" style="animation-delay:'+(i*0.05)+'s" tabindex="0" role="button" '+
        'onclick="renderChapter('+c.id+')" onkeydown="if(event.key===\'Enter\')renderChapter('+c.id+')">'+
        '<div class="chap-num">'+(isDone?'✓':c.id)+'</div>'+
        '<div><h3>'+esc(c.titre)+'</h3><div class="state">'+(isDone?'Chapitre validé !':'5 activités à découvrir')+'</div></div></div>';
    }).join('')+'</div>';
  appEl().innerHTML = h;
}

/* ---------- CHAPTER ---------- */
const ACTS = [
  {ico:'📖',nom:'Fiche de révision'},
  {ico:'❓',nom:'Quiz'},
  {ico:'🔍',nom:'Étude de documents'},
  {ico:'✍️',nom:'Développement construit'},
  {ico:'🎮',nom:'Notions essentielles'}
];
let currentChap=null;
function renderChapter(id, actIdx){
  if(actIdx===undefined) actIdx=0;
  currentChap = CHAPTERS.filter(function(c){return c.id===id;})[0];
  appEl().innerHTML =
    '<div class="crumb"><a onclick="goHome()">Accueil</a> › Chapitre '+id+'</div>'+
    '<h1 class="chap-title">Chapitre '+id+' · '+esc(currentChap.titre)+'</h1>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="activities">'+ACTS.map(function(a,i){
      return '<div class="act-tab '+(i===actIdx?'active':'')+'" tabindex="0" role="button" '+
        'onclick="renderChapter('+id+','+i+')" onkeydown="if(event.key===\'Enter\')renderChapter('+id+','+i+')">'+
        '<span class="ico">'+a.ico+'</span>'+a.nom+'</div>';
    }).join('')+'</div>'+
    '<div id="actPanel"></div>';
  [renderFiche,renderQuiz,renderEtude,renderDev,renderVocab][actIdx]();
  window.scrollTo(0,0);
}

/* ---------- ACT 1 : FICHE ---------- */
function renderFiche(){
  const f=currentChap.activite1_fiche;
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+printHeaderHTML(currentChap,'Fiche de révision')+
    '<h2>📖 Fiche de révision</h2>'+
    '<h3>Introduction</h3>'+paras(f.introduction)+
    '<h3>'+esc(f.partie1_titre)+'</h3>'+paras(f.partie1_contenu)+
    '<h3>'+esc(f.partie2_titre)+'</h3>'+paras(f.partie2_contenu)+
    '<h3>'+esc(f.partie3_titre)+'</h3>'+paras(f.partie3_contenu)+
    '<h3>Conclusion</h3>'+paras(f.conclusion)+
    '<div class="retenir"><h4>🎯 À retenir absolument</h4><ul>'+
      currentChap.activite5_vocabulaire.notions_essentielles.map(function(n){return '<li>'+boldDates(esc(n))+'</li>';}).join('')+
    '</ul></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 2 : QUIZ ---------- */
let quizIdx=0, quizScore=0;
function renderQuiz(){ quizIdx=0; quizScore=0; showQuizQ(); }
function showQuizQ(){
  const qz=currentChap.activite2_quiz;
  if(quizIdx>=qz.length){ showQuizScore(); return; }
  const q=qz[quizIdx];
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<div class="quiz-head"><h2>❓ Quiz</h2><span class="quiz-count">Question '+(quizIdx+1)+' / '+qz.length+'</span></div>'+
    '<div class="quiz-q">'+esc(q.question)+'</div>'+
    q.options.map(function(o,i){return '<button class="quiz-opt" onclick="answerQuiz('+i+')">'+esc(o)+'</button>';}).join('')+
    '<div class="quiz-expl" id="expl"></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" id="btnNext" style="display:none" onclick="quizIdx++;showQuizQ()">Question suivante →</button></div>'+
  '</div>';
}
function answerQuiz(i){
  const q=currentChap.activite2_quiz[quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b,j){
    b.disabled=true;
    if(j===q.correcte) b.classList.add('good');
    else if(j===i) b.classList.add('bad');
  });
  if(i===q.correcte) quizScore++;
  const ex=document.getElementById('expl');
  ex.innerHTML='<strong>'+(i===q.correcte?'✅ Bonne réponse !':'❌ Pas tout à fait.')+'</strong> '+boldDates(esc(q.explication));
  ex.classList.add('show');
  const btn=document.getElementById('btnNext');
  btn.style.display='inline-block';
  btn.textContent = (quizIdx+1<currentChap.activite2_quiz.length) ? 'Question suivante →' : 'Voir mon score 🏁';
}
function showQuizScore(){
  const total=currentChap.activite2_quiz.length;
  const sur20=Math.round(quizScore/total*20);
  let msg;
  if(sur20>=16) msg='Excellent travail, tu maîtrises ce chapitre ! 🌟';
  else if(sur20>=12) msg='Bon travail ! Relis la fiche pour consolider les points manqués. 👍';
  else if(sur20>=8) msg='Tu es sur la bonne voie. Reprends la fiche de révision puis retente le quiz !';
  else msg='Ce chapitre mérite une relecture attentive de la fiche. Courage, tu vas y arriver !';
  if(state.completed.indexOf(currentChap.id)<0){
    state.completed.push(currentChap.id);
    state.xp += 20;
    saveState(state);
    xpPop('🎉 Chapitre validé · +20 XP');
    const d=state.completed.length;
    if(d===3) setTimeout(function(){xpPop('🥉 Badge Bronze débloqué !');},2800);
    if(d===6) setTimeout(function(){xpPop('🥈 Badge Argent débloqué !');},2800);
    if(d===7) setTimeout(function(){xpPop('🥇 Badge Or débloqué ! Tu es prêt(e) pour le DNB !');},2800);
  }
  document.getElementById('actPanel').innerHTML =
  '<div class="panel"><div class="quiz-score">'+
    '<div class="big">'+sur20+' / 20</div>'+
    '<p>('+quizScore+' bonnes réponses sur '+total+')</p>'+
    '<p style="margin:14px 0">'+msg+'</p>'+
    '<button class="btn btn-small" onclick="renderQuiz()">🔄 Refaire le quiz</button> '+
    '<button class="btn btn-small btn-ghost" onclick="renderChapter('+currentChap.id+',0)">📖 Relire la fiche</button>'+
  '</div></div>';
}

/* ---------- ACT 3 : ETUDE ---------- */
function toggleCorr(btn){
  const c=btn.nextElementSibling;
  c.classList.toggle('show');
  btn.textContent = c.classList.contains('show') ? 'Masquer la correction' : 'Voir la correction';
}
function renderEtude(){
  const e=currentChap.activite3_etude;
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+printHeaderHTML(currentChap,'Étude de documents')+
    '<h2>🔍 Étude de documents</h2>'+
    '<div class="methodo"><strong>Méthode DNB :</strong> 1) Présenter le document (nature, auteur, date, contexte). 2) Analyser son contenu en citant le texte. 3) Critiquer sa portée (fiabilité, limites, intérêt pour le géographe).</div>'+
    '<h3>'+esc(e.document_titre)+'</h3>'+
    '<div class="doc-box">'+paras(e.document_texte)+'<span class="src">'+esc(e.document_source)+'</span></div>'+
    e.questions.map(function(q,i){
      return '<div class="q-item"><span class="qnum">Question '+(i+1)+'.</span> '+esc(q)+
        '<br><button class="btn-corr" onclick="toggleCorr(this)">Voir la correction</button>'+
        '<div class="corr">'+paras(e.corrections[i])+'</div></div>';
    }).join('')+
    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 4 : DEV CONSTRUIT ---------- */
function renderDev(){
  const d=currentChap.activite4_developpement;
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+printHeaderHTML(currentChap,'Développement construit')+
    '<h2>✍️ Développement construit</h2>'+
    '<div class="sujet-box">📝 Sujet : '+esc(d.sujet)+'</div>'+
    '<div class="methodo"><strong>Méthode (20-25 lignes, 45 min) :</strong> 10 min de brouillon (plan + exemples), 30 min de rédaction, 5 min de relecture. Saute une ligne entre chaque partie, utilise des connecteurs logiques et des exemples datés.</div>'+
    '<h3>Plan détaillé pour t\'aider</h3>'+
    '<div class="plan-step"><h4>Introduction</h4><p>'+boldDates(esc(d.plan.introduction))+'</p></div>'+
    '<div class="plan-step"><h4>Première partie</h4><p>'+boldDates(esc(d.plan.partie1))+'</p></div>'+
    '<div class="plan-step"><h4>Deuxième partie</h4><p>'+boldDates(esc(d.plan.partie2))+'</p></div>'+
    '<div class="plan-step"><h4>Conclusion</h4><p>'+boldDates(esc(d.plan.conclusion))+'</p></div>'+
    '<div class="q-item"><span class="qnum">Correction rédigée complète</span> (à lire après avoir rédigé ton propre développement !)'+
      '<br><button class="btn-corr" onclick="toggleCorr(this)">Voir la correction</button>'+
      '<div class="corr">'+paras(d.correction_complete)+'</div></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 5 : VOCAB ---------- */
let matchSel=null, matchDone=0, matchAwarded=false;
function shuffled(a){ return a.slice().sort(function(){return Math.random()-.5;}); }
function renderVocab(){
  const v=currentChap.activite5_vocabulaire;
  matchSel=null; matchDone=0; matchAwarded=false;
  const pool=shuffled(v.termes).slice(0,5);
  const mots=shuffled(pool);
  const defs=shuffled(pool);
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<h2>🎮 Notions essentielles</h2>'+
    '<div class="retenir"><h4>🎯 Les notions essentielles du chapitre</h4><ul>'+
      v.notions_essentielles.map(function(n){return '<li>'+boldDates(esc(n))+'</li>';}).join('')+
    '</ul></div>'+
    '<h3>🃏 Cartes de vocabulaire (clique pour retourner)</h3>'+
    '<div class="vocab-grid">'+v.termes.map(function(t){
      return '<div class="flip" tabindex="0" role="button" onclick="this.classList.toggle(\'on\')" onkeydown="if(event.key===\'Enter\')this.classList.toggle(\'on\')">'+
        '<div class="flip-inner"><div class="flip-face flip-front">'+esc(t.mot)+'</div>'+
        '<div class="flip-face flip-back">'+esc(t.definition)+'</div></div></div>';
    }).join('')+'</div>'+
    '<div class="match-zone"><h3>⚡ Défi association (+10 XP)</h3>'+
      '<p style="font-size:.88rem;color:var(--ink-soft)">Clique sur un mot, puis sur sa définition. Associe les 5 paires !</p>'+
      '<div class="match-cols">'+
        '<div>'+mots.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="mot" onclick="matchClick(this)">'+esc(t.mot)+'</div>';}).join('')+'</div>'+
        '<div>'+defs.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="def" onclick="matchClick(this)">'+esc(t.definition)+'</div>';}).join('')+'</div>'+
      '</div><p id="matchMsg" style="margin-top:12px;font-weight:600"></p>'+
    '</div>'+
  '</div>';
}
function matchClick(el){
  if(el.classList.contains('ok')) return;
  if(!matchSel){ matchSel=el; el.classList.add('sel'); return; }
  if(matchSel===el){ el.classList.remove('sel'); matchSel=null; return; }
  if(matchSel.dataset.type===el.dataset.type){
    matchSel.classList.remove('sel'); matchSel=el; el.classList.add('sel'); return;
  }
  const a=matchSel;
  if(a.dataset.mot===el.dataset.mot){
    a.classList.remove('sel'); a.classList.add('ok'); el.classList.add('ok');
    matchDone++;
    if(matchDone===5){
      document.getElementById('matchMsg').textContent='🎉 Bravo, les 5 paires sont associées !';
      if(!matchAwarded){ matchAwarded=true; state.xp+=10; saveState(state); xpPop('⭐ +10 XP'); }
    }
  }else{
    a.classList.remove('sel'); a.classList.add('ko'); el.classList.add('ko');
    setTimeout(function(){a.classList.remove('ko');el.classList.remove('ko');},600);
  }
  matchSel=null;
}

/* ---------- INIT ---------- */
if(state.prenom){ renderHome(); } else { renderLogin(); }
</script>
