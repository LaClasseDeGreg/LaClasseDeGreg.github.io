<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions DNB - Géographie 3ème</title>
<style>
:root{
  --primary:#00b894;
  --primary-dark:#019875;
  --gradient:linear-gradient(135deg,#00b894 0%,#00876c 100%);
  --ink:#1c2b26;
  --ink-soft:#56716a;
  --bg:#f4faf7;
  --card:#ffffff;
  --gold:#f0b429;
  --success:#2eb872;
  --error:#e74c3c;
  --radius:14px;
  --shadow:0 4px 18px rgba(30,35,64,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{direction:ltr}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;direction:ltr;text-align:left}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif}

/* ---------- HEADER ---------- */
header{position:sticky;top:0;z-index:50;background:var(--gradient);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
header .brand{font-family:Georgia,serif;font-size:1.05rem;font-weight:bold;letter-spacing:.3px}
header .contacts{display:flex;gap:14px;font-size:.78rem;flex-wrap:wrap;justify-content:flex-end}
header .contacts a{color:#fff;text-decoration:none;opacity:.92;border-bottom:1px solid rgba(255,255,255,.4)}
header .contacts a:hover,header .contacts a:focus{opacity:1;border-bottom-color:#fff}
#btnHome{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:30px;cursor:pointer;font-size:.85rem;transition:background .2s}
#btnHome:hover,#btnHome:focus{background:rgba(255,255,255,.32)}

main{max-width:980px;margin:0 auto;padding:22px 16px 70px}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 34px;max-width:430px;width:100%;text-align:center;animation:rise .5s ease}
.login-card .emoji{font-size:3rem}
.login-card h1{font-size:1.5rem;margin:14px 0 6px}
.login-card p{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px}
.login-card input{width:100%;padding:13px 16px;border:2px solid #d4ece4;border-radius:10px;font-size:1rem;margin-bottom:14px;transition:border .2s}
.login-card input:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-block;background:var(--gradient);color:#fff;border:none;padding:13px 30px;border-radius:30px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(0,184,148,.4)}
.btn:hover,.btn:focus{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,184,148,.5)}
.btn:active{transform:translateY(0)}
.btn-ghost{background:#fff;color:var(--primary);border:2px solid var(--primary);box-shadow:none}
.btn-small{padding:8px 18px;font-size:.85rem}

/* ---------- HOME / MENU ---------- */
.hello{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.hello h1{font-size:1.45rem}
.encour{background:#fff;border-left:5px solid var(--primary);border-radius:10px;padding:12px 16px;margin:14px 0 22px;color:var(--ink-soft);font-style:italic;box-shadow:var(--shadow)}
.badges{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.badge{background:var(--card);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);font-size:.85rem;opacity:.38;filter:grayscale(1);transition:all .4s}
.badge.won{opacity:1;filter:none;border:2px solid var(--gold)}
.badge .ico{font-size:1.4rem}
.progress-bar{background:#dcefe8;border-radius:20px;height:12px;overflow:hidden;margin:4px 0 26px}
.progress-bar div{height:100%;background:var(--gradient);border-radius:20px;transition:width .6s ease;min-width:0}
.chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.chap-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;display:flex;gap:14px;align-items:flex-start;border:2px solid transparent;transition:transform .18s,border-color .18s,box-shadow .18s;animation:rise .45s ease backwards}
.chap-card:hover,.chap-card:focus{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 24px rgba(0,184,148,.22)}
.chap-num{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-family:Georgia,serif;font-size:1.1rem}
.chap-card.done .chap-num{background:var(--success)}
.chap-card h3{font-size:.97rem;line-height:1.35}
.chap-card .state{font-size:.76rem;color:var(--ink-soft);margin-top:5px}
.chap-card.done .state{color:var(--success);font-weight:600}

/* ---------- CHAPTER VIEW ---------- */
.crumb{font-size:.82rem;color:var(--ink-soft);margin-bottom:8px}
.crumb a{color:var(--primary);cursor:pointer;text-decoration:none}
.chap-title{font-size:1.35rem;margin-bottom:18px}
.activities{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:26px}
.act-tab{background:var(--card);border:2px solid #dcefe8;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;font-size:.84rem;font-weight:600}
.act-tab .ico{font-size:1.5rem;display:block;margin-bottom:6px}
.act-tab:hover{border-color:var(--primary);transform:translateY(-2px)}
.act-tab.active{background:var(--gradient);color:#fff;border-color:transparent}

/* ---------- CONTENT PANELS ---------- */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;animation:rise .35s ease}
.panel h2{font-size:1.25rem;margin-bottom:16px;color:var(--primary-dark)}
.panel h3{font-size:1.05rem;margin:22px 0 10px;color:var(--ink)}
.panel p{margin-bottom:13px;text-align:justify}
.retenir{background:#e7f9f3;border:2px solid var(--primary);border-radius:12px;padding:16px 18px;margin:20px 0}
.retenir h4{color:var(--primary-dark);margin-bottom:10px;font-family:Georgia,serif}
.retenir li{margin:7px 0 7px 18px}
.doc-box{background:#faf8f2;border:1px solid #e7e0c9;border-left:5px solid var(--gold);border-radius:10px;padding:18px 20px;margin:16px 0;font-family:Georgia,serif}
.doc-box .src{display:block;margin-top:12px;font-size:.82rem;color:var(--ink-soft);font-style:italic;font-family:'Segoe UI',sans-serif}
.q-item{margin:18px 0;padding:16px;background:#f6fbf9;border-radius:10px}
.q-item .qnum{font-weight:700;color:var(--primary-dark)}
.corr{display:none;margin-top:12px;padding:14px;background:#e9f8f0;border-left:4px solid var(--success);border-radius:8px;font-size:.93rem}
.corr.show{display:block;animation:rise .3s ease}
.btn-corr{margin-top:10px;background:#fff;border:2px solid var(--success);color:var(--success);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:.83rem;font-weight:600;transition:all .15s}
.btn-corr:hover{background:var(--success);color:#fff}
.methodo{background:#fff7e8;border:1px solid #f0ddb0;border-radius:10px;padding:14px 18px;margin:16px 0;font-size:.9rem}
.methodo strong{color:#a97800}
.pdf-bar{margin-top:24px;text-align:right}

/* ---------- QUIZ ---------- */
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.quiz-count{font-size:.85rem;color:var(--ink-soft)}
.quiz-q{font-size:1.08rem;font-weight:600;margin-bottom:18px}
.quiz-opt{display:block;width:100%;text-align:left;background:#f6fbf9;border:2px solid #dcefe8;border-radius:10px;padding:13px 16px;margin:9px 0;cursor:pointer;font-size:.95rem;transition:all .15s;font-family:inherit;color:inherit}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);background:#e7f9f3}
.quiz-opt:disabled{cursor:default}
.quiz-opt.good{background:#e9f8f0;border-color:var(--success);font-weight:600}
.quiz-opt.bad{background:#fdecea;border-color:var(--error)}
.quiz-expl{display:none;margin-top:14px;padding:14px;background:#e7f9f3;border-left:4px solid var(--primary);border-radius:8px;font-size:.92rem}
.quiz-expl.show{display:block;animation:rise .3s ease}
.quiz-score{text-align:center;padding:30px 10px}
.quiz-score .big{font-size:3rem;font-family:Georgia,serif;color:var(--primary-dark);font-weight:bold}
.quiz-score .btn{margin:6px}

/* ---------- VOCAB ---------- */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin:18px 0}
.flip{perspective:900px;height:185px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flip.on .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center}
.flip-front{background:var(--gradient);color:#fff;font-family:Georgia,serif;font-size:1.12rem;font-weight:bold}
.flip-back{background:#fff;border:2px solid var(--primary);transform:rotateY(180deg);font-size:.78rem;line-height:1.4;overflow-y:auto}
.match-zone{margin-top:26px}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.match-item{background:#f6fbf9;border:2px solid #dcefe8;border-radius:10px;padding:11px 13px;cursor:pointer;font-size:.84rem;transition:all .15s}
.match-item.sel{border-color:var(--primary);background:#e7f9f3}
.match-item.ok{border-color:var(--success);background:#e9f8f0;opacity:.6;cursor:default}
.match-item.ko{border-color:var(--error);background:#fdecea}
.xp-pop{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#5a4300;padding:12px 26px;border-radius:30px;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:99;animation:rise .4s ease}

/* ---------- PLAN DEV ---------- */
.plan-step{border-left:3px solid var(--primary);padding:4px 0 4px 18px;margin:14px 0}
.plan-step h4{color:var(--primary-dark);margin-bottom:6px;font-family:Georgia,serif}
.sujet-box{background:var(--gradient);color:#fff;border-radius:12px;padding:18px 22px;font-size:1.02rem;font-weight:600;margin-bottom:20px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:600px){
  header{flex-direction:column;align-items:flex-start}
  header .contacts{justify-content:flex-start}
  .panel{padding:18px}
  .match-cols{grid-template-columns:1fr}
}

/* ---------- PRINT ---------- */
@media print{
  header,.pdf-bar,.activities,.crumb,#btnHome,.btn,.btn-corr,.quiz-opt,.xp-pop,.encour{display:none!important}
  body{background:#fff}
  .panel{box-shadow:none;padding:0}
  .corr,.quiz-expl{display:block!important}
  main{max-width:100%;padding:0}
  .print-header{display:block!important;border-bottom:2px solid #00b894;padding-bottom:8px;margin-bottom:16px;font-size:.85rem;color:#555}
}
.print-header{display:none}
</style>
</head>

<script>
const CHAPTERS = [{"id": 1, "titre": "Les aires urbaines, une nouvelle géographie d'une France mondialisée", "activite1_fiche": {"introduction": "La France compte aujourd'hui plus de 67 millions d'habitants, dont plus de 85 % vivent dans une aire urbaine, c'est-à-dire dans une ville ou sous son influence directe. L'urbanisation a profondément transformé le territoire français depuis les années 1950 : les villes s'étalent, les campagnes proches des villes se transforment, et les plus grandes agglomérations concentrent de plus en plus d'habitants, d'emplois et de richesses. Ce phénomène est renforcé par la mondialisation, qui favorise les grandes métropoles connectées au reste du monde. Problématique : comment l'urbanisation et la mondialisation transforment-elles l'organisation du territoire français ?", "partie1_titre": "I. Une France urbanisée : les aires urbaines structurent le territoire", "partie1_contenu": "A. Qu'est-ce qu'une aire urbaine ? Une aire urbaine est un ensemble formé de trois espaces : la ville-centre (le coeur historique et dense), la banlieue (les communes qui prolongent la ville-centre sans rupture du bâti) et la couronne périurbaine (les communes plus éloignées dont au moins 40 % des actifs travaillent dans le pôle urbain). La ville-centre et sa banlieue forment ensemble le pôle urbain.\n\nB. Une population très majoritairement urbaine. Plus de 85 % des Français vivent dans une aire urbaine. La France compte environ 700 aires urbaines, mais elles sont très inégales : l'aire urbaine de Paris dépasse 12 millions d'habitants, soit près d'un Français sur cinq, tandis que celles de Lyon, Marseille-Aix, Toulouse, Bordeaux, Lille et Nice dépassent le million d'habitants.\n\nC. Des mobilités quotidiennes croissantes. Les habitants des couronnes périurbaines effectuent chaque jour des migrations pendulaires : ils se déplacent le matin vers le pôle urbain pour travailler ou étudier, et reviennent le soir. Ces déplacements, souvent réalisés en voiture, allongent les temps de trajet, saturent les axes routiers et posent des questions environnementales (pollution, émissions de gaz à effet de serre).", "partie2_titre": "II. L'étalement urbain transforme les espaces et les modes de vie", "partie2_contenu": "A. La périurbanisation, moteur de l'étalement urbain. Depuis les années 1970, de nombreux ménages quittent les villes-centres pour s'installer dans les couronnes périurbaines. Ils recherchent des logements plus grands et moins chers, souvent une maison individuelle avec jardin, ainsi qu'un cadre de vie perçu comme plus calme. Ce mouvement s'appelle la périurbanisation : la ville s'étale toujours plus loin sur les campagnes environnantes.\n\nB. Des conséquences importantes sur les territoires. L'étalement urbain consomme des terres agricoles et des espaces naturels : lotissements, zones commerciales, rocades et parkings artificialisent les sols. Les paysages périurbains se ressemblent partout en France : ronds-points, zones d'activités en entrée de ville, lotissements pavillonnaires. Cette artificialisation des sols menace la biodiversité et augmente les risques d'inondation.\n\nC. De nouveaux modes de vie. Les habitants du périurbain dépendent fortement de l'automobile : travail, courses, loisirs et école nécessitent des déplacements. Le coût des carburants pèse sur le budget des ménages périurbains. Les pouvoirs publics tentent de limiter l'étalement urbain en densifiant les villes et en développant les transports en commun (tramways, RER métropolitains, pistes cyclables).", "partie3_titre": "III. La métropolisation : des grandes villes renforcées par la mondialisation", "partie3_contenu": "A. La métropolisation concentre hommes et activités. La mondialisation favorise les plus grandes villes : on parle de métropolisation. Les métropoles concentrent les fonctions de commandement (sièges sociaux des grandes entreprises, centres de décision politiques), les activités innovantes (recherche, universités, technopôles), les services rares (grands hôpitaux, aéroports internationaux) et les équipements culturels majeurs.\n\nB. Paris, seule ville mondiale française. Paris domine très largement le réseau urbain français : la capitale concentre les pouvoirs politiques et économiques, accueille le premier quartier d'affaires européen (La Défense), deux aéroports internationaux et attire des millions de touristes chaque année. Paris est connectée aux autres grandes villes mondiales comme New York, Londres ou Tokyo.\n\nC. Des métropoles régionales dynamiques mais des inégalités croissantes. Derrière Paris, des métropoles régionales comme Lyon, Toulouse (aéronautique avec Airbus), Bordeaux, Nantes ou Lille attirent habitants et entreprises, notamment grâce aux lignes à grande vitesse qui les relient à la capitale. Mais la métropolisation creuse les inégalités : les villes petites et moyennes ainsi que certains espaces ruraux se sentent à l'écart de cette dynamique, ce qui nourrit un sentiment d'abandon dans une partie de la population.", "conclusion": "La France est devenue un territoire profondément urbanisé : plus de 85 % des habitants vivent dans l'une des 700 aires urbaines, organisées en ville-centre, banlieue et couronne périurbaine. L'étalement urbain transforme les paysages et les modes de vie, tandis que la mondialisation renforce le poids des métropoles, Paris en tête. Cette nouvelle géographie pose des défis majeurs : limiter l'artificialisation des sols, réduire la dépendance à l'automobile et lutter contre les inégalités entre métropoles dynamiques et territoires qui se sentent délaissés."}, "activite2_quiz": [{"question": "Quelle part des Français vit dans une aire urbaine ?", "options": ["Environ 50 %", "Environ 65 %", "Plus de 85 %", "100 %"], "correcte": 2, "explication": "Plus de 85 % des Français vivent dans une aire urbaine, c'est-à-dire dans une ville ou dans un espace sous son influence directe. La France est un pays très urbanisé."}, {"question": "Quels sont les trois espaces qui composent une aire urbaine ?", "options": ["Le centre commercial, la gare et l'aéroport", "La ville-centre, la banlieue et la couronne périurbaine", "Le village, le bourg et la ville", "Le quartier d'affaires, la zone industrielle et le port"], "correcte": 1, "explication": "Une aire urbaine se compose de la ville-centre, de sa banlieue (qui forment ensemble le pôle urbain) et de la couronne périurbaine, dont au moins 40 % des actifs travaillent dans le pôle."}, {"question": "Qu'est-ce qu'une migration pendulaire ?", "options": ["Un déménagement définitif vers une autre région", "Un déplacement quotidien entre le domicile et le lieu de travail", "Un voyage touristique à l'étranger", "L'exode rural du XIXe siècle"], "correcte": 1, "explication": "Les migrations pendulaires sont les déplacements quotidiens des habitants entre leur domicile (souvent en périphérie) et leur lieu de travail ou d'études (souvent dans le pôle urbain)."}, {"question": "Combien d'habitants compte environ l'aire urbaine de Paris ?", "options": ["2 millions", "5 millions", "Plus de 12 millions", "30 millions"], "correcte": 2, "explication": "L'aire urbaine de Paris dépasse 12 millions d'habitants, soit près d'un Français sur cinq. Elle est de très loin la première aire urbaine du pays."}, {"question": "Qu'est-ce que la périurbanisation ?", "options": ["La destruction des banlieues", "L'installation de ménages dans des communes éloignées de la ville-centre, mais sous son influence", "Le retour des habitants vers les centres-villes", "La construction de gratte-ciel"], "correcte": 1, "explication": "La périurbanisation désigne l'installation de citadins dans des communes situées au-delà de la banlieue, souvent dans des maisons individuelles, tout en continuant à travailler dans le pôle urbain."}, {"question": "Quelle est la principale raison qui pousse les ménages à s'installer dans le périurbain ?", "options": ["La proximité des aéroports", "Des logements plus grands et moins chers", "L'absence totale d'impôts", "L'interdiction d'habiter en ville"], "correcte": 1, "explication": "Les ménages recherchent des logements plus grands et moins coûteux qu'en ville, souvent une maison avec jardin, ainsi qu'un cadre de vie perçu comme plus agréable."}, {"question": "Quelle est une conséquence négative de l'étalement urbain ?", "options": ["L'augmentation des terres agricoles", "L'artificialisation des sols et la disparition d'espaces naturels", "La baisse du trafic automobile", "Le refroidissement du climat"], "correcte": 1, "explication": "L'étalement urbain artificialise les sols : lotissements, routes et zones commerciales remplacent terres agricoles et espaces naturels, ce qui menace la biodiversité et aggrave les risques d'inondation."}, {"question": "De quel moyen de transport les habitants du périurbain dépendent-ils le plus ?", "options": ["Le métro", "L'avion", "La voiture individuelle", "Le bateau"], "correcte": 2, "explication": "Les espaces périurbains sont peu desservis par les transports en commun : la voiture est indispensable pour aller travailler, faire ses courses ou accéder aux services."}, {"question": "Qu'est-ce que la métropolisation ?", "options": ["La construction de métros dans toutes les villes", "La concentration des populations, des activités et des fonctions de commandement dans les plus grandes villes", "La disparition des grandes villes", "Le développement uniquement des villages"], "correcte": 1, "explication": "La métropolisation est le processus de concentration des habitants, des richesses, des activités innovantes et des fonctions de commandement dans les grandes métropoles, renforcé par la mondialisation."}, {"question": "Quelle ville française est considérée comme une ville mondiale ?", "options": ["Lyon", "Paris", "Toulouse", "Lille"], "correcte": 1, "explication": "Paris est la seule ville mondiale française : elle concentre les pouvoirs politiques et économiques, le quartier d'affaires de La Défense, des aéroports internationaux et rayonne culturellement dans le monde entier."}, {"question": "Quel quartier d'affaires majeur se situe dans l'aire urbaine de Paris ?", "options": ["Wall Street", "La City", "La Défense", "Euralille"], "correcte": 2, "explication": "La Défense, à l'ouest de Paris, est le premier quartier d'affaires européen : il regroupe les sièges sociaux de nombreuses grandes entreprises françaises et internationales."}, {"question": "Quelle métropole du Sud-Ouest est dynamisée par l'industrie aéronautique ?", "options": ["Marseille", "Strasbourg", "Toulouse", "Rennes"], "correcte": 2, "explication": "Toulouse accueille le siège et les chaînes d'assemblage d'Airbus : l'aéronautique attire ingénieurs, chercheurs et sous-traitants, ce qui en fait l'une des métropoles les plus dynamiques de France."}, {"question": "Quel équipement renforce les liens entre Paris et les métropoles régionales ?", "options": ["Les lignes à grande vitesse (LGV)", "Les canaux fluviaux", "Les routes départementales", "Les téléphériques"], "correcte": 0, "explication": "Les lignes à grande vitesse relient Paris aux grandes métropoles régionales (Lyon, Bordeaux, Lille, Strasbourg, Rennes...) en quelques heures, renforçant leur attractivité."}, {"question": "Quelle est une conséquence de la métropolisation sur le territoire français ?", "options": ["Une parfaite égalité entre tous les territoires", "Un creusement des inégalités entre métropoles et villes petites ou moyennes", "La disparition de Paris", "La fin de l'urbanisation"], "correcte": 1, "explication": "La métropolisation concentre les richesses dans les grandes villes : certaines villes moyennes et certains espaces ruraux se sentent délaissés, ce qui creuse les inégalités territoriales."}, {"question": "Comment les pouvoirs publics tentent-ils de limiter l'étalement urbain ?", "options": ["En interdisant les villes", "En densifiant les villes et en développant les transports en commun", "En supprimant les routes", "En construisant uniquement des parkings"], "correcte": 1, "explication": "Pour limiter l'étalement urbain, les pouvoirs publics cherchent à densifier l'habitat existant, à reconstruire la ville sur elle-même et à développer tramways, trains de banlieue et pistes cyclables."}], "activite3_etude": {"document_type": "texte", "document_titre": "Vivre dans le périurbain : le quotidien d'une famille installée loin de la ville-centre", "document_texte": "« Il y a huit ans, nous avons quitté notre appartement de trois pièces en location dans la banlieue proche pour faire construire une maison à une trentaine de kilomètres de la ville. Ici, le terrain était deux fois moins cher, et les enfants ont un jardin. Mais tout a un prix : chaque matin, je pars à 6 h 45 pour éviter les bouchons et rejoindre mon travail dans la zone d'activités, à 40 minutes de route quand tout va bien. Ma femme fait le trajet inverse vers le centre-ville. Nous avons deux voitures, c'est indispensable : il n'y a qu'un bus le matin et un le soir. Le plein d'essence pèse lourd dans le budget. La boulangerie du village a fermé l'an dernier, alors nous faisons toutes nos courses le samedi dans la grande zone commerciale, près de l'échangeur. Le médecin le plus proche est à un quart d'heure de voiture. Malgré tout, nous ne regrettons rien : ici, c'est calme, et nous sommes propriétaires. »", "document_source": "Témoignage d'un habitant d'une commune périurbaine, adapté à des fins pédagogiques d'enquêtes sur la périurbanisation en France (INSEE, années 2010-2020).", "questions": ["Présentez le document : nature, sujet, intérêt pour l'étude des aires urbaines.", "Pour quelles raisons cette famille a-t-elle quitté la banlieue proche pour s'installer dans le périurbain ?", "Relevez dans le texte deux contraintes liées à la vie dans une commune périurbaine.", "Comment ce témoignage illustre-t-il la notion de migration pendulaire ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez quelles sont les conséquences de la périurbanisation sur les modes de vie et sur l'environnement."], "corrections": ["Ce document est un témoignage d'un habitant d'une commune périurbaine, adapté d'enquêtes menées sur la périurbanisation en France dans les années 2010-2020. Il décrit le quotidien d'une famille installée à une trentaine de kilomètres d'une ville-centre. Il est intéressant car il illustre concrètement, à l'échelle d'une famille, les mécanismes de l'étalement urbain étudiés dans le chapitre.", "La famille a quitté la banlieue proche pour deux raisons principales : le coût du logement, puisque le terrain était deux fois moins cher qu'en ville, ce qui lui a permis de devenir propriétaire d'une maison ; et la recherche d'un meilleur cadre de vie, avec un jardin pour les enfants et un environnement calme.", "Le texte révèle plusieurs contraintes : les longs trajets quotidiens (40 minutes de route, départ à 6 h 45 pour éviter les bouchons), la dépendance à l'automobile (deux voitures indispensables, presque pas de bus), le coût des carburants qui pèse sur le budget, et l'éloignement des services (fermeture de la boulangerie, médecin à un quart d'heure de voiture, courses dans une zone commerciale éloignée).", "Ce témoignage illustre parfaitement la migration pendulaire : chaque jour, le père quitte son domicile périurbain le matin pour rejoindre son travail dans une zone d'activités, et sa femme fait de même vers le centre-ville ; tous deux reviennent le soir. Ces allers-retours quotidiens entre le lieu de résidence et le lieu de travail définissent les migrations pendulaires.", "Exemple de rédaction : La périurbanisation transforme profondément les modes de vie et l'environnement. Les ménages qui s'installent loin des villes-centres, attirés par des logements plus grands et moins chers, deviennent dépendants de l'automobile : les migrations pendulaires quotidiennes allongent les temps de trajet, fatiguent les habitants et pèsent sur le budget des familles, comme le montre le témoignage. Les services de proximité (commerces, médecins) se raréfient dans ces communes, obligeant à toujours plus de déplacements. Sur le plan environnemental, l'étalement urbain artificialise les sols : lotissements, routes et zones commerciales remplacent les terres agricoles et les espaces naturels, ce qui menace la biodiversité et accroît la pollution liée aux déplacements automobiles. C'est pourquoi les pouvoirs publics cherchent aujourd'hui à densifier les villes et à développer les transports en commun."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, décrivez et expliquez l'organisation d'une aire urbaine française et les dynamiques qui la transforment.", "plan": {"introduction": "Contexte : plus de 85 % des Français vivent aujourd'hui dans une aire urbaine ; l'urbanisation structure le territoire national. Définition : une aire urbaine est un ensemble formé d'une ville-centre, de sa banlieue et d'une couronne périurbaine. Problématique : comment s'organise une aire urbaine et quelles dynamiques la transforment ? Annonce du plan : d'abord l'organisation en trois espaces, puis les dynamiques d'étalement urbain et de métropolisation.", "partie1": "I. Une organisation en trois espaces complémentaires. Argument 1 : la ville-centre concentre l'habitat dense, les commerces, les emplois et les fonctions de commandement ; exemple : le centre de Toulouse ou de Lyon, avec ses bureaux et ses équipements culturels. Argument 2 : la banlieue prolonge la ville-centre sans rupture du bâti et forme avec elle le pôle urbain ; exemple : les communes de la petite couronne parisienne. Argument 3 : la couronne périurbaine regroupe des communes plus éloignées dont au moins 40 % des actifs travaillent dans le pôle ; ses habitants effectuent des migrations pendulaires quotidiennes, principalement en voiture.", "partie2": "II. Des dynamiques qui transforment les aires urbaines. Argument 1 : la périurbanisation pousse les ménages vers des communes toujours plus éloignées, à la recherche de logements plus grands et moins chers ; conséquence : étalement urbain et artificialisation des sols qui consomment des terres agricoles. Argument 2 : la métropolisation, renforcée par la mondialisation, concentre populations, emplois qualifiés et fonctions de commandement dans les plus grandes aires urbaines ; exemples : Paris, ville mondiale avec La Défense, et Toulouse, dynamisée par Airbus. Argument 3 : ces dynamiques creusent des inégalités entre métropoles attractives et villes moyennes ou espaces ruraux qui se sentent délaissés ; les pouvoirs publics tentent d'y répondre en densifiant les villes et en développant les transports en commun.", "conclusion": "Bilan : l'aire urbaine, organisée en ville-centre, banlieue et couronne périurbaine, est la structure de base du territoire français, transformée par l'étalement urbain et la métropolisation. Ouverture : ces évolutions posent la question de l'aménagement du territoire pour réduire les inégalités entre espaces (thème 2 du programme)."}, "correction_complete": "Plus de 85 % des Français vivent aujourd'hui dans une aire urbaine, c'est-à-dire dans une ville ou dans l'espace qu'elle influence directement. Une aire urbaine est un ensemble formé d'une ville-centre, de sa banlieue et d'une couronne périurbaine. Comment s'organise une aire urbaine française et quelles dynamiques la transforment ? Nous décrirons d'abord son organisation en trois espaces, avant d'expliquer les dynamiques qui la font évoluer.\n\nUne aire urbaine s'organise en trois espaces complémentaires. La ville-centre, coeur historique et dense, concentre les commerces, les services, les emplois et les fonctions de commandement : à Lyon ou à Toulouse, on y trouve les centres de décision, les universités et les grands équipements culturels. Autour d'elle, la banlieue prolonge le bâti sans interruption : ville-centre et banlieue forment ensemble le pôle urbain, comme Paris et les communes de sa petite couronne. Enfin, la couronne périurbaine regroupe des communes plus éloignées, d'apparence rurale, mais dont au moins 40 % des actifs travaillent dans le pôle urbain. Leurs habitants effectuent chaque jour des migrations pendulaires : ils partent le matin vers le pôle pour travailler et reviennent le soir, le plus souvent en voiture, ce qui sature les axes routiers aux heures de pointe.\n\nDeux grandes dynamiques transforment ces aires urbaines. La première est la périurbanisation : depuis les années 1970, de nombreux ménages s'installent toujours plus loin des villes-centres pour trouver des logements plus grands et moins chers, souvent une maison individuelle avec jardin. Cet étalement urbain artificialise les sols : lotissements, rocades et zones commerciales remplacent les terres agricoles et les espaces naturels, ce qui pose de graves problèmes environnementaux. La seconde dynamique est la métropolisation, renforcée par la mondialisation : les plus grandes aires urbaines concentrent les populations, les emplois qualifiés, la recherche et les fonctions de commandement. Paris, seule ville mondiale française avec son quartier d'affaires de La Défense, domine le réseau urbain national, tandis que des métropoles régionales comme Toulouse, portée par l'aéronautique d'Airbus, ou Bordeaux, reliée à Paris par la LGV depuis 2017, gagnent des habitants. Ces dynamiques creusent cependant les inégalités avec les villes moyennes et les espaces ruraux, qui se sentent parfois délaissés.\n\nAinsi, l'aire urbaine, organisée en ville-centre, banlieue et couronne périurbaine, constitue la structure de base du territoire français. L'étalement urbain et la métropolisation la transforment en profondeur et creusent des inégalités territoriales. Ces déséquilibres posent la question de l'aménagement du territoire, qui cherche précisément à réduire les écarts entre les espaces français."}, "activite5_vocabulaire": {"termes": [{"mot": "Aire urbaine", "definition": "Ensemble formé par une ville-centre, sa banlieue et sa couronne périurbaine. Plus de 85 % des Français y vivent."}, {"mot": "Ville-centre", "definition": "Commune principale d'une aire urbaine, qui concentre l'habitat dense, les emplois, les commerces et les fonctions de commandement."}, {"mot": "Banlieue", "definition": "Ensemble des communes qui prolongent la ville-centre sans rupture du bâti. Avec la ville-centre, elle forme le pôle urbain."}, {"mot": "Couronne périurbaine", "definition": "Ensemble des communes éloignées du pôle urbain dont au moins 40 % des actifs travaillent dans ce pôle."}, {"mot": "Périurbanisation", "definition": "Installation de ménages venus de la ville dans des communes de plus en plus éloignées de la ville-centre, à la recherche de logements plus grands et moins chers."}, {"mot": "Étalement urbain", "definition": "Extension des surfaces urbanisées (lotissements, zones commerciales, routes) sur les espaces agricoles et naturels qui entourent les villes."}, {"mot": "Migration pendulaire", "definition": "Déplacement quotidien des habitants entre leur domicile et leur lieu de travail ou d'études."}, {"mot": "Métropolisation", "definition": "Concentration croissante des populations, des activités et des fonctions de commandement dans les plus grandes villes."}, {"mot": "Métropole", "definition": "Grande ville qui concentre les fonctions de commandement (économiques, politiques, culturelles) et qui exerce son influence sur un vaste territoire."}, {"mot": "Ville mondiale", "definition": "Métropole dont l'influence s'exerce à l'échelle de la planète, comme Paris, New York, Londres ou Tokyo."}], "notions_essentielles": ["Plus de 85 % des Français vivent dans une aire urbaine : la France compte environ 700 aires urbaines, dominées par Paris (plus de 12 millions d'habitants).", "Une aire urbaine est formée de trois espaces : la ville-centre, la banlieue (qui forment le pôle urbain) et la couronne périurbaine.", "La périurbanisation provoque l'étalement urbain : les sols sont artificialisés et les habitants dépendent de la voiture (migrations pendulaires).", "La métropolisation, renforcée par la mondialisation, concentre populations, emplois et fonctions de commandement dans les grandes métropoles.", "Paris est la seule ville mondiale française ; la métropolisation creuse les inégalités avec les villes moyennes et les espaces ruraux."]}}, {"id": 2, "titre": "Les espaces de faible densité et leurs atouts", "activite1_fiche": {"introduction": "Si la France est un pays très urbanisé, une partie importante de son territoire reste faiblement peuplée : montagnes, campagnes éloignées des villes, plateaux et certaines zones du centre du pays. Ces espaces de faible densité comptent moins de 30 habitants par kilomètre carré. Longtemps marqués par l'exode rural et le vieillissement de leur population, ils disposent pourtant d'atouts réels : agriculture de qualité, tourisme, ressources naturelles et cadre de vie recherché. Problématique : quelles sont les caractéristiques des espaces de faible densité et comment valorisent-ils leurs atouts ?", "partie1_titre": "I. Des espaces faiblement peuplés aux contraintes réelles", "partie1_contenu": "A. Où se situent les espaces de faible densité ? Les espaces de faible densité (moins de 30 habitants/km²) couvrent une grande partie du territoire français. Ils s'étendent surtout le long d'une diagonale allant du nord-est au sud-ouest du pays, souvent appelée diagonale des faibles densités, ainsi que dans les massifs montagneux : Alpes du Sud, Pyrénées, Massif central, Corse intérieure. Le département de la Lozère, avec environ 15 habitants/km², est le moins densément peuplé de France.\n\nB. Des espaces marqués par le déclin démographique. Depuis le XIXe siècle, l'exode rural a vidé ces campagnes : les jeunes sont partis travailler en ville, laissant une population vieillissante. Beaucoup de villages ont perdu leurs commerces, leurs écoles, parfois leur médecin. On parle de déprise rurale lorsque les terres cessent d'être cultivées et que les services disparaissent.\n\nC. Des contraintes d'accessibilité et de services. Ces territoires souffrent de l'éloignement : les habitants doivent parcourir de longues distances pour accéder aux soins (déserts médicaux), aux études supérieures ou aux services publics. La couverture en téléphonie mobile et en internet à haut débit y a longtemps été insuffisante, même si elle s'améliore.", "partie2_titre": "II. Des atouts agricoles valorisés", "partie2_contenu": "A. Des agricultures diversifiées. Les espaces de faible densité restent des espaces agricoles essentiels. On y pratique l'élevage extensif (bovins dans le Massif central, ovins dans les Causses), des cultures de qualité et une agriculture qui façonne les paysages. Certaines régions de faible densité accueillent aussi une agriculture productiviste céréalière, comme dans certaines parties de la Champagne.\n\nB. La valorisation par la qualité et les labels. Pour faire face à la concurrence, de nombreux agriculteurs misent sur la qualité : appellations d'origine protégée (AOP) pour les fromages (roquefort, cantal, comté), labels biologiques, vente directe à la ferme et circuits courts. Ces démarches valorisent les terroirs et permettent de mieux rémunérer les producteurs.\n\nC. L'agritourisme, un complément de revenu. Beaucoup d'exploitations diversifient leurs activités : gîtes ruraux, chambres d'hôtes, fermes pédagogiques, vente de produits locaux. L'agritourisme crée un lien entre agriculture et tourisme et apporte des revenus complémentaires aux familles d'agriculteurs.", "partie3_titre": "III. De nouveaux atouts : tourisme, nature et nouveaux habitants", "partie3_contenu": "A. Le tourisme vert et les sports de nature. Les espaces de faible densité attirent des touristes en quête de calme, de paysages préservés et d'activités de pleine nature : randonnée, VTT, canoë dans les gorges du Tarn ou de l'Ardèche, ski dans les stations de moyenne montagne. Les parcs naturels régionaux et nationaux (Cévennes, Vanoise, Pyrénées) protègent ces milieux tout en favorisant un tourisme durable.\n\nB. Des ressources naturelles et énergétiques. Ces territoires disposent de ressources précieuses : forêts exploitées pour le bois, eau, carrières, et de plus en plus d'énergies renouvelables. Parcs éoliens, centrales solaires et barrages hydroélectriques s'y développent, car l'espace disponible y est abondant.\n\nC. L'arrivée de nouveaux habitants. Depuis les années 2000, certains espaces ruraux regagnent des habitants : des néo-ruraux, citadins qui choisissent de s'installer à la campagne pour la qualité de vie, parfois en télétravaillant grâce à internet. Des artisans, des commerçants et des familles redonnent vie à certains villages. Ce renouveau reste cependant inégal : les campagnes proches des villes ou touristiques attirent, tandis que les plus isolées continuent de perdre des habitants.", "conclusion": "Les espaces de faible densité, situés le long de la diagonale des faibles densités et dans les montagnes, cumulent des contraintes réelles : isolement, vieillissement, recul des services. Mais ils disposent d'atouts solides qu'ils apprennent à valoriser : une agriculture de qualité reconnue par des labels, un tourisme vert en plein essor, des ressources naturelles et énergétiques, et une attractivité nouvelle auprès de citadins en quête de qualité de vie. Leur avenir dépend de leur capacité à maintenir des services, à se connecter aux réseaux numériques et à concilier développement et préservation de l'environnement."}, "activite2_quiz": [{"question": "À partir de quel seuil parle-t-on d'espace de faible densité ?", "options": ["Moins de 200 habitants/km²", "Moins de 100 habitants/km²", "Moins de 30 habitants/km²", "Moins de 1 habitant/km²"], "correcte": 2, "explication": "On considère qu'un espace est de faible densité lorsqu'il compte moins de 30 habitants par kilomètre carré. Une grande partie du territoire français est dans ce cas."}, {"question": "Comment appelle-t-on la bande de territoires peu peuplés qui traverse la France du nord-est au sud-ouest ?", "options": ["La dorsale européenne", "La diagonale des faibles densités", "La ceinture verte", "Le couloir rhodanien"], "correcte": 1, "explication": "La diagonale des faibles densités (parfois appelée diagonale du vide) s'étend des Ardennes au Pays basque intérieur en passant par le Massif central : elle regroupe les territoires les moins peuplés de France métropolitaine."}, {"question": "Quel département est le moins densément peuplé de France métropolitaine ?", "options": ["Le Nord", "La Lozère", "Les Bouches-du-Rhône", "Le Rhône"], "correcte": 1, "explication": "La Lozère, dans le Massif central, compte environ 15 habitants par km², ce qui en fait le département le moins dense de France métropolitaine."}, {"question": "Qu'est-ce que l'exode rural ?", "options": ["Le départ des citadins vers les campagnes", "Le départ massif des habitants des campagnes vers les villes", "Un type de tourisme", "Une fête agricole"], "correcte": 1, "explication": "L'exode rural désigne le départ massif des habitants des campagnes vers les villes, surtout du XIXe siècle aux années 1970, qui a vidé de nombreux espaces ruraux."}, {"question": "Qu'est-ce qu'un désert médical ?", "options": ["Un hôpital dans le désert", "Un territoire où l'accès aux soins est très difficile par manque de médecins", "Une zone sans pharmacie de garde le dimanche", "Un service d'urgences saturé"], "correcte": 1, "explication": "Un désert médical est un territoire où les médecins sont trop peu nombreux : les habitants doivent parcourir de longues distances ou attendre longtemps pour se soigner. Beaucoup d'espaces de faible densité sont concernés."}, {"question": "Quel type d'élevage pratique-t-on surtout dans le Massif central ?", "options": ["L'élevage extensif de bovins", "L'élevage de crevettes", "L'élevage industriel de volailles uniquement", "L'élevage de chameaux"], "correcte": 0, "explication": "Le Massif central est une grande région d'élevage extensif : les troupeaux de bovins (races limousine, charolaise, aubrac...) pâturent sur de vastes prairies."}, {"question": "Que signifie le sigle AOP ?", "options": ["Association des ouvriers paysans", "Appellation d'origine protégée", "Agriculture ouverte au public", "Aide officielle aux producteurs"], "correcte": 1, "explication": "L'appellation d'origine protégée garantit qu'un produit (fromage, vin...) est fabriqué dans une zone précise selon un savoir-faire reconnu. Le roquefort, le cantal ou le comté sont des AOP."}, {"question": "Qu'est-ce qu'un circuit court ?", "options": ["Une course cycliste", "Une vente avec peu ou pas d'intermédiaires entre le producteur et le consommateur", "Un câble électrique défectueux", "Une autoroute rurale"], "correcte": 1, "explication": "Dans un circuit court, le producteur vend directement (ou presque) au consommateur : vente à la ferme, marchés, AMAP. Cela permet de mieux rémunérer les agriculteurs."}, {"question": "Qu'est-ce que l'agritourisme ?", "options": ["Le tourisme dans les aéroports", "L'accueil de touristes dans les exploitations agricoles (gîtes, fermes pédagogiques...)", "La visite des usines", "Un voyage organisé par l'État"], "correcte": 1, "explication": "L'agritourisme désigne les activités touristiques proposées par les agriculteurs : gîtes ruraux, chambres d'hôtes, fermes pédagogiques, vente de produits. C'est un complément de revenu important."}, {"question": "Quel type de tourisme se développe dans les espaces de faible densité ?", "options": ["Le tourisme d'affaires", "Le tourisme vert et les sports de pleine nature", "Le tourisme balnéaire de masse", "Le tourisme spatial"], "correcte": 1, "explication": "Les espaces de faible densité attirent un tourisme vert : randonnée, VTT, canoë, découverte des paysages et des terroirs, loin de l'agitation des villes."}, {"question": "Quel est le rôle d'un parc naturel régional ?", "options": ["Interdire toute présence humaine", "Protéger les milieux naturels tout en favorisant un développement durable du territoire", "Construire des parcs d'attractions", "Développer l'industrie lourde"], "correcte": 1, "explication": "Un parc naturel régional protège les paysages et la biodiversité tout en soutenant les activités locales (agriculture, artisanat, tourisme durable). Exemples : les Cévennes, le Vercors, le Morvan."}, {"question": "Quelles énergies renouvelables se développent dans les espaces de faible densité ?", "options": ["Le charbon et le pétrole", "L'éolien, le solaire et l'hydroélectricité", "Le nucléaire uniquement", "Aucune"], "correcte": 1, "explication": "L'espace disponible permet d'installer des parcs éoliens et des centrales solaires ; les montagnes accueillent des barrages hydroélectriques. Ces territoires contribuent à la transition énergétique."}, {"question": "Qui sont les néo-ruraux ?", "options": ["Des robots agricoles", "Des citadins qui s'installent à la campagne pour la qualité de vie", "Des agriculteurs partis en ville", "Des touristes étrangers"], "correcte": 1, "explication": "Les néo-ruraux sont d'anciens citadins qui choisissent de vivre à la campagne, attirés par la qualité de vie et parfois rendus mobiles par le télétravail. Ils contribuent au renouveau de certains villages."}, {"question": "Quel outil facilite l'installation de télétravailleurs dans les campagnes ?", "options": ["L'internet à haut débit (fibre optique)", "Le minitel", "Le télégraphe", "Les pigeons voyageurs"], "correcte": 0, "explication": "Le déploiement de la fibre optique et de la 4G/5G permet de travailler à distance depuis les espaces ruraux : c'est un enjeu majeur pour leur attractivité."}, {"question": "Le renouveau démographique des espaces ruraux est-il uniforme ?", "options": ["Oui, toutes les campagnes gagnent des habitants", "Non : les campagnes proches des villes ou touristiques attirent, les plus isolées continuent de se dépeupler", "Non : toutes les campagnes perdent des habitants", "Oui, grâce à une loi qui oblige à s'y installer"], "correcte": 1, "explication": "Le renouveau est inégal : les campagnes périurbaines et touristiques gagnent des habitants, tandis que les territoires les plus isolés, mal desservis et pauvres en services, continuent de perdre de la population."}], "activite3_etude": {"document_type": "texte", "document_titre": "Un village qui revit grâce à ses nouveaux habitants et à la valorisation de ses atouts", "document_texte": "« Notre commune de 480 habitants, perchée à 900 mètres d'altitude, a longtemps semblé condamnée : l'école avait fermé en 1998, le dernier café en 2005, et la moitié des maisons du bourg restaient volets clos. Le tournant date d'une dizaine d'années. La communauté de communes a financé l'arrivée de la fibre optique et transformé l'ancienne poste en espace de travail partagé. Trois familles de télétravailleurs se sont installées, puis un jeune couple a repris la ferme de ses grands-parents pour produire des fromages fermiers vendus en circuit court et dans deux AOP voisines. Une boulangère ambulante passe trois fois par semaine. L'été, les gîtes communaux affichent complet : les randonneurs viennent pour les sentiers du parc naturel régional et les gorges toutes proches. L'école a rouvert il y a quatre ans avec une classe unique de dix-huit élèves. Rien n'est gagné, le médecin le plus proche reste à vingt-cinq minutes, mais pour la première fois depuis un demi-siècle, le village gagne des habitants. »", "document_source": "Témoignage d'un maire d'une commune de moyenne montagne, adapté à des fins pédagogiques de reportages de la presse régionale française (années 2020).", "questions": ["Présentez le document : nature, auteur, sujet.", "Quels signes de déclin le village a-t-il connus avant son renouveau ?", "Relevez trois atouts que la commune a su valoriser pour attirer de nouveaux habitants et des touristes.", "Quel rôle les acteurs publics (communauté de communes, parc naturel régional) ont-ils joué dans ce renouveau ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que les espaces de faible densité disposent d'atouts mais restent confrontés à des fragilités."], "corrections": ["Ce document est le témoignage du maire d'une commune de moyenne montagne d'environ 480 habitants, adapté de reportages de la presse régionale des années 2020. Il raconte le déclin puis le renouveau de ce village de faible densité, ce qui illustre concrètement les notions du chapitre.", "Le village a connu les signes classiques de la déprise rurale : la fermeture de l'école en 1998, celle du dernier café en 2005, et l'abandon de nombreuses maisons du bourg restées volets clos. Ce déclin résultait du départ des habitants et du vieillissement de la population, hérités de l'exode rural.", "La commune a valorisé plusieurs atouts : le numérique, avec l'arrivée de la fibre optique et la création d'un espace de travail partagé qui ont attiré des télétravailleurs ; l'agriculture de qualité, avec la reprise d'une ferme produisant des fromages vendus en circuit court et l'existence d'AOP voisines ; et le tourisme vert, avec des gîtes complets l'été grâce aux sentiers du parc naturel régional et aux gorges proches.", "Les acteurs publics ont joué un rôle décisif : la communauté de communes a financé la fibre optique et transformé l'ancienne poste en espace de travail partagé, créant les conditions de l'installation de nouveaux habitants. Le parc naturel régional, en protégeant les paysages et en balisant les sentiers, rend le territoire attractif pour les randonneurs. Sans ces investissements publics, le renouveau n'aurait probablement pas eu lieu.", "Exemple de rédaction : Les espaces de faible densité disposent d'atouts réels qu'ils apprennent à valoriser. Comme le montre le document, l'agriculture de qualité (fromages fermiers, AOP, circuits courts), le tourisme vert lié aux paysages protégés et l'arrivée du numérique permettent d'attirer néo-ruraux, télétravailleurs et visiteurs : le village étudié regagne des habitants et a même rouvert son école. Ces territoires offrent aussi de l'espace pour les énergies renouvelables et un cadre de vie recherché. Mais des fragilités demeurent : le médecin le plus proche reste à vingt-cinq minutes, ce qui illustre les déserts médicaux, et le maire reconnaît que rien n'est gagné. Le renouveau reste inégal : il profite surtout aux campagnes touristiques ou bien connectées, tandis que les territoires les plus isolés continuent de perdre habitants et services."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que les espaces de faible densité français sont confrontés à des contraintes mais disposent d'atouts qu'ils valorisent.", "plan": {"introduction": "Contexte : une grande partie du territoire français est faiblement peuplée, le long de la diagonale des faibles densités et dans les montagnes. Définition : un espace de faible densité compte moins de 30 habitants/km². Problématique : ces espaces sont-ils seulement des territoires en difficulté, ou disposent-ils d'atouts ? Annonce du plan : d'abord les contraintes de ces espaces, puis les atouts qu'ils valorisent.", "partie1": "I. Des espaces confrontés à des contraintes réelles. Argument 1 : un long déclin démographique hérité de l'exode rural, avec une population vieillissante ; exemple : la Lozère, département le moins dense de France avec environ 15 habitants/km². Argument 2 : le recul des services et des commerces (écoles, cafés, médecins), qui crée des déserts médicaux et un sentiment d'abandon. Argument 3 : des contraintes d'accessibilité : éloignement des villes, routes de montagne, couverture numérique longtemps insuffisante.", "partie2": "II. Des atouts nombreux et de mieux en mieux valorisés. Argument 1 : une agriculture de qualité, valorisée par les labels (AOP comme le roquefort ou le comté), les circuits courts et l'agritourisme. Argument 2 : un tourisme vert en plein essor : randonnée, sports de nature, parcs naturels régionaux et nationaux (Cévennes, Vanoise) qui protègent des paysages exceptionnels. Argument 3 : de nouvelles dynamiques : ressources énergétiques renouvelables (éolien, solaire, hydroélectricité), arrivée de néo-ruraux et de télétravailleurs grâce à la fibre optique, réouverture de services dans certains villages.", "conclusion": "Bilan : les espaces de faible densité cumulent des fragilités (isolement, vieillissement, déserts médicaux) mais valorisent des atouts solides : qualité des productions, tourisme vert, ressources naturelles et attractivité résidentielle nouvelle. Ouverture : la réduction des inégalités entre ces territoires et les métropoles est un enjeu central de l'aménagement du territoire."}, "correction_complete": "Une grande partie du territoire français est faiblement peuplée : le long d'une diagonale allant du nord-est au sud-ouest et dans les massifs montagneux, de vastes espaces comptent moins de 30 habitants par kilomètre carré. Ces espaces de faible densité sont-ils seulement des territoires en difficulté, ou disposent-ils d'atouts qu'ils savent valoriser ? Nous présenterons d'abord leurs contraintes, avant de montrer la diversité de leurs atouts.\n\nLes espaces de faible densité sont d'abord confrontés à des contraintes réelles. Depuis le XIXe siècle, l'exode rural a vidé ces campagnes de leurs jeunes, partis travailler en ville : la population restante est vieillissante, et des départements comme la Lozère ne comptent plus qu'environ 15 habitants par kilomètre carré. Ce déclin démographique a entraîné le recul des services : fermetures d'écoles, de commerces et de cabinets médicaux. De nombreux territoires sont devenus des déserts médicaux, où il faut parcourir de longues distances pour se soigner. S'ajoutent des contraintes d'accessibilité : éloignement des grandes villes, routes de montagne difficiles l'hiver, couverture en téléphonie mobile et en internet longtemps insuffisante. Ces difficultés nourrissent chez certains habitants un sentiment d'abandon.\n\nPourtant, ces espaces disposent d'atouts nombreux, de mieux en mieux valorisés. Leur agriculture mise sur la qualité : les appellations d'origine protégée, comme le roquefort des Causses ou le comté du Jura, garantissent des produits liés à un terroir, tandis que les circuits courts et l'agritourisme (gîtes, fermes pédagogiques) complètent les revenus des exploitants. Le tourisme vert connaît un essor remarquable : randonneurs, vététistes et amateurs de canoë fréquentent les gorges du Tarn ou de l'Ardèche, et les parcs naturels régionaux et nationaux, comme les Cévennes ou la Vanoise, protègent des paysages exceptionnels tout en soutenant l'économie locale. Enfin, de nouvelles dynamiques apparaissent : l'espace disponible accueille éoliennes, centrales solaires et barrages hydroélectriques, et l'arrivée de la fibre optique permet à des néo-ruraux et à des télétravailleurs de s'installer, redonnant vie à certains villages qui rouvrent école ou commerce.\n\nAinsi, les espaces de faible densité cumulent des fragilités héritées de l'exode rural, mais ils valorisent des atouts solides : productions de qualité, tourisme de nature, ressources énergétiques et cadre de vie recherché. Réduire les inégalités entre ces territoires et les métropoles dynamiques constitue désormais l'un des grands enjeux de l'aménagement du territoire français."}, "activite5_vocabulaire": {"termes": [{"mot": "Espace de faible densité", "definition": "Territoire comptant moins de 30 habitants par kilomètre carré."}, {"mot": "Densité de population", "definition": "Nombre moyen d'habitants par kilomètre carré sur un territoire donné."}, {"mot": "Diagonale des faibles densités", "definition": "Bande de territoires peu peuplés qui traverse la France du nord-est (Ardennes) au sud-ouest (Pyrénées), en passant par le Massif central."}, {"mot": "Exode rural", "definition": "Départ massif des habitants des campagnes vers les villes, surtout du XIXe siècle aux années 1970."}, {"mot": "Déprise rurale", "definition": "Abandon progressif d'un espace rural : terres qui ne sont plus cultivées, services et commerces qui ferment, maisons inoccupées."}, {"mot": "Désert médical", "definition": "Territoire où le nombre de médecins est insuffisant, rendant l'accès aux soins difficile pour les habitants."}, {"mot": "AOP (appellation d'origine protégée)", "definition": "Label européen garantissant qu'un produit est fabriqué dans une zone géographique précise selon un savoir-faire reconnu."}, {"mot": "Circuit court", "definition": "Mode de vente avec peu ou pas d'intermédiaires entre le producteur et le consommateur (vente à la ferme, marchés, AMAP)."}, {"mot": "Tourisme vert", "definition": "Tourisme pratiqué dans les espaces ruraux et naturels : randonnée, sports de nature, découverte des terroirs."}, {"mot": "Néo-rural", "definition": "Ancien citadin qui choisit de s'installer à la campagne, attiré par la qualité de vie, parfois grâce au télétravail."}], "notions_essentielles": ["Les espaces de faible densité (moins de 30 hab/km²) couvrent la diagonale des faibles densités et les massifs montagneux ; la Lozère est le département le moins dense.", "Ces espaces cumulent des fragilités héritées de l'exode rural : vieillissement, déserts médicaux, recul des commerces et des services.", "L'agriculture y est valorisée par la qualité : AOP (roquefort, comté), circuits courts, agritourisme.", "Le tourisme vert et les parcs naturels (Cévennes, Vanoise) attirent des visiteurs en quête de nature et font vivre l'économie locale.", "De nouvelles dynamiques émergent : énergies renouvelables, arrivée de néo-ruraux et de télétravailleurs grâce au numérique, mais ce renouveau reste inégal."]}}, {"id": 3, "titre": "Les espaces productifs et leurs évolutions", "activite1_fiche": {"introduction": "Un espace productif est un espace aménagé par les sociétés pour produire des richesses : produits agricoles, biens industriels ou services. En France, ces espaces se transforment profondément sous l'effet de la mondialisation : la concurrence internationale oblige les territoires à se spécialiser, à innover et à s'adapter. Certains espaces productifs sont en plein essor, comme les technopôles ou les grandes régions touristiques, tandis que d'autres, comme les vieilles régions industrielles, doivent se reconvertir. Problématique : comment les espaces productifs français évoluent-ils dans le contexte de la mondialisation ?", "partie1_titre": "I. Des espaces agricoles puissants mais en mutation", "partie1_contenu": "A. Une agriculture puissante et intégrée aux marchés mondiaux. La France est la première puissance agricole de l'Union européenne. Son agriculture s'est modernisée après 1945 : mécanisation, engrais, remembrement des terres. Les grandes régions d'agriculture productiviste, comme la Beauce pour les céréales ou la Bretagne pour l'élevage intensif (porcs, volailles, lait), produisent en grande quantité pour les marchés français, européens et mondiaux. L'agroalimentaire (transformation des produits agricoles) est un secteur industriel majeur.\n\nB. Des espaces agricoles connectés et spécialisés. Les espaces agricoles productifs sont reliés aux ports d'exportation (Rouen pour les céréales), aux industries agroalimentaires et aux marchés par des réseaux de transport efficaces. Chaque région tend à se spécialiser : viticulture dans le Bordelais et en Champagne, maraîchage dans le Val de Loire, élevage extensif en montagne.\n\nC. Des défis environnementaux et sociaux. L'agriculture productiviste est critiquée pour ses effets sur l'environnement : pollution des eaux par les nitrates et les pesticides (algues vertes en Bretagne), appauvrissement des sols, émissions de gaz à effet de serre. De plus en plus d'agriculteurs se tournent vers l'agriculture biologique, les labels de qualité et les circuits courts. Le revenu des agriculteurs et le renouvellement des générations restent des défis majeurs.", "partie2_titre": "II. Des espaces industriels recomposés par la mondialisation", "partie2_contenu": "A. Le déclin des vieilles régions industrielles. Les régions de tradition industrielle du Nord et de l'Est (charbon, sidérurgie, textile) ont été durement touchées par la désindustrialisation depuis les années 1970 : fermetures d'usines, chômage, friches industrielles. Ces territoires se reconvertissent : à Lens, l'ouverture du musée du Louvre-Lens en 2012 sur un ancien carreau de mine symbolise cette mutation vers la culture et les services.\n\nB. Les nouveaux espaces industriels dynamiques. L'industrie française se concentre désormais dans des espaces innovants : les technopôles, qui associent entreprises de haute technologie, universités et laboratoires de recherche. Toulouse, capitale européenne de l'aéronautique avec Airbus, Sophia Antipolis près de Nice (informatique, biotechnologies) ou Grenoble (micro-électronique) illustrent cette industrie de l'innovation. Les métropoles et leurs périphéries attirent ces activités.\n\nC. Une industrie insérée dans la mondialisation. Les entreprises françaises s'insèrent dans des chaînes de production mondiales : l'A380 puis l'A350 d'Airbus sont assemblés à Toulouse à partir de pièces fabriquées dans toute l'Europe. La concurrence mondiale a provoqué des délocalisations, mais la France attire aussi des investissements étrangers et certaines productions sont relocalisées.", "partie3_titre": "III. La domination des espaces de services et du tourisme", "partie3_contenu": "A. Une économie dominée par les services. Près de 80 % des actifs français travaillent dans le secteur tertiaire : commerce, transports, santé, éducation, banques, numérique. Les services se concentrent dans les métropoles, et d'abord à Paris : le quartier de La Défense, premier quartier d'affaires européen, regroupe les sièges de grandes entreprises françaises et mondiales.\n\nB. La France, grande puissance touristique. La France est l'un des pays les plus visités au monde, avec plus de 90 millions de touristes internationaux les meilleures années avant 2020. Les espaces touristiques sont variés : littoraux méditerranéen et atlantique (tourisme balnéaire), montagnes (sports d'hiver dans les Alpes), Paris et ses monuments, châteaux de la Loire, tourisme vert dans les campagnes. Le tourisme fait vivre des régions entières et crée de nombreux emplois.\n\nC. Des espaces touristiques sous pression. Le tourisme de masse pose des problèmes : bétonnage des littoraux, pression sur l'eau et les milieux naturels, dépendance économique à une seule activité, saisonnalité des emplois. Les stations de moyenne montagne s'inquiètent du manque de neige lié au changement climatique. Le développement d'un tourisme plus durable est devenu un enjeu majeur.", "conclusion": "Les espaces productifs français se transforment sous l'effet de la mondialisation. L'agriculture, puissante mais contestée, évolue vers plus de qualité et de durabilité. L'industrie se recompose : déclin des vieilles régions industrielles en reconversion, essor des technopôles et des métropoles innovantes. Les services dominent l'économie, portés par les métropoles et par un tourisme de premier rang mondial. Partout, le défi est le même : rester compétitif dans la mondialisation tout en réduisant les impacts environnementaux et les inégalités territoriales."}, "activite2_quiz": [{"question": "Qu'est-ce qu'un espace productif ?", "options": ["Un espace protégé interdit aux activités", "Un espace aménagé pour produire des richesses (agriculture, industrie, services)", "Un espace réservé au logement", "Un espace uniquement agricole"], "correcte": 1, "explication": "Un espace productif est un espace aménagé et mis en valeur par les sociétés pour produire des richesses : produits agricoles, biens industriels ou services."}, {"question": "Quel rang occupe la France dans l'agriculture de l'Union européenne ?", "options": ["Première puissance agricole", "Cinquième puissance agricole", "Dixième puissance agricole", "Dernière puissance agricole"], "correcte": 0, "explication": "La France est la première puissance agricole de l'Union européenne grâce à ses vastes terres, à la modernisation de ses exploitations et à son industrie agroalimentaire."}, {"question": "Quelle région est célèbre pour sa grande culture céréalière ?", "options": ["La Bretagne", "La Beauce", "La Côte d'Azur", "Les Alpes"], "correcte": 1, "explication": "La Beauce, au sud-ouest de Paris, est surnommée le grenier à blé de la France : ses vastes plaines accueillent une agriculture productiviste céréalière très mécanisée."}, {"question": "Quelle région est spécialisée dans l'élevage intensif (porcs, volailles, lait) ?", "options": ["La Provence", "La Bretagne", "L'Alsace", "La Corse"], "correcte": 1, "explication": "La Bretagne est la première région française d'élevage intensif : porcs, volailles et production laitière y alimentent une puissante industrie agroalimentaire."}, {"question": "Qu'est-ce que l'agriculture productiviste ?", "options": ["Une agriculture qui cherche les rendements les plus élevés possibles grâce à la mécanisation et aux intrants", "Une agriculture sans machines", "Une agriculture de loisir", "Une agriculture réservée aux jardins"], "correcte": 0, "explication": "L'agriculture productiviste vise des rendements maximaux grâce à la mécanisation, aux engrais, aux pesticides et à la spécialisation. Elle est efficace mais critiquée pour ses impacts environnementaux."}, {"question": "Quel problème environnemental touche les côtes bretonnes à cause de l'élevage intensif ?", "options": ["Les marées noires", "Les algues vertes liées aux nitrates", "Les éruptions volcaniques", "La montée des eaux"], "correcte": 1, "explication": "Les nitrates issus des élevages intensifs polluent les rivières et favorisent la prolifération d'algues vertes sur certaines plages bretonnes, un problème environnemental et sanitaire majeur."}, {"question": "Qu'est-ce que la désindustrialisation ?", "options": ["La construction de nouvelles usines", "Le déclin des activités et des emplois industriels dans un territoire", "Le développement de l'industrie spatiale", "La modernisation des usines"], "correcte": 1, "explication": "La désindustrialisation désigne le recul de l'industrie : fermetures d'usines et pertes d'emplois industriels, qui ont durement frappé le Nord et l'Est de la France depuis les années 1970."}, {"question": "Quelles régions françaises ont été les plus touchées par la désindustrialisation ?", "options": ["Le Sud-Ouest et la Bretagne", "Le Nord et l'Est (charbon, sidérurgie, textile)", "La Côte d'Azur", "L'Île-de-France uniquement"], "correcte": 1, "explication": "Les vieilles régions industrielles du Nord et de l'Est, spécialisées dans le charbon, la sidérurgie et le textile, ont subi de plein fouet les fermetures d'usines et le chômage."}, {"question": "Quel équipement culturel symbolise la reconversion de l'ancien bassin minier du Nord ?", "options": ["Le château de Versailles", "Le Louvre-Lens, ouvert en 2012", "Le Futuroscope", "Disneyland Paris"], "correcte": 1, "explication": "Le musée du Louvre-Lens, ouvert en 2012 sur un ancien carreau de mine, symbolise la reconversion du bassin minier vers la culture et le tourisme."}, {"question": "Qu'est-ce qu'un technopôle ?", "options": ["Un espace qui regroupe entreprises de haute technologie, universités et laboratoires de recherche", "Une usine de charbon", "Un centre commercial", "Un parc d'attractions scientifique"], "correcte": 0, "explication": "Un technopôle associe sur un même site entreprises innovantes, universités et centres de recherche pour favoriser l'innovation. Exemples : Sophia Antipolis, Grenoble, Toulouse."}, {"question": "Quelle ville est la capitale européenne de l'aéronautique ?", "options": ["Marseille", "Toulouse", "Lille", "Nantes"], "correcte": 1, "explication": "Toulouse accueille le siège et les chaînes d'assemblage d'Airbus : avions assemblés à partir de pièces fabriquées dans toute l'Europe, ce qui illustre l'insertion de l'industrie française dans la mondialisation."}, {"question": "Quelle part des actifs français travaille dans le secteur tertiaire (services) ?", "options": ["Environ 20 %", "Environ 50 %", "Près de 80 %", "100 %"], "correcte": 2, "explication": "Près de 8 actifs français sur 10 travaillent dans les services : commerce, santé, éducation, transports, banques, numérique... Le tertiaire domine largement l'économie."}, {"question": "Quel est le premier quartier d'affaires européen ?", "options": ["La City de Londres", "La Défense, près de Paris", "Euralille", "La Part-Dieu à Lyon"], "correcte": 1, "explication": "La Défense, à l'ouest de Paris, est le premier quartier d'affaires d'Europe : ses tours regroupent les sièges de nombreuses grandes entreprises françaises et internationales."}, {"question": "Pourquoi la France est-elle une grande puissance touristique ?", "options": ["Parce qu'elle est l'un des pays les plus visités au monde grâce à la diversité de ses espaces touristiques", "Parce qu'elle n'a pas de monuments", "Parce que le tourisme y est interdit", "Parce qu'elle n'a qu'une seule plage"], "correcte": 0, "explication": "Avec plus de 90 millions de visiteurs internationaux les meilleures années, la France figure parmi les premières destinations mondiales : littoraux, montagnes, Paris, châteaux, terroirs."}, {"question": "Quel défi le changement climatique pose-t-il aux stations de moyenne montagne ?", "options": ["Trop de neige", "Le manque de neige qui menace l'économie du ski", "La disparition des touristes d'été", "L'interdiction de la randonnée"], "correcte": 1, "explication": "Le réchauffement climatique réduit l'enneigement en moyenne montagne : de nombreuses stations doivent diversifier leurs activités (randonnée, VTT, bien-être) pour survivre."}], "activite3_etude": {"document_type": "texte", "document_titre": "Toulouse, un espace productif de l'innovation porté par l'aéronautique", "document_texte": "« Autour des pistes de Toulouse-Blagnac s'étend l'un des plus puissants complexes industriels d'Europe. Dans les halls d'assemblage d'Airbus, longs de plusieurs centaines de mètres, des équipes font naître les A320, A330 et A350 à partir de tronçons de fuselage, d'ailes et d'empennages fabriqués en Allemagne, en Espagne, au Royaume-Uni et en France, acheminés par avion-cargo, par bateau et par convois routiers exceptionnels. L'avionneur emploie directement des dizaines de milliers de salariés dans l'agglomération, mais il fait aussi vivre un réseau de centaines de sous-traitants et de bureaux d'études. Autour de l'usine gravitent des écoles d'ingénieurs réputées, des laboratoires du CNRS et de l'ONERA, la Cité de l'espace et le pôle de compétitivité Aerospace Valley. Chaque année, des milliers d'ingénieurs, de techniciens et d'étudiants venus de toute la France et de l'étranger s'installent dans la Ville rose, dont la population augmente parmi les plus vites de France. »", "document_source": "Texte adapté à des fins pédagogiques d'articles de presse économique sur l'industrie aéronautique toulousaine (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, intérêt pour l'étude des espaces productifs.", "Montrez, à l'aide du texte, que la production des avions Airbus est insérée dans la mondialisation.", "Quels acteurs de l'innovation sont présents à Toulouse autour d'Airbus ?", "Quelles sont les conséquences de cette activité sur la métropole toulousaine ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez pourquoi Toulouse peut être qualifiée d'espace productif de l'innovation."], "corrections": ["Ce document est un texte adapté d'articles de presse économique des années 2010-2020 consacré à l'industrie aéronautique de Toulouse. Il décrit le fonctionnement du complexe industriel d'Airbus et son influence sur la métropole. Il illustre concrètement la notion d'espace productif industriel innovant, au coeur du chapitre.", "La production d'Airbus est typique de la mondialisation : les avions sont assemblés à Toulouse à partir de tronçons de fuselage, d'ailes et d'empennages fabriqués en Allemagne, en Espagne, au Royaume-Uni et en France, puis acheminés par avion-cargo, par bateau et par convois routiers exceptionnels. La production est donc répartie entre plusieurs pays européens, et les avions sont ensuite vendus à des compagnies du monde entier.", "Le texte cite de nombreux acteurs de l'innovation : des écoles d'ingénieurs réputées qui forment les futurs salariés, des laboratoires de recherche publics (CNRS, ONERA), le pôle de compétitivité Aerospace Valley qui met en réseau entreprises et chercheurs, ainsi que des centaines de sous-traitants et bureaux d'études qui travaillent pour Airbus.", "L'aéronautique transforme la métropole : Airbus emploie directement des dizaines de milliers de salariés et en fait vivre beaucoup d'autres chez les sous-traitants. Chaque année, des milliers d'ingénieurs, de techniciens et d'étudiants s'installent à Toulouse, dont la population augmente parmi les plus rapides de France. L'activité renforce donc l'attractivité et la croissance de la ville.", "Exemple de rédaction : Toulouse est un espace productif de l'innovation car elle concentre tous les ingrédients de l'industrie de haute technologie. Le coeur du système est Airbus, qui assemble ses avions à partir de pièces venues de toute l'Europe : la ville est ainsi insérée dans les réseaux de la mondialisation. Autour de l'avionneur gravitent des centaines de sous-traitants, des écoles d'ingénieurs, des laboratoires de recherche comme le CNRS et l'ONERA, et le pôle de compétitivité Aerospace Valley, qui font circuler les savoirs entre entreprises et universités : c'est la définition même d'un technopôle. Cette synergie attire chaque année des milliers d'ingénieurs et d'étudiants, ce qui fait de Toulouse l'une des métropoles les plus dynamiques de France. L'innovation y nourrit donc à la fois l'industrie, l'emploi et la croissance urbaine."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez comment la mondialisation transforme les espaces productifs français.", "plan": {"introduction": "Contexte : les espaces productifs français (agricoles, industriels, de services) sont insérés dans une économie mondialisée et concurrentielle. Définition : un espace productif est un espace aménagé pour produire des richesses. Problématique : comment la mondialisation transforme-t-elle ces espaces ? Annonce du plan : d'abord les espaces gagnants, renforcés par la mondialisation, puis les espaces fragilisés qui doivent s'adapter.", "partie1": "I. Des espaces productifs renforcés par la mondialisation. Argument 1 : les espaces de l'innovation se développent dans les métropoles : technopôles comme Toulouse (Airbus, assemblage de pièces venues de toute l'Europe), Sophia Antipolis ou Grenoble. Argument 2 : les grandes régions d'agriculture productiviste exportent sur les marchés mondiaux : céréales de la Beauce expédiées par le port de Rouen, élevage breton lié à l'agroalimentaire. Argument 3 : les espaces de services et de tourisme profitent des flux mondiaux : La Défense, premier quartier d'affaires européen, et la France parmi les premières destinations touristiques mondiales (plus de 90 millions de visiteurs les meilleures années).", "partie2": "II. Des espaces fragilisés qui doivent s'adapter. Argument 1 : les vieilles régions industrielles du Nord et de l'Est subissent la désindustrialisation depuis les années 1970 : fermetures d'usines, chômage, friches industrielles. Argument 2 : ces territoires se reconvertissent vers les services et la culture ; exemple : le Louvre-Lens, ouvert en 2012 sur un ancien carreau de mine. Argument 3 : l'agriculture productiviste, critiquée pour ses impacts environnementaux (algues vertes en Bretagne), évolue vers la qualité : agriculture biologique, AOP, circuits courts ; le tourisme cherche lui aussi à devenir plus durable face au changement climatique.", "conclusion": "Bilan : la mondialisation recompose les espaces productifs : elle renforce les métropoles innovantes, les régions agricoles exportatrices et les espaces touristiques, mais fragilise les vieilles régions industrielles, contraintes de se reconvertir. Ouverture : ces mutations creusent des inégalités entre territoires, que l'aménagement du territoire tente de réduire."}, "correction_complete": "Les espaces productifs français, qu'ils soient agricoles, industriels ou de services, sont aujourd'hui insérés dans une économie mondialisée où la concurrence est forte. Un espace productif est un espace aménagé par les sociétés pour produire des richesses. Comment la mondialisation transforme-t-elle ces espaces ? Nous verrons d'abord qu'elle renforce certains territoires, avant de montrer qu'elle en fragilise d'autres, contraints de s'adapter.\n\nLa mondialisation renforce d'abord les espaces productifs les plus compétitifs. Les espaces de l'innovation se concentrent dans les métropoles : à Toulouse, capitale européenne de l'aéronautique, Airbus assemble ses A320 et A350 à partir de pièces fabriquées en Allemagne, en Espagne et au Royaume-Uni, entouré d'écoles d'ingénieurs, de laboratoires de recherche et de centaines de sous-traitants ; Sophia Antipolis près de Nice et Grenoble illustrent le même modèle du technopôle. Les grandes régions agricoles productivistes profitent aussi des marchés mondiaux : les céréales de la Beauce sont exportées par le port de Rouen, tandis que l'élevage intensif breton alimente une puissante industrie agroalimentaire. Enfin, les services et le tourisme tirent parti des flux de la mondialisation : La Défense, premier quartier d'affaires européen, accueille les sièges de firmes mondiales, et la France, avec plus de 90 millions de visiteurs internationaux les mei
