lleures années, demeure l'une des premières destinations touristiques de la planète.\n\nMais la mondialisation fragilise d'autres espaces, qui doivent se transformer. Les vieilles régions industrielles du Nord et de l'Est, spécialisées dans le charbon, la sidérurgie et le textile, subissent la désindustrialisation depuis les années 1970 : fermetures d'usines, chômage élevé et friches industrielles ont marqué ces territoires. Ils se reconvertissent peu à peu vers les services, la logistique et la culture : l'ouverture du Louvre-Lens en 2012, sur un ancien carreau de mine du bassin minier, symbolise cette renaissance. L'agriculture productiviste est elle aussi contrainte d'évoluer : critiquée pour la pollution des eaux, comme le montrent les algues vertes en Bretagne, elle se tourne davantage vers l'agriculture biologique, les labels de qualité et les circuits courts. Le tourisme, enfin, cherche à devenir plus durable, notamment en moyenne montagne où le manque de neige menace l'économie du ski.\n\nAinsi, la mondialisation recompose profondément les espaces productifs français : elle favorise les métropoles innovantes, les régions agricoles exportatrices et les grands espaces touristiques, tandis que les territoires industriels anciens doivent inventer leur reconversion. Ces mutations creusent des inégalités entre les territoires, auxquelles les politiques d'aménagement du territoire tentent de répondre."}, "activite5_vocabulaire": {"termes": [{"mot": "Espace productif", "definition": "Espace aménagé et mis en valeur par les sociétés pour produire des richesses : produits agricoles, biens industriels ou services."}, {"mot": "Agriculture productiviste", "definition": "Agriculture qui recherche des rendements maximaux grâce à la mécanisation, aux engrais, aux pesticides et à la spécialisation."}, {"mot": "Agroalimentaire", "definition": "Secteur industriel qui transforme les produits agricoles en produits alimentaires (laiteries, conserveries, abattoirs...)."}, {"mot": "Désindustrialisation", "definition": "Déclin des activités et des emplois industriels dans un territoire, marqué par des fermetures d'usines."}, {"mot": "Friche industrielle", "definition": "Terrain ou bâtiment industriel abandonné après la fermeture d'une usine."}, {"mot": "Reconversion", "definition": "Transformation d'un territoire en difficulté qui développe de nouvelles activités pour remplacer celles qui ont disparu."}, {"mot": "Technopôle", "definition": "Espace qui regroupe des entreprises de haute technologie, des universités et des laboratoires de recherche pour favoriser l'innovation."}, {"mot": "Pôle de compétitivité", "definition": "Réseau associant entreprises, centres de recherche et formations sur un territoire et un secteur donnés pour stimuler l'innovation (ex. Aerospace Valley à Toulouse)."}, {"mot": "Secteur tertiaire", "definition": "Ensemble des activités de services : commerce, transports, santé, éducation, banques, tourisme... Près de 80 % des actifs français y travaillent."}, {"mot": "Tourisme de masse", "definition": "Tourisme qui concerne un très grand nombre de personnes, concentrées dans certains lieux et à certaines saisons, avec de forts impacts sur les territoires."}], "notions_essentielles": ["Un espace productif est un espace aménagé pour produire des richesses ; la mondialisation oblige ces espaces à se spécialiser et à innover.", "La France est la première puissance agricole de l'UE : agriculture productiviste (Beauce, Bretagne) mais contestée, qui évolue vers la qualité et le bio.", "Les vieilles régions industrielles du Nord et de l'Est, frappées par la désindustrialisation, se reconvertissent (exemple du Louvre-Lens, 2012).", "L'industrie innovante se concentre dans les technopôles des métropoles : Toulouse (Airbus), Sophia Antipolis, Grenoble.", "Les services dominent l'économie (près de 80 % des actifs) ; la France est l'une des premières destinations touristiques mondiales, mais le tourisme doit devenir plus durable."]}}, {"id": 4, "titre": "Aménager le territoire pour réduire les inégalités", "activite1_fiche": {"introduction": "Le territoire français est marqué par de fortes inégalités : les métropoles concentrent les richesses et les emplois, tandis que des villes moyennes, des espaces ruraux et d'anciennes régions industrielles se sentent délaissés. Pour réduire ces écarts, les pouvoirs publics mènent des politiques d'aménagement du territoire : ils créent des infrastructures, soutiennent les territoires en difficulté et tentent de rendre le développement plus équilibré et plus durable. Problématique : pourquoi et comment aménager le territoire français pour réduire les inégalités entre les espaces ?", "partie1_titre": "I. Un territoire marqué par des inégalités croissantes", "partie1_contenu": "A. Des inégalités entre métropoles et autres territoires. La métropolisation concentre les emplois qualifiés, les services rares et les richesses dans les plus grandes villes, Paris en tête. À l'inverse, certaines villes petites et moyennes voient leurs commerces de centre-ville fermer, et des espaces ruraux perdent habitants et services publics (écoles, gares, maternités).\n\nB. Des territoires en difficulté spécifique. Les anciennes régions industrielles du Nord et de l'Est cumulent chômage élevé et friches industrielles. Certains quartiers de banlieue concentrent pauvreté et difficultés sociales. Les espaces ruraux isolés souffrent de l'éloignement des services, des déserts médicaux et d'une couverture numérique longtemps insuffisante.\n\nC. Un sentiment d'abandon qui interroge la cohésion nationale. Ces inégalités territoriales nourrissent chez une partie des habitants le sentiment d'être les oubliés de la mondialisation et des politiques publiques. Réduire ces fractures est donc un enjeu économique, social et politique majeur : c'est l'objectif de l'aménagement du territoire.", "partie2_titre": "II. Des acteurs multiples qui aménagent à toutes les échelles", "partie2_contenu": "A. L'État, acteur historique de l'aménagement. Depuis les années 1960, l'État pilote de grands aménagements : lignes à grande vitesse, autoroutes, aéroports, grands ports. Aujourd'hui, il agit notamment à travers l'Agence nationale de la cohésion des territoires (ANCT) et des programmes ciblés comme Action coeur de ville, qui aide à revitaliser les centres des villes moyennes, ou France Services, qui regroupe des services publics de proximité.\n\nB. Les collectivités territoriales en première ligne. Depuis les lois de décentralisation de 1982, les régions, les départements et les communes (souvent regroupées en intercommunalités) disposent de compétences importantes : transports régionaux, collèges et lycées, zones d'activités, urbanisme. Les régions élaborent des schémas d'aménagement et soutiennent le développement économique local.\n\nC. L'Union européenne et les acteurs privés. L'Union européenne cofinance de nombreux projets grâce à ses fonds structurels, comme le FEDER (Fonds européen de développement régional), qui aide les régions en retard de développement. Les entreprises privées, les associations et les habitants (consultés lors d'enquêtes publiques) participent également aux choix d'aménagement.", "partie3_titre": "III. Aménager pour rééquilibrer et développer durablement : des exemples concrets", "partie3_contenu": "A. Désenclaver et connecter les territoires. Les infrastructures de transport visent à rapprocher les territoires : la LGV Sud Europe Atlantique met Bordeaux à environ deux heures de Paris depuis 2017, et le plan France Très Haut Débit déploie la fibre optique jusque dans les campagnes pour permettre télétravail et services en ligne.\n\nB. Soutenir les territoires en reconversion : l'exemple du Louvre-Lens. Dans l'ancien bassin minier du Nord, frappé par la fermeture des mines, l'État, la région, les collectivités locales et l'Union européenne ont financé l'implantation du musée du Louvre-Lens, ouvert en 2012 sur un ancien carreau de mine. Objectif : changer l'image du territoire, attirer touristes et entreprises, créer des emplois. C'est un exemple d'aménagement culturel au service de la reconversion.\n\nC. Un aménagement de plus en plus durable. Les aménagements doivent désormais concilier développement économique, justice sociale et protection de l'environnement : limitation de l'artificialisation des sols, transports en commun, rénovation énergétique, trames vertes en ville. Certains grands projets sont contestés par des habitants ou des associations qui jugent leurs impacts trop lourds : l'aménagement fait débat et suppose des choix démocratiques.", "conclusion": "Face aux inégalités croissantes entre métropoles dynamiques et territoires fragilisés, l'aménagement du territoire vise à rééquilibrer le développement. État, collectivités territoriales, Union européenne et acteurs privés agissent à toutes les échelles : infrastructures de transport et numériques, revitalisation des centres-villes, reconversion des anciennes régions industrielles comme à Lens. L'aménagement doit aujourd'hui être durable et concerté : il s'agit de réduire les fractures territoriales sans sacrifier l'environnement, en associant les habitants aux décisions."}, "activite2_quiz": [{"question": "Qu'est-ce que l'aménagement du territoire ?", "options": ["La décoration des bâtiments publics", "L'ensemble des actions menées pour organiser le territoire et réduire les inégalités entre les espaces", "La construction de logements uniquement à Paris", "Le découpage des régions"], "correcte": 1, "explication": "L'aménagement du territoire désigne l'ensemble des actions menées par les pouvoirs publics et leurs partenaires pour organiser le territoire, corriger les inégalités spatiales et favoriser un développement équilibré."}, {"question": "Quel phénomène concentre richesses et emplois dans les grandes villes ?", "options": ["La métropolisation", "L'exode urbain", "La déprise rurale", "La décentralisation"], "correcte": 0, "explication": "La métropolisation concentre les emplois qualifiés, les richesses et les fonctions de commandement dans les plus grandes villes, creusant les écarts avec les autres territoires."}, {"question": "Quels territoires se sentent souvent délaissés face à la métropolisation ?", "options": ["Les grandes métropoles", "Les villes moyennes, les espaces ruraux isolés et les anciennes régions industrielles", "Les quartiers d'affaires", "Les aéroports internationaux"], "correcte": 1, "explication": "Villes moyennes aux commerces fermés, espaces ruraux privés de services et anciennes régions industrielles touchées par le chômage cumulent les difficultés et nourrissent un sentiment d'abandon."}, {"question": "Depuis quelles lois les collectivités territoriales ont-elles des compétences d'aménagement importantes ?", "options": ["Les lois de décentralisation de 1982", "La loi de 1905", "Les lois Jules Ferry", "Le traité de Rome"], "correcte": 0, "explication": "Les lois de décentralisation de 1982 (lois Defferre) ont transféré des compétences de l'État vers les régions, départements et communes : transports, lycées et collèges, urbanisme, développement économique."}, {"question": "Quel programme national aide à revitaliser les centres des villes moyennes ?", "options": ["Action coeur de ville", "Plan Marshall", "Erasmus", "Natura 2000"], "correcte": 0, "explication": "Le programme Action coeur de ville soutient les villes moyennes : rénovation des logements, aide aux commerces de centre-ville, amélioration des espaces publics."}, {"question": "Que sont les espaces France Services ?", "options": ["Des agences de voyage", "Des lieux qui regroupent plusieurs services publics de proximité", "Des zones commerciales", "Des ambassades"], "correcte": 1, "explication": "Les espaces France Services regroupent en un même lieu des services publics (CAF, impôts, retraite, Pôle emploi...) pour les rendre accessibles, notamment dans les territoires ruraux."}, {"question": "Quel fonds européen aide les régions en retard de développement ?", "options": ["Le FEDER", "Le FMI", "La BCE", "L'OTAN"], "correcte": 0, "explication": "Le FEDER (Fonds européen de développement régional) cofinance des projets d'aménagement dans les régions européennes : infrastructures, innovation, environnement, rénovation urbaine."}, {"question": "Quelle LGV met Bordeaux à environ deux heures de Paris depuis 2017 ?", "options": ["La LGV Sud Europe Atlantique", "La LGV Méditerranée", "Le tunnel sous la Manche", "Le RER A"], "correcte": 0, "explication": "La LGV Sud Europe Atlantique, inaugurée en 2017, relie Paris à Bordeaux en environ deux heures : elle renforce l'attractivité de la métropole bordelaise."}, {"question": "Quel plan vise à apporter la fibre optique sur tout le territoire ?", "options": ["Le plan France Très Haut Débit", "Le plan Vigipirate", "Le plan ORSEC", "Le plan Borloo"], "correcte": 0, "explication": "Le plan France Très Haut Débit déploie la fibre optique et le très haut débit sur tout le territoire, condition essentielle de l'attractivité des espaces ruraux (télétravail, services en ligne)."}, {"question": "Quel équipement culturel a été implanté à Lens pour aider la reconversion du bassin minier ?", "options": ["Le musée du Louvre-Lens (2012)", "Le centre Pompidou-Metz", "Le Mucem", "La Philharmonie de Paris"], "correcte": 0, "explication": "Le Louvre-Lens, ouvert en 2012 sur un ancien carreau de mine, vise à changer l'image du bassin minier, à attirer touristes et entreprises et à créer des emplois : c'est un aménagement culturel emblématique."}, {"question": "Quels acteurs ont financé le Louvre-Lens ?", "options": ["Uniquement la ville de Lens", "L'État, la région, les collectivités locales et l'Union européenne", "Une entreprise américaine", "Les visiteurs du musée"], "correcte": 1, "explication": "Le Louvre-Lens illustre la multiplicité des acteurs de l'aménagement : État, région, département, intercommunalité et Union européenne (FEDER) ont cofinancé le projet."}, {"question": "Qu'est-ce qu'un aménagement durable ?", "options": ["Un aménagement qui dure longtemps", "Un aménagement qui concilie développement économique, justice sociale et protection de l'environnement", "Un aménagement en béton armé", "Un aménagement réservé aux riches"], "correcte": 1, "explication": "Un aménagement durable cherche l'équilibre entre les trois piliers du développement durable : économie, social et environnement (transports en commun, sobriété foncière, rénovation énergétique...)."}, {"question": "Comment les habitants peuvent-ils participer aux choix d'aménagement ?", "options": ["Ils ne le peuvent pas", "Par les enquêtes publiques, les concertations et les élections locales", "En achetant des actions", "En écrivant au président des États-Unis"], "correcte": 1, "explication": "Les grands projets font l'objet d'enquêtes publiques et de concertations où les habitants donnent leur avis ; les élections locales permettent aussi de choisir les élus qui décident des aménagements."}, {"question": "Pourquoi certains grands projets d'aménagement sont-ils contestés ?", "options": ["Parce qu'ils sont gratuits", "Parce que des habitants ou des associations jugent leurs impacts environnementaux ou sociaux trop lourds", "Parce qu'ils sont toujours inutiles", "Parce qu'ils sont secrets"], "correcte": 1, "explication": "Des projets (autoroutes, retenues d'eau, zones commerciales...) sont parfois contestés en raison de leurs impacts sur l'environnement ou de leur coût : l'aménagement suppose des arbitrages démocratiques."}, {"question": "Quel est l'objectif principal de l'aménagement du territoire ?", "options": ["Concentrer toutes les richesses à Paris", "Réduire les inégalités entre les territoires et favoriser un développement équilibré et durable", "Supprimer les campagnes", "Construire le plus de routes possible"], "correcte": 1, "explication": "L'aménagement du territoire vise à corriger les déséquilibres spatiaux : soutenir les territoires en difficulté, désenclaver, répartir équipements et services, dans une logique désormais durable."}], "activite3_etude": {"document_type": "texte", "document_titre": "Le Louvre-Lens, un musée pour transformer un territoire", "document_texte": "« Pourquoi installer une antenne du plus grand musée du monde à Lens, ville de 35 000 habitants au coeur de l'ancien bassin minier ? Le choix, annoncé en 2004, était d'abord un pari sur un territoire meurtri : après la fermeture des mines, achevée dans les années 1980, le pays minier cumulait chômage record, friches industrielles et image dégradée. Le musée, ouvert en décembre 2012 sur un ancien carreau de mine de 20 hectares, a été financé par la région, le département, la communauté d'agglomération et des fonds européens, pour environ 150 millions d'euros. Dix ans plus tard, le bilan est contrasté mais réel : plusieurs millions de visiteurs accueillis, des hôtels et des restaurants ouverts, des emplois créés dans le tourisme, et surtout une fierté retrouvée pour les habitants, dont beaucoup sont devenus les premiers visiteurs du musée. La transformation économique complète du bassin minier, elle, prendra encore du temps. »", "document_source": "Texte adapté à des fins pédagogiques de dossiers de presse et d'articles consacrés au Louvre-Lens (2012-2022).", "questions": ["Présentez le document : nature, sujet, période concernée.", "Quelles difficultés le bassin minier connaissait-il avant l'arrivée du musée ?", "Quels acteurs ont financé le Louvre-Lens ? Que révèle cette liste sur l'aménagement du territoire ?", "Quels effets positifs le musée a-t-il eus sur le territoire ? Le document signale-t-il des limites ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, expliquez pourquoi le Louvre-Lens est un exemple d'aménagement du territoire destiné à réduire les inégalités."], "corrections": ["Ce document est un texte adapté de dossiers de presse et d'articles consacrés au musée du Louvre-Lens, couvrant la période 2012-2022, de l'ouverture du musée à son dixième anniversaire. Il présente les raisons de son implantation dans l'ancien bassin minier et dresse un premier bilan de ses effets sur le territoire.", "Avant l'arrivée du musée, le bassin minier cumulait les difficultés : la fermeture des mines, achevée dans les années 1980, avait laissé un chômage record, des friches industrielles et une image très dégradée du territoire. C'est un exemple typique de vieille région industrielle frappée par la désindustrialisation.", "Le musée a été financé par la région, le département, la communauté d'agglomération et des fonds européens, pour environ 150 millions d'euros. Cette liste montre que l'aménagement du territoire mobilise des acteurs publics à toutes les échelles : collectivités territoriales locales et régionales, et Union européenne. Aucun acteur ne peut financer seul un tel projet : l'aménagement est une action collective.", "Le document signale des effets positifs réels : plusieurs millions de visiteurs, des hôtels et restaurants ouverts, des emplois créés dans le tourisme, et une fierté retrouvée chez les habitants, devenus les premiers visiteurs du musée. Mais il pointe aussi une limite : la transformation économique complète du bassin minier prendra encore du temps ; un seul équipement, aussi prestigieux soit-il, ne suffit pas à effacer des décennies de crise.", "Exemple de rédaction : Le Louvre-Lens illustre parfaitement l'aménagement du territoire au service de la réduction des inégalités. L'État et ses partenaires ont choisi d'implanter une antenne du plus grand musée du monde non pas dans une métropole déjà favorisée, mais à Lens, au coeur d'un bassin minier frappé par la désindustrialisation, le chômage et les friches. Le financement, partagé entre la région, le département, l'intercommunalité et l'Union européenne, montre la mobilisation de tous les niveaux de décision. L'objectif était de changer l'image du territoire, d'attirer visiteurs et entreprises et de redonner confiance aux habitants : dix ans après l'ouverture de 2012, des emplois touristiques ont été créés et la fierté est revenue. Les limites du projet rappellent toutefois qu'un aménagement ne transforme pas un territoire du jour au lendemain : il doit s'inscrire dans une stratégie de long terme."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, expliquez pourquoi le territoire français doit être aménagé et montrez quels acteurs interviennent, en vous appuyant sur un exemple précis.", "plan": {"introduction": "Contexte : la métropolisation et la mondialisation creusent les écarts entre les territoires français. Définition : l'aménagement du territoire désigne les actions menées pour organiser l'espace et réduire les inégalités. Problématique : pourquoi aménager le territoire et qui sont les acteurs de cet aménagement ? Annonce du plan : d'abord les inégalités qui rendent l'aménagement nécessaire, puis les acteurs et un exemple concret.", "partie1": "I. Des inégalités territoriales qui rendent l'aménagement nécessaire. Argument 1 : la métropolisation concentre emplois et richesses dans les grandes villes, Paris en tête, au détriment du reste du territoire. Argument 2 : des territoires cumulent les difficultés : anciennes régions industrielles (chômage, friches), villes moyennes aux centres dévitalisés, espaces ruraux frappés par les déserts médicaux et l'éloignement des services. Argument 3 : ces fractures nourrissent un sentiment d'abandon qui menace la cohésion nationale : réduire les inégalités est un enjeu économique, social et politique.", "partie2": "II. Des acteurs multiples, illustrés par l'exemple du Louvre-Lens. Argument 1 : l'État pilote de grands programmes (Action coeur de ville, France Services, plan France Très Haut Débit) et de grandes infrastructures comme la LGV Paris-Bordeaux ouverte en 2017. Argument 2 : depuis les lois de décentralisation de 1982, les collectivités territoriales (régions, départements, communes et intercommunalités) sont en première ligne ; l'Union européenne cofinance via le FEDER. Argument 3 : l'exemple du Louvre-Lens (2012) : musée implanté sur un ancien carreau de mine, financé par la région, le département, l'intercommunalité et l'UE, pour changer l'image du bassin minier, attirer des visiteurs et créer des emplois ; bilan réel mais transformation encore inachevée.", "conclusion": "Bilan : les inégalités creusées par la métropolisation rendent l'aménagement du territoire indispensable ; il mobilise l'État, les collectivités, l'UE et les acteurs privés, comme le montre le Louvre-Lens. Ouverture : l'aménagement doit désormais être durable et concerté, en associant les habitants aux décisions."}, "correction_complete": "Le territoire français est marqué par des inégalités croissantes : la métropolisation et la mondialisation concentrent les richesses dans les grandes villes, tandis que d'autres espaces se sentent délaissés. L'aménagement du territoire désigne l'ensemble des actions menées pour organiser l'espace et réduire ces écarts. Pourquoi le territoire doit-il être aménagé, et quels acteurs interviennent ? Nous présenterons d'abord les inégalités qui rendent l'aménagement nécessaire, puis ses acteurs à travers l'exemple du Louvre-Lens.\n\nL'aménagement répond d'abord à des inégalités territoriales profondes. La métropolisation concentre les emplois qualifiés, les services rares et les richesses dans les grandes métropoles, Paris en tête, qui regroupe à elle seule près d'un Français sur cinq. À l'inverse, plusieurs types de territoires cumulent les difficultés : les anciennes régions industrielles du Nord et de l'Est, frappées par la désindustrialisation, connaissent chômage élevé et friches industrielles ; de nombreuses villes moyennes voient les commerces de leur centre-ville fermer ; les espaces ruraux isolés souffrent des déserts médicaux et de la disparition des services publics. Ces fractures nourrissent chez beaucoup d'habitants un sentiment d'abandon qui fragilise la cohésion nationale : réduire les inégalités territoriales est donc un enjeu à la fois économique, social et politique.\n\nL'aménagement mobilise des acteurs à toutes les échelles, comme le montre l'exemple du Louvre-Lens. L'État pilote de grands programmes nationaux, comme Action coeur de ville pour revitaliser les villes moyennes ou le plan France Très Haut Débit pour apporter la fibre optique dans les campagnes, et de grandes infrastructures comme la LGV qui met Bordeaux à deux heures de Paris depuis 2017. Depuis les lois de décentralisation de 1982, les collectivités territoriales sont en première ligne, et l'Union européenne cofinance de nombreux projets grâce au FEDER. Le Louvre-Lens illustre cette coopération : ouvert en 2012 sur un ancien carreau de mine, ce musée a été financé par la région, le département, l'intercommunalité et des fonds européens, pour environ 150 millions d'euros. L'objectif était de transformer l'image du bassin minier, d'attirer des visiteurs et de créer des emplois. Dix ans plus tard, des millions de visiteurs sont venus, des hôtels et des restaurants ont ouvert et la fierté des habitants est revenue, même si la reconversion économique complète du territoire demandera encore du temps.\n\nAinsi, les inégalités creusées par la métropolisation rendent l'aménagement du territoire indispensable. Celui-ci repose sur la coopération de l'État, des collectivités territoriales, de l'Union européenne et des acteurs privés. L'enjeu est désormais de rendre cet aménagement durable et concerté, en associant les habitants aux choix qui façonnent leur cadre de vie."}, "activite5_vocabulaire": {"termes": [{"mot": "Aménagement du territoire", "definition": "Ensemble des actions menées par les pouvoirs publics et leurs partenaires pour organiser le territoire et réduire les inégalités entre les espaces."}, {"mot": "Inégalités territoriales", "definition": "Écarts de richesse, d'emplois, de services et d'équipements entre les différents espaces d'un territoire."}, {"mot": "Décentralisation", "definition": "Transfert de compétences de l'État vers les collectivités territoriales, engagé par les lois de 1982."}, {"mot": "Collectivité territoriale", "definition": "Structure administrative dirigée par des élus locaux : commune, département, région (et intercommunalités qui regroupent des communes)."}, {"mot": "Intercommunalité", "definition": "Regroupement de communes qui exercent ensemble certaines compétences (transports, déchets, développement économique...)."}, {"mot": "FEDER", "definition": "Fonds européen de développement régional : fonds de l'Union européenne qui cofinance des projets d'aménagement dans les régions."}, {"mot": "Désenclaver", "definition": "Relier un territoire isolé aux réseaux de transport et de communication pour le rendre plus accessible."}, {"mot": "Reconversion", "definition": "Transformation d'un territoire en difficulté qui développe de nouvelles activités (services, culture, tourisme) pour remplacer celles qui ont disparu."}, {"mot": "Friche industrielle", "definition": "Terrain ou bâtiment abandonné après la fermeture d'une usine ou d'une mine, parfois réaménagé pour de nouveaux usages."}, {"mot": "Développement durable", "definition": "Développement qui concilie efficacité économique, justice sociale et protection de l'environnement, pour répondre aux besoins présents sans compromettre ceux des générations futures."}], "notions_essentielles": ["La métropolisation creuse les inégalités : métropoles dynamiques d'un côté, villes moyennes, espaces ruraux et anciennes régions industrielles fragilisés de l'autre.", "L'aménagement du territoire vise à réduire ces inégalités et à favoriser un développement équilibré et durable.", "Les acteurs sont multiples : État (Action coeur de ville, France Services), collectivités territoriales (depuis la décentralisation de 1982), Union européenne (FEDER), acteurs privés et habitants.", "Le Louvre-Lens, ouvert en 2012 sur un ancien carreau de mine, est l'exemple type d'un aménagement culturel au service de la reconversion d'un territoire.", "L'aménagement doit être durable et concerté : limiter l'artificialisation des sols, développer les transports en commun et associer les habitants aux décisions."]}}, {"id": 5, "titre": "Les territoires ultramarins français : une problématique spécifique", "activite1_fiche": {"introduction": "La France ne se limite pas à l'Europe : elle est présente sur tous les océans grâce à ses territoires ultramarins, où vivent environ 2,8 millions de Français. Les cinq départements et régions d'outre-mer (DROM) sont la Guadeloupe, la Martinique, la Guyane, La Réunion et Mayotte ; s'y ajoutent des collectivités au statut particulier comme la Polynésie française ou la Nouvelle-Calédonie. Ces territoires, éloignés de la métropole de plusieurs milliers de kilomètres, cumulent des contraintes fortes mais offrent aussi des atouts considérables à la France. Problématique : quelles sont les spécificités des territoires ultramarins et comment sont-ils aménagés pour répondre à leurs difficultés ?", "partie1_titre": "I. Des territoires éloignés et soumis à de fortes contraintes", "partie1_contenu": "A. L'éloignement et la fragmentation. Les territoires ultramarins sont situés à des milliers de kilomètres de la métropole : environ 7 000 km pour les Antilles, plus de 9 000 km pour La Réunion, plus de 15 000 km pour la Nouvelle-Calédonie. La plupart sont des îles, parfois des archipels éclatés en de nombreuses îles comme la Polynésie française. Cet éloignement renchérit les transports et le coût de la vie : de nombreux produits importés y sont plus chers qu'en métropole (on parle de vie chère).\n\nB. Des contraintes naturelles et des risques majeurs. Ces territoires, souvent montagneux et volcaniques, sont exposés à des risques naturels importants : cyclones aux Antilles et dans l'océan Indien, séismes, éruptions volcaniques (la Soufrière en Guadeloupe, le piton de la Fournaise à La Réunion), fortes pluies et glissements de terrain. Le changement climatique aggrave certains de ces risques, notamment la montée du niveau de la mer.\n\nC. Des difficultés économiques et sociales marquées. Le chômage y est nettement plus élevé qu'en métropole, en particulier chez les jeunes, et le PIB par habitant plus faible. Les économies dépendent fortement des importations et des aides publiques. Une partie de la population vit dans des conditions précaires, notamment à Mayotte, département le plus pauvre de France, confronté de plus à une forte pression migratoire.", "partie2_titre": "II. Des atouts considérables pour la France", "partie2_contenu": "A. Une immense zone économique exclusive. Grâce à ses outre-mer, la France possède la deuxième zone économique exclusive (ZEE) du monde, plus de 10 millions de km² : elle dispose ainsi de ressources maritimes considérables (pêche, ressources minérales et énergétiques potentielles) et d'une présence stratégique sur tous les océans.\n\nB. Des atouts économiques et scientifiques. Les territoires ultramarins disposent d'atouts productifs : agriculture tropicale d'exportation (banane aux Antilles, canne à sucre et rhum à La Réunion et aux Antilles), tourisme attiré par les plages, les lagons et les volcans, et équipements d'exception comme le Centre spatial guyanais de Kourou, d'où décollent les fusées européennes Ariane. La biodiversité ultramarine est exceptionnelle : la forêt amazonienne de Guyane, les récifs coralliens et les lagons abritent une part majeure de la biodiversité française.\n\nC. Un rayonnement géopolitique et culturel. Les outre-mer donnent à la France une présence militaire et diplomatique sur tous les continents et océans. Leurs cultures (langues créoles, musiques, carnavals) enrichissent la culture française et contribuent à son rayonnement mondial.", "partie3_titre": "III. Aménager et développer les territoires ultramarins", "partie3_contenu": "A. Réduire la dépendance et les inégalités. L'État et l'Union européenne soutiennent massivement les outre-mer : les DROM bénéficient des fonds européens destinés aux régions ultrapériphériques. Les politiques publiques visent à développer les productions locales, à diversifier les économies et à lutter contre la vie chère et le chômage.\n\nB. Des aménagements pour désenclaver et équiper. De grands aménagements améliorent les liaisons et les équipements : ports et aéroports internationaux, routes comme la Nouvelle Route du Littoral à La Réunion, construite en mer pour sécuriser la liaison entre Saint-Denis et l'ouest de l'île, hôpitaux et universités. Le numérique (câbles sous-marins, fibre) réduit l'isolement.\n\nC. Un développement qui doit être durable. L'aménagement des outre-mer doit composer avec des milieux fragiles : protéger les récifs coralliens et les forêts, développer les énergies renouvelables (géothermie en Guadeloupe, solaire et photovoltaïque à La Réunion), gérer l'eau et les déchets, adapter les constructions aux cyclones et aux séismes. L'objectif est un développement qui réponde aux besoins des habitants sans détruire un patrimoine naturel exceptionnel.", "conclusion": "Les territoires ultramarins font de la France une puissance présente sur tous les océans, dotée de la deuxième ZEE mondiale, d'une biodiversité exceptionnelle et d'équipements stratégiques comme le Centre spatial guyanais. Mais ces territoires cumulent des contraintes spécifiques : éloignement, risques naturels, chômage et vie chère. Leur aménagement, soutenu par l'État et l'Union européenne, vise à réduire ces difficultés tout en préservant des milieux fragiles : c'est tout l'enjeu d'un développement durable adapté aux réalités ultramarines."}, "activite2_quiz": [{"question": "Combien de Français environ vivent dans les territoires ultramarins ?", "options": ["280 000", "Environ 2,8 millions", "28 millions", "67 millions"], "correcte": 1, "explication": "Environ 2,8 millions de Français vivent dans les outre-mer, soit environ 4 % de la population nationale, répartis sur tous les océans du globe."}, {"question": "Quels sont les cinq départements et régions d'outre-mer (DROM) ?", "options": ["Corse, Bretagne, Alsace, Savoie, Provence", "Guadeloupe, Martinique, Guyane, La Réunion, Mayotte", "Polynésie, Nouvelle-Calédonie, Wallis, Futuna, Saint-Martin", "Tahiti, Bora-Bora, Moorea, Raiatea, Huahine"], "correcte": 1, "explication": "Les cinq DROM sont la Guadeloupe et la Martinique (Antilles), la Guyane (Amérique du Sud), La Réunion et Mayotte (océan Indien). Mayotte est devenue le 101e département français en 2011."}, {"question": "À quelle distance environ de la métropole se trouve La Réunion ?", "options": ["500 km", "2 000 km", "Plus de 9 000 km", "50 000 km"], "correcte": 2, "explication": "La Réunion, dans l'océan Indien, se situe à plus de 9 000 km de la métropole : cet éloignement renchérit les transports et le coût de la vie."}, {"question": "Qu'appelle-t-on la vie chère dans les outre-mer ?", "options": ["Le luxe des hôtels", "Le niveau des prix plus élevé qu'en métropole, notamment pour les produits importés", "Le coût des billets d'avion uniquement", "Une fête traditionnelle"], "correcte": 1, "explication": "À cause de l'éloignement et de la dépendance aux importations, de nombreux produits coûtent nettement plus cher qu'en métropole : cette vie chère provoque régulièrement des mouvements sociaux."}, {"question": "Quels risques naturels menacent particulièrement les Antilles ?", "options": ["Les avalanches", "Les cyclones, les séismes et les éruptions volcaniques", "Les tempêtes de sable", "Le gel"], "correcte": 1, "explication": "Les Antilles sont exposées aux cyclones tropicaux, aux séismes et au risque volcanique (la Soufrière en Guadeloupe, la montagne Pelée en Martinique)."}, {"question": "Quel volcan actif se trouve à La Réunion ?", "options": ["Le Vésuve", "Le piton de la Fournaise", "L'Etna", "Le mont Fuji"], "correcte": 1, "explication": "Le piton de la Fournaise, à La Réunion, est l'un des volcans les plus actifs du monde. Ses éruptions régulières sont surveillées de près mais attirent aussi les touristes."}, {"question": "Quel est le département le plus pauvre de France ?", "options": ["La Lozère", "Mayotte", "La Creuse", "Le Cantal"], "correcte": 1, "explication": "Mayotte, devenue département en 2011, est le département le plus pauvre de France : une grande partie de la population vit sous le seuil de pauvreté et le territoire connaît une forte pression migratoire."}, {"question": "Que signifie ZEE ?", "options": ["Zone économique exclusive", "Zone européenne élargie", "Zone d'élevage extensif", "Zone écologique équatoriale"], "correcte": 0, "explication": "La zone économique exclusive est l'espace maritime (jusqu'à 370 km des côtes) où un État dispose de droits exclusifs d'exploitation des ressources (pêche, minerais, énergie)."}, {"question": "Quel rang mondial occupe la ZEE française ?", "options": ["Premier", "Deuxième, grâce aux outre-mer", "Dixième", "Centième"], "correcte": 1, "explication": "Grâce à ses territoires ultramarins dispersés sur tous les océans, la France possède la deuxième ZEE mondiale (plus de 10 millions de km²), derrière les États-Unis."}, {"question": "Quel équipement stratégique se trouve à Kourou, en Guyane ?", "options": ["Le Centre spatial guyanais, base de lancement des fusées Ariane", "Une centrale nucléaire", "Le plus grand port du monde", "Un circuit de Formule 1"], "correcte": 0, "explication": "Le Centre spatial guyanais, près de Kourou, est la base de lancement de l'Europe spatiale : sa position proche de l'équateur est idéale pour lancer les fusées Ariane."}, {"question": "Quelles cultures tropicales d'exportation trouve-t-on aux Antilles ?", "options": ["Le blé et le maïs", "La banane et la canne à sucre", "La vigne et l'olivier", "Le riz et le thé"], "correcte": 1, "explication": "La banane et la canne à sucre (transformée en sucre et en rhum) sont les grandes cultures d'exportation des Antilles, soutenues par des aides européennes."}, {"question": "Pourquoi la biodiversité ultramarine est-elle si précieuse ?", "options": ["Elle n'a aucune importance", "La forêt guyanaise, les récifs coralliens et les lagons abritent une part majeure de la biodiversité française", "Elle ne concerne que les animaux domestiques", "Elle se limite aux cocotiers"], "correcte": 1, "explication": "La forêt amazonienne de Guyane, les récifs coralliens et les lagons des outre-mer abritent l'essentiel de la biodiversité française : un patrimoine naturel exceptionnel mais fragile."}, {"question": "Quel grand aménagement routier a été construit en mer à La Réunion ?", "options": ["La Nouvelle Route du Littoral", "Le pont de Normandie", "Le viaduc de Millau", "Le tunnel du Mont-Blanc"], "correcte": 0, "explication": "La Nouvelle Route du Littoral, construite en partie sur la mer, sécurise la liaison entre Saint-Denis et l'ouest de l'île, auparavant menacée par les chutes de pierres de la falaise."}, {"question": "De quels fonds européens les DROM bénéficient-ils ?", "options": ["D'aucun fonds", "Des fonds destinés aux régions ultrapériphériques de l'Union européenne", "Du budget de la NASA", "Des fonds de l'ONU uniquement"], "correcte": 1, "explication": "Les DROM sont des régions ultrapériphériques de l'UE : ils reçoivent des fonds européens importants (FEDER notamment) pour financer infrastructures et développement."}, {"question": "Pourquoi le développement des outre-mer doit-il être durable ?", "options": ["Parce que leurs milieux naturels (récifs, forêts, lagons) sont exceptionnels mais fragiles", "Parce que le béton y est interdit", "Parce qu'il n'y a pas d'habitants", "Parce que le tourisme y est interdit"], "correcte": 0, "explication": "Les milieux ultramarins (récifs coralliens, forêts tropicales, lagons) sont d'une richesse exceptionnelle mais très fragiles : l'aménagement doit les protéger tout en répondant aux besoins des habitants."}], "activite3_etude": {"document_type": "texte", "document_titre": "La Réunion : développer une île aux mille contraintes", "document_texte": "« Sur cette île volcanique de l'océan Indien, à plus de 9 000 kilomètres de Paris, tout aménagement est un défi. Le relief, d'abord : les pentes du piton des Neiges et du piton de la Fournaise enserrent les hommes sur un étroit littoral, où se concentrent les 870 000 habitants, les routes et les activités. Les risques, ensuite : chaque été austral, l'île guette les cyclones ; les fortes pluies provoquent éboulements et coupures de routes. C'est pour sécuriser l'axe vital entre Saint-Denis et Le Port, régulièrement fermé par les chutes de pierres, que la Nouvelle Route du Littoral a été lancée, en partie construite sur la mer, l'un des chantiers les plus coûteux de France. L'économie, enfin : le chômage touche une part bien plus importante de la population active qu'en métropole, malgré le dynamisme du tourisme, de la canne à sucre et des énergies renouvelables, qui couvrent une part croissante des besoins en électricité de l'île. Les fonds européens et nationaux financent une large partie de ces aménagements. »", "document_source": "Texte adapté à des fins pédagogiques de dossiers documentaires et d'articles de presse consacrés à La Réunion (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, territoire concerné.", "Relevez trois contraintes naturelles qui pèsent sur l'aménagement de La Réunion.", "Pourquoi la Nouvelle Route du Littoral a-t-elle été construite ? Qu'est-ce qui en fait un chantier exceptionnel ?", "Quels atouts économiques de l'île le texte mentionne-t-il ? Qui finance les grands aménagements ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que l'aménagement des territoires ultramarins répond à des problématiques spécifiques."], "corrections": ["Ce document est un texte adapté de dossiers documentaires et d'articles de presse des années 2010-2020 consacré à La Réunion, département et région d'outre-mer de l'océan Indien. Il présente les contraintes qui pèsent sur l'aménagement de l'île et les réponses qui y sont apportées.", "Le texte mentionne plusieurs contraintes naturelles : le relief volcanique très accidenté (pitons des Neiges et de la Fournaise) qui concentre habitants et activités sur un étroit littoral ; les cyclones qui menacent l'île chaque été austral ; et les fortes pluies qui provoquent éboulements et coupures de routes. S'y ajoute l'éloignement : plus de 9 000 km séparent l'île de Paris.", "La Nouvelle Route du Littoral a été construite pour sécuriser l'axe vital entre Saint-Denis, le chef-lieu, et Le Port : l'ancienne route, longeant la falaise, était régulièrement fermée à cause des chutes de pierres. Ce chantier est exceptionnel car la route est en partie construite sur la mer, ce qui en fait l'un des chantiers les plus coûteux de France.", "Le texte cite trois atouts économiques : le tourisme, attiré par les paysages volcaniques de l'île ; la canne à sucre, culture d'exportation traditionnelle ; et les énergies renouvelables, qui couvrent une part croissante des besoins en électricité. Les grands aménagements sont financés en grande partie par les fonds européens et nationaux, ce qui illustre la solidarité dont bénéficient les régions ultrapériphériques.", "Exemple de rédaction : L'aménagement des territoires ultramarins répond à des problématiques que la métropole ne connaît pas avec la même intensité. À La Réunion, l'éloignement (plus de 9 000 km de Paris), le relief volcanique et les risques cycloniques contraignent fortement les choix : les 870 000 habitants se concentrent sur le littoral, et il a fallu construire en mer la Nouvelle Route du Littoral, chantier parmi les plus coûteux de France, pour sécuriser un axe vital. Les difficultés sociales sont également plus marquées, avec un chômage bien supérieur à celui de la métropole. Pour y répondre, l'État et l'Union européenne financent massivement infrastructures et développement, tandis que l'île valorise ses atouts : tourisme, canne à sucre, énergies renouvelables. L'enjeu est de développer ces territoires sans dégrader des milieux naturels exceptionnels : c'est la définition même d'un aménagement durable adapté à l'outre-mer."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que les territoires ultramarins français cumulent des contraintes spécifiques mais constituent des atouts majeurs pour la France.", "plan": {"introduction": "Contexte : environ 2,8 millions de Français vivent dans les outre-mer, présents sur tous les océans. Définition : les territoires ultramarins regroupent les cinq DROM (Guadeloupe, Martinique, Guyane, La Réunion, Mayotte) et des collectivités au statut particulier. Problématique : ces territoires sont-ils des espaces en difficulté ou des atouts pour la France ? Annonce du plan : d'abord leurs contraintes spécifiques, puis les atouts qu'ils offrent à la France.", "partie1": "I. Des territoires soumis à des contraintes spécifiques. Argument 1 : l'éloignement (7 000 km pour les Antilles, plus de 9 000 km pour La Réunion) et l'insularité renchérissent les transports et provoquent la vie chère. Argument 2 : des risques naturels majeurs : cyclones, séismes, volcans actifs (piton de la Fournaise, Soufrière), aggravés par le changement climatique. Argument 3 : des difficultés sociales marquées : chômage élevé, surtout chez les jeunes, dépendance aux importations et aux aides ; Mayotte est le département le plus pauvre de France.", "partie2": "II. Des atouts majeurs pour la France. Argument 1 : la deuxième ZEE mondiale (plus de 10 millions de km²) : ressources maritimes et présence stratégique sur tous les océans. Argument 2 : des atouts économiques et scientifiques : agriculture tropicale (banane, canne à sucre, rhum), tourisme, Centre spatial guyanais de Kourou d'où décollent les fusées Ariane, biodiversité exceptionnelle (forêt guyanaise, récifs coralliens). Argument 3 : des aménagements soutenus par l'État et l'UE pour développer durablement ces territoires : Nouvelle Route du Littoral à La Réunion, énergies renouvelables, fonds européens pour les régions ultrapériphériques.", "conclusion": "Bilan : les outre-mer cumulent éloignement, risques naturels et difficultés sociales, mais ils font de la France une puissance maritime, spatiale et écologique mondiale. Ouverture : leur développement durable, respectueux de milieux fragiles, est l'un des grands défis de l'aménagement du territoire français."}, "correction_complete": "Environ 2,8 millions de Français vivent dans les territoires ultramarins, qui assurent à la France une présence sur tous les océans : les cinq départements et régions d'outre-mer (Guadeloupe, Martinique, Guyane, La Réunion, Mayotte) et des collectivités au statut particulier comme la Polynésie française ou la Nouvelle-Calédonie. Ces territoires sont-ils avant tout des espaces en difficulté, ou des atouts pour la France ? Nous montrerons d'abord les contraintes spécifiques qu'ils cumulent, avant de présenter les atouts considérables qu'ils offrent au pays.\n\nLes territoires ultramarins sont d'abord soumis à des contraintes que la métropole ne connaît pas avec la même intensité. L'éloignement est considérable : environ 7 000 kilomètres séparent les Antilles de la métropole, plus de 9 000 pour La Réunion. Cette distance, combinée à l'insularité, renchérit les transports et provoque la vie chère, source régulière de mouvements sociaux. Ces territoires sont aussi exposés à des risques naturels majeurs : cyclones aux Antilles et dans l'océan Indien, séismes, volcans actifs comme le piton de la Fournaise à La Réunion ou la Soufrière en Guadeloupe, auxquels s'ajoute la montée du niveau de la mer liée au changement climatique. Enfin, les difficultés sociales y sont marquées : le chômage, surtout chez les jeunes, dépasse largement celui de la métropole, les économies dépendent des importations et des aides publiques, et Mayotte, devenue département en 2011, est le plus pauvre de France.\n\nPourtant, les outre-mer constituent des atouts majeurs pour la France. Grâce à eux, le pays possède la deuxième zone économique exclusive du monde, plus de 10 millions de kilomètres carrés, qui lui assure des ressources maritimes considérables et une présence stratégique sur tous les océans. Les atouts économiques et scientifiques sont réels : agriculture tropicale d'exportation (banane, canne à sucre, rhum), tourisme attiré par les lagons et les volcans, et surtout le Centre spatial guyanais de Kourou, d'où décollent les fusées européennes Ariane. La biodiversité ultramarine, de la forêt amazonienne de Guyane aux récifs coralliens, représente l'essentiel du patrimoine naturel français. Pour valoriser ces atouts et réduire les difficultés, l'État et l'Union européenne financent de grands aménagements, comme la Nouvelle Route du Littoral à La Réunion, et soutiennent le développement des énergies renouvelables.\n\nAinsi, les territoires ultramarins cumulent des contraintes spécifiques, éloignement, risques naturels et fragilités sociales, mais ils font de la France une puissance maritime, spatiale et écologique de premier plan. Leur développement durable, qui doit répondre aux besoins des habitants sans détruire des milieux exceptionnels, constitue l'un des grands défis de l'aménagement du territoire français."}, "activite5_vocabulaire": {"termes": [{"mot": "Territoire ultramarin", "definition": "Territoire français situé hors d'Europe, sur les autres continents et océans (outre-mer)."}, {"mot": "DROM", "definition": "Département et région d'outre-mer : Guadeloupe, Martinique, Guyane, La Réunion et Mayotte. Les lois françaises et européennes s'y appliquent."}, {"mot": "Insularité", "definition": "Caractère d'un territoire qui est une île, ce qui entraîne isolement et dépendance aux liaisons maritimes et aériennes."}, {"mot": "Vie chère", "definition": "Niveau des prix plus élevé qu'en métropole dans les outre-mer, lié à l'éloignement et à la dépendance aux importations."}, {"mot": "Risque naturel", "definition": "Menace qu'un phénomène naturel (cyclone, séisme, éruption) fait peser sur des populations et des aménagements."}, {"mot": "ZEE (zone économique exclusive)", "definition": "Espace maritime s'étendant jusqu'à 370 km des côtes, où un État a des droits exclusifs d'exploitation des ressources. La France possède la 2e ZEE mondiale."}, {"mot": "Région ultrapériphérique", "definition": "Statut européen des DROM qui leur permet de recevoir des fonds européens spécifiques malgré leur éloignement."}, {"mot": "Centre spatial guyanais", "definition": "Base de lancement des fusées européennes Ariane, située près de Kourou en Guyane, proche de l'équateur."}, {"mot": "Biodiversité", "definition": "Diversité des espèces vivantes et des milieux naturels. Les outre-mer abritent l'essentiel de la biodiversité française."}, {"mot": "Désenclavement", "definition": "Action de relier un territoire isolé aux réseaux de transport et de communication (routes, ports, aéroports, câbles numériques)."}], "notions_essentielles": ["Environ 2,8 millions de Français vivent dans les outre-mer : cinq DROM (Guadeloupe, Martinique, Guyane, La Réunion, Mayotte) et des collectivités au statut particulier.", "Ces territoires cumulent des contraintes : éloignement (7 000 à 15 000 km), insularité, vie chère, risques naturels (cyclones, volcans, séismes) et chômage élevé.", "Grâce aux outre-mer, la France possède la deuxième ZEE mondiale (plus de 10 millions de km²) et une présence sur tous les océans.", "Les atouts sont considérables : agriculture tropicale, tourisme, Centre spatial guyanais de Kourou, biodiversité exceptionnelle.", "L'État et l'Union européenne financent de grands aménagements (Nouvelle Route du Littoral à La Réunion) pour un développement qui doit rester durable."]}}, {"id": 6, "titre": "L'Union européenne, un nouveau territoire de référence et d'appartenance", "activite1_fiche": {"introduction": "La France appartient à l'Union européenne, un ensemble de 27 États qui ont choisi de s'associer pour construire un espace de paix, de prospérité et de libre circulation. Avec environ 450 millions d'habitants, l'UE est l'un des principaux pôles économiques du monde. Pour les Français, l'Union est devenue un territoire du quotidien : on y circule sans contrôle aux frontières, on y paie souvent en euros, on y étudie avec Erasmus. Mais ce territoire reste marqué par des contrastes importants entre régions riches et régions en retard de développement. Problématique : en quoi l'Union européenne constitue-t-elle un nouveau territoire de référence et d'appartenance pour ses habitants ?", "partie1_titre": "I. Un territoire ouvert où l'on circule librement", "partie1_contenu": "A. Une construction par élargissements successifs. Née avec six pays fondateurs (traité de Rome, 1957), la construction européenne s'est élargie par étapes pour atteindre 28 États membres, puis 27 après le départ du Royaume-Uni (Brexit, effectif en 2020). Les derniers grands élargissements, en 2004 et 2007, ont intégré les pays d'Europe centrale et orientale issus de l'ancien bloc communiste.\n\nB. L'espace Schengen : des frontières intérieures ouvertes. La plupart des pays de l'UE (et quelques voisins comme la Suisse ou la Norvège) appartiennent à l'espace Schengen : les contrôles aux frontières intérieures y sont supprimés. On peut traverser l'Europe sans montrer son passeport, ce qui facilite le tourisme, le travail et les échanges. En contrepartie, les contrôles sont renforcés aux frontières extérieures de l'espace.\n\nC. Une monnaie commune : l'euro. Depuis 2002, l'euro circule sous forme de pièces et de billets : c'est aujourd'hui la monnaie d'une vingtaine de pays formant la zone euro. La monnaie unique facilite les voyages, les comparaisons de prix et le commerce entre pays membres. C'est aussi un symbole d'appartenance commune et la deuxième monnaie la plus utilisée au monde.", "partie2_titre": "II. Un territoire de plus en plus intégré et vécu au quotidien", "partie2_contenu": "A. Des mobilités européennes croissantes. Les Européens circulent de plus en plus dans l'UE : touristes, travailleurs frontaliers, étudiants. Le programme Erasmus, créé en 1987, a permis à des millions de jeunes d'étudier ou de se former dans un autre pays européen. Des centaines de milliers de travailleurs frontaliers franchissent chaque jour une frontière, par exemple entre la France et le Luxembourg, la Suisse ou l'Allemagne.\n\nB. Des régions transfrontalières dynamiques. Aux frontières, des territoires coopèrent étroitement : agglomérations transfrontalières comme Lille-Courtrai-Tournai ou le bassin de vie franco-genevois, tramways qui franchissent la frontière entre Strasbourg et Kehl en Allemagne, hôpitaux et lycées partagés. Ces régions transfrontalières montrent que les frontières deviennent des coutures plutôt que des barrières.\n\nC. Des réseaux qui unifient le territoire. L'UE soutient de grands réseaux de transport transeuropéens : lignes à grande vitesse (Paris-Bruxelles-Amsterdam-Cologne avec Thalys puis Eurostar, Paris-Londres par le tunnel sous la Manche ouvert en 1994), corridors de fret, liaisons aériennes à bas coût. Ces réseaux rapprochent les métropoles européennes et structurent la mégalopole européenne, axe densément peuplé qui s'étend de Londres à Milan.", "partie3_titre": "III. Un territoire marqué par des contrastes que l'UE tente de réduire", "partie3_contenu": "A. De fortes inégalités territoriales. Le territoire européen est contrasté : les régions les plus riches se concentrent dans la mégalopole européenne et autour des grandes capitales (Île-de-France, Luxembourg, sud de l'Allemagne), tandis que les régions d'Europe centrale, orientale et méditerranéenne, ainsi que les régions ultrapériphériques, affichent un PIB par habitant nettement inférieur à la moyenne.\n\nB. La politique de cohésion : réduire les écarts. Pour réduire ces inégalités, l'UE consacre une part importante de son budget à la politique régionale (ou politique de cohésion) : le FEDER finance infrastructures, innovation et rénovation urbaine, le FSE soutient l'emploi et la formation. Routes au Portugal, métros en Pologne, fibre optique dans les campagnes françaises : les fonds européens sont visibles partout sur le territoire.\n\nC. Un sentiment d'appartenance encore débattu. L'appartenance européenne progresse : symboles communs (drapeau aux douze étoiles, hymne, journée de l'Europe le 9 mai), citoyenneté européenne qui permet de voter aux élections municipales et européennes dans son pays de résidence. Mais l'euroscepticisme existe : une partie des citoyens critique l'éloignement des institutions, et le Brexit a montré qu'un pays pouvait quitter l'Union. L'UE reste un projet en construction, débattu démocratiquement.", "conclusion": "L'Union européenne est devenue pour ses habitants un véritable territoire de référence : on y circule librement grâce à Schengen, on y paie en euros, on y étudie avec Erasmus, et les régions transfrontalières effacent peu à peu les frontières. Ce territoire reste cependant marqué par de fortes inégalités, que la politique de cohésion et ses fonds (FEDER, FSE) s'efforcent de réduire. Territoire vécu au quotidien mais projet encore débattu, comme l'a montré le Brexit, l'UE constitue pour la France et les Français un horizon d'appartenance qui complète, sans le remplacer, le cadre national."}, "activite2_quiz": [{"question": "Combien d'États membres compte l'Union européenne depuis le Brexit ?", "options": ["15", "27", "30", "44"], "correcte": 1, "explication": "Depuis le départ du Royaume-Uni (Brexit, effectif en 2020), l'Union européenne compte 27 États membres."}, {"question": "Combien d'habitants compte environ l'Union européenne ?", "options": ["67 millions", "150 millions", "Environ 450 millions", "1,4 milliard"], "correcte": 2, "explication": "Avec environ 450 millions d'habitants, l'UE est le troisième ensemble de population au monde derrière l'Inde et la Chine, et l'un des principaux pôles économiques de la planète."}, {"question": "Qu'est-ce que l'espace Schengen ?", "options": ["Une zone militaire", "Un espace où les contrôles aux frontières intérieures sont supprimés", "Un parc naturel européen", "Le quartier des institutions à Bruxelles"], "correcte": 1, "explication": "Dans l'espace Schengen, les contrôles aux frontières intérieures sont supprimés : on circule librement d'un pays à l'autre. Les contrôles sont en revanche renforcés aux frontières extérieures."}, {"question": "Depuis quand les pièces et billets en euros circulent-ils ?", "options": ["1957", "1987", "2002", "2015"], "correcte": 2, "explication": "L'euro est devenu la monnaie concrète des Européens en 2002, avec la mise en circulation des pièces et des billets. Une vingtaine de pays forment aujourd'hui la zone euro."}, {"question": "Qu'est-ce que le programme Erasmus ?", "options": ["Un programme militaire", "Un programme d'échange permettant d'étudier ou de se former dans un autre pays européen", "Une chaîne de télévision", "Un traité de commerce"], "correcte": 1, "explication": "Créé en 1987, Erasmus a permis à des millions de jeunes Européens d'étudier ou de se former dans un autre pays de l'UE : c'est l'un des symboles les plus populaires de la construction européenne."}, {"question": "Qu'est-ce qu'un travailleur frontalier ?", "options": ["Un douanier", "Une personne qui habite dans un pays et travaille chaque jour dans un pays voisin", "Un travailleur saisonnier agricole", "Un diplomate"], "correcte": 1, "explication": "Un travailleur frontalier habite d'un côté de la frontière et travaille de l'autre : des centaines de milliers de Français travaillent ainsi au Luxembourg, en Suisse ou en Allemagne."}, {"question": "Quel tramway symbolise la coopération transfrontalière franco-allemande ?", "options": ["Le tramway entre Strasbourg et Kehl", "Le tramway de Bordeaux", "Le métro de Lille", "Le funiculaire de Montmartre"], "correcte": 0, "explication": "Depuis 2017, le tramway de Strasbourg franchit le Rhin jusqu'à Kehl, en Allemagne : il symbolise les régions transfrontalières où la frontière devient une couture plutôt qu'une barrière."}, {"question": "Quel tunnel relie la France au Royaume-Uni depuis 1994 ?", "options": ["Le tunnel du Mont-Blanc", "Le tunnel sous la Manche", "Le tunnel de Fréjus", "Le tunnel du Saint-Gothard"], "correcte": 1, "explication": "Le tunnel sous la Manche, ouvert en 1994, permet aux trains Eurostar de relier Paris à Londres en un peu plus de deux heures : un exemple de grand réseau de transport européen."}, {"question": "Qu'est-ce que la mégalopole européenne ?", "options": ["La plus grande ville d'Europe", "Un axe densément peuplé et urbanisé qui s'étend de Londres à Milan", "Le nom du Parlement européen", "Une autoroute"], "correcte": 1, "explication": "La mégalopole européenne (ou dorsale) est un axe presque continu de villes et de régions densément peuplées et riches, qui s'étend de Londres à Milan en passant par le Benelux, la vallée du Rhin et la Suisse."}, {"question": "Où se situent les régions les plus riches de l'UE ?", "options": ["Uniquement en bord de mer", "Dans la mégalopole européenne et autour des grandes capitales", "Aux frontières extérieures", "Dans les montagnes"], "correcte": 1, "explication": "Les régions les plus riches se concentrent dans la mégalopole européenne et autour des capitales (Île-de-France, Luxembourg, sud de l'Allemagne), tandis que l'Europe centrale, orientale et méditerranéenne reste en retrait."}, {"question": "Quel est l'objectif de la politique de cohésion de l'UE ?", "options": ["Renforcer les armées", "Réduire les inégalités de développement entre les régions européennes", "Organiser les Jeux olympiques", "Supprimer les langues nationales"], "correcte": 1, "explication": "La politique de cohésion (ou politique régionale) consacre une part importante du budget européen à réduire les écarts entre régions riches et régions en retard de développement."}, {"question": "Que finance le FEDER ?", "options": ["Les clubs de football", "Des infrastructures, l'innovation et la rénovation urbaine dans les régions", "Les ambassades", "Les armées nationales"], "correcte": 1, "explication": "Le Fonds européen de développement régional finance routes, métros, fibre optique, innovation et rénovation urbaine : ses panneaux bleus étoilés sont visibles sur les chantiers partout en Europe."}, {"question": "Quels sont les symboles de l'Union européenne ?", "options": ["Un aigle et une devise latine", "Le drapeau aux douze étoiles, l'hymne (l'Ode à la joie) et la journée de l'Europe le 9 mai", "Une tour Eiffel dorée", "Un lion ailé"], "correcte": 1, "explication": "Le drapeau bleu aux douze étoiles, l'hymne tiré de l'Ode à la joie de Beethoven et la journée de l'Europe du 9 mai (date de la déclaration Schuman de 1950) symbolisent l'appartenance européenne."}, {"question": "Que permet la citoyenneté européenne ?", "options": ["De ne plus payer d'impôts", "De circuler, séjourner, étudier et voter aux élections municipales et européennes dans son pays de résidence", "De devenir président de la Commission", "D'avoir deux passeports"], "correcte": 1, "explication": "Tout citoyen d'un État membre est aussi citoyen européen : il peut circuler et s'installer librement dans l'UE et voter aux élections municipales et européennes là où il réside."}, {"question": "Quel événement a montré qu'un pays pouvait quitter l'Union européenne ?", "options": ["Le traité de Rome", "Le Brexit (départ du Royaume-Uni, effectif en 2020)", "La chute du mur de Berlin", "La création de l'euro"], "correcte": 1, "explication": "À la suite du référendum de 2016, le Royaume-Uni a quitté l'UE en 2020 : le Brexit a montré que l'appartenance européenne reste un choix débattu démocratiquement."}], "activite3_etude": {"document_type": "texte", "document_titre": "Vivre l'Europe au quotidien dans une région transfrontalière", "document_texte": "« Chaque matin, bien avant le lever du jour, des dizaines de milliers de voitures et de trains régionaux convergent de Lorraine vers le Luxembourg. Plus de 120 000 habitants de la région franchissent ainsi quotidiennement la frontière pour aller travailler dans les banques, les commerces et les institutions du Grand-Duché, où les salaires sont nettement plus élevés. À la gare de Thionville, les annonces se font pour Luxembourg-ville comme pour Metz. Personne ne montre de passeport : depuis les accords de Schengen, la frontière n'est plus qu'une ligne sur la carte. Les communes françaises et luxembourgeoises coopèrent pour développer les parkings-relais, cadencer les trains et construire des logements. Beaucoup de familles vivent à cheval sur les deux pays : on habite en France, on travaille au Luxembourg, on paie en euros des deux côtés, et les enfants partent parfois étudier à Bruxelles ou à Berlin avec Erasmus. Ici, l'Europe n'est pas une idée abstraite : c'est le quotidien. »", "document_source": "Texte adapté à des fins pédagogiques de reportages de presse sur les travailleurs frontaliers franco-luxembourgeois (années 2010-2020).", "questions": ["Présentez le document : nature, sujet, espace concerné.", "Combien d'habitants de la région franchissent chaque jour la frontière, et pourquoi ?", "Quels éléments du texte montrent que la frontière franco-luxembourgeoise s'est effacée dans la vie quotidienne ?", "Comment les acteurs publics des deux pays coopèrent-ils ?", "Rédaction (6 à 8 lignes) : à l'aide du document et de vos connaissances, montrez que l'Union européenne est devenue un territoire du quotidien pour ses habitants."], "corrections": ["Ce document est un texte adapté de reportages de presse des années 2010-2020 consacré aux travailleurs frontaliers entre la Lorraine (France) et le Luxembourg. Il décrit la vie quotidienne dans cette région transfrontalière et illustre concrètement l'intégration européenne.", "Plus de 120 000 habitants de la région franchissent chaque jour la frontière pour aller travailler au Luxembourg, dans les banques, les commerces et les institutions du Grand-Duché. La principale motivation est économique : les salaires y sont nettement plus élevés qu'en France.", "Plusieurs éléments montrent l'effacement de la frontière : personne ne montre de passeport grâce aux accords de Schengen ; la frontière n'est plus qu'une ligne sur la carte ; les annonces en gare de Thionville desservent indifféremment Luxembourg-ville et Metz ; on paie en euros des deux côtés ; et des familles vivent à cheval sur les deux pays, habitant en France et travaillant au Luxembourg.", "Les communes françaises et luxembourgeoises coopèrent concrètement : elles développent ensemble des parkings-relais pour les frontaliers, cadencent les trains régionaux pour absorber les flux quotidiens et construisent des logements. Cette coopération transfrontalière transforme la frontière en couture entre les deux territoires plutôt qu'en barrière.", "Exemple de rédaction : L'Union européenne n'est plus seulement un projet politique : elle est devenue un territoire vécu au quotidien. Le document le montre à l'échelle franco-luxembourgeoise : grâce à l'espace Schengen, plus de 120 000 frontaliers traversent chaque jour la frontière sans aucun contrôle pour aller travailler, et l'euro permet de payer des deux côtés sans changer de monnaie. Les communes des deux pays coopèrent pour organiser transports et logements, formant un véritable bassin de vie transfrontalier. À une autre échelle, le programme Erasmus envoie les jeunes étudier à Bruxelles ou à Berlin, et les réseaux de transport européens, comme l'Eurostar par le tunnel sous la Manche, rapprochent les métropoles. Circuler, travailler, étudier, consommer : pour des millions d'Européens, l'UE constitue désormais un territoire de référence et d'appartenance qui complète le cadre national."]}, "activite4_developpement": {"sujet": "Sous la forme d'un développement construit d'une vingtaine de lignes, montrez que l'Union européenne constitue un nouveau territoire de référence et d'appartenance pour ses habitants, malgré des contrastes persistants.", "plan": {"introduction": "Contexte : la France appartient à l'UE, ensemble de 27 États et environ 450 millions d'habitants. Définition : un territoire de référence est un espace que les habitants pratiquent au quotidien et auquel ils s'identifient. Problématique : en quoi l'UE est-elle devenue un tel territoire, et quelles limites subsistent ? Annonce du plan : d'abord un territoire intégré et vécu au quotidien, puis un territoire contrasté que l'UE cherche à rééquilibrer.", "partie1": "I. Un territoire intégré, vécu au quotidien par ses habitants. Argument 1 : la libre circulation grâce à l'espace Schengen : plus de contrôles aux frontières intérieures ; exemple : plus de 120 000 frontaliers lorrains travaillent chaque jour au Luxembourg. Argument 2 : des outils communs : l'euro (pièces et billets depuis 2002), monnaie d'une vingtaine de pays, et le programme Erasmus (créé en 1987) qui a fait étudier des millions de jeunes à l'étranger. Argument 3 : des réseaux et des régions qui unissent : tunnel sous la Manche (1994), LGV européennes, tramway Strasbourg-Kehl, agglomérations transfrontalières où la frontière devient une couture.", "partie2": "II. Un territoire contrasté que l'Union cherche à rééquilibrer. Argument 1 : de fortes inégalités : régions riches de la mégalopole européenne (de Londres à Milan) et des capitales, contre régions d'Europe centrale, orientale, méditerranéenne et ultrapériphériques en retard de développement. Argument 2 : la politique de cohésion réduit ces écarts : le FEDER et le FSE financent infrastructures, innovation, emploi et formation dans les régions moins développées. Argument 3 : l'appartenance reste débattue : symboles communs (drapeau, hymne, 9 mai) et citoyenneté européenne d'un côté, euroscepticisme et Brexit (2020) de l'autre.", "conclusion": "Bilan : grâce à Schengen, à l'euro, à Erasmus et aux coopérations transfrontalières, l'UE est devenue un territoire du quotidien, même si les inégalités régionales et les débats sur l'appartenance persistent. Ouverture : ce territoire européen renforce la place de la France et de l'Europe dans le monde, objet du dernier chapitre de géographie."}, "correction_complete": "La France appartient à l'Union européenne, ensemble de 27 États qui regroupe environ 450 millions d'habitants. Au-delà des institutions, l'UE est devenue pour beaucoup d'Européens un espace pratiqué au quotidien. En quoi constitue-t-elle un nouveau territoire de référence et d'appartenance, et quelles limites subsistent ? Nous montrerons d'abord qu'il s'agit d'un territoire intégré et vécu, avant d'étudier les contrastes que l'Union cherche à réduire.\n\nL'Union européenne est d'abord un territoire intégré que ses habitants pratiquent chaque jour. La libre circulation en est le socle : dans l'espace Schengen, les contrôles aux frontières intérieures ont disparu, si bien que plus de 120 000 habitants de Lorraine franchissent quotidiennement la frontière pour travailler au Luxembourg sans jamais montrer leur passeport. Des outils communs renforcent cette intégration : l'euro, dont les pièces et billets circulent depuis 2002 dans une vingtaine de pays, facilite voyages et échanges, tandis que le programme Erasmus, créé en 1987, a permis à des millions de jeunes d'étudier dans un autre pays européen. Enfin, des réseaux et des territoires unissent concrètement l'espace européen : le tunnel sous la Manche, ouvert en 1994, met Londres à un peu plus de deux heures de Paris, le tramway de Strasbourg franchit le Rhin jusqu'à Kehl, et des agglomérations transfrontalières comme Lille-Courtrai-Tournai transforment les frontières en coutures plutôt qu'en barrières.\n\nCe territoire reste pourtant profondément contrasté. Les régions les plus riches se concentrent dans la mégalopole européenne, cet axe densément peuplé qui s'étend de Londres à Milan, et autour des grandes capitales comme l'Île-de-France ou le Luxembourg ; à l'inverse, de nombreuses régions d'Europe centrale, orientale et méditerranéenne, ainsi que les régions ultrapériphériques comme les outre-mer français, affichent un PIB par habitant nettement inférieur à la moyenne. Pour réduire ces écarts, l'Union consacre une part importante de son budget à la politique de cohésion : le FEDER finance routes, métros, fibre optique et innovation, le FSE soutient l'emploi et la formation. L'appartenance européenne, enfin, reste débattue : si le drapeau aux douze étoiles, l'hymne et la citoyenneté européenne nourrissent un sentiment commun, l'euroscepticisme demeure, et le Brexit, effectif en 2020, a montré qu'un État pouvait choisir de quitter l'Union.\n\nAinsi, par la libre circulation, la monnaie unique, Erasmus et les coopérations transfrontalières, l'Union européenne est devenue un véritable territoire de référence et d'appartenance, même si les inégalités régionales et les débats démocratiques rappellent qu'elle reste un projet en construction. Ce territoire européen constitue aussi un atout majeur pour l'influence de la France et de l'Europe dans le monde."}, "activite5_vocabulaire": {"termes": [{"mot": "Union européenne", "definition": "Association de 27 États européens qui coopèrent dans les domaines économique, politique et social. Environ 450 millions d'habitants."}, {"mot": "Espace Schengen", "definition": "Espace regroupant la plupart des pays de l'UE et quelques voisins, où les contrôles aux frontières intérieures sont supprimés."}, {"mot": "Zone euro", "definition": "Ensemble des pays de l'UE (une vingtaine) qui ont adopté l'euro comme monnaie. Pièces et billets circulent depuis 2002."}, {"mot": "Erasmus", "definition": "Programme européen créé en 1987 permettant aux jeunes d'étudier ou de se former dans un autre pays européen."}, {"mot": "Travailleur frontalier", "definition": "Personne qui réside dans un pays et traverse chaque jour la frontière pour travailler dans un pays voisin."}, {"mot": "Région transfrontalière", "definition": "Territoire situé de part et d'autre d'une frontière, dont les habitants et les collectivités coopèrent étroitement."}, {"mot": "Mégalopole européenne", "definition": "Axe densément peuplé, urbanisé et riche qui s'étend de Londres à Milan : c'est le coeur économique de l'Europe."}, {"mot": "Politique de cohésion", "definition": "Politique régionale de l'UE qui vise à réduire les inégalités de développement entre les régions européennes."}, {"mot": "FEDER", "definition": "Fonds européen de développement régional, qui finance infrastructures, innovation et rénovation dans les régions de l'UE."}, {"mot": "Citoyenneté européenne", "definition": "Statut de tout citoyen d'un État membre : droit de circuler, de séjourner et de voter aux élections municipales et européennes dans son pays de résidence."}], "notions_essentielles": ["L'UE compte 27 États (depuis le Brexit, effectif en 2020) et environ 450 millions d'habitants : c'est l'un des principaux pôles économiques mondiaux.", "L'espace Schengen supprime les contrôles aux frontières intérieures ; l'euro (2002) est la monnaie d'une vingtaine de pays ; Erasmus (1987) fait étudier les jeunes à l'étranger.", "Les régions transfrontalières (Lorraine-Luxembourg, Strasbourg-Kehl) et les grands réseaux (tunnel sous la Manche, 1994) font de l'UE un territoire du quotidien.", "Le territoire européen est contrasté : la mégalopole européenne (de Londres à Milan) concentre les richesses, l'Europe centrale, orientale et méditerranéenne est en retrait.", "La politique de cohésion (FEDER, FSE) réduit les inégalités régionales ; l'appartenance européenne reste débattue (symboles communs mais euroscepticisme et Brexit)."]}}, {"id": 7, "titre": "La France et l'Europe dans le monde", "activite1_fiche": {"introduction": "L'Union européenne est l'un des principaux pôles de puissance du monde, et la France, qui en est l'un des piliers, dispose elle-même d'une influence qui dépasse largement sa taille. Présente sur tous les océans grâce à ses outre-mer, membre permanent du Conseil de sécurité de l'ONU, première destination touristique mondiale, la France exerce une influence à la fois politique, économique, militaire et culturelle. Mais cette puissance connaît aussi des limites face aux géants américain et chinois. Problématique : quelle est la place de la France et de l'Union européenne dans le monde ?", "partie1_titre": "I. L'Union européenne, un pôle majeur de l'économie mondiale", "partie1_contenu": "A. Une puissance commerciale de premier rang. L'Union européenne est l'un des trois grands pôles de l'économie mondiale, avec l'Amérique du Nord et l'Asie orientale. Elle réalise une part majeure du commerce mondial de marchandises et de services : c'est la première puissance commerciale de la planète. Ses grands ports, comme Rotterdam aux Pays-Bas ou Anvers en Belgique, et ses aéroports comptent parmi les plus actifs du monde.\n\nB. L'euro, une monnaie mondiale. L'euro est la deuxième monnaie la plus utilisée au monde pour les échanges et les réserves, derrière le dollar américain. Il donne à la zone euro un poids financier considérable et symbolise la puissance économique européenne.\n\nC. Une influence normative et une attractivité fortes. L'UE attire des investissements, des étudiants et des migrants du monde entier. Elle exerce aussi une influence par ses normes : ses règles sur l'environnement, la protection des données personnelles ou la sécurité alimentaire s'imposent souvent aux entreprises du monde entier qui veulent accéder à son marché de 450 millions de consommateurs. L'UE est enfin le premier donneur d'aide au développement de la planète.", "partie2_titre": "II. La France, une puissance mondiale aux multiples atouts", "partie2_contenu": "A. Une puissance politique et militaire. La France est l'un des cinq membres permanents du Conseil de sécurité de l'ONU, avec un droit de veto. Elle dispose de l'arme nucléaire et d'une armée capable d'intervenir loin de ses frontières. Son réseau diplomatique (ambassades et consulats) est l'un des plus étendus du monde. Grâce à ses territoires ultramarins, elle possède la deuxième zone économique exclusive mondiale, plus de 10 millions de km², et des bases militaires sur tous les océans.\n\nB. Une puissance économique. La France figure parmi les dix premières économies mondiales. Ses firmes transnationales sont présentes sur tous les continents : aéronautique (Airbus), luxe (LVMH, L'Oréal), énergie (TotalEnergies, EDF), agroalimentaire (Danone), assurance et banque (AXA, BNP Paribas). Elle exporte des produits de haute technologie, des produits agricoles et des services.\n\nC. Le rayonnement culturel : le soft power français. L'influence française passe aussi par la culture : la langue française est parlée par environ 300 millions de personnes dans le monde, réunies au sein de la francophonie et de son organisation, l'OIF. Le réseau des lycées français à l'étranger, les Alliances françaises, les médias internationaux (TV5 Monde, France 24, RFI), la gastronomie, la mode et le cinéma diffusent la culture française. La France est enfin la première destination touristique mondiale, avec plus de 90 millions de visiteurs internationaux les meilleures années.", "partie3_titre": "III. Une puissance qui connaît des limites dans un monde multipolaire", "partie3_contenu": "A. Des concurrents géants. Face aux États-Unis et à la Chine, la France ne pèse qu'environ 1 % de la population mondiale et l'UE voit sa part dans la richesse mondiale diminuer avec la montée des pays émergents. Ni la France ni l'UE ne peuvent rivaliser seules avec les géants américain et chinois dans des domaines comme le numérique, dominé par les grandes plateformes étrangères.\n\nB. Les difficultés de l'Europe puissance. L'Union européenne re
