"IVe République", "definition": "Régime politique français de 1946 à 1958, fondé sur une Constitution dont le préambule proclame des droits sociaux."}], "notions_essentielles": ["À la Libération (1944), le GPRF de de Gaulle rétablit la République et annule les lois de Vichy", "Les femmes obtiennent le droit de vote le 21 avril 1944 et votent pour la première fois en avril 1945", "Le programme du CNR (Les Jours heureux) inspire les grandes réformes sociales", "La Sécurité sociale est créée en 1945 : naissance de l'État-providence", "Les nationalisations (EDF-GDF, Renault, banques) donnent à l'État le contrôle des secteurs clés"]}}, {"id": 9, "titre": "Femmes et hommes dans la société des années 1950 aux années 1980", "activite1_fiche": {"introduction": "De 1944 aux années 1980, la place des femmes dans la société française se transforme profondément. Citoyennes depuis 1944, les femmes conquièrent progressivement l'égalité juridique, l'autonomie économique et la maîtrise de leur corps. Ces conquêtes ne sont pas données : elles sont le fruit de luttes menées par les mouvements féministes et portées par des figures comme Simone de Beauvoir ou Simone Veil. Pourtant, malgré des avancées majeures, les inégalités entre femmes et hommes persistent.", "partie1_titre": "I. LES ANNÉES 1950 : DES FEMMES CITOYENNES MAIS MINEURES DANS LA FAMILLE", "partie1_contenu": "Depuis l'ordonnance du 21 avril 1944, les femmes votent et sont éligibles. Mais dans les années 1950, la société reste très inégalitaire. Le modèle dominant est celui de la femme au foyer : l'épouse s'occupe du ménage et des enfants tandis que le mari travaille et dirige la famille. Le Code civil hérité de Napoléon fait du mari le chef de famille : jusqu'en 1965, une femme mariée ne peut pas ouvrir un compte en banque ni travailler sans l'autorisation de son mari. La contraception est interdite par la loi de 1920, et l'avortement est un délit sévèrement puni. En 1949, Simone de Beauvoir publie Le Deuxième Sexe, ouvrage fondateur qui analyse la condition féminine et affirme : « On ne naît pas femme, on le devient ». Le livre fait scandale mais inspire les féministes du monde entier.", "partie2_titre": "II. LES ANNÉES 1960-1970 : ÉMANCIPATION ET CONQUÊTE DE NOUVEAUX DROITS", "partie2_contenu": "Les Trente Glorieuses transforment la vie des femmes. Le travail salarié féminin se développe massivement, notamment dans le secteur tertiaire (bureaux, commerce, enseignement) : l'indépendance économique progresse. Les filles accèdent de plus en plus aux études : la mixité scolaire se généralise et les filles deviennent majoritaires au baccalauréat. Les lois accompagnent ces évolutions : en 1965, la réforme des régimes matrimoniaux permet aux femmes mariées de travailler et de gérer leurs biens sans autorisation du mari. La loi Neuwirth (1967) autorise la contraception : la pilule permet aux femmes de choisir leurs maternités. Après mai 1968, le Mouvement de libération des femmes (MLF) porte les revendications féministes dans la rue : égalité, libre disposition de son corps. En 1975, la loi Veil dépénalise l'interruption volontaire de grossesse (IVG) : la ministre de la Santé Simone Veil l'impose après des débats d'une rare violence à l'Assemblée nationale. La même année, le divorce par consentement mutuel est créé. En 1972, le principe « à travail égal, salaire égal » est inscrit dans la loi.", "partie3_titre": "III. DES INÉGALITÉS QUI PERSISTENT", "partie3_contenu": "Malgré ces conquêtes, l'égalité réelle n'est pas atteinte. Dans le monde du travail, les femmes restent moins payées que les hommes à travail égal, occupent plus souvent des emplois précaires ou à temps partiel, et se heurtent au plafond de verre qui limite leur accès aux postes de direction. À la maison, les tâches domestiques et l'éducation des enfants reposent encore majoritairement sur elles : c'est la double journée. En politique, les femmes restent très minoritaires : il faudra attendre la loi sur la parité (2000) pour imposer l'égal accès des femmes et des hommes aux mandats électoraux. Des femmes pionnières ouvrent cependant la voie : Simone Veil, ministre puis première présidente du Parlement européen élu au suffrage universel (1979), ou Édith Cresson, première femme Première ministre (1991). Les violences faites aux femmes demeurent un combat toujours actuel.", "conclusion": "Des années 1950 aux années 1980, les femmes ont conquis l'égalité juridique, l'autonomie économique et la liberté de disposer de leur corps : autant de victoires arrachées par les luttes féministes et des figures courageuses comme Simone Veil. Mais l'égalité en droit ne signifie pas l'égalité en fait : salaires, partage des tâches, représentation politique restent inégaux. Le combat pour l'égalité réelle entre les femmes et les hommes, devenu grande cause nationale, se poursuit aujourd'hui."}, "activite2_quiz": [{"question": "Quand les femmes obtiennent-elles le droit de vote en France ?", "options": ["1936", "21 avril 1944", "1965", "1975"], "correcte": 1, "explication": "L'ordonnance du 21 avril 1944 accorde le droit de vote et d'éligibilité aux femmes. Elles votent pour la première fois en avril 1945."}, {"question": "Qui publie Le Deuxième Sexe en 1949 ?", "options": ["Simone Veil", "Simone de Beauvoir", "Olympe de Gouges", "George Sand"], "correcte": 1, "explication": "Simone de Beauvoir publie Le Deuxième Sexe en 1949, ouvrage fondateur du féminisme moderne : « On ne naît pas femme, on le devient »."}, {"question": "Jusqu'en 1965, que ne peut pas faire une femme mariée sans l'autorisation de son mari ?", "options": ["Voter", "Travailler et ouvrir un compte en banque", "Conduire", "Voyager"], "correcte": 1, "explication": "Jusqu'à la réforme de 1965, le mari est le chef de famille : sa femme ne peut ni travailler ni ouvrir un compte bancaire sans son accord."}, {"question": "Que permet la loi Neuwirth de 1967 ?", "options": ["L'IVG", "La contraception", "Le divorce", "La parité"], "correcte": 1, "explication": "La loi Neuwirth (1967) autorise la contraception, interdite depuis 1920. La pilule permet aux femmes de choisir leurs maternités."}, {"question": "Que dépénalise la loi Veil de 1975 ?", "options": ["Le divorce", "L'interruption volontaire de grossesse", "La contraception", "Le travail des femmes"], "correcte": 1, "explication": "La loi Veil (17 janvier 1975) dépénalise l'IVG. Simone Veil l'a défendue à l'Assemblée face à des attaques d'une grande violence."}, {"question": "Qui est Simone Veil ?", "options": ["Une philosophe", "La ministre de la Santé qui fait voter la loi sur l'IVG", "Une romancière", "La première femme Première ministre"], "correcte": 1, "explication": "Simone Veil, rescapée d'Auschwitz, ministre de la Santé, fait voter la loi sur l'IVG en 1975 puis devient la première présidente du Parlement européen élu (1979)."}, {"question": "Qu'est-ce que le MLF ?", "options": ["Un parti politique", "Le Mouvement de libération des femmes", "Un syndicat ouvrier", "Une loi"], "correcte": 1, "explication": "Le Mouvement de libération des femmes, né après mai 1968, porte les revendications féministes : égalité et libre disposition de son corps."}, {"question": "Que prévoit la loi de 1972 sur les salaires ?", "options": ["Un salaire minimum féminin", "À travail égal, salaire égal", "L'interdiction du travail de nuit", "La retraite à 60 ans"], "correcte": 1, "explication": "La loi de 1972 inscrit le principe « à travail égal, salaire égal » entre hommes et femmes, mais les écarts persistent dans les faits."}, {"question": "Qu'est-ce que le plafond de verre ?", "options": ["Une loi sur le logement", "Les obstacles invisibles qui bloquent l'accès des femmes aux postes de direction", "Un impôt", "Une réforme scolaire"], "correcte": 1, "explication": "Le plafond de verre désigne les obstacles invisibles qui empêchent les femmes d'accéder aux plus hautes responsabilités professionnelles."}, {"question": "Qu'appelle-t-on la double journée ?", "options": ["Travailler de nuit", "Cumuler travail salarié et tâches domestiques", "Avoir deux emplois", "Travailler le week-end"], "correcte": 1, "explication": "La double journée désigne le cumul, pour les femmes, du travail salarié et de la majorité des tâches domestiques et familiales."}, {"question": "Dans quel secteur le travail féminin se développe-t-il surtout ?", "options": ["L'agriculture", "Le secteur tertiaire", "La mine", "Le bâtiment"], "correcte": 1, "explication": "Pendant les Trente Glorieuses, les femmes investissent massivement le secteur tertiaire : bureaux, commerce, enseignement, santé."}, {"question": "Qui devient première présidente du Parlement européen élu en 1979 ?", "options": ["Édith Cresson", "Simone Veil", "Simone de Beauvoir", "Françoise Giroud"], "correcte": 1, "explication": "Simone Veil est élue présidente du Parlement européen en 1979, premier Parlement élu au suffrage universel direct."}, {"question": "Qui est la première femme Première ministre en France ?", "options": ["Simone Veil", "Édith Cresson", "Élisabeth Borne", "Ségolène Royal"], "correcte": 1, "explication": "Édith Cresson est la première femme nommée Première ministre, en 1991, sous la présidence de François Mitterrand."}, {"question": "Que vise la loi sur la parité de 2000 ?", "options": ["L'égalité des salaires", "L'égal accès des femmes et des hommes aux mandats électoraux", "La mixité scolaire", "Le droit de vote"], "correcte": 1, "explication": "La loi de 2000 impose la parité en politique : un égal accès des femmes et des hommes aux mandats électoraux et fonctions électives."}, {"question": "Quelle phrase célèbre résume la pensée de Simone de Beauvoir ?", "options": ["« Liberté, égalité, fraternité »", "« On ne naît pas femme, on le devient »", "« L'État, c'est moi »", "« Je pense donc je suis »"], "correcte": 1, "explication": "Cette phrase du Deuxième Sexe signifie que les rôles féminins sont construits par la société et non déterminés par la nature."}], "activite3_etude": {"document_type": "Discours historique", "document_titre": "Le discours de Simone Veil à l'Assemblée nationale (26 novembre 1974)", "document_texte": "« Je voudrais tout d'abord vous faire partager une conviction de femme : je le dis avec toute ma conviction, l'avortement doit rester l'exception, l'ultime recours pour des situations sans issue. Mais comment le tolérer sans qu'il perde ce caractère d'exception, sans que la société paraisse l'encourager ? Je voudrais d'abord vous dire ceci : c'est toujours un drame, cela restera toujours un drame. [...] Mais nous ne pouvons plus fermer les yeux sur les 300 000 avortements qui, chaque année, mutilent les femmes de ce pays, qui bafouent nos lois et qui humilient ou traumatisent celles qui y ont recours. [...] Je le dis avec toute ma conviction : aucune femme ne recourt de gaieté de cœur à l'avortement. Il suffit d'écouter les femmes. C'est toujours un drame. »", "document_source": "Simone Veil, ministre de la Santé, discours à l'Assemblée nationale, 26 novembre 1974, lors de la présentation du projet de loi sur l'IVG", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Quelle situation Simone Veil dénonce-t-elle ?", "Quels arguments utilise-t-elle pour convaincre les députés ?", "Pourquoi ce discours demande-t-il du courage à Simone Veil ?", "Rédigez 6 à 8 lignes expliquant pourquoi la loi Veil est une étape majeure de l'émancipation des femmes"], "corrections": ["Ce document est un discours politique prononcé par Simone Veil, ministre de la Santé, devant l'Assemblée nationale le 26 novembre 1974. Elle y présente le projet de loi dépénalisant l'interruption volontaire de grossesse, dans un hémicycle composé presque uniquement d'hommes et largement hostile.", "Simone Veil dénonce la réalité des avortements clandestins : environ 300 000 femmes avortent chaque année en France dans l'illégalité, au péril de leur santé et de leur vie. La loi est bafouée et les femmes sont humiliées, traumatisées, parfois mutilées par des avortements pratiqués dans des conditions dangereuses.", "Elle utilise des arguments mesurés pour convaincre une assemblée réticente : elle affirme que l'avortement doit rester l'exception et l'ultime recours, qu'il demeure toujours un drame, et qu'aucune femme n'y recourt de gaieté de cœur. Elle s'appuie sur la réalité des chiffres et invite les députés à écouter les femmes plutôt qu'à juger.", "Ce discours demande un immense courage car Simone Veil affronte une Assemblée composée à plus de 98 % d'hommes, dont beaucoup sont violemment opposés au texte. Elle subit pendant les débats des attaques personnelles d'une rare violence, certaines faisant même référence à la déportation alors qu'elle est elle-même rescapée d'Auschwitz.", "La loi Veil, promulguée le 17 janvier 1975, est une étape majeure de l'émancipation des femmes car elle leur reconnaît la libre disposition de leur corps, revendication centrale des mouvements féministes. Elle met fin au drame des avortements clandestins qui mettaient en danger la vie de centaines de milliers de femmes chaque année. Avec la loi Neuwirth de 1967 autorisant la contraception, elle permet aux femmes de choisir d'avoir ou non des enfants, et donc de maîtriser leur vie personnelle et professionnelle. Votée grâce au courage d'une femme ministre face à une assemblée d'hommes, elle symbolise aussi l'entrée des femmes dans les lieux de pouvoir et reste un acquis fondamental régulièrement réaffirmé."]}, "activite4_developpement": {"sujet": "Décrivez l'évolution de la place des femmes dans la société française des années 1950 aux années 1980", "plan": {"introduction": "Contexte : femmes citoyennes depuis 1944 mais société inégalitaire. Problématique : comment la place des femmes évolue-t-elle des années 1950 aux années 1980 ? Plan : des conquêtes juridiques et sociales majeures / des inégalités persistantes", "partie1": "I. DES CONQUÊTES MAJEURES VERS L'ÉGALITÉ : années 1950 inégalitaires (femme au foyer, mari chef de famille), émancipation économique (travail tertiaire, études), conquêtes juridiques (réforme de 1965, loi Neuwirth 1967, loi Veil 1975, salaire égal 1972), rôle des féministes (Beauvoir, MLF) et de Simone Veil", "partie2": "II. DES INÉGALITÉS QUI PERSISTENT : écarts de salaires malgré la loi, temps partiel et plafond de verre, double journée (tâches domestiques), sous-représentation politique (parité seulement en 2000), violences faites aux femmes", "conclusion": "Bilan : égalité juridique conquise par les luttes mais égalité réelle inachevée. Ouverture : le combat continue aujourd'hui (parité, égalité salariale, grande cause nationale)."}, "correction_complete": "En 1944, les Françaises deviennent citoyennes en obtenant le droit de vote. Pourtant, dans les années 1950, la société française reste profondément inégalitaire : la loi comme les mentalités maintiennent les femmes dans une position subordonnée. Comment la place des femmes dans la société française évolue-t-elle des années 1950 aux années 1980 ? Nous verrons d'abord que les femmes conquièrent des droits majeurs vers l'égalité, puis que des inégalités importantes persistent malgré ces avancées.\n\nDans les années 1950, le modèle dominant est celui de la femme au foyer. Le Code civil fait du mari le chef de famille : jusqu'en 1965, une femme mariée ne peut ni travailler ni ouvrir un compte en banque sans l'autorisation de son époux. La contraception est interdite depuis 1920 et l'avortement est un délit. C'est contre cet ordre que s'élève Simone de Beauvoir, qui publie en 1949 Le Deuxième Sexe et affirme que les rôles féminins sont construits par la société : « On ne naît pas femme, on le devient ». Les Trente Glorieuses transforment ensuite la condition féminine. Les femmes investissent massivement le travail salarié, surtout dans le secteur tertiaire, et accèdent aux études supérieures : l'indépendance économique progresse. Les lois suivent : la réforme de 1965 libère les femmes mariées de la tutelle du mari, la loi Neuwirth autorise la contraception en 1967, et la loi de 1972 pose le principe « à travail égal, salaire égal ». Après mai 1968, le Mouvement de libération des femmes porte les revendications féministes dans la rue. La conquête la plus emblématique est la loi Veil du 17 janvier 1975 : la ministre de la Santé Simone Veil, affrontant avec courage une Assemblée presque exclusivement masculine et souvent hostile, fait dépénaliser l'interruption volontaire de grossesse. Les femmes obtiennent ainsi la libre disposition de leur corps.\n\nMalgré ces victoires, l'égalité réelle n'est pas atteinte. Dans le monde du travail, les écarts de salaires persistent malgré la loi de 1972, les femmes occupent davantage d'emplois précaires ou à temps partiel, et le plafond de verre leur barre l'accès aux postes de direction. Dans la sphère privée, les tâches domestiques et l'éducation des enfants reposent toujours majoritairement sur elles : c'est la double journée, qui freine leurs carrières. En politique, les femmes demeurent très minoritaires à l'Assemblée nationale et au gouvernement : il faudra attendre la loi de 2000 pour que la parité impose l'égal accès aux mandats électoraux. Quelques pionnières ouvrent cependant la voie, comme Simone Veil, première présidente du Parlement européen élu au suffrage universel en 1979, ou Édith Cresson, première femme Première ministre en 1991. Enfin, les violences faites aux femmes restent une réalité massive et longtemps ignorée.\n\nDes années 1950 aux années 1980, les femmes ont donc conquis l'essentiel de l'égalité juridique : autonomie dans le mariage, indépendance économique, maîtrise de leur corps. Ces conquêtes, arrachées par les luttes féministes et le courage de figures comme Simone Veil, ont transformé la société française. Mais l'égalité en droit ne s'est pas traduite par l'égalité en fait : salaires, partage des tâches et pouvoir restent inégalement répartis, et ce combat se poursuit de nos jours."}, "activite5_vocabulaire": {"termes": [{"mot": "Féminisme", "definition": "Mouvement qui lutte pour l'égalité des droits entre les femmes et les hommes."}, {"mot": "Le Deuxième Sexe", "definition": "Ouvrage de Simone de Beauvoir (1949), fondateur du féminisme moderne : « On ne naît pas femme, on le devient »."}, {"mot": "Loi Neuwirth", "definition": "Loi de 1967 autorisant la contraception en France, interdite depuis 1920."}, {"mot": "Loi Veil", "definition": "Loi du 17 janvier 1975 dépénalisant l'interruption volontaire de grossesse (IVG), défendue par Simone Veil."}, {"mot": "IVG", "definition": "Interruption volontaire de grossesse, dépénalisée en France par la loi Veil de 1975."}, {"mot": "MLF", "definition": "Mouvement de libération des femmes, né après mai 1968, qui revendique l'égalité et la libre disposition du corps."}, {"mot": "Plafond de verre", "definition": "Ensemble des obstacles invisibles qui limitent l'accès des femmes aux postes de responsabilité."}, {"mot": "Double journée", "definition": "Cumul par les femmes du travail salarié et de la majorité des tâches domestiques et familiales."}, {"mot": "Parité", "definition": "Égal accès des femmes et des hommes aux mandats électoraux, imposé par la loi de 2000."}, {"mot": "Émancipation", "definition": "Processus par lequel une personne ou un groupe se libère d'une domination et conquiert son autonomie."}], "notions_essentielles": ["Dans les années 1950, la femme mariée est soumise à l'autorité du mari (jusqu'à la réforme de 1965)", "La loi Neuwirth (1967) autorise la contraception, la loi Veil (1975) dépénalise l'IVG", "Simone de Beauvoir (Le Deuxième Sexe, 1949) et le MLF portent le combat féministe", "Le travail féminin explose pendant les Trente Glorieuses, surtout dans le tertiaire", "Les inégalités persistent : salaires, double journée, plafond de verre, sous-représentation politique"]}}, {"id": 10, "titre": "La Ve République, de la République gaullienne à l'alternance et à la cohabitation", "activite1_fiche": {"introduction": "En mai 1958, la IVe République s'effondre, incapable de résoudre la guerre d'Algérie. Le général de Gaulle revient au pouvoir et fonde la Ve République, un régime nouveau qui renforce considérablement le pouvoir exécutif. Depuis 1958, la Ve République a montré sa solidité : elle a survécu à la crise de mai 68, connu l'alternance politique en 1981 et inventé la cohabitation. Elle reste aujourd'hui le cadre de la vie politique française.", "partie1_titre": "I. LA FONDATION DE LA Ve RÉPUBLIQUE PAR DE GAULLE (1958-1962)", "partie1_contenu": "Le 13 mai 1958, à Alger, une insurrection menace de plonger la France dans la guerre civile : l'armée et les partisans de l'Algérie française réclament le retour du général de Gaulle. Investi président du Conseil le 1er juin 1958, de Gaulle est chargé de rédiger une nouvelle Constitution. Celle-ci est massivement approuvée par référendum le 28 septembre 1958 (près de 80 % de oui). La Constitution de la Ve République renforce le pouvoir exécutif : le président de la République, élu pour 7 ans, nomme le Premier ministre, peut dissoudre l'Assemblée nationale et consulter directement les Français par référendum. L'article 16 lui donne les pleins pouvoirs en cas de crise grave. En 1962, après la fin de la guerre d'Algérie (accords d'Évian), de Gaulle franchit une étape décisive : il propose par référendum l'élection du président de la République au suffrage universel direct. Adoptée, cette réforme fait du président la clé de voûte des institutions, élu directement par le peuple. De Gaulle est ainsi élu en 1965 lors de la première élection présidentielle au suffrage universel direct.", "partie2_titre": "II. LA RÉPUBLIQUE GAULLIENNE FACE AUX CRISES (1962-1969)", "partie2_contenu": "De Gaulle exerce le pouvoir de façon personnelle : il s'adresse directement aux Français par la télévision et les référendums, et mène une politique de grandeur nationale (force de frappe nucléaire, indépendance vis-à-vis des États-Unis, sortie du commandement intégré de l'OTAN en 1966). Mais en mai 1968, une crise majeure ébranle le régime : la révolte étudiante (barricades au Quartier latin) se transforme en crise sociale avec une grève générale de plusieurs millions de salariés, puis en crise politique. De Gaulle reprend la situation en main : il dissout l'Assemblée et ses partisans remportent massivement les élections de juin 1968. Les accords de Grenelle augmentent fortement les salaires. Mais l'autorité du général est atteinte : en avril 1969, après l'échec d'un référendum sur la régionalisation et le Sénat, de Gaulle démissionne. Georges Pompidou (1969-1974) puis Valéry Giscard d'Estaing (1974-1981) lui succèdent, confirmant la solidité des institutions. Giscard modernise la société : majorité à 18 ans (1974), loi Veil sur l'IVG (1975).", "partie3_titre": "III. ALTERNANCE ET COHABITATIONS : LA Ve RÉPUBLIQUE À L'ÉPREUVE (1981-2002)", "partie3_contenu": "Le 10 mai 1981, François Mitterrand, candidat socialiste, est élu président : c'est la première alternance de la Ve République, le passage du pouvoir de la droite à la gauche. Les institutions fonctionnent sans heurt, preuve de leur solidité. Mitterrand mène d'abord de grandes réformes : abolition de la peine de mort (1981, loi portée par Robert Badinter), cinquième semaine de congés payés, retraite à 60 ans, décentralisation, radios libres. En 1986, la droite remporte les élections législatives : Mitterrand nomme Jacques Chirac Premier ministre. C'est la première cohabitation : un président et un Premier ministre de bords opposés gouvernent ensemble, le président conservant la politique étrangère et la défense, le Premier ministre conduisant la politique intérieure. Deux autres cohabitations suivront (1993-1995 avec Édouard Balladur, 1997-2002 entre Jacques Chirac président et Lionel Jospin Premier ministre). Pour limiter ces situations, le quinquennat remplace le septennat en 2000 : le mandat présidentiel est réduit à 5 ans, aligné sur celui des députés.", "conclusion": "Depuis 1958, la Ve République a fait la preuve de sa solidité : elle a surmonté la guerre d'Algérie, mai 68, la démission de son fondateur, l'alternance de 1981 et trois cohabitations. Le président élu au suffrage universel reste la clé de voûte d'institutions qui ont su s'adapter (quinquennat en 2000). La Ve République est aujourd'hui le deuxième régime le plus durable de l'histoire de France après la IIIe République."}, "activite2_quiz": [{"question": "Quel événement provoque le retour de de Gaulle au pouvoir en 1958 ?", "options": ["Mai 68", "La crise du 13 mai 1958 à Alger", "La Seconde Guerre mondiale", "La chute du mur de Berlin"], "correcte": 1, "explication": "Le 13 mai 1958, une insurrection à Alger menace la République : de Gaulle est rappelé au pouvoir pour résoudre la crise algérienne."}, {"question": "Comment la Constitution de la Ve République est-elle adoptée ?", "options": ["Par un vote du Parlement", "Par référendum le 28 septembre 1958", "Par décret", "Par les députés seuls"], "correcte": 1, "explication": "La Constitution est approuvée par référendum le 28 septembre 1958 avec près de 80 % de oui."}, {"question": "Quelle réforme majeure intervient en 1962 ?", "options": ["Le quinquennat", "L'élection du président au suffrage universel direct", "Le droit de vote des femmes", "L'abolition de la peine de mort"], "correcte": 1, "explication": "En 1962, de Gaulle fait adopter par référendum l'élection du président au suffrage universel direct : le président devient la clé de voûte du régime."}, {"question": "Quelle est la durée du mandat présidentiel en 1958 ?", "options": ["4 ans", "5 ans", "7 ans", "10 ans"], "correcte": 2, "explication": "Le mandat présidentiel est de 7 ans (septennat) jusqu'à la réforme de 2000 qui instaure le quinquennat (5 ans)."}, {"question": "Que se passe-t-il en mai 1968 ?", "options": ["Une guerre", "Une crise étudiante, sociale et politique", "Une élection présidentielle", "Un référendum"], "correcte": 1, "explication": "Mai 68 : révolte étudiante au Quartier latin, grève générale de millions de salariés, crise politique qui ébranle le pouvoir gaullien."}, {"question": "Que sont les accords de Grenelle (1968) ?", "options": ["Des accords de paix", "Des accords augmentant les salaires", "Un traité européen", "Des accords coloniaux"], "correcte": 1, "explication": "Les accords de Grenelle (mai 1968) prévoient de fortes hausses de salaires, dont 35 % pour le SMIG, pour mettre fin à la grève générale."}, {"question": "Pourquoi de Gaulle démissionne-t-il en 1969 ?", "options": ["Il perd l'élection présidentielle", "Son référendum est rejeté", "Il est malade", "L'Assemblée le renverse"], "correcte": 1, "explication": "De Gaulle démissionne en avril 1969 après l'échec de son référendum sur la régionalisation et la réforme du Sénat."}, {"question": "Qui succède à de Gaulle en 1969 ?", "options": ["Mitterrand", "Pompidou", "Giscard d'Estaing", "Chirac"], "correcte": 1, "explication": "Georges Pompidou, ancien Premier ministre de de Gaulle, est élu président en 1969. Il meurt en fonction en 1974."}, {"question": "Quelle réforme Giscard d'Estaing adopte-t-il en 1974 ?", "options": ["Le quinquennat", "La majorité à 18 ans", "La retraite à 60 ans", "La décentralisation"], "correcte": 1, "explication": "En 1974, Giscard d'Estaing abaisse la majorité de 21 à 18 ans. Sous son mandat est aussi votée la loi Veil (1975)."}, {"question": "Que se passe-t-il le 10 mai 1981 ?", "options": ["La première cohabitation", "L'élection de François Mitterrand", "Mai 68", "Le référendum de 1962"], "correcte": 1, "explication": "Le 10 mai 1981, François Mitterrand est élu président : première alternance de la Ve République, la gauche arrive au pouvoir."}, {"question": "Qu'est-ce que l'alternance ?", "options": ["Un changement de Constitution", "Le passage du pouvoir d'un camp politique à l'autre", "Une dissolution", "Un référendum"], "correcte": 1, "explication": "L'alternance est le passage pacifique du pouvoir d'un camp à l'autre (de la droite à la gauche en 1981), preuve du bon fonctionnement démocratique."}, {"question": "Quelle grande réforme est adoptée en 1981 ?", "options": ["L'IVG", "L'abolition de la peine de mort", "Le droit de vote à 18 ans", "Le quinquennat"], "correcte": 1, "explication": "La peine de mort est abolie en octobre 1981, loi défendue par Robert Badinter, garde des Sceaux de François Mitterrand."}, {"question": "Qu'est-ce que la cohabitation ?", "options": ["Deux présidents en même temps", "Un président et un Premier ministre de bords opposés", "Une alliance de partis", "Un gouvernement d'union nationale"], "correcte": 1, "explication": "La cohabitation survient quand le président et la majorité parlementaire sont de bords opposés : le Premier ministre conduit alors la politique intérieure."}, {"question": "Quand a lieu la première cohabitation ?", "options": ["1981-1986", "1986-1988", "1993-1995", "1997-2002"], "correcte": 1, "explication": "La première cohabitation (1986-1988) associe François Mitterrand, président socialiste, et Jacques Chirac, Premier ministre de droite."}, {"question": "Que change la réforme de 2000 ?", "options": ["Le septennat remplace le quinquennat", "Le quinquennat remplace le septennat", "Le président est élu par le Parlement", "Le Sénat est supprimé"], "correcte": 1, "explication": "En 2000, le quinquennat (5 ans) remplace le septennat : le mandat présidentiel est aligné sur celui des députés pour limiter les cohabitations."}], "activite3_etude": {"document_type": "Discours historique", "document_titre": "Le discours de Bayeux du général de Gaulle (16 juin 1946)", "document_texte": "« C'est donc du chef de l'État, placé au-dessus des partis [...] que doit procéder le pouvoir exécutif. [...] Au chef de l'État la charge d'accorder l'intérêt général quant au choix des hommes avec l'orientation qui se dégage du Parlement. À lui la mission de nommer les ministres et, d'abord, bien entendu, le Premier, qui devra diriger la politique et le travail du gouvernement. [...] À lui l'attribution de servir d'arbitre au-dessus des contingences politiques [...]. À lui, s'il devait arriver que la patrie fût en péril, le devoir d'être le garant de l'indépendance nationale. »", "document_source": "Charles de Gaulle, discours prononcé à Bayeux (Normandie), 16 juin 1946. De Gaulle y expose sa conception des institutions, qui inspirera la Constitution de 1958.", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Quelle place de Gaulle veut-il donner au chef de l'État ?", "Quels pouvoirs précis attribue-t-il au président ?", "Pourquoi ce discours annonce-t-il la Constitution de 1958 ?", "Rédigez 6 à 8 lignes expliquant comment la Ve République applique les idées du discours de Bayeux"], "corrections": ["Ce document est un discours politique prononcé par le général de Gaulle à Bayeux le 16 juin 1946. De Gaulle, qui vient de démissionner du GPRF en janvier 1946 par désaccord avec le retour du régime des partis, y expose sa conception des institutions, opposée au projet de la future IVe République.", "De Gaulle veut faire du chef de l'État la figure centrale des institutions : un président placé au-dessus des partis, incarnant l'intérêt général et l'unité de la nation, et non un simple représentant des forces politiques du Parlement. Le pouvoir exécutif doit procéder de lui.", "De Gaulle attribue au président des pouvoirs étendus : nommer le Premier ministre et les ministres, servir d'arbitre au-dessus des partis, et garantir l'indépendance nationale en cas de péril, ce qui annonce les pouvoirs exceptionnels de crise.", "Ce discours annonce la Constitution de 1958 car toutes les idées qu'il exprime y seront appliquées : un exécutif fort dominé par le président, la nomination du Premier ministre par le chef de l'État, son rôle d'arbitre, et l'article 16 sur les pouvoirs exceptionnels. Rejetées en 1946, ces idées triomphent douze ans plus tard quand de Gaulle revient au pouvoir.", /* ---------- STATE ---------- */
function loadState(){
  try{ return JSON.parse(localStorage.getItem('dnb_histoire')||'{}'); }catch(e){ return {}; }
}
function saveState(s){ try{ localStorage.setItem('dnb_histoire', JSON.stringify(s)); }catch(e){} }
let state = loadState();
if(!state.completed) state.completed = [];
if(!state.xp) state.xp = 0;

/* ---------- UTILS ---------- */
function esc(t){ const d=document.createElement('div'); d.textContent=t==null?'':t; return d.innerHTML; }
function boldDates(html){
  return html.replace(/\b(1[6-9]\d{2}|20\d{2})\b/g,'<strong>$1</strong>')
             .replace(/\b(\d{1,2})(er)?\s+(janvier|février|mars|avril|mai|juin|juillet|août|septembre|octobre|novembre|décembre)\b/gi,'<strong>$&</strong>');
}
function paras(txt){
  return (txt||'').split(/\n\n+/).map(function(p){return '<p>'+boldDates(esc(p))+'</p>';}).join('');
}
function randEnc(){ return ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)]; }
function appEl(){ return document.getElementById('app'); }
function printHeaderHTML(chap, act){
  return '<div class="print-header">Révisions DNB Histoire 3ème · Chapitre '+chap.id+' : '+esc(chap.titre)+' · '+esc(act)+'<br>Gregory CRON · laclassedegreg@gmail.com · www.linkedin.com/in/gregorycron</div>';
}
function xpPop(msg){
  const e=document.createElement('div'); e.className='xp-pop'; e.textContent=msg;
  document.body.appendChild(e); setTimeout(function(){e.remove();},2600);
}

/* ---------- LOGIN ---------- */
function renderLogin(){
  appEl().innerHTML =
  '<div class="login-wrap"><div class="login-card">'+
    '<div class="emoji">🎓</div>'+
    '<h1>Révisions du Brevet<br>Histoire 3ème</h1>'+
    '<p>10 chapitres, 50 activités complètes pour préparer le DNB.<br>Entre ton prénom pour commencer.</p>'+
    '<input id="prenom" type="text" placeholder="Ton prénom" maxlength="30" autocomplete="given-name">'+
    '<button class="btn" onclick="doLogin()">C\'est parti !</button>'+
  '</div></div>';
  const inp=document.getElementById('prenom');
  inp.focus();
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') doLogin(); });
}
function doLogin(){
  const v=document.getElementById('prenom').value.trim();
  if(!v){ document.getElementById('prenom').style.borderColor='#e74c3c'; return; }
  state.prenom=v; saveState(state); renderHome();
}

/* ---------- HOME ---------- */
function goHome(){ if(state.prenom){renderHome();}else{renderLogin();} window.scrollTo(0,0); }
function renderHome(){
  const done = state.completed.length;
  const pct = Math.round(done/CHAPTERS.length*100);
  const badges = [
    {ico:'🥉',nom:'Badge Bronze',cond:'3 chapitres validés',won:done>=3},
    {ico:'🥈',nom:'Badge Argent',cond:'6 chapitres validés',won:done>=6},
    {ico:'🥇',nom:'Badge Or',cond:'10 chapitres validés',won:done>=10}
  ];
  let h = '<div class="hello"><h1>Bonjour '+esc(state.prenom)+' 👋</h1>'+
    '<div style="font-size:.88rem;color:var(--ink-soft)">⭐ '+state.xp+' XP · '+done+'/10 chapitres validés</div></div>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="badges">'+badges.map(function(b){
      return '<div class="badge '+(b.won?'won':'')+'"><span class="ico">'+b.ico+'</span><span><strong>'+b.nom+'</strong><br><span style="color:var(--ink-soft)">'+b.cond+'</span></span></div>';
    }).join('')+'</div>'+
    '<div class="progress-bar"><div style="width:'+pct+'%"></div></div>'+
    '<div class="chapters">'+CHAPTERS.map(function(c,i){
      const isDone=state.completed.indexOf(c.id)>=0;
      return '<div class="chap-card '+(isDone?'done':'')+'" style="animation-delay:'+(i*0.05)+'s" tabindex="0" role="button" '+
        'onclick="renderChapter('+c.id+')" onkeydown="if(event.key===\'Enter\')renderChapter('+c.id+')">'+
        '<div class="chap-num">'+(isDone?'✓':c.id)+'</div>'+
        '<div><h3>'+esc(c.titre)+'</h3><div class="state">'+(isDone?'Chapitre validé !':'5 activités à découvrir')+'</div></div></div>';
    }).join('')+'</div>';
  appEl().innerHTML = h;
}

/* ---------- CHAPTER ---------- */
const ACTS = [
  {ico:'📖',nom:'Fiche de révision'},
  {ico:'❓',nom:'Quiz'},
  {ico:'🔍',nom:'Étude de documents'},
  {ico:'✍️',nom:'Développement construit'},
  {ico:'🎮',nom:'Notions essentielles'}
];
let currentChap=null;
function renderChapter(id, actIdx){
  if(actIdx===undefined) actIdx=0;
  currentChap = CHAPTERS.filter(function(c){return c.id===id;})[0];
  appEl().innerHTML =
    '<div class="crumb"><a onclick="goHome()">Accueil</a> › Chapitre '+id+'</div>'+
    '<h1 class="chap-title">Chapitre '+id+' · '+esc(currentChap.titre)+'</h1>'+
    '<div class="encour">💬 '+randEnc()+'</div>'+
    '<div class="activities">'+ACTS.map(function(a,i){
      return '<div class="act-tab '+(i===actIdx?'active':'')+'" tabindex="0" role="button" '+
        'onclick="renderChapter('+id+','+i+')" onkeydown="if(event.key===\'Enter\')renderChapter('+id+','+i+')">'+
        '<span class="ico">'+a.ico+'</span>'+a.nom+'</div>';
    }).join('')+'</div>'+
    '<div id="actPanel"></div>';
  [renderFiche,renderQuiz,renderEtude,renderDev,renderVocab][actIdx]();
  window.scrollTo(0,0);
}

/* ---------- ACT 1 : FICHE ---------- */

  const f=currentChap.activite1_fiche;
  document.getElementById('actPanel').innerHTML =

/* ---------- ACT 2 : QUIZ ---------- */
let quizIdx=0, quizScore=0;
function renderQuiz(){ quizIdx=0; quizScore=0; showQuizQ(); }
function showQuizQ(){
  const qz=currentChap.activite2_quiz;
  if(quizIdx>=qz.length){ showQuizScore(); return; }
  const q=qz[quizIdx];
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<div class="quiz-head"><h2>❓ Quiz</h2><span class="quiz-count">Question '+(quizIdx+1)+' / '+qz.length+'</span></div>'+
    '<div class="quiz-q">'+esc(q.question)+'</div>'+
    q.options.map(function(o,i){return '<button class="quiz-opt" onclick="answerQuiz('+i+')">'+esc(o)+'</button>';}).join('')+
    '<div class="quiz-expl" id="expl"></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" id="btnNext" style="display:none" onclick="quizIdx++;showQuizQ()">Question suivante →</button></div>'+
  '</div>';
}
function answerQuiz(i){
  const q=currentChap.activite2_quiz[quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b,j){
    b.disabled=true;
    if(j===q.correcte) b.classList.add('good');
    else if(j===i) b.classList.add('bad');
  });
  if(i===q.correcte) quizScore++;
  const ex=document.getElementById('expl');
  ex.innerHTML='<strong>'+(i===q.correcte?'✅ Bonne réponse !':'❌ Pas tout à fait.')+'</strong> '+boldDates(esc(q.explication));
  ex.classList.add('show');
  const btn=document.getElementById('btnNext');
  btn.style.display='inline-block';
  btn.textContent = (quizIdx+1<currentChap.activite2_quiz.length) ? 'Question suivante →' : 'Voir mon score 🏁';
}
function showQuizScore(){
  const total=currentChap.activite2_quiz.length;
  const sur20=Math.round(quizScore/total*20);
  let msg;
  if(sur20>=16) msg='Excellent travail, tu maîtrises ce chapitre ! 🌟';
  else if(sur20>=12) msg='Bon travail ! Relis la fiche pour consolider les points manqués. 👍';
  else if(sur20>=8) msg='Tu es sur la bonne voie. Reprends la fiche de révision puis retente le quiz !';
  else msg='Ce chapitre mérite une relecture attentive de la fiche. Courage, tu vas y arriver !';
  if(state.completed.indexOf(currentChap.id)<0){
    state.completed.push(currentChap.id);
    state.xp += 20;
    saveState(state);
    xpPop('🎉 Chapitre validé · +20 XP');
    const d=state.completed.length;
    if(d===3) setTimeout(function(){xpPop('🥉 Badge Bronze débloqué !');},2800);
    if(d===6) setTimeout(function(){xpPop('🥈 Badge Argent débloqué !');},2800);
    if(d===10) setTimeout(function(){xpPop('🥇 Badge Or débloqué ! Tu es prêt(e) pour le DNB !');},2800);
  }
  document.getElementById('actPanel').innerHTML =
  '<div class="panel"><div class="quiz-score">'+
    '<div class="big">'+sur20+' / 20</div>'+
    '<p>('+quizScore+' bonnes réponses sur '+total+')</p>'+
    '<p style="margin:14px 0">'+msg+'</p>'+
    '<button class="btn btn-small" onclick="renderQuiz()">🔄 Refaire le quiz</button> '+
    '<button class="btn btn-small btn-ghost" onclick="renderChapter('+currentChap.id+',0)">📖 Relire la fiche</button>'+
  '</div></div>';
}

  const c=btn.nextElementSibling;

  btn.textContent = c.classList.contains('show') ? 'Masquer la correction' : 'Voir la correction';
}

    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

    '<div class="plan-step"><h4>Deuxième partie</h4><p>'+boldDates(esc(d.plan.partie2))+'</p></div>'+
    '<div class="plan-step"><h4>Conclusion</h4><p>'+boldDates(esc(d.plan.conclusion))+'</p></div>'+
    '<div class="q-item"><span class="qnum">Correction rédigée complète</span> (à lire après avoir rédigé ton propre développement !)'+
      '<br><button class="btn-corr" onclick="toggleCorr(this)">Voir la correction</button>'+
      '<div class="corr">'+paras(d.correction_complete)+'</div></div>'+
    '<div class="pdf-bar"><button class="btn btn-small" onclick="window.print()">📄 Télécharger le PDF</button></div>'+
  '</div>';
}

/* ---------- ACT 5 : VOCAB ---------- */
let matchSel=null, matchDone=0, matchAwarded=false;
function shuffled(a){ return a.slice().sort(function(){return Math.random()-.5;}); }
function renderVocab(){
  const v=currentChap.activite5_vocabulaire;
  matchSel=null; matchDone=0; matchAwarded=false;
  const pool=shuffled(v.termes).slice(0,5);
  const mots=shuffled(pool);
  const defs=shuffled(pool);
  document.getElementById('actPanel').innerHTML =
  '<div class="panel">'+
    '<h2>🎮 Notions essentielles</h2>'+
    '<div class="retenir"><h4>🎯 Les notions essentielles du chapitre</h4><ul>'+
      v.notions_essentielles.map(function(n){return '<li>'+boldDates(esc(n))+'</li>';}).join('')+
    '</ul></div>'+
    '<h3>🃏 Cartes de vocabulaire (clique pour retourner)</h3>'+
    '<div class="vocab-grid">'+v.termes.map(function(t){
      return '<div class="flip" tabindex="0" role="button" onclick="this.classList.toggle(\'on\')" onkeydown="if(event.key===\'Enter\')this.classList.toggle(\'on\')">'+
        '<div class="flip-inner"><div class="flip-face flip-front">'+esc(t.mot)+'</div>'+
        '<div class="flip-face flip-back">'+esc(t.definition)+'</div></div></div>';
    }).join('')+'</div>'+
    '<div class="match-zone"><h3>⚡ Défi association (+10 XP)</h3>'+
      '<p style="font-size:.88rem;color:var(--ink-soft)">Clique sur un mot, puis sur sa définition. Associe les 5 paires !</p>'+
      '<div class="match-cols">'+
        '<div>'+mots.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="mot" onclick="matchClick(this)">'+esc(t.mot)+'</div>';}).join('')+'</div>'+
        '<div>'+defs.map(function(t){return '<div class="match-item" data-mot="'+esc(t.mot)+'" data-type="def" onclick="matchClick(this)">'+esc(t.definition)+'</div>';}).join('')+'</div>'+
      '</div><p id="matchMsg" style="margin-top:12px;font-weight:600"></p>'+
    '</div>'+
  '</div>';
}
function matchClick(el){
  if(el.classList.contains('ok')) return;
  if(!matchSel){ matchSel=el; el.classList.add('sel'); return; }
  if(matchSel===el){ el.classList.remove('sel'); matchSel=null; return; }
  if(matchSel.dataset.type===el.dataset.type){
    matchSel.classList.remove('sel'); matchSel=el; el.classList.add('sel'); return;
  }
  const a=matchSel;
  if(a.dataset.mot===el.dataset.mot){
    a.classList.remove('sel'); a.classList.add('ok'); el.classList.add('ok');
    matchDone++;
    if(matchDone===5){
      document.getElementById('matchMsg').textContent='🎉 Bravo, les 5 paires sont associées !';
      if(!matchAwarded){ matchAwarded=true; state.xp+=10; saveState(state); xpPop('⭐ +10 XP'); }
    }
  }else{
    a.classList.remove('sel'); a.classList.add('ko'); el.classList.add('ko');
    setTimeout(function(){a.classList.remove('ko');el.classList.remove('ko');},600);
  }
  matchSel=null;
}

/* ---------- INIT ---------- */
if(state.prenom){ renderHome(); } else { renderLogin(); }
</script>
