<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révisions DNB - Histoire 3ème</title>
<style>
:root{
  --primary:#667eea;
  --primary-dark:#4c5fd7;
  --gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  --ink:#1e2340;
  --ink-soft:#5a6080;
  --bg:#f5f6fb;
  --card:#ffffff;
  --gold:#f0b429;
  --success:#2eb872;
  --error:#e74c3c;
  --radius:14px;
  --shadow:0 4px 18px rgba(30,35,64,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{direction:ltr}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;direction:ltr;text-align:left}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif}

/* ---------- HEADER ---------- */
header{position:sticky;top:0;z-index:50;background:var(--gradient);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 10px rgba(0,0,0,.18)}
header .brand{font-family:Georgia,serif;font-size:1.05rem;font-weight:bold;letter-spacing:.3px}
header .contacts{display:flex;gap:14px;font-size:.78rem;flex-wrap:wrap;justify-content:flex-end}
header .contacts a{color:#fff;text-decoration:none;opacity:.92;border-bottom:1px solid rgba(255,255,255,.4)}
header .contacts a:hover,header .contacts a:focus{opacity:1;border-bottom-color:#fff}
#btnHome{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);color:#fff;padding:7px 14px;border-radius:30px;cursor:pointer;font-size:.85rem;transition:background .2s}
#btnHome:hover,#btnHome:focus{background:rgba(255,255,255,.32)}

main{max-width:980px;margin:0 auto;padding:22px 16px 70px}

/* ---------- LOGIN ---------- */
.login-wrap{min-height:70vh;display:flex;align-items:center;justify-content:center}
.login-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:40px 34px;max-width:430px;width:100%;text-align:center;animation:rise .5s ease}
.login-card .emoji{font-size:3rem}
.login-card h1{font-size:1.5rem;margin:14px 0 6px}
.login-card p{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px}
.login-card input{width:100%;padding:13px 16px;border:2px solid #dde0f0;border-radius:10px;font-size:1rem;margin-bottom:14px;transition:border .2s}
.login-card input:focus{outline:none;border-color:var(--primary)}
.btn{display:inline-block;background:var(--gradient);color:#fff;border:none;padding:13px 30px;border-radius:30px;font-size:1rem;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(102,126,234,.4)}
.btn:hover,.btn:focus{transform:translateY(-2px);box-shadow:0 6px 18px rgba(102,126,234,.5)}
.btn:active{transform:translateY(0)}
.btn-ghost{background:#fff;color:var(--primary);border:2px solid var(--primary);box-shadow:none}
.btn-small{padding:8px 18px;font-size:.85rem}

/* ---------- HOME / MENU ---------- */
.hello{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:6px}
.hello h1{font-size:1.45rem}
.encour{background:#fff;border-left:5px solid var(--primary);border-radius:10px;padding:12px 16px;margin:14px 0 22px;color:var(--ink-soft);font-style:italic;box-shadow:var(--shadow)}
.badges{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.badge{background:var(--card);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);font-size:.85rem;opacity:.38;filter:grayscale(1);transition:all .4s}
.badge.won{opacity:1;filter:none;border:2px solid var(--gold)}
.badge .ico{font-size:1.4rem}
.progress-bar{background:#e4e7f5;border-radius:20px;height:12px;overflow:hidden;margin:4px 0 26px}
.progress-bar div{height:100%;background:var(--gradient);border-radius:20px;transition:width .6s ease;min-width:0}
.chapters{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.chap-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;cursor:pointer;display:flex;gap:14px;align-items:flex-start;border:2px solid transparent;transition:transform .18s,border-color .18s,box-shadow .18s;animation:rise .45s ease backwards}
.chap-card:hover,.chap-card:focus{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 8px 24px rgba(102,126,234,.22)}
.chap-num{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:var(--gradient);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-family:Georgia,serif;font-size:1.1rem}
.chap-card.done .chap-num{background:var(--success)}
.chap-card h3{font-size:.97rem;line-height:1.35}
.chap-card .state{font-size:.76rem;color:var(--ink-soft);margin-top:5px}
.chap-card.done .state{color:var(--success);font-weight:600}

/* ---------- CHAPTER VIEW ---------- */
.crumb{font-size:.82rem;color:var(--ink-soft);margin-bottom:8px}
.crumb a{color:var(--primary);cursor:pointer;text-decoration:none}
.chap-title{font-size:1.35rem;margin-bottom:18px}
.activities{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:26px}
.act-tab{background:var(--card);border:2px solid #e4e7f5;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;font-size:.84rem;font-weight:600}
.act-tab .ico{font-size:1.5rem;display:block;margin-bottom:6px}
.act-tab:hover{border-color:var(--primary);transform:translateY(-2px)}
.act-tab.active{background:var(--gradient);color:#fff;border-color:transparent}

/* ---------- CONTENT PANELS ---------- */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;animation:rise .35s ease}
.panel h2{font-size:1.25rem;margin-bottom:16px;color:var(--primary-dark)}
.panel h3{font-size:1.05rem;margin:22px 0 10px;color:var(--ink)}
.panel p{margin-bottom:13px;text-align:justify}
.retenir{background:#eef0ff;border:2px solid var(--primary);border-radius:12px;padding:16px 18px;margin:20px 0}
.retenir h4{color:var(--primary-dark);margin-bottom:10px;font-family:Georgia,serif}
.retenir li{margin:7px 0 7px 18px}
.doc-box{background:#faf8f2;border:1px solid #e7e0c9;border-left:5px solid var(--gold);border-radius:10px;padding:18px 20px;margin:16px 0;font-family:Georgia,serif}
.doc-box .src{display:block;margin-top:12px;font-size:.82rem;color:var(--ink-soft);font-style:italic;font-family:'Segoe UI',sans-serif}
.q-item{margin:18px 0;padding:16px;background:#f8f9fd;border-radius:10px}
.q-item .qnum{font-weight:700;color:var(--primary-dark)}
.corr{display:none;margin-top:12px;padding:14px;background:#e9f8f0;border-left:4px solid var(--success);border-radius:8px;font-size:.93rem}
.corr.show{display:block;animation:rise .3s ease}
.btn-corr{margin-top:10px;background:#fff;border:2px solid var(--success);color:var(--success);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:.83rem;font-weight:600;transition:all .15s}
.btn-corr:hover{background:var(--success);color:#fff}
.methodo{background:#fff7e8;border:1px solid #f0ddb0;border-radius:10px;padding:14px 18px;margin:16px 0;font-size:.9rem}
.methodo strong{color:#a97800}
.pdf-bar{margin-top:24px;text-align:right}

/* ---------- QUIZ ---------- */
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.quiz-count{font-size:.85rem;color:var(--ink-soft)}
.quiz-q{font-size:1.08rem;font-weight:600;margin-bottom:18px}
.quiz-opt{display:block;width:100%;text-align:left;background:#f8f9fd;border:2px solid #e4e7f5;border-radius:10px;padding:13px 16px;margin:9px 0;cursor:pointer;font-size:.95rem;transition:all .15s;font-family:inherit;color:inherit}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);background:#eef0ff}
.quiz-opt:disabled{cursor:default}
.quiz-opt.good{background:#e9f8f0;border-color:var(--success);font-weight:600}
.quiz-opt.bad{background:#fdecea;border-color:var(--error)}
.quiz-expl{display:none;margin-top:14px;padding:14px;background:#eef0ff;border-left:4px solid var(--primary);border-radius:8px;font-size:.92rem}
.quiz-expl.show{display:block;animation:rise .3s ease}
.quiz-score{text-align:center;padding:30px 10px}
.quiz-score .big{font-size:3rem;font-family:Georgia,serif;color:var(--primary-dark);font-weight:bold}
.quiz-score .btn{margin:6px}

/* ---------- VOCAB ---------- */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:14px;margin:18px 0}
.flip{perspective:900px;height:185px;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s;transform-style:preserve-3d}
.flip.on .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center}
.flip-front{background:var(--gradient);color:#fff;font-family:Georgia,serif;font-size:1.12rem;font-weight:bold}
.flip-back{background:#fff;border:2px solid var(--primary);transform:rotateY(180deg);font-size:.78rem;line-height:1.4;overflow-y:auto}
.match-zone{margin-top:26px}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.match-item{background:#f8f9fd;border:2px solid #e4e7f5;border-radius:10px;padding:11px 13px;cursor:pointer;font-size:.84rem;transition:all .15s}
.match-item.sel{border-color:var(--primary);background:#eef0ff}
.match-item.ok{border-color:var(--success);background:#e9f8f0;opacity:.6;cursor:default}
.match-item.ko{border-color:var(--error);background:#fdecea}
.xp-pop{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:#5a4300;padding:12px 26px;border-radius:30px;font-weight:bold;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:99;animation:rise .4s ease}

/* ---------- PLAN DEV ---------- */
.plan-step{border-left:3px solid var(--primary);padding:4px 0 4px 18px;margin:14px 0}
.plan-step h4{color:var(--primary-dark);margin-bottom:6px;font-family:Georgia,serif}
.sujet-box{background:var(--gradient);color:#fff;border-radius:12px;padding:18px 22px;font-size:1.02rem;font-weight:600;margin-bottom:20px}

@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:600px){
  header{flex-direction:column;align-items:flex-start}
  header .contacts{justify-content:flex-start}
  .panel{padding:18px}
  .match-cols{grid-template-columns:1fr}
}

/* ---------- PRINT ---------- */
@media print{
  header,.pdf-bar,.activities,.crumb,#btnHome,.btn,.btn-corr,.quiz-opt,.xp-pop,.encour{display:none!important}
  body{background:#fff}
  .panel{box-shadow:none;padding:0}
  .corr,.quiz-expl{display:block!important}
  main{max-width:100%;padding:0}
  .print-header{display:block!important;border-bottom:2px solid #667eea;padding-bottom:8px;margin-bottom:16px;font-size:.85rem;color:#555}
}
.print-header{display:none}
</style>
</head>

<script>
const CHAPTERS = [{"id": 1, "titre": "Première Guerre mondiale", "activite1_fiche": {"introduction": "La Première Guerre mondiale (1914-1918) marque une rupture majeure dans l'histoire du XXe siècle. Ce conflit, qui débute comme une guerre européenne, devient rapidement mondial et mobilise des millions de soldats et de civils. Elle inaugure l'ère des guerres totales, où l'ensemble des ressources économiques, humaines et technologiques d'un pays sont mobilisées pour l'effort de guerre. Cette guerre provoque des bouleversements politiques considérables : chute des empires, émergence de nouvelles puissances, redécoupage territorial de l'Europe par le traité de Versailles. Elle laisse également des séquelles profondes dans les sociétés européennes, traumatisées par une violence de masse sans précédent.", "partie1_titre": "I. LES ORIGINES DU CONFLIT", "partie1_contenu": "Plusieurs facteurs contribuent à la montée des tensions en Europe au début du XXe siècle. Le nationalisme exacerbé pousse les peuples à revendiquer leur indépendance ou leur unité. L'impérialisme colonial provoque des rivalités entre grandes puissances européennes. La course aux armements s'intensifie. Le système d'alliances divise l'Europe en deux blocs : la Triple-Alliance (Allemagne, Autriche-Hongrie, Italie) face à la Triple-Entente (France, Royaume-Uni, Russie). Le 28 juin 1914, l'archiduc François-Ferdinand est assassiné à Sarajevo par Gavrilo Princip. Cet événement déclenche un enchaînement diplomatique rapide qui transforme un conflit régional en guerre européenne.", "partie2_titre": "II. LES PHASES DU CONFLIT", "partie2_contenu": "La guerre de mouvement (août-novembre 1914) voit l'application du plan Schlieffen par l'Allemagne. La bataille de la Marne (6-13 septembre 1914) arrête l'avancée allemande et sauve Paris. La guerre de position (1915-1917) s'installe avec un système de tranchées de la mer du Nord à la Suisse. La bataille de Verdun (février-décembre 1916) fait 700 000 victimes. L'année 1917 est décisive avec la révolution russe et l'entrée en guerre des États-Unis. La fin de la guerre (1918) voit les dernières offensives allemandes échouer et l'armistice signé le 11 novembre 1918.", "partie3_titre": "III. UNE GUERRE TOTALE", "partie3_contenu": "La mobilisation économique est totale : les usines sont converties pour produire du matériel militaire. Les femmes remplacent les hommes dans les usines d'armement (munitionnettes). La mobilisation humaine concerne 8 millions d'hommes en France. La propagande et la censure sont organisées pour maintenir le moral. Les populations civiles subissent violences et privations. Le génocide arménien (1915-1916) fait 1,5 million de victimes.", "conclusion": "Le bilan est catastrophique : 10 millions de morts militaires, 8 millions de blessés graves. Le traité de Versailles (28 juin 1919) impose des conditions très dures à l'Allemagne, créant un ressentiment qui nourrira le nazisme. La SDN est créée pour maintenir la paix mais reste inefficace."}, "activite2_quiz": [{"question": "Quelle date marque l'attentat de Sarajevo ?", "options": ["28 juin 1914", "1er août 1914", "11 novembre 1918", "28 juin 1919"], "correcte": 0, "explication": "L'archiduc François-Ferdinand est assassiné le 28 juin 1914 à Sarajevo par Gavrilo Princip, déclenchant l'engrenage diplomatique qui conduit à la Première Guerre mondiale."}, {"question": "Quel système d'alliances oppose deux blocs avant 1914 ?", "options": ["OTAN vs Pacte de Varsovie", "Triple-Alliance vs Triple-Entente", "Axe vs Alliés", "CEE vs COMECON"], "correcte": 1, "explication": "La Triple-Alliance (Allemagne, Autriche-Hongrie, Italie) s'oppose à la Triple-Entente (France, Royaume-Uni, Russie)."}, {"question": "Quelle bataille arrête l'avancée allemande en septembre 1914 ?", "options": ["La bataille de la Marne", "La bataille de Verdun", "La bataille de la Somme", "La bataille de Tannenberg"], "correcte": 0, "explication": "La bataille de la Marne (6-13 septembre 1914) est une victoire défensive française qui sauve Paris et marque la fin de la guerre de mouvement."}, {"question": "Combien de temps dure la bataille de Verdun ?", "options": ["3 mois", "6 mois", "10 mois", "15 mois"], "correcte": 2, "explication": "La bataille de Verdun dure 10 mois (février-décembre 1916) et fait environ 700 000 victimes."}, {"question": "Comment appelle-t-on les soldats français de 14-18 ?", "options": ["Les poilus", "Les grognards", "Les maquisards", "Les tommies"], "correcte": 0, "explication": "Les poilus désignent les soldats français de la Grande Guerre."}, {"question": "En quelle année les États-Unis entrent-ils en guerre ?", "options": ["1914", "1915", "1916", "1917"], "correcte": 3, "explication": "Les États-Unis entrent en guerre le 6 avril 1917 aux côtés de l'Entente."}, {"question": "Quel événement de 1917 affaiblit la Russie ?", "options": ["Bataille de Tannenberg", "Révolution bolchevique", "Offensive Broussilov", "Siège de Stalingrad"], "correcte": 1, "explication": "La révolution russe (1917) aboutit au retrait de la Russie du conflit."}, {"question": "Quelle date marque la signature de l'armistice ?", "options": ["8 mai 1945", "11 novembre 1918", "18 juin 1940", "14 juillet 1918"], "correcte": 1, "explication": "L'armistice est signé le 11 novembre 1918 à 5h, les combats cessent à 11h."}, {"question": "Comment appelle-t-on les femmes dans les usines d'armement ?", "options": ["Les suffragettes", "Les munitionnettes", "Les Rosie", "Les ouvrières"], "correcte": 1, "explication": "Les munitionnettes remplacent les hommes dans les usines d'armement."}, {"question": "Où est signé le traité de paix en 1919 ?", "options": ["Versailles", "Paris", "Genève", "Berlin"], "correcte": 0, "explication": "Le traité de Versailles est signé le 28 juin 1919 dans la galerie des Glaces."}, {"question": "Combien de morts militaires la WWI fait-elle environ ?", "options": ["1 million", "5 millions", "10 millions", "20 millions"], "correcte": 2, "explication": "La Première Guerre mondiale fait environ 10 millions de morts militaires."}, {"question": "Quelle organisation internationale est créée après la guerre ?", "options": ["L'ONU", "La SDN", "L'OTAN", "La Croix-Rouge"], "correcte": 1, "explication": "La Société des Nations (SDN) est créée en 1920."}, {"question": "Quel général français organise la défense de Verdun ?", "options": ["Joffre", "Pétain", "Foch", "Nivelle"], "correcte": 1, "explication": "Le général Pétain organise la défense de Verdun en 1916."}, {"question": "Quelle est l'attitude de l'Italie au début de la Première Guerre mondiale ?", "options": ["Elle entre immédiatement en guerre aux côtés de l'Allemagne", "Elle reste neutre en 1914 puis rejoint l'Entente en 1915", "Elle reste neutre pendant toute la guerre", "Elle est envahie par la France dès 1914"], "correcte": 1, "explication": "Bien que membre de la Triple-Alliance avec l'Allemagne et l'Autriche-Hongrie, l'Italie se déclare neutre en 1914. En mai 1915, elle entre en guerre aux côtés de l'Entente (traité de Londres), espérant obtenir des territoires autrichiens."}, {"question": "Quel terme désigne les soldats défigurés ?", "options": ["Les invalides", "Les gueules cassées", "Les mutilés", "Les gazés"], "correcte": 1, "explication": "Les gueules cassées désignent les soldats gravement défigurés par les éclats d'obus."}, {"question": "Quel génocide est perpétré pendant la WWI ?", "options": ["Génocide arménien", "Shoah", "Génocide rwandais", "Génocide cambodgien"], "correcte": 0, "explication": "Le génocide arménien (1915-1916) fait 1,5 million de victimes."}, {"question": "Quelle arme chimique est utilisée massivement ?", "options": ["Napalm", "Gaz moutarde", "Agent orange", "Phosphore blanc"], "correcte": 1, "explication": "Les gaz de combat (chlore, ypérite ou gaz moutarde) sont utilisés massivement."}, {"question": "Que demande l'article 231 du traité de Versailles ?", "options": ["Reconnaître culpabilité allemande", "Limiter armée allemande", "Restituer Alsace-Lorraine", "Créer la SDN"], "correcte": 0, "explication": "L'article 231 déclare l'Allemagne seule responsable de la guerre."}, {"question": "Combien de soldats coloniaux combattent pour la France ?", "options": ["100 000", "300 000", "600 000", "1 million"], "correcte": 2, "explication": "Environ 600 000 soldats coloniaux combattent pour la France."}, {"question": "Quel président américain propose la création de la SDN ?", "options": ["Theodore Roosevelt", "Woodrow Wilson", "Franklin Roosevelt", "Harry Truman"], "correcte": 1, "explication": "Le président Woodrow Wilson propose la création de la SDN dans ses 14 points."}], "activite3_etude": {"document_type": "Témoignage", "document_titre": "Lettre d'un poilu à Verdun", "document_texte": "Nous sommes montés en ligne le 22 février au matin. Depuis trois jours, l'enfer s'est déchaîné sur nous. Les obus tombent sans discontinuer. On ne voit plus rien, on n'entend plus rien, sauf le sifflement des marmites et les explosions qui ébranlent la terre. Les copains tombent les uns après les autres. Hier, Durand a été emporté par un obus, il ne reste rien de lui. La boue, le sang, les cadavres, c'est notre quotidien. On ne dort plus, on ne mange presque plus. On attend la mort ou la relève, on ne sait pas ce qui viendra en premier. Le lieutenant nous a dit : 'Ils ne passeront pas.' Mais combien d'entre nous resteront vivants ?", "document_source": "Lettre d'un soldat français anonyme, 25 février 1916 - Archives de la Grande Guerre", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Quelles sont les conditions de vie des soldats décrites dans ce témoignage ?", "Que révèle ce document sur la violence de la bataille de Verdun ?", "Quelles sont les limites de ce document pour comprendre la bataille ?", "Rédigez 6-8 lignes montrant en quoi ce témoignage illustre la notion de 'guerre totale'"], "corrections": ["Ce document est une lettre écrite par un soldat français anonyme le 25 février 1916, soit quatre jours après le début de la bataille de Verdun. C'est une source primaire qui témoigne du vécu des combattants au cœur de la bataille la plus meurtrière de la Première Guerre mondiale.", "Les conditions de vie sont épouvantables. Le soldat décrit 'l'enfer' des bombardements incessants ('les obus tombent sans discontinuer'). La mort est omniprésente ('Les copains tombent les uns après les autres', 'Durand a été emporté par un obus, il ne reste rien de lui'). Les conditions matérielles sont terribles : 'La boue, le sang, les cadavres, c'est notre quotidien', 'On ne dort plus, on ne mange presque plus'. Le soldat oscille entre résignation ('On attend la mort ou la relève') et détermination ('Ils ne passeront pas').", "Ce document révèle l'extrême violence de Verdun à travers plusieurs éléments : l'intensité des bombardements ('l'enfer', 'les obus tombent sans discontinuer'), la mort de masse ('Les copains tombent les uns après les autres'), la brutalité des décès ('il ne reste rien de lui'), et la déshumanisation du combat ('La boue, le sang, les cadavres, c'est notre quotidien'). Le soldat évoque également l'incertitude permanente face à la mort ('On attend la mort ou la relève').", "Ce document a plusieurs limites : c'est un témoignage individuel qui ne reflète que l'expérience d'un seul soldat à un moment donné. Étant anonyme, on ne peut pas vérifier son authenticité absolue. Le soldat ne voit que sa portion de front et ignore la situation d'ensemble. Le document ne dit rien des motivations profondes, de la stratégie militaire ou du contexte politique. Enfin, il faut se méfier de la censure qui pouvait modifier les lettres.", "Ce témoignage illustre parfaitement la notion de 'guerre totale' car il montre la mobilisation extrême des soldats qui vivent dans des conditions inhumaines. La violence de masse est totale : les bombardements incessants, les pertes massives, la déshumanisation des combattants réduits à survivre dans 'la boue, le sang, les cadavres'. La détermination exprimée ('Ils ne passeront pas') révèle aussi l'embrigadement moral des soldats pour tenir coûte que coûte. Cette bataille de Verdun mobilise des centaines de milliers d'hommes et des millions d'obus, illustrant la mobilisation totale des ressources pour anéantir l'ennemi."]}, "activite4_developpement": {"sujet": "Expliquez pourquoi la Première Guerre mondiale est qualifiée de 'guerre totale'", "plan": {"introduction": "Présenter le contexte (1914-1918), définir 'guerre totale' (mobilisation de toutes les ressources), poser la problématique (En quoi la WWI est-elle une guerre totale ?), annoncer le plan (mobilisation des ressources / embrigadement des esprits et violence contre civils)", "partie1": "I. UNE MOBILISATION TOTALE DES RESSOURCES - Mobilisation humaine (8 millions de Français, 600 000 soldats coloniaux) - Mobilisation économique (usines converties en armement, munitionnettes 40% main d'œuvre) - Exemples précis : production obus passe de 13 000/jour en 1914 à 200 000 en 1918", "partie2": "II. EMBRIGADEMENT DES ESPRITS ET VIOLENCE CONTRE CIVILS - Propagande intensive (affiches, presse, cinéma pour maintenir moral) - Censure stricte (lettres contrôlées, journaux censurés) - Violence contre civils (populations occupées, génocide arménien 1,5M morts, bombardements)", "conclusion": "Bilan : la WWI mérite le qualificatif de guerre totale par la mobilisation complète des ressources et l'embrigadement total de la société. Ouverture : cette totalisation annonce la WWII qui poussera encore plus loin la logique d'anéantissement."}, "correction_complete": "La Première Guerre mondiale, qui se déroule de 1914 à 1918, marque une rupture majeure dans l'histoire des conflits armés. Pour la première fois, les États mobilisent l'ensemble de leurs ressources économiques, humaines et technologiques pour l'effort de guerre. Le terme de guerre totale désigne un conflit dans lequel toute la société, combattants comme civils, est mobilisée au service de la victoire. Comment la Première Guerre mondiale illustre-t-elle cette notion de guerre totale ? Nous verrons dans un premier temps la mobilisation de toutes les ressources matérielles et humaines, puis nous étudierons l'embrigadement des esprits et la violence exercée contre les populations civiles.\n\nLa Première Guerre mondiale mobilise des effectifs sans précédent. En France, 8 millions d'hommes sont appelés sous les drapeaux entre 1914 et 1918, soit près de 20% de la population totale. Les colonies participent également à l'effort de guerre : 600 000 soldats coloniaux (tirailleurs sénégalais, algériens, marocains, indochinois) combattent aux côtés des troupes métropolitaines. Cette mobilisation humaine massive transforme les armées européennes en véritables armées de masse. L'économie est entièrement convertie pour répondre aux besoins de la guerre. Les usines civiles sont transformées en usines d'armement produisant obus, canons, mitrailleuses, avions. La production industrielle s'adapte : en 1914, la France produit 13 000 obus par jour ; en 1918, elle en produit 200 000. L'État intervient massivement dans l'économie par la planification et le dirigisme. Les femmes remplacent les hommes partis au front dans tous les secteurs. Les munitionnettes travaillent dans les usines d'armement et représentent 40% de la main-d'œuvre industrielle française en 1918.\n\nLa guerre totale implique également une mobilisation des esprits. Les gouvernements organisent une propagande intensive pour maintenir le moral des troupes et de la population. Affiches, presse, cinéma diffusent des messages patriotiques qui glorifient les soldats, diabolisent l'ennemi et présentent la guerre comme une croisade du Bien contre le Mal. En France, les Allemands sont caricaturés en Boches barbares. Cette guerre des mots et des images vise à créer une culture de guerre justifiant tous les sacrifices. La censure accompagne la propagande. Les lettres des soldats sont contrôlées par les autorités militaires. Les journaux ne peuvent publier que des informations autorisées par le gouvernement. L'objectif est de préserver le moral de l'arrière et d'éviter que la lassitude ne s'installe. Enfin, les populations civiles ne sont plus épargnées. Dans les territoires occupés de Belgique et du nord de la France, les civils subissent réquisitions, travaux forcés, déportations. Le génocide arménien (1915-1916), perpétré par l'Empire ottoman, fait 1,5 million de victimes civiles. Les bombardements aériens, bien qu'encore limités, annoncent les guerres futures.\n\nLa Première Guerre mondiale mérite donc pleinement le qualificatif de guerre totale. Elle mobilise l'ensemble des ressources matérielles et humaines des nations, transforme l'économie en machine de guerre, embrigade les esprits par la propagande et n'épargne plus les populations civiles. Cette totalisation de la guerre annonce les conflits du XXe siècle, notamment la Seconde Guerre mondiale qui poussera encore plus loin la logique d'anéantissement total de l'adversaire."}, "activite5_vocabulaire": {"termes": [{"mot": "Guerre totale", "definition": "Conflit dans lequel l'ensemble des ressources d'un pays (économiques, humaines, technologiques) sont mobilisées pour l'effort de guerre. Les civils et les combattants participent à la guerre."}, {"mot": "Triple-Entente", "definition": "Alliance militaire regroupant la France, le Royaume-Uni et la Russie avant et pendant la Première Guerre mondiale."}, {"mot": "Poilus", "definition": "Surnom donné aux soldats français de la Première Guerre mondiale. Le terme viendrait de l'argot militaire signifiant courageux, viril."}, {"mot": "Munitionnettes", "definition": "Femmes qui travaillent dans les usines d'armement pendant la Première Guerre mondiale, remplaçant les hommes partis au front."}, {"mot": "Gueules cassées", "definition": "Expression désignant les soldats gravement défigurés par les éclats d'obus pendant la guerre."}, {"mot": "Propagande", "definition": "Action systématique exercée sur l'opinion publique pour faire accepter certaines idées. Pendant la guerre, elle vise à maintenir le moral."}, {"mot": "Armistice", "definition": "Convention signée par les belligérants en vue de suspendre les hostilités. L'armistice du 11 novembre 1918 met fin aux combats de la Première Guerre mondiale."}, {"mot": "Traité de Versailles", "definition": "Traité de paix signé le 28 juin 1919 entre l'Allemagne et les Alliés, imposant des conditions très dures à l'Allemagne."}, {"mot": "SDN", "definition": "Société des Nations, organisation internationale créée en 1920 pour maintenir la paix par la négociation et la sécurité collective."}, {"mot": "Génocide arménien", "definition": "Massacre systématique des Arméniens de l'Empire ottoman en 1915-1916 faisant 1,5 million de victimes."}], "notions_essentielles": ["La Première Guerre mondiale débute en 1914 suite à l'attentat de Sarajevo", "C'est une guerre totale mobilisant toute la société (soldats et civils)", "La bataille de Verdun (1916) symbolise l'horreur de la guerre", "Le traité de Versailles (1919) impose des conditions dures à l'Allemagne", "La guerre fait 10 millions de morts et crée un traumatisme profond"]}}, {"id": 2, "titre": "Démocraties fragilisées et expériences totalitaires (années 1930)", "activite1_fiche": {"introduction": "Dans les années 1930, l'Europe connaît une crise profonde. La crise économique de 1929, partie des États-Unis, frappe durement les sociétés européennes : chômage de masse, misère, instabilité politique. Dans ce contexte, les démocraties sont fragilisées et des régimes totalitaires s'installent ou se renforcent : le régime soviétique de Staline, l'Italie fasciste de Mussolini et l'Allemagne nazie de Hitler. Ces régimes partagent des caractéristiques communes : un chef tout-puissant, un parti unique, le contrôle total de la société, la terreur d'État et la volonté de créer un homme nouveau.", "partie1_titre": "I. L'URSS DE STALINE : UN RÉGIME TOTALITAIRE COMMUNISTE", "partie1_contenu": "Après la mort de Lénine en 1924, Staline s'impose à la tête de l'URSS. Il met en place une économie entièrement dirigée par l'État : la collectivisation des terres force les paysans à rejoindre des fermes collectives (kolkhozes). Cette politique provoque une famine terrible en Ukraine (1932-1933), appelée Holodomor, qui fait plusieurs millions de morts. Les plans quinquennaux organisent l'industrialisation forcée du pays. Staline impose un contrôle total de la société : culte de la personnalité, propagande omniprésente, jeunesses communistes. La terreur est un instrument de gouvernement : la police politique (NKVD) traque les opposants réels ou supposés. Lors de la Grande Terreur (1937-1938), environ 750 000 personnes sont exécutées. Des millions de Soviétiques sont déportés au Goulag, ensemble de camps de travail forcé.", "partie2_titre": "II. L'ALLEMAGNE NAZIE : UN RÉGIME TOTALITAIRE RACISTE", "partie2_contenu": "Hitler arrive légalement au pouvoir le 30 janvier 1933, nommé chancelier dans un contexte de crise économique majeure (6 millions de chômeurs). En quelques mois, il détruit la démocratie : incendie du Reichstag, pleins pouvoirs (mars 1933), interdiction des partis et syndicats, élimination des opposants internes lors de la Nuit des longs couteaux (1934). Le régime nazi repose sur une idéologie raciste et antisémite : les nazis affirment la supériorité de la prétendue race aryenne. Les Juifs sont progressivement exclus de la société : lois de Nuremberg (1935) qui leur retirent la citoyenneté allemande, pogrom de la Nuit de Cristal (9-10 novembre 1938). La société est embrigadée : Jeunesses hitlériennes, propagande de Goebbels, culte du Führer. La Gestapo et les SS font régner la terreur, les opposants sont envoyés dans les premiers camps de concentration comme Dachau (ouvert dès 1933).", "partie3_titre": "III. DES DÉMOCRATIES FRAGILISÉES : L'EXEMPLE DE LA FRANCE", "partie3_contenu": "La France des années 1930 traverse une grave crise politique, économique et sociale. La crise de 1929 atteint la France vers 1931 : chômage, faillites, baisse des salaires. L'antiparlementarisme se développe, alimenté par des scandales politico-financiers comme l'affaire Stavisky (1934). Le 6 février 1934, une manifestation de ligues d'extrême droite dégénère en émeute sanglante devant l'Assemblée nationale, faisant craindre un coup de force fasciste. En réaction, la gauche s'unit : socialistes (SFIO), communistes et radicaux forment le Front populaire qui remporte les élections de mai 1936. Léon Blum devient président du Conseil. Les accords Matignon (juin 1936) apportent des avancées sociales majeures : congés payés (2 semaines), semaine de 40 heures, conventions collectives, hausse des salaires. Mais le Front populaire se heurte aux difficultés économiques et éclate en 1938. La démocratie française résiste, mais elle est affaiblie face aux dictatures.", "conclusion": "Les années 1930 voient donc s'affronter deux modèles : les démocraties fragilisées par la crise et les régimes totalitaires qui embrigadent leurs populations. L'agressivité croissante de l'Allemagne nazie (remilitarisation, annexions) conduit l'Europe vers une nouvelle guerre mondiale. Le Front populaire montre cependant que la démocratie peut répondre à la crise par des réformes sociales plutôt que par la dictature."}, "activite2_quiz": [{"question": "En quelle année Hitler devient-il chancelier ?", "options": ["1929", "1933", "1936", "1939"], "correcte": 1, "explication": "Hitler est nommé chancelier le 30 janvier 1933 par le président Hindenburg, dans un contexte de crise économique majeure."}, {"question": "Qu'est-ce qu'un kolkhoze ?", "options": ["Un camp de travail", "Une ferme collective", "Un parti politique", "Une police secrète"], "correcte": 1, "explication": "Le kolkhoze est une ferme collective soviétique. La collectivisation forcée des terres par Staline provoque résistances et famines."}, {"question": "Que sont les lois de Nuremberg (1935) ?", "options": ["Des lois sociales", "Des lois antisémites", "Des lois électorales", "Des lois économiques"], "correcte": 1, "explication": "Les lois de Nuremberg retirent la citoyenneté allemande aux Juifs et interdisent les mariages entre Juifs et non-Juifs. Elles institutionnalisent l'antisémitisme nazi."}, {"question": "Qu'est-ce que le Goulag ?", "options": ["La police politique", "Un parti unique", "L'ensemble des camps de travail soviétiques", "Un plan économique"], "correcte": 2, "explication": "Le Goulag désigne l'administration des camps de travail forcé soviétiques où sont déportés des millions de personnes sous Staline."}, {"question": "Quel événement a lieu le 6 février 1934 en France ?", "options": ["L'élection du Front populaire", "Une émeute des ligues d'extrême droite", "Les accords Matignon", "L'affaire Stavisky"], "correcte": 1, "explication": "Le 6 février 1934, une manifestation antiparlementaire des ligues dégénère en émeute sanglante place de la Concorde, faisant craindre un coup de force contre la République."}, {"question": "Qui dirige le Front populaire en 1936 ?", "options": ["Édouard Daladier", "Léon Blum", "Maurice Thorez", "Philippe Pétain"], "correcte": 1, "explication": "Léon Blum, chef de la SFIO (socialistes), devient président du Conseil après la victoire du Front populaire en mai 1936."}, {"question": "Que prévoient les accords Matignon ?", "options": ["Congés payés et semaine de 40h", "Le droit de vote des femmes", "La nationalisation des banques", "Le service militaire obligatoire"], "correcte": 0, "explication": "Les accords Matignon (juin 1936) instaurent les congés payés (2 semaines), la semaine de 40 heures et les conventions collectives."}, {"question": "Qu'est-ce que la Nuit de Cristal ?", "options": ["Une fête nazie", "Un pogrom contre les Juifs", "Une bataille", "Un traité"], "correcte": 1, "explication": "Dans la nuit du 9 au 10 novembre 1938, les nazis organisent un pogrom : synagogues incendiées, commerces juifs pillés, environ 100 Juifs tués et 30 000 déportés."}, {"question": "Quelle famine frappe l'Ukraine en 1932-1933 ?", "options": ["L'Holodomor", "La Grande Terreur", "Le Goulag", "La NEP"], "correcte": 0, "explication": "L'Holodomor est la famine provoquée par la collectivisation stalinienne en Ukraine, faisant plusieurs millions de morts."}, {"question": "Qu'est-ce que la Grande Terreur (1937-1938) ?", "options": ["Une guerre civile", "Des purges massives en URSS", "Une crise économique", "Une révolution"], "correcte": 1, "explication": "La Grande Terreur désigne les purges staliniennes de 1937-1938 : environ 750 000 exécutions et des millions de déportations au Goulag."}, {"question": "Quel ministre organise la propagande nazie ?", "options": ["Himmler", "Goering", "Goebbels", "Hess"], "correcte": 2, "explication": "Joseph Goebbels est ministre de la Propagande du Reich. Il contrôle presse, radio, cinéma et organise le culte du Führer."}, {"question": "Quand ouvre le camp de Dachau ?", "options": ["1933", "1936", "1939", "1942"], "correcte": 0, "explication": "Dachau, premier grand camp de concentration nazi, ouvre dès mars 1933 pour enfermer les opposants politiques."}, {"question": "Quels partis composent le Front populaire ?", "options": ["SFIO, communistes, radicaux", "Ligues d'extrême droite", "Gaullistes et centristes", "Monarchistes"], "correcte": 0, "explication": "Le Front populaire unit la SFIO (socialistes), le Parti communiste et le Parti radical contre la menace fasciste."}, {"question": "Qu'est-ce que le culte de la personnalité ?", "options": ["Une religion d'État", "La glorification systématique du chef", "Un parti politique", "Une fête nationale"], "correcte": 1, "explication": "Le culte de la personnalité est la glorification systématique du chef (Staline, Hitler, Mussolini) par la propagande : portraits, statues, défilés."}, {"question": "Quel est le point commun des régimes totalitaires ?", "options": ["Le pluralisme politique", "Parti unique et terreur d'État", "Les élections libres", "La liberté de la presse"], "correcte": 1, "explication": "Les régimes totalitaires partagent : un chef tout-puissant, un parti unique, une idéologie officielle, la propagande, l'embrigadement et la terreur d'État."}], "activite3_etude": {"document_type": "Affiche de propagande", "document_titre": "Témoignage sur l'embrigadement de la jeunesse allemande", "document_texte": "« Nous étions dans les Jeunesses hitlériennes depuis l'âge de dix ans. On nous apprenait à marcher au pas, à chanter les chants du parti, à vénérer le Führer. Nos professeurs nous enseignaient que les Allemands étaient une race supérieure et que les Juifs étaient nos ennemis. Celui qui posait des questions était dénoncé. Mon meilleur ami a cessé de venir à l'école : son père avait critiqué le régime devant des voisins. Le soir, à la radio, nous écoutions les discours de Hitler. Ma mère n'osait plus parler de politique, même à la maison. Elle disait que les murs avaient des oreilles. »", "document_source": "Témoignage d'un ancien membre des Jeunesses hitlériennes, recueilli après 1945 (mémoires publiées)", "questions": ["Présentez le document (nature, auteur, contexte)", "Quels moyens le régime nazi utilise-t-il pour embrigader la jeunesse ?", "Relevez les éléments qui montrent que la population vit dans la peur", "Quelles sont les limites de ce témoignage pour l'historien ?", "Rédigez 6 à 8 lignes expliquant comment ce document illustre le contrôle total de la société par le régime nazi"], "corrections": ["Ce document est un témoignage d'un ancien membre des Jeunesses hitlériennes, publié après 1945, donc après la chute du régime nazi. L'auteur raconte son enfance dans l'Allemagne des années 1930. C'est une source primaire de type mémoires, rédigée a posteriori.", "Le régime embrigade la jeunesse par plusieurs moyens : l'enrôlement obligatoire dans les Jeunesses hitlériennes dès 10 ans, l'apprentissage militaire (marcher au pas), les chants du parti, le culte du Führer, l'endoctrinement scolaire (théories racistes enseignées par les professeurs) et la propagande radiophonique (discours de Hitler).", "Plusieurs éléments montrent la peur : la dénonciation de ceux qui posent des questions, la disparition de l'ami dont le père a critiqué le régime, le silence de la mère qui n'ose plus parler de politique même chez elle, et l'expression « les murs ont des oreilles » qui révèle la surveillance généralisée et la peur de la délation.", "Ce témoignage a des limites : il est rédigé après 1945, donc des années après les faits, avec les risques d'oubli ou de reconstruction de la mémoire. L'auteur peut chercher à se présenter comme une victime du système plutôt que comme un participant. Il ne reflète qu'une expérience individuelle. L'historien doit le croiser avec d'autres sources (archives, autres témoignages).", "Ce document illustre le totalitarisme nazi car il montre que le régime contrôle tous les aspects de la vie. L'État s'empare de la jeunesse à travers les Jeunesses hitlériennes et l'école, pour façonner un homme nouveau dévoué au Führer et imprégné de l'idéologie raciste. La propagande envahit l'espace privé par la radio. Surtout, la terreur s'étend jusque dans les familles : la délation brise les liens sociaux, chacun se méfie de tous, et même le domicile n'est plus un espace de liberté. Le régime nazi ne se contente donc pas d'obéissance : il exige l'adhésion totale des esprits, caractéristique fondamentale d'un régime totalitaire."]}, "activite4_developpement": {"sujet": "Décrivez les principales caractéristiques du régime nazi entre 1933 et 1939", "plan": {"introduction": "Contexte : crise de 1929, arrivée de Hitler au pouvoir en janvier 1933. Définition : régime totalitaire fondé sur une idéologie raciste. Problématique : quelles sont les caractéristiques du régime nazi ? Plan : dictature et embrigadement / idéologie raciste et antisémite", "partie1": "I. UNE DICTATURE QUI CONTRÔLE TOUTE LA SOCIÉTÉ : destruction de la démocratie (pleins pouvoirs mars 1933, parti unique), culte du Führer et propagande de Goebbels, embrigadement (Jeunesses hitlériennes), terreur (Gestapo, SS, camp de Dachau dès 1933)", "partie2": "II. UN RÉGIME FONDÉ SUR LE RACISME ET L'ANTISÉMITISME : idéologie de la race aryenne supérieure, exclusion progressive des Juifs (boycott 1933, lois de Nuremberg 1935), violences (Nuit de Cristal 1938), préparation de la guerre pour conquérir l'espace vital (Lebensraum)", "conclusion": "Bilan : le nazisme est un totalitarisme raciste qui détruit la démocratie et exclut les Juifs. Ouverture : cette idéologie conduit à la guerre et au génocide des Juifs d'Europe."}, "correction_complete": "Le 30 janvier 1933, Adolf Hitler, chef du parti nazi (NSDAP), est nommé chancelier de l'Allemagne dans un contexte de crise économique dramatique qui frappe le pays depuis 1929. En quelques années, il transforme l'Allemagne en un régime totalitaire fondé sur une idéologie raciste. Quelles sont les principales caractéristiques du régime nazi entre 1933 et 1939 ? Nous verrons d'abord que le nazisme est une dictature qui contrôle toute la société, puis qu'il repose sur une idéologie raciste et antisémite.\n\nDès son arrivée au pouvoir, Hitler détruit méthodiquement la démocratie allemande. Après l'incendie du Reichstag en février 1933, il obtient les pleins pouvoirs en mars 1933. Les partis politiques et les syndicats sont interdits : le NSDAP devient parti unique. Les opposants politiques sont arrêtés et envoyés dans les premiers camps de concentration, comme Dachau qui ouvre dès mars 1933. La terreur est assurée par la Gestapo, la police politique secrète, et par les SS de Himmler. La société entière est embrigadée. Le culte du Führer est organisé par la propagande de Goebbels, ministre de la Propagande : presse, radio, cinéma et grandes cérémonies comme les congrès de Nuremberg glorifient Hitler. La jeunesse est enrôlée dans les Jeunesses hitlériennes où elle apprend l'obéissance et l'idéologie nazie. L'école, les loisirs, le travail sont contrôlés par le régime qui veut créer un homme nouveau entièrement dévoué au nazisme.\n\nLe régime nazi repose ensuite sur une idéologie raciste. Hitler affirme l'existence d'une hiérarchie des races dans laquelle les Aryens, race prétendument supérieure, doivent dominer. Cette idéologie justifie l'exclusion des Juifs, désignés comme responsables de tous les malheurs de l'Allemagne. Dès avril 1933, les commerces juifs sont boycottés et les fonctionnaires juifs révoqués. Les lois de Nuremberg de septembre 1935 retirent aux Juifs la citoyenneté allemande et interdisent les mariages entre Juifs et non-Juifs. La violence s'intensifie avec la Nuit de Cristal, du 9 au 10 novembre 1938 : les synagogues sont incendiées, les commerces juifs pillés, une centaine de Juifs sont assassinés et 30 000 sont déportés en camps de concentration. Enfin, l'idéologie nazie prépare la guerre : Hitler veut conquérir un espace vital (Lebensraum) à l'Est pour la race aryenne, ce qui le conduit à remilitariser l'Allemagne et à multiplier les agressions extérieures.\n\nLe régime nazi se caractérise donc par une dictature totalitaire qui embrigade et terrorise la société, et par une idéologie raciste qui exclut violemment les Juifs. Cette logique de haine et de conquête conduit l'Europe à la Seconde Guerre mondiale en 1939 et aboutira au génocide des Juifs d'Europe, la Shoah."}, "activite5_vocabulaire": {"termes": [{"mot": "Totalitarisme", "definition": "Régime politique dans lequel l'État contrôle la totalité de la vie publique et privée des citoyens, par la propagande, l'embrigadement et la terreur."}, {"mot": "Führer", "definition": "Mot allemand signifiant guide ou chef. Titre porté par Hitler, qui concentre tous les pouvoirs en Allemagne nazie."}, {"mot": "Antisémitisme", "definition": "Hostilité et discrimination envers les Juifs. C'est un pilier de l'idéologie nazie."}, {"mot": "Lois de Nuremberg", "definition": "Lois antisémites de 1935 qui retirent la citoyenneté allemande aux Juifs et interdisent les mariages entre Juifs et non-Juifs."}, {"mot": "Gestapo", "definition": "Police politique secrète du régime nazi, chargée de traquer les opposants."}, {"mot": "Goulag", "definition": "Ensemble des camps de travail forcé soviétiques où sont déportés les opposants réels ou supposés au régime stalinien."}, {"mot": "Kolkhoze", "definition": "Ferme collective soviétique créée par la collectivisation forcée des terres sous Staline."}, {"mot": "Culte de la personnalité", "definition": "Glorification systématique et organisée du chef de l'État par la propagande (portraits, statues, cérémonies)."}, {"mot": "Front populaire", "definition": "Coalition de gauche (SFIO, communistes, radicaux) qui remporte les élections françaises de 1936 et mène des réformes sociales majeures."}, {"mot": "Accords Matignon", "definition": "Accords signés en juin 1936 instaurant les congés payés, la semaine de 40 heures et les conventions collectives en France."}], "notions_essentielles": ["Hitler arrive légalement au pouvoir en janvier 1933 puis détruit la démocratie", "Les régimes totalitaires (URSS, Allemagne, Italie) contrôlent toute la société par la propagande et la terreur", "Le nazisme repose sur une idéologie raciste et antisémite (lois de Nuremberg 1935)", "Staline impose la collectivisation et la terreur de masse (Goulag, Grande Terreur)", "En France, le Front populaire (1936) défend la démocratie par des réformes sociales (congés payés)"]}}, {"id": 3, "titre": "La Seconde Guerre mondiale, une guerre d'anéantissement (1939-1945)", "activite1_fiche": {"introduction": "La Seconde Guerre mondiale (1939-1945) est le conflit le plus meurtrier de l'histoire : entre 50 et 60 millions de morts, dont une majorité de civils. Déclenchée par l'invasion de la Pologne par l'Allemagne nazie le 1er septembre 1939, elle oppose l'Axe (Allemagne, Italie, Japon) aux Alliés (Royaume-Uni, URSS, États-Unis, France libre). C'est une guerre d'anéantissement : les belligérants cherchent à détruire totalement l'adversaire, ses armées, son économie, et parfois sa population. Elle est marquée par un crime sans précédent : le génocide des Juifs et des Tziganes d'Europe.", "partie1_titre": "I. UN CONFLIT AUX DIMENSIONS PLANÉTAIRES", "partie1_contenu": "De 1939 à 1942, l'Axe accumule les victoires. La Blitzkrieg (guerre éclair) allemande écrase la Pologne (1939) puis la France, qui signe l'armistice le 22 juin 1940. Le Royaume-Uni résiste seul lors de la bataille d'Angleterre (été 1940). En juin 1941, Hitler envahit l'URSS (opération Barbarossa). Le 7 décembre 1941, le Japon attaque la flotte américaine à Pearl Harbor : les États-Unis entrent en guerre, le conflit devient mondial. L'année 1942-1943 marque le tournant : victoire soviétique à Stalingrad (février 1943), victoires américaines dans le Pacifique (Midway), débarquement allié en Afrique du Nord. De 1943 à 1945, les Alliés reconquièrent l'Europe : débarquement de Normandie (6 juin 1944), libération de la France, prise de Berlin par l'Armée rouge. L'Allemagne capitule le 8 mai 1945. Le Japon capitule le 2 septembre 1945, après les bombardements atomiques d'Hiroshima (6 août) et Nagasaki (9 août).", "partie2_titre": "II. UNE GUERRE D'ANÉANTISSEMENT", "partie2_contenu": "La Seconde Guerre mondiale est marquée par une violence extrême contre les combattants et les civils. Sur le front de l'Est, la guerre prend un caractère idéologique et racial : Hitler veut anéantir le judéo-bolchevisme et réduire les Slaves en esclavage. La bataille de Stalingrad (septembre 1942 - février 1943) illustre cette violence : combats rue par rue, environ 800 000 morts côté Axe et plus d'un million côté soviétique. Les civils deviennent des cibles : bombardements massifs des villes (Londres, Dresde, Tokyo), sièges meurtriers (Leningrad, 900 jours, environ 1 million de morts), massacres de populations (Oradour-sur-Glane en France, 10 juin 1944). Les bombes atomiques lancées sur Hiroshima et Nagasaki font environ 200 000 morts, en grande majorité des civils. La guerre mobilise aussi les sciences et les économies entières : c'est une guerre totale portée à son paroxysme.", "partie3_titre": "III. LE GÉNOCIDE DES JUIFS ET DES TZIGANES", "partie3_contenu": "Le régime nazi organise l'extermination systématique des Juifs d'Europe. Dès 1939-1940, les Juifs de Pologne sont enfermés dans des ghettos (Varsovie) où des centaines de milliers meurent de faim et de maladie. À partir de l'invasion de l'URSS en 1941, les Einsatzgruppen (groupes mobiles de tuerie) fusillent plus d'un million de Juifs (Shoah par balles), comme à Babi Yar près de Kiev (33 000 morts en deux jours, septembre 1941). En janvier 1942, la conférence de Wannsee organise la Solution finale : la déportation de tous les Juifs d'Europe vers des centres de mise à mort. Dans les camps d'extermination (Auschwitz-Birkenau, Treblinka, Sobibor), les déportés sont assassinés dans des chambres à gaz dès leur arrivée. Auschwitz, le plus grand centre, est à la fois camp de concentration et centre d'extermination : environ 1,1 million de personnes y sont assassinées. Au total, la Shoah fait près de 6 millions de victimes juives, soit les deux tiers des Juifs d'Europe. Les Tziganes sont également victimes d'un génocide (environ 250 000 morts).", "conclusion": "La Seconde Guerre mondiale s'achève sur un bilan effroyable : 50 à 60 millions de morts, des villes détruites, des économies ruinées, et le traumatisme moral du génocide. La découverte des camps bouleverse les consciences. En 1945, les vainqueurs créent l'ONU pour préserver la paix et jugent les dirigeants nazis au procès de Nuremberg (1945-1946), où est défini le crime contre l'humanité."}, "activite2_quiz": [{"question": "Quand débute la Seconde Guerre mondiale en Europe ?", "options": ["1er septembre 1939", "3 septembre 1938", "22 juin 1940", "7 décembre 1941"], "correcte": 0, "explication": "La guerre débute le 1er septembre 1939 avec l'invasion de la Pologne par l'Allemagne. La France et le Royaume-Uni déclarent la guerre le 3 septembre."}, {"question": "Qu'est-ce que la Blitzkrieg ?", "options": ["Une guerre de tranchées", "Une guerre éclair", "Un blocus naval", "Une guerre froide"], "correcte": 1, "explication": "La Blitzkrieg (guerre éclair) combine chars et aviation pour percer rapidement les lignes ennemies. Elle permet à l'Allemagne d'écraser la Pologne puis la France."}, {"question": "Que se passe-t-il à Pearl Harbor le 7 décembre 1941 ?", "options": ["Un débarquement allié", "L'attaque japonaise contre la flotte américaine", "Une bataille navale britannique", "La capitulation du Japon"], "correcte": 1, "explication": "Le Japon attaque par surprise la base américaine de Pearl Harbor, provoquant l'entrée en guerre des États-Unis."}, {"question": "Quelle bataille marque le tournant de la guerre à l'Est ?", "options": ["Verdun", "Stalingrad", "La Marne", "Midway"], "correcte": 1, "explication": "La victoire soviétique à Stalingrad (février 1943) marque le tournant : l'Allemagne passe sur la défensive à l'Est."}, {"question": "Quand a lieu le débarquement de Normandie ?", "options": ["8 mai 1945", "6 juin 1944", "18 juin 1940", "11 novembre 1944"], "correcte": 1, "explication": "Le 6 juin 1944 (D-Day), les Alliés débarquent en Normandie, ouvrant un second front à l'Ouest."}, {"question": "Quand l'Allemagne capitule-t-elle ?", "options": ["6 juin 1944", "8 mai 1945", "2 septembre 1945", "11 novembre 1945"], "correcte": 1, "explication": "L'Allemagne capitule sans conditions le 8 mai 1945, après la prise de Berlin par l'Armée rouge."}, {"question": "Sur quelles villes sont lancées les bombes atomiques ?", "options": ["Tokyo et Kyoto", "Hiroshima et Nagasaki", "Osaka et Kobe", "Berlin et Dresde"], "correcte": 1, "explication": "Les États-Unis lancent la bombe atomique sur Hiroshima (6 août 1945) puis Nagasaki (9 août), provoquant la capitulation du Japon."}, {"question": "Que sont les Einsatzgruppen ?", "options": ["Des unités de chars", "Des groupes mobiles de tuerie", "Des camps de travail", "Des sous-marins"], "correcte": 1, "explication": "Les Einsatzgruppen sont des unités SS qui fusillent plus d'un million de Juifs en URSS occupée : c'est la Shoah par balles."}, {"question": "Que décide la conférence de Wannsee (janvier 1942) ?", "options": ["L'invasion de l'URSS", "L'organisation de la Solution finale", "L'armistice avec la France", "Le partage de l'Europe"], "correcte": 1, "explication": "La conférence de Wannsee organise la Solution finale : la déportation et l'extermination de tous les Juifs d'Europe."}, {"question": "Quel est le plus grand centre d'extermination nazi ?", "options": ["Dachau", "Auschwitz-Birkenau", "Buchenwald", "Drancy"], "correcte": 1, "explication": "Auschwitz-Birkenau est le plus grand centre de mise à mort : environ 1,1 million de personnes y sont assassinées, en grande majorité des Juifs."}, {"question": "Combien de Juifs sont victimes de la Shoah ?", "options": ["1 million", "3 millions", "6 millions", "10 millions"], "correcte": 2, "explication": "La Shoah fait près de 6 millions de victimes juives, soit les deux tiers des Juifs d'Europe."}, {"question": "Qu'est-ce qu'un ghetto ?", "options": ["Un camp d'extermination", "Un quartier fermé où sont enfermés les Juifs", "Une prison militaire", "Un centre de propagande"], "correcte": 1, "explication": "Les ghettos sont des quartiers clos où les nazis enferment les Juifs (Varsovie). Des centaines de milliers y meurent de faim et de maladie."}, {"question": "Que s'est-il passé à Oradour-sur-Glane le 10 juin 1944 ?", "options": ["Un débarquement", "Un massacre de civils par les SS", "Une bataille de chars", "Une rafle de résistants"], "correcte": 1, "explication": "La division SS Das Reich massacre 643 habitants d'Oradour-sur-Glane, illustrant la violence contre les civils."}, {"question": "Quel procès juge les dirigeants nazis en 1945-1946 ?", "options": ["Le procès de Tokyo", "Le procès de Nuremberg", "Le procès de La Haye", "Le procès de Berlin"], "correcte": 1, "explication": "Le procès de Nuremberg juge les principaux dirigeants nazis et définit le crime contre l'humanité."}, {"question": "Qu'est-ce qu'une guerre d'anéantissement ?", "options": ["Une guerre courte", "Une guerre visant la destruction totale de l'ennemi", "Une guerre sans combats", "Une guerre coloniale"], "correcte": 1, "explication": "Une guerre d'anéantissement vise la destruction totale de l'adversaire : armées, économies, et parfois populations civiles entières."}], "activite3_etude": {"document_type": "Témoignage historique", "document_titre": "Le témoignage de Primo Levi sur Auschwitz", "document_texte": "« Le wagon s'est arrêté. Nous avons vu apparaître une vaste plateforme éclairée par des projecteurs. Un peu plus loin, une rangée de camions. Puis tout s'est passé très vite. Des SS, jambes écartées, l'air impassible, se sont mis à interroger chacun : Quel âge ? En bonne santé ou malade ? En moins de dix minutes, le tri fut fait. Nous étions le groupe des hommes valides. Des autres, femmes, enfants, vieillards, de tous ceux-là, nous n'avons rien su : la nuit les engloutit, purement et simplement. Nous savons aujourd'hui que ce tri rapide et sommaire avait servi à juger si nous étions capables ou non de travailler utilement pour le Reich. »", "document_source": "Primo Levi, Si c'est un homme, 1947. Primo Levi, Juif italien, fut déporté à Auschwitz en février 1944.", "questions": ["Présentez le document et son auteur", "Que décrit Primo Levi dans cet extrait ?", "Que signifie la phrase « la nuit les engloutit » ?", "Pourquoi ce témoignage est-il précieux pour l'historien ?", "Rédigez 6 à 8 lignes expliquant en quoi ce document témoigne du processus d'extermination des Juifs d'Europe"], "corrections": ["Ce document est un extrait de Si c'est un homme, récit autobiographique publié en 1947 par Primo Levi, écrivain juif italien déporté à Auschwitz en février 1944. Il y témoigne de son arrivée au camp. C'est une source primaire majeure sur la Shoah, écrite par un survivant peu après les faits.", "Primo Levi décrit la sélection à l'arrivée du convoi à Auschwitz : les SS trient en quelques minutes les déportés. Les hommes jugés valides sont destinés au travail forcé ; les femmes, enfants et vieillards disparaissent immédiatement, envoyés vers les chambres à gaz sans que les autres déportés le sachent.", "Cette phrase signifie que les femmes, enfants et vieillards ont disparu sans laisser de trace : ils ont été immédiatement assassinés dans les chambres à gaz. L'euphémisme traduit l'ignorance des déportés à ce moment-là et l'anéantissement total de ces personnes, dont il ne reste rien.", "Ce témoignage est précieux car il provient d'un témoin direct, victime et survivant. Écrit dès 1947, il est proche des événements. Primo Levi décrit avec précision le fonctionnement de la machine d'extermination. Mais l'historien doit le compléter par d'autres sources : le témoin ne voit qu'une partie du processus et ignore sur le moment le sort des autres déportés.", "Ce document témoigne du caractère industriel et systématique de l'extermination. La sélection à l'arrivée révèle la logique nazie : seuls les déportés capables de travailler pour le Reich sont provisoirement épargnés, les autres sont immédiatement assassinés. La rapidité du tri (moins de dix minutes) montre une organisation rodée, déshumanisée, où des vies sont jugées en quelques secondes. La disparition immédiate des femmes, des enfants et des vieillards illustre la volonté d'anéantir un peuple entier, y compris les plus vulnérables. Auschwitz combine ainsi camp de travail et centre de mise à mort : c'est le cœur du génocide qui fera 6 millions de victimes juives."]}, "activite4_developpement": {"sujet": "Montrez que la Seconde Guerre mondiale est une guerre d'anéantissement", "plan": {"introduction": "Contexte : 1939-1945, conflit le plus meurtrier de l'histoire (50-60 millions de morts). Définition : guerre d'anéantissement = destruction totale de l'ennemi. Problématique : en quoi la WWII est-elle une guerre d'anéantissement ? Plan : violence extrême contre combattants et civils / génocide des Juifs et des Tziganes", "partie1": "I. UNE VIOLENCE EXTRÊME CONTRE LES COMBATTANTS ET LES CIVILS : guerre idéologique sur le front de l'Est (Stalingrad, 1,8 million de morts), civils ciblés (bombardements de Londres, Dresde, sièges de Leningrad), massacres (Oradour-sur-Glane), bombes atomiques (Hiroshima, Nagasaki, 200 000 morts)", "partie2": "II. LE GÉNOCIDE DES JUIFS ET DES TZIGANES : ghettos (Varsovie), Shoah par balles (Einsatzgruppen, Babi Yar), Solution finale (Wannsee 1942), camps d'extermination (Auschwitz, 1,1 million de morts), bilan de 6 millions de Juifs assassinés", "conclusion": "Bilan : violence totale contre soldats, civils et peuples entiers. Ouverture : en 1945, le procès de Nuremberg définit le crime contre l'humanité et l'ONU est créée pour préserver la paix."}, "correction_complete": "La Seconde Guerre mondiale, qui ravage le monde de 1939 à 1945, est le conflit le plus meurtrier de l'histoire avec 50 à 60 millions de morts, dont une majorité de civils. Contrairement aux guerres précédentes, les belligérants ne cherchent pas seulement la victoire militaire mais la destruction totale de l'adversaire. En quoi la Seconde Guerre mondiale est-elle une guerre d'anéantissement ? Nous montrerons d'abord que la violence atteint un degré extrême contre les combattants et les civils, puis que cette guerre est marquée par un crime unique : le génocide des Juifs et des Tziganes d'Europe.\n\nLa violence de la Seconde Guerre mondiale dépasse tout ce que l'humanité avait connu. Sur le front de l'Est, la guerre prend un caractère idéologique et racial : Hitler veut anéantir le communisme et réduire les peuples slaves en esclavage. La bataille de Stalingrad, de septembre 1942 à février 1943, illustre cette logique : les combats se déroulent rue par rue, maison par maison, et font près de deux millions de morts au total. Aucun camp ne fait de quartier. Les civils deviennent des cibles à part entière. Les bombardements massifs détruisent les villes : Londres pendant le Blitz, Dresde en février 1945, Tokyo en mars 1945. Le siège de Leningrad par les Allemands dure 900 jours et tue environ un million d'habitants, morts de faim et de froid. Des massacres frappent les populations occupées, comme à Oradour-sur-Glane le 10 juin 1944, où la division SS Das Reich assassine 643 villageois. Enfin, les bombes atomiques lancées sur Hiroshima le 6 août 1945 et Nagasaki le 9 août font environ 200 000 morts, presque tous civils : une seule arme peut désormais anéantir une ville entière.\n\nMais l'anéantissement atteint son paroxysme avec le génocide des Juifs et des Tziganes. Dès 1939-1940, les nazis enferment les Juifs de Pologne dans des ghettos, comme celui de Varsovie, où des centaines de milliers de personnes meurent de faim et de maladie. Avec l'invasion de l'URSS en juin 1941, les Einsatzgruppen, groupes mobiles de tuerie, fusillent plus d'un million de Juifs : c'est la Shoah par balles, illustrée par le massacre de Babi Yar où 33 000 Juifs de Kiev sont assassinés en deux jours. En janvier 1942, la conférence de Wannsee organise la Solution finale : tous les Juifs d'Europe doivent être déportés vers des centres de mise à mort. Dans les camps d'extermination comme Treblinka, Sobibor et surtout Auschwitz-Birkenau, les déportés sont gazés dès leur arrivée après une sélection sommaire. Environ 1,1 million de personnes sont assassinées à Auschwitz. Au total, la Shoah fait près de 6 millions de victimes juives, soit les deux tiers des Juifs d'Europe, auxquelles s'ajoutent environ 250 000 Tziganes exterminés.\n\nLa Seconde Guerre mondiale est donc bien une guerre d'anéantissement : anéantissement des armées dans des batailles d'une violence inouïe, anéantissement des villes et des civils par les bombardements, et anéantissement programmé de peuples entiers par le génocide. Face à l'ampleur de ces crimes, les Alliés jugent les dirigeants nazis au procès de Nuremberg en 1945-1946, où naît la notion de crime contre l'humanité, et créent l'ONU pour tenter de préserver la paix mondiale."}, "activite5_vocabulaire": {"termes": [{"mot": "Guerre d'anéantissement", "definition": "Guerre visant la destruction totale de l'adversaire : ses armées, son économie, et parfois sa population entière."}, {"mot": "Blitzkrieg", "definition": "Guerre éclair combinant chars et aviation pour percer rapidement les lignes ennemies. Stratégie allemande victorieuse de 1939 à 1941."}, {"mot": "Shoah", "definition": "Mot hébreu signifiant catastrophe. Désigne le génocide des Juifs d'Europe par les nazis : près de 6 millions de victimes."}, {"mot": "Génocide", "definition": "Extermination programmée et systématique d'un peuple en raison de ses origines."}, {"mot": "Ghetto", "definition": "Quartier fermé dans lequel les nazis enferment les populations juives (exemple : Varsovie)."}, {"mot": "Einsatzgruppen", "definition": "Unités SS chargées de fusiller les Juifs et les communistes en URSS occupée : la Shoah par balles."}, {"mot": "Solution finale", "definition": "Nom donné par les nazis au projet d'extermination de tous les Juifs d'Europe, organisé à la conférence de Wannsee (janvier 1942)."}, {"mot": "Camp d'extermination", "definition": "Centre de mise à mort où les déportés sont assassinés dans des chambres à gaz (Auschwitz-Birkenau, Treblinka, Sobibor)."}, {"mot": "Crime contre l'humanité", "definition": "Notion juridique définie au procès de Nuremberg (1945) : assassinat, extermination, déportation commis contre des populations civiles."}, {"mot": "Capitulation", "definition": "Reconnaissance officielle de la défaite militaire. L'Allemagne capitule le 8 mai 1945, le Japon le 2 septembre 1945."}], "notions_essentielles": ["La guerre débute le 1er septembre 1939 (invasion de la Pologne) et devient mondiale en décembre 1941 (Pearl Harbor)", "Stalingrad (1943) marque le tournant de la guerre en Europe", "C'est une guerre d'anéantissement : violence extrême contre soldats et civils (bombardements, massacres, bombes atomiques)", "La Shoah est le génocide de 6 millions de Juifs (ghettos, fusillades, camps d'extermination)", "La guerre s'achève les 8 mai et 2 septembre 1945 ; le procès de Nuremberg définit le crime contre l'humanité"]}}, {"id": 4, "titre": "Le monde bipolaire au temps de la guerre froide", "activite1_fiche": {"introduction": "Après 1945, l'alliance entre les vainqueurs de la Seconde Guerre mondiale se brise. Deux superpuissances aux modèles opposés s'affrontent : les États-Unis, défenseurs de la démocratie libérale et du capitalisme, et l'URSS, qui impose le communisme en Europe de l'Est. De 1947 à 1991, le monde vit au rythme de la guerre froide : un affrontement global (idéologique, politique, économique, culturel) mais sans guerre directe entre les deux Grands, car l'arme nucléaire rend un conflit direct suicidaire. C'est l'équilibre de la terreur.", "partie1_titre": "I. LA FORMATION DES BLOCS (1945-1949)", "partie1_contenu": "Dès 1946, Churchill dénonce le rideau de fer qui coupe l'Europe en deux. En 1947, la rupture est consommée : le président américain Truman propose d'endiguer le communisme (doctrine Truman, containment) et lance le plan Marshall, une aide économique massive pour reconstruire l'Europe. L'URSS répond par la doctrine Jdanov qui dénonce l'impérialisme américain, et impose des démocraties populaires en Europe de l'Est (Pologne, Hongrie, Tchécoslovaquie avec le coup de Prague en 1948). Deux alliances militaires se forment : l'OTAN (1949) autour des États-Unis, le pacte de Varsovie (1955) autour de l'URSS. L'Allemagne devient le symbole de la division : en 1948-1949, Staline organise le blocus de Berlin-Ouest ; les Américains répondent par un pont aérien d'un an. En 1949, deux États allemands sont créés : la RFA à l'Ouest, la RDA à l'Est.", "partie2_titre": "II. CRISES ET CONFLITS PÉRIPHÉRIQUES (1950-1975)", "partie2_contenu": "Les deux Grands s'affrontent indirectement dans des conflits périphériques. La guerre de Corée (1950-1953) oppose la Corée du Nord communiste, soutenue par la Chine et l'URSS, à la Corée du Sud soutenue par les États-Unis : elle fait près de 3 millions de morts et aboutit à la division durable du pays. À Berlin, pour stopper la fuite des Allemands de l'Est vers l'Ouest, la RDA construit en août 1961 le mur de Berlin, symbole mondial de la guerre froide. La crise la plus dangereuse est celle de Cuba (octobre 1962) : l'URSS installe des missiles nucléaires sur l'île, à 150 km des côtes américaines. Le président Kennedy impose un blocus naval ; pendant 13 jours, le monde frôle la guerre nucléaire, avant que Khrouchtchev ne retire les missiles. Après Cuba, les deux Grands entament la Détente : téléphone rouge, accords de limitation des armements (SALT). Mais la guerre du Vietnam (1964-1973) engage massivement les États-Unis contre le Nord-Vietnam communiste : c'est un échec américain traumatisant.", "partie3_titre": "III. LA FIN DE LA GUERRE FROIDE (1975-1991)", "partie3_contenu": "Dans les années 1980, l'URSS s'épuise : économie en crise, guerre coûteuse en Afghanistan (1979-1989), course aux armements relancée par le président américain Reagan. En 1985, Mikhaïl Gorbatchev arrive au pouvoir en URSS et lance des réformes : la perestroïka (restructuration économique) et la glasnost (transparence, liberté d'expression). Mais ces réformes ne suffisent pas et libèrent les aspirations des peuples. En 1989, les démocraties populaires d'Europe de l'Est s'effondrent les unes après les autres : c'est l'automne des peuples. Le 9 novembre 1989, le mur de Berlin tombe, événement symbolique majeur. L'Allemagne est réunifiée en 1990. En décembre 1991, l'URSS elle-même se disloque : la guerre froide est terminée, les États-Unis restent la seule superpuissance.", "conclusion": "Pendant plus de 40 ans, la guerre froide a structuré les relations internationales et divisé le monde en deux blocs. Sans jamais s'affronter directement, les deux Grands ont mené une lutte d'influence globale, des crises de Berlin à Cuba en passant par les guerres de Corée et du Vietnam. La chute du mur de Berlin (1989) et la disparition de l'URSS (1991) ouvrent une nouvelle ère, dominée par les États-Unis mais marquée par de nouvelles instabilités."}, "activite2_quiz": [{"question": "Quelles sont les deux superpuissances de la guerre froide ?", "options": ["France et Allemagne", "États-Unis et URSS", "Chine et Japon", "Royaume-Uni et URSS"], "correcte": 1, "explication": "La guerre froide oppose les États-Unis (bloc de l'Ouest, capitaliste) et l'URSS (bloc de l'Est, communiste) de 1947 à 1991."}, {"question": "Qu'est-ce que le rideau de fer ?", "options": ["Une muraille en Chine", "La frontière séparant l'Europe en deux blocs", "Un traité de paix", "Une arme secrète"], "correcte": 1, "explication": "Expression de Churchill (1946) désignant la frontière qui sépare l'Europe de l'Ouest et l'Europe de l'Est communiste."}, {"question": "Qu'est-ce que le plan Marshall (1947) ?", "options": ["Un plan militaire", "Une aide économique américaine à l'Europe", "Un plan d'invasion", "Un programme spatial"], "correcte": 1, "explication": "Le plan Marshall est une aide économique massive des États-Unis pour reconstruire l'Europe et endiguer le communisme."}, {"question": "Quelle alliance militaire est créée en 1949 autour des États-Unis ?", "options": ["Le pacte de Varsovie", "L'OTAN", "L'ONU", "La SDN"], "correcte": 1, "explication": "L'OTAN (Organisation du traité de l'Atlantique Nord) est l'alliance militaire du bloc de l'Ouest. Le pacte de Varsovie (1955) est son équivalent à l'Est."}, {"question": "Que se passe-t-il à Berlin en 1948-1949 ?", "options": ["La construction du mur", "Le blocus soviétique et le pont aérien", "La chute du mur", "La réunification"], "correcte": 1, "explication": "Staline bloque les accès terrestres à Berlin-Ouest. Les Américains ravitaillent la ville par un pont aérien pendant près d'un an."}, {"question": "En quelle année le mur de Berlin est-il construit ?", "options": ["1949", "1953", "1961", "1989"], "correcte": 2, "explication": "Le mur de Berlin est construit en août 1961 par la RDA pour empêcher la fuite des Allemands de l'Est vers l'Ouest."}, {"question": "Quelle crise fait frôler la guerre nucléaire en 1962 ?", "options": ["La crise de Suez", "La crise de Cuba", "La crise de Berlin", "La guerre de Corée"], "correcte": 1, "explication": "En octobre 1962, l'installation de missiles soviétiques à Cuba provoque 13 jours de crise extrême entre Kennedy et Khrouchtchev."}, {"question": "Qu'est-ce que l'équilibre de la terreur ?", "options": ["La paix mondiale", "La dissuasion nucléaire mutuelle", "Une alliance militaire", "Un traité de désarmement"], "correcte": 1, "explication": "Les deux Grands possèdent l'arme nucléaire : une guerre directe signifierait leur destruction mutuelle, ce qui les dissuade de s'affronter directement."}, {"question": "Quelle guerre oppose indirectement les deux blocs de 1950 à 1953 ?", "options": ["La guerre du Vietnam", "La guerre de Corée", "La guerre d'Algérie", "La guerre d'Afghanistan"], "correcte": 1, "explication": "La guerre de Corée (1950-1953) oppose le Nord communiste au Sud pro-américain. Elle fait près de 3 millions de morts."}, {"question": "Quel conflit est un traumatisme pour les États-Unis ?", "options": ["La guerre de Corée", "La guerre du Vietnam", "La guerre du Golfe", "La crise de Cuba"], "correcte": 1, "explication": "La guerre du Vietnam (1964-1973) est un échec américain : malgré des moyens énormes, les États-Unis ne peuvent vaincre le Nord-Vietnam communiste."}, {"question": "Qui dirige l'URSS à partir de 1985 ?", "options": ["Staline", "Khrouchtchev", "Brejnev", "Gorbatchev"], "correcte": 3, "explication": "Mikhaïl Gorbatchev lance la perestroïka et la glasnost pour réformer l'URSS, mais précipite involontairement sa chute."}, {"question": "Que signifient perestroïka et glasnost ?", "options": ["Guerre et paix", "Restructuration et transparence", "Armée et police", "Plan et marché"], "correcte": 1, "explication": "La perestroïka est la restructuration économique, la glasnost la transparence et la liberté d'expression. Réformes de Gorbatchev."}, {"question": "Quand tombe le mur de Berlin ?", "options": ["9 novembre 1989", "8 mai 1985", "25 décembre 1991", "3 octobre 1990"], "correcte": 0, "explication": "Le 9 novembre 1989, le mur de Berlin tombe sous la pression populaire : c'est le symbole de la fin de la guerre froide."}, {"question": "Quand l'URSS disparaît-elle ?", "options": ["1989", "1990", "1991", "1995"], "correcte": 2, "explication": "L'URSS se disloque en décembre 1991 : les républiques soviétiques deviennent indépendantes, la guerre froide est terminée."}, {"question": "Qu'est-ce qu'une démocratie populaire ?", "options": ["Une démocratie directe", "Un régime communiste imposé par l'URSS", "Une monarchie", "Une république fédérale"], "correcte": 1, "explication": "Les démocraties populaires sont les régimes communistes imposés par l'URSS en Europe de l'Est après 1945 (Pologne, Hongrie, RDA...)."}], "activite3_etude": {"document_type": "Discours historique", "document_titre": "Le discours de Kennedy à Berlin (26 juin 1963)", "document_texte": "« Il y a beaucoup de gens dans le monde qui ne comprennent pas, ou qui prétendent ne pas comprendre, quelle est la grande différence entre le monde libre et le monde communiste. Qu'ils viennent à Berlin ! Il y en a qui disent que le communisme est la vague de l'avenir. Qu'ils viennent à Berlin ! [...] La liberté connaît bien des difficultés et la démocratie n'est pas parfaite. Mais nous n'avons jamais eu besoin, nous, d'élever un mur pour empêcher notre peuple de s'enfuir. [...] Tous les hommes libres, où qu'ils vivent, sont citoyens de Berlin, et par conséquent, en tant qu'homme libre, je suis fier de prononcer ces mots : Ich bin ein Berliner ! »", "document_source": "John F. Kennedy, président des États-Unis, discours prononcé devant l'hôtel de ville de Berlin-Ouest, 26 juin 1963", "questions": ["Présentez le document (nature, auteur, date, contexte)", "À qui Kennedy s'adresse-t-il et que dénonce-t-il ?", "Que symbolise le mur de Berlin selon ce discours ?", "Pourquoi peut-on dire que ce discours est aussi un acte de propagande ?", "Rédigez 6 à 8 lignes expliquant pourquoi Berlin est un lieu symbolique de la guerre froide"], "corrections": ["Ce document est un discours politique prononcé par John F. Kennedy, président des États-Unis, le 26 juin 1963 à Berlin-Ouest, moins de deux ans après la construction du mur (août 1961). Kennedy s'exprime devant une foule immense au cœur de la guerre froide.", "Kennedy s'adresse aux Berlinois de l'Ouest, mais aussi au monde entier et au bloc communiste. Il dénonce le régime communiste qui a dû construire un mur pour empêcher sa population de fuir, preuve selon lui de l'échec de ce système face au monde libre.", "Le mur symbolise l'échec du communisme : Kennedy oppose la liberté de l'Ouest, qui n'a pas besoin d'enfermer ses citoyens, à l'Est qui emprisonne les siens. Le mur devient la preuve concrète et visible de la supériorité du modèle occidental.", "C'est un acte de propagande car Kennedy utilise ce discours pour valoriser le modèle américain dans la lutte idéologique contre l'URSS. La phrase « Ich bin ein Berliner » est un coup médiatique destiné à marquer les esprits. Le discours simplifie la réalité en opposant un monde libre parfait à un monde communiste uniquement répressif.", "Berlin est le lieu symbolique de la guerre froide car la ville concentre tous les affrontements entre les deux blocs. Située en pleine RDA communiste mais divisée en secteurs, elle est le point de contact direct entre l'Est et l'Ouest. Elle a connu le blocus de 1948-1949, auquel les Américains ont répondu par le pont aérien, puis la co
