nstruction du mur en 1961 qui coupe la ville en deux et sépare des familles entières. Chaque camp en fait une vitrine de son modèle : prospérité capitaliste à l'Ouest, socialisme à l'Est. La chute du mur, le 9 novembre 1989, marquera logiquement la fin symbolique de la guerre froide."]}, "activite4_developpement": {"sujet": "Montrez que Berlin est un symbole de la guerre froide entre 1945 et 1991", "plan": {"introduction": "Contexte : après 1945, l'Allemagne vaincue est occupée par les quatre vainqueurs ; Berlin, située en zone soviétique, est elle aussi divisée. Problématique : pourquoi Berlin symbolise-t-elle la guerre froide ? Plan : Berlin, enjeu d'affrontement / Berlin, ville coupée en deux puis réunifiée", "partie1": "I. BERLIN, ENJEU DE L'AFFRONTEMENT EST-OUEST (1945-1961) : division en 4 secteurs d'occupation, blocus de Berlin par Staline (1948-1949) et pont aérien américain, création de la RFA et de la RDA (1949), fuite massive des Allemands de l'Est par Berlin-Ouest", "partie2": "II. LE MUR, SYMBOLE DE LA DIVISION DU MONDE (1961-1989) : construction du mur en août 1961, familles séparées, morts en tentant de passer, discours de Kennedy (1963), chute du mur le 9 novembre 1989 et réunification allemande (1990)", "conclusion": "Bilan : Berlin concentre toutes les tensions de la guerre froide, du blocus à la chute du mur. Ouverture : la disparition de l'URSS en 1991 confirme la fin du monde bipolaire."}, "correction_complete": "En 1945, l'Allemagne vaincue est divisée en quatre zones d'occupation par les vainqueurs de la Seconde Guerre mondiale. Berlin, l'ancienne capitale, située en pleine zone soviétique, est elle-même partagée en quatre secteurs. Très vite, la ville devient le théâtre privilégié de l'affrontement entre les États-Unis et l'URSS. Pourquoi Berlin est-elle le symbole de la guerre froide ? Nous verrons d'abord que la ville est un enjeu majeur de l'affrontement Est-Ouest, puis que le mur construit en 1961 incarne la division du monde jusqu'en 1989.\n\nDès le début de la guerre froide, Berlin cristallise les tensions entre les deux Grands. En juin 1948, Staline décide de bloquer tous les accès terrestres à Berlin-Ouest pour obliger les Occidentaux à abandonner la ville. Les États-Unis répondent par un gigantesque pont aérien : pendant près d'un an, des avions ravitaillent les deux millions de Berlinois de l'Ouest en vivres et en charbon, avec un atterrissage toutes les deux minutes. Staline doit lever le blocus en mai 1949 : c'est la première grande victoire de l'Ouest dans la guerre froide. La même année, la division de l'Allemagne devient officielle avec la création de la RFA à l'Ouest et de la RDA à l'Est. Berlin-Ouest devient alors une vitrine du capitalisme au cœur du bloc communiste, et une porte de sortie : entre 1949 et 1961, près de trois millions d'Allemands de l'Est fuient vers l'Ouest en passant par Berlin, vidant la RDA de ses forces vives.\n\nPour stopper cette hémorragie, le régime est-allemand construit dans la nuit du 12 au 13 août 1961 un mur qui coupe la ville en deux. Long de plus de 150 kilomètres autour de Berlin-Ouest, gardé par des miradors et des soldats ayant ordre de tirer, le mur sépare brutalement des familles et des quartiers entiers. Environ 140 personnes meurent en tentant de le franchir. Le mur devient le symbole mondial de la guerre froide et de l'échec du communisme : comme le déclare le président Kennedy lors de son discours de juin 1963 (« Ich bin ein Berliner »), le monde libre n'a jamais eu besoin d'un mur pour retenir sa population. Pendant 28 ans, le mur incarne la division de l'Europe. Mais en 1989, les réformes de Gorbatchev en URSS et les manifestations populaires en RDA précipitent l'effondrement du bloc de l'Est. Le 9 novembre 1989, sous la pression de la foule, le mur tombe dans la liesse générale. L'Allemagne est réunifiée le 3 octobre 1990.\n\nBerlin a donc concentré, pendant plus de quarante ans, tous les épisodes majeurs de la guerre froide : le blocus de 1948, la construction du mur en 1961, et sa chute en 1989. La ville résume à elle seule la logique des blocs, l'affrontement des modèles et la victoire finale de l'Ouest. La dislocation de l'URSS en décembre 1991 confirme la fin du monde bipolaire et ouvre une ère nouvelle dans les relations internationales."}, "activite5_vocabulaire": {"termes": [{"mot": "Guerre froide", "definition": "Affrontement global (idéologique, politique, économique) entre les États-Unis et l'URSS de 1947 à 1991, sans conflit armé direct entre eux."}, {"mot": "Monde bipolaire", "definition": "Organisation du monde autour de deux superpuissances rivales : les États-Unis et l'URSS."}, {"mot": "Rideau de fer", "definition": "Expression de Churchill (1946) désignant la frontière fermée séparant l'Europe de l'Ouest de l'Europe de l'Est communiste."}, {"mot": "Plan Marshall", "definition": "Aide économique américaine massive (1947) destinée à reconstruire l'Europe et à endiguer le communisme."}, {"mot": "OTAN", "definition": "Organisation du traité de l'Atlantique Nord (1949) : alliance militaire du bloc de l'Ouest dirigée par les États-Unis."}, {"mot": "Pacte de Varsovie", "definition": "Alliance militaire du bloc de l'Est (1955) dirigée par l'URSS, en réponse à l'OTAN."}, {"mot": "Équilibre de la terreur", "definition": "Situation où les deux Grands, possédant l'arme nucléaire, renoncent à s'affronter directement par peur d'une destruction mutuelle."}, {"mot": "Mur de Berlin", "definition": "Mur construit en août 1961 par la RDA pour empêcher la fuite de sa population vers l'Ouest. Sa chute le 9 novembre 1989 symbolise la fin de la guerre froide."}, {"mot": "Détente", "definition": "Période d'apaisement des relations Est-Ouest après la crise de Cuba (1962) : dialogue, accords de limitation des armements."}, {"mot": "Perestroïka", "definition": "Politique de restructuration économique lancée par Gorbatchev en URSS à partir de 1985, accompagnée de la glasnost (transparence)."}], "notions_essentielles": ["La guerre froide (1947-1991) oppose deux blocs sans affrontement direct grâce à l'équilibre de la terreur", "Le plan Marshall et la doctrine Truman lancent la rupture en 1947", "Berlin est le symbole de la guerre froide : blocus (1948), mur (1961), chute du mur (1989)", "La crise de Cuba (1962) fait frôler la guerre nucléaire", "L'URSS disparaît en décembre 1991 : fin du monde bipolaire"]}}, {"id": 5, "titre": "Indépendances et construction de nouveaux États", "activite1_fiche": {"introduction": "En 1945, les empires coloniaux européens dominent encore une grande partie de l'Afrique et de l'Asie. Mais la Seconde Guerre mondiale a affaibli les métropoles et renforcé les mouvements nationalistes dans les colonies. Entre 1945 et 1975, la quasi-totalité des colonies accède à l'indépendance : c'est la décolonisation. Elle se fait parfois par la négociation, parfois par la guerre. Les nouveaux États doivent ensuite relever d'immenses défis : construire un État, développer leur économie et trouver leur place dans un monde dominé par la guerre froide.", "partie1_titre": "I. LES CAUSES DE LA DÉCOLONISATION", "partie1_contenu": "Plusieurs facteurs expliquent la décolonisation après 1945. D'abord, la Seconde Guerre mondiale a affaibli le prestige et les économies des puissances coloniales : la France et le Royaume-Uni, ruinés, ne peuvent plus tenir leurs empires. Les colonies ont fourni soldats et ressources pendant la guerre et réclament la reconnaissance de leurs droits. Ensuite, les mouvements nationalistes se renforcent, portés par des leaders charismatiques : Gandhi en Inde, Hô Chi Minh au Vietnam, Bourguiba en Tunisie. Enfin, le contexte international est favorable : les deux superpuissances, États-Unis et URSS, sont hostiles au colonialisme, et l'ONU affirme le droit des peuples à disposer d'eux-mêmes. En 1955, la conférence de Bandung réunit 29 pays d'Asie et d'Afrique qui condamnent le colonialisme et encouragent les peuples encore colonisés à se libérer.", "partie2_titre": "II. DES INDÉPENDANCES NÉGOCIÉES OU ARRACHÉES PAR LA GUERRE", "partie2_contenu": "Certaines indépendances sont obtenues par la négociation. L'Inde britannique, sous l'impulsion de Gandhi et de sa stratégie de non-violence (désobéissance civile, boycott des produits anglais), obtient son indépendance en 1947. Mais elle est divisée en deux États : l'Inde, à majorité hindoue, et le Pakistan, musulman, dans des violences qui font des centaines de milliers de morts. En Afrique, la plupart des colonies françaises et britanniques accèdent pacifiquement à l'indépendance vers 1960 (année des indépendances africaines : 17 pays). D'autres indépendances sont arrachées par la guerre. En Indochine, la France affronte le Viêt-minh d'Hô Chi Minh de 1946 à 1954 : la défaite de Diên Biên Phu (mai 1954) contraint la France à se retirer. En Algérie, colonie de peuplement avec un million d'Européens, la guerre (1954-1962) est particulièrement violente : attentats du FLN, répression de l'armée française, torture. Les accords d'Évian (mars 1962) reconnaissent l'indépendance de l'Algérie.", "partie3_titre": "III. LES DÉFIS DES NOUVEAUX ÉTATS", "partie3_contenu": "Les nouveaux États indépendants font face à d'immenses défis. Défi politique d'abord : construire un État stable avec des frontières souvent héritées de la colonisation, qui ne correspondent pas aux réalités ethniques (sources de guerres civiles, comme au Nigéria avec la guerre du Biafra). Beaucoup de pays connaissent des dictatures ou des coups d'État. Défi économique ensuite : les économies restent dépendantes des anciennes métropoles (exportation de matières premières), c'est le néocolonialisme. La croissance démographique très forte aggrave la pauvreté. Défi diplomatique enfin : dans le contexte de la guerre froide, les nouveaux États cherchent une troisième voie. En 1961, la conférence de Belgrade fonde le mouvement des non-alignés, qui refuse l'alignement sur les deux blocs. On parle alors de tiers-monde pour désigner ces pays pauvres qui veulent peser sur la scène internationale.", "conclusion": "En une trentaine d'années, la décolonisation a fait naître des dizaines d'États nouveaux et transformé la carte du monde. Mais l'indépendance politique n'a pas toujours apporté le développement : de nombreux pays du tiers-monde restent marqués par la pauvreté, l'instabilité politique et la dépendance économique. La décolonisation a néanmoins permis l'émergence de nouvelles voix sur la scène internationale, du mouvement des non-alignés aux puissances émergentes d'aujourd'hui."}, "activite2_quiz": [{"question": "Qu'est-ce que la décolonisation ?", "options": ["La conquête de colonies", "L'accès des colonies à l'indépendance", "Une guerre entre colonies", "Un traité commercial"], "correcte": 1, "explication": "La décolonisation est le processus par lequel les colonies accèdent à l'indépendance, principalement entre 1945 et 1975."}, {"question": "Quel leader indien prône la non-violence ?", "options": ["Nehru", "Gandhi", "Hô Chi Minh", "Bourguiba"], "correcte": 1, "explication": "Gandhi mène la lutte pour l'indépendance de l'Inde par la non-violence : désobéissance civile, boycott des produits britanniques."}, {"question": "En quelle année l'Inde devient-elle indépendante ?", "options": ["1945", "1947", "1954", "1962"], "correcte": 1, "explication": "L'Inde britannique devient indépendante en 1947, mais elle est divisée entre l'Inde (hindoue) et le Pakistan (musulman)."}, {"question": "Que se passe-t-il à Diên Biên Phu en 1954 ?", "options": ["Une victoire française", "Une défaite française décisive", "Un traité de paix", "Une conférence internationale"], "correcte": 1, "explication": "La défaite de Diên Biên Phu (mai 1954) face au Viêt-minh contraint la France à quitter l'Indochine."}, {"question": "Quand a lieu la guerre d'Algérie ?", "options": ["1946-1954", "1954-1962", "1962-1970", "1950-1953"], "correcte": 1, "explication": "La guerre d'Algérie dure de 1954 à 1962. Elle s'achève par les accords d'Évian qui reconnaissent l'indépendance algérienne."}, {"question": "Quel mouvement mène la lutte pour l'indépendance algérienne ?", "options": ["Le Viêt-minh", "Le FLN", "Le Congrès", "Le Néo-Destour"], "correcte": 1, "explication": "Le FLN (Front de libération nationale) déclenche l'insurrection le 1er novembre 1954 et mène la guerre d'indépendance."}, {"question": "Que signent la France et le FLN en mars 1962 ?", "options": ["Le traité de Rome", "Les accords d'Évian", "Les accords de Genève", "La conférence de Bandung"], "correcte": 1, "explication": "Les accords d'Évian (18 mars 1962) mettent fin à la guerre et reconnaissent l'indépendance de l'Algérie."}, {"question": "Que réunit la conférence de Bandung en 1955 ?", "options": ["Les puissances coloniales", "29 pays d'Asie et d'Afrique", "Les membres de l'OTAN", "Les pays communistes"], "correcte": 1, "explication": "La conférence de Bandung (1955) réunit 29 pays d'Asie et d'Afrique qui condamnent le colonialisme."}, {"question": "Qu'est-ce que le mouvement des non-alignés ?", "options": ["Une alliance militaire", "Le refus de s'aligner sur les deux blocs", "Un parti politique", "Une organisation économique"], "correcte": 1, "explication": "Fondé à Belgrade en 1961, le mouvement des non-alignés regroupe les pays qui refusent de choisir entre les États-Unis et l'URSS."}, {"question": "Qu'est-ce que le tiers-monde ?", "options": ["Le bloc communiste", "Les pays pauvres issus de la décolonisation", "L'Europe de l'Ouest", "Les pays pétroliers"], "correcte": 1, "explication": "Le tiers-monde désigne les pays pauvres, souvent issus de la décolonisation, qui n'appartiennent ni au bloc de l'Ouest ni au bloc de l'Est."}, {"question": "Quelle année est appelée année des indépendances africaines ?", "options": ["1947", "1954", "1960", "1962"], "correcte": 2, "explication": "En 1960, 17 pays africains accèdent à l'indépendance, principalement d'anciennes colonies françaises."}, {"question": "Qu'est-ce que le néocolonialisme ?", "options": ["Une nouvelle colonisation militaire", "La dépendance économique persistante des anciennes colonies", "Un mouvement artistique", "Une alliance politique"], "correcte": 1, "explication": "Le néocolonialisme désigne la domination économique que les anciennes métropoles continuent d'exercer sur les pays devenus indépendants."}, {"question": "Pourquoi la guerre d'Algérie est-elle particulièrement violente ?", "options": ["L'Algérie est une colonie de peuplement", "L'Algérie est très éloignée", "L'Algérie n'a pas de ressources", "L'ONU soutient la France"], "correcte": 0, "explication": "L'Algérie compte un million d'Européens (pieds-noirs) et est considérée comme partie intégrante de la France, ce qui rend le conflit particulièrement âpre."}, {"question": "Quel problème posent les frontières des nouveaux États africains ?", "options": ["Elles sont trop courtes", "Elles sont héritées de la colonisation sans tenir compte des peuples", "Elles sont maritimes", "Elles n'existent pas"], "correcte": 1, "explication": "Les frontières tracées par les colonisateurs séparent ou regroupent arbitrairement des peuples différents, provoquant des conflits comme la guerre du Biafra."}, {"question": "Qui sont les deux superpuissances hostiles au colonialisme ?", "options": ["France et Royaume-Uni", "États-Unis et URSS", "Chine et Japon", "Allemagne et Italie"], "correcte": 1, "explication": "Les États-Unis (anciens colonisés) et l'URSS (anti-impérialiste) sont tous deux hostiles aux empires coloniaux européens."}], "activite3_etude": {"document_type": "Discours historique", "document_titre": "Le discours de Sékou Touré face au général de Gaulle (Conakry, 25 août 1958)", "document_texte": "« Nous préférons la pauvreté dans la liberté à la richesse dans l'esclavage. [...] Nous ne renoncerons pas et nous ne renoncerons jamais à notre droit légitime à l'indépendance. [...] La Guinée veut être un pays libre, maître de son destin. Nous sommes prêts à coopérer avec la France, mais dans l'égalité et la dignité, et non dans la soumission. Il n'y a pas de dignité sans liberté : nous préférons la liberté. »", "document_source": "Sékou Touré, leader nationaliste guinéen, discours prononcé devant le général de Gaulle à Conakry, 25 août 1958. La Guinée vote non au référendum proposé par de Gaulle et devient indépendante le 2 octobre 1958.", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Que réclame Sékou Touré dans ce discours ?", "Expliquez la phrase : « Nous préférons la pauvreté dans la liberté à la richesse dans l'esclavage »", "Quelle relation Sékou Touré propose-t-il avec la France ?", "Rédigez 6 à 8 lignes expliquant comment ce discours illustre les aspirations des peuples colonisés après 1945"], "corrections": ["Ce document est un discours politique prononcé par Sékou Touré, leader nationaliste guinéen, le 25 août 1958 à Conakry, devant le général de Gaulle. Le contexte : de Gaulle propose aux colonies africaines un référendum sur la Communauté française. La Guinée sera le seul territoire à voter non, devenant indépendante dès octobre 1958.", "Sékou Touré réclame l'indépendance immédiate de la Guinée. Il revendique le droit légitime de son peuple à la liberté et refuse toute forme de soumission à la France, tout en se disant prêt à une coopération entre égaux.", "Cette phrase signifie que la liberté politique passe avant la prospérité matérielle : Sékou Touré préfère une Guinée indépendante mais pauvre, privée de l'aide française, plutôt qu'une Guinée prospère mais soumise à la métropole. La dignité du peuple n'a pas de prix.", "Sékou Touré ne rejette pas la France : il propose une coopération fondée sur l'égalité et la dignité entre deux États souverains, et non une relation de domination entre métropole et colonie. Il refuse la soumission, pas le partenariat.", "Ce discours illustre parfaitement les aspirations des peuples colonisés après 1945. Comme Gandhi en Inde ou Hô Chi Minh au Vietnam, Sékou Touré exprime la revendication fondamentale d'indépendance et de dignité qui anime les mouvements nationalistes. Son discours montre que les colonisés ne demandent plus des réformes mais la pleine souveraineté, quitte à en payer le prix économique. Il révèle aussi le nouveau rapport de force : le leader africain ose défier publiquement le chef de la France. Enfin, la victoire du non en Guinée encourage les autres colonies : deux ans plus tard, en 1960, dix-sept pays africains accèdent à l'indépendance."]}, "activite4_developpement": {"sujet": "Décrivez les formes de la décolonisation et les défis des nouveaux États après 1945", "plan": {"introduction": "Contexte : en 1945, les empires coloniaux affaiblis font face à la montée des nationalismes. Problématique : comment les colonies deviennent-elles indépendantes et quels défis affrontent-elles ? Plan : des indépendances négociées ou conquises par la guerre / les défis des nouveaux États", "partie1": "I. DES INDÉPENDANCES NÉGOCIÉES OU CONQUISES PAR LA GUERRE : indépendances négociées (Inde 1947 avec Gandhi et la non-violence, Afrique francophone en 1960), indépendances par la guerre (Indochine 1946-1954 et Diên Biên Phu, Algérie 1954-1962 et accords d'Évian)", "partie2": "II. LES DÉFIS DES NOUVEAUX ÉTATS : défi politique (frontières artificielles, instabilité, guerres civiles), défi économique (dépendance, néocolonialisme, pauvreté), défi diplomatique (Bandung 1955, non-alignés 1961, tiers-monde)", "conclusion": "Bilan : la décolonisation transforme la carte du monde mais l'indépendance ne garantit pas le développement. Ouverture : certains pays du Sud deviendront des puissances émergentes."}, "correction_complete": "En 1945, au lendemain de la Seconde Guerre mondiale, les empires coloniaux européens dominent encore l'Afrique et une grande partie de l'Asie. Mais la guerre a affaibli les métropoles et renforcé les mouvements nationalistes. En trente ans, la quasi-totalité des colonies accède à l'indépendance. Comment les peuples colonisés conquièrent-ils leur indépendance, et quels défis les nouveaux États doivent-ils relever ? Nous étudierons d'abord les différentes formes de la décolonisation, puis les difficultés auxquelles font face les jeunes nations.\n\nLa décolonisation emprunte deux voies principales. Dans certains cas, l'indépendance est obtenue par la négociation. C'est le cas de l'Inde britannique : Gandhi y mène depuis les années 1920 une lutte non-violente fondée sur la désobéissance civile et le boycott des produits anglais. Épuisé par la guerre, le Royaume-Uni accorde l'indépendance en 1947, mais le territoire est divisé entre l'Inde, à majorité hindoue, et le Pakistan musulman, dans des violences qui font des centaines de milliers de morts. En Afrique, la plupart des colonies françaises et britanniques accèdent pacifiquement à l'indépendance autour de 1960, année où dix-sept pays africains deviennent souverains. Dans d'autres cas, l'indépendance est arrachée par la guerre. En Indochine, la France affronte de 1946 à 1954 le Viêt-minh communiste d'Hô Chi Minh : la défaite de Diên Biên Phu en mai 1954 contraint la France au retrait. En Algérie, colonie de peuplement où vivent un million d'Européens, la guerre déclenchée par le FLN en novembre 1954 est d'une violence extrême : attentats, répression, torture. Elle s'achève par les accords d'Évian en mars 1962, qui reconnaissent l'indépendance algérienne.\n\nUne fois indépendants, les nouveaux États affrontent d'immenses défis. Sur le plan politique, ils doivent construire des États stables avec des frontières héritées de la colonisation, tracées sans tenir compte des peuples : ces frontières artificielles provoquent des guerres civiles, comme celle du Biafra au Nigéria. Beaucoup de pays sombrent dans la dictature ou les coups d'État militaires. Sur le plan économique, les jeunes nations restent dépendantes des anciennes métropoles auxquelles elles vendent leurs matières premières : cette domination persistante est appelée néocolonialisme. La forte croissance démographique aggrave la pauvreté. Sur le plan diplomatique enfin, les nouveaux États cherchent à exister entre les deux blocs de la guerre froide. La conférence de Bandung, en 1955, condamne le colonialisme et affirme la solidarité afro-asiatique. En 1961, la conférence de Belgrade fonde le mouvement des non-alignés, qui refuse la soumission aux États-Unis comme à l'URSS. Ces pays pauvres mais nombreux forment le tiers-monde, qui veut peser sur la scène internationale.\n\nLa décolonisation a donc profondément transformé le monde : en une génération, des dizaines d'États nouveaux sont nés, par la négociation ou par la guerre. Mais l'indépendance politique n'a pas suffi à garantir le développement, et beaucoup de pays du tiers-monde restent marqués par la pauvreté et l'instabilité. Certains, comme l'Inde, deviendront cependant les puissances émergentes du XXIe siècle."}, "activite5_vocabulaire": {"termes": [{"mot": "Décolonisation", "definition": "Processus par lequel les colonies accèdent à l'indépendance, principalement entre 1945 et 1975."}, {"mot": "Nationalisme", "definition": "Mouvement politique revendiquant l'indépendance d'un peuple et la création d'un État souverain."}, {"mot": "Non-violence", "definition": "Stratégie de lutte sans armes prônée par Gandhi : désobéissance civile, boycott, manifestations pacifiques."}, {"mot": "FLN", "definition": "Front de libération nationale, mouvement qui mène la guerre d'indépendance algérienne de 1954 à 1962."}, {"mot": "Accords d'Évian", "definition": "Accords signés le 18 mars 1962 entre la France et le FLN, reconnaissant l'indépendance de l'Algérie."}, {"mot": "Conférence de Bandung", "definition": "Conférence de 1955 réunissant 29 pays d'Asie et d'Afrique qui condamnent le colonialisme."}, {"mot": "Non-alignement", "definition": "Position des pays qui refusent de s'aligner sur l'un des deux blocs de la guerre froide (mouvement fondé à Belgrade en 1961)."}, {"mot": "Tiers-monde", "definition": "Ensemble des pays pauvres, souvent issus de la décolonisation, n'appartenant ni au bloc de l'Ouest ni au bloc de l'Est."}, {"mot": "Néocolonialisme", "definition": "Domination économique exercée par les anciennes métropoles sur les pays devenus indépendants."}, {"mot": "Colonie de peuplement", "definition": "Colonie où s'est installée une importante population venue de la métropole, comme l'Algérie avec un million d'Européens."}], "notions_essentielles": ["La décolonisation (1945-1975) est favorisée par l'affaiblissement des métropoles et la montée des nationalismes", "L'Inde obtient son indépendance par la négociation (1947), l'Algérie par la guerre (1954-1962)", "La défaite de Diên Biên Phu (1954) chasse la France d'Indochine", "Les conférences de Bandung (1955) et Belgrade (1961) affirment le tiers-monde et le non-alignement", "Les nouveaux États affrontent des défis politiques, économiques et diplomatiques majeurs"]}}, {"id": 6, "titre": "Affirmation et mise en oeuvre du projet européen", "activite1_fiche": {"introduction": "Après 1945, l'Europe est ruinée et divisée par deux guerres mondiales nées sur son sol. Pour empêcher un nouveau conflit, notamment entre la France et l'Allemagne, des dirigeants européens lancent un projet inédit : unir les pays d'Europe par l'économie pour garantir la paix. De la CECA (1951) à l'Union européenne d'aujourd'hui, la construction européenne s'est progressivement élargie et approfondie, malgré des crises et des débats sur son avenir.", "partie1_titre": "I. LES DÉBUTS DE LA CONSTRUCTION EUROPÉENNE (1950-1957)", "partie1_contenu": "Le 9 mai 1950, Robert Schuman, ministre français des Affaires étrangères, propose dans une déclaration historique de placer la production franco-allemande de charbon et d'acier sous une autorité commune. L'idée, inspirée par Jean Monnet, est simple : rendre la guerre matériellement impossible en unissant les économies. En 1951, le traité de Paris crée la CECA (Communauté européenne du charbon et de l'acier) entre six pays : France, RFA, Italie, Belgique, Pays-Bas, Luxembourg. Le succès de la CECA conduit les Six à aller plus loin : le 25 mars 1957, les traités de Rome créent la CEE (Communauté économique européenne), un marché commun où marchandises, capitaux et travailleurs circulent librement, et Euratom pour l'énergie atomique. Les pères fondateurs de l'Europe (Schuman, Monnet, Adenauer, De Gasperi) ont fait le pari de la réconciliation, symbolisée par l'amitié franco-allemande scellée par le traité de l'Élysée (1963) entre de Gaulle et Adenauer.", "partie2_titre": "II. ÉLARGISSEMENTS ET APPROFONDISSEMENT (1957-1992)", "partie2_contenu": "La CEE connaît un grand succès économique pendant les Trente Glorieuses : le marché commun stimule les échanges et la croissance. La PAC (politique agricole commune, 1962) modernise l'agriculture européenne. La communauté s'élargit progressivement : le Royaume-Uni, l'Irlande et le Danemark entrent en 1973, la Grèce en 1981, l'Espagne et le Portugal en 1986, ces trois derniers après la chute de leurs dictatures. L'Europe des Six devient l'Europe des Douze. L'intégration s'approfondit aussi : élection du Parlement européen au suffrage universel direct (1979), Acte unique (1986) qui prépare le grand marché intérieur. En 1992, le traité de Maastricht marque une étape décisive : la CEE devient l'Union européenne (UE), une citoyenneté européenne est créée, et la monnaie unique est décidée.", "partie3_titre": "III. L'UNION EUROPÉENNE DEPUIS 1992 : RÉUSSITES ET DÉFIS", "partie3_contenu": "Depuis Maastricht, l'UE a connu des avancées majeures. L'euro entre en circulation le 1er janvier 2002 : aujourd'hui, 20 pays l'utilisent (zone euro). L'espace Schengen permet la libre circulation des personnes sans contrôle aux frontières intérieures. Après la chute du communisme, l'UE s'élargit massivement à l'Est : dix pays entrent en 2004 (Pologne, Hongrie, pays baltes...), puis la Roumanie et la Bulgarie (2007) et la Croatie (2013), portant l'Union à 28 membres. Mais l'UE traverse aussi des crises : crise de la zone euro (2010-2012) qui frappe durement la Grèce, crise migratoire (2015), et surtout le Brexit : en 2016, les Britanniques votent par référendum la sortie de l'UE, effective en 2020. L'Union compte désormais 27 membres. Les débats persistent entre partisans d'une intégration renforcée (fédéralistes) et défenseurs des souverainetés nationales.", "conclusion": "En soixante-dix ans, la construction européenne a réussi son pari initial : la paix entre des nations qui s'étaient déchirées pendant des siècles. Elle a créé le premier marché économique mondial et une monnaie partagée par des centaines de millions d'Européens. Mais l'UE doit relever de nouveaux défis : sa place face aux grandes puissances, les migrations, la transition écologique, et l'adhésion de ses citoyens à un projet parfois jugé trop lointain."}, "activite2_quiz": [{"question": "Qui prononce la déclaration du 9 mai 1950 ?", "options": ["Jean Monnet", "Robert Schuman", "Charles de Gaulle", "Konrad Adenauer"], "correcte": 1, "explication": "Robert Schuman, ministre français des Affaires étrangères, propose le 9 mai 1950 de mettre en commun le charbon et l'acier. Le 9 mai est devenu la journée de l'Europe."}, {"question": "Que crée le traité de Paris en 1951 ?", "options": ["La CEE", "La CECA", "L'UE", "L'euro"], "correcte": 1, "explication": "Le traité de Paris (1951) crée la CECA, qui met en commun le charbon et l'acier de six pays."}, {"question": "Combien de pays fondent la CECA ?", "options": ["4", "6", "9", "12"], "correcte": 1, "explication": "Six pays fondent la CECA : France, RFA, Italie, Belgique, Pays-Bas et Luxembourg."}, {"question": "Que créent les traités de Rome (1957) ?", "options": ["La CECA et l'OTAN", "La CEE et Euratom", "L'UE et l'euro", "Schengen et Maastricht"], "correcte": 1, "explication": "Les traités de Rome (25 mars 1957) créent la CEE (marché commun) et Euratom (énergie atomique)."}, {"question": "Quel est l'objectif premier de la construction européenne ?", "options": ["Créer une armée", "Garantir la paix", "Conquérir des colonies", "Concurrencer la Chine"], "correcte": 1, "explication": "L'objectif fondateur est de rendre la guerre impossible entre les nations européennes, notamment entre la France et l'Allemagne."}, {"question": "Qu'est-ce que la PAC ?", "options": ["Un parti politique", "La politique agricole commune", "Un pacte militaire", "Une banque"], "correcte": 1, "explication": "La PAC (1962) est la politique agricole commune qui modernise et soutient l'agriculture européenne."}, {"question": "Quand le Royaume-Uni entre-t-il dans la CEE ?", "options": ["1957", "1973", "1986", "2004"], "correcte": 1, "explication": "Le Royaume-Uni entre dans la CEE en 1973, avec l'Irlande et le Danemark : premier élargissement."}, {"question": "Que décide le traité de Maastricht (1992) ?", "options": ["La sortie du Royaume-Uni", "La création de l'UE et de la monnaie unique", "La création de la CECA", "L'entrée de la Grèce"], "correcte": 1, "explication": "Le traité de Maastricht transforme la CEE en Union européenne, crée la citoyenneté européenne et décide la monnaie unique."}, {"question": "Quand l'euro entre-t-il en circulation ?", "options": ["1992", "1999", "2002", "2007"], "correcte": 2, "explication": "Les pièces et billets en euros entrent en circulation le 1er janvier 2002."}, {"question": "Qu'est-ce que l'espace Schengen ?", "options": ["La zone euro", "Un espace de libre circulation des personnes", "Une alliance militaire", "Un marché agricole"], "correcte": 1, "explication": "L'espace Schengen permet de circuler sans contrôle aux frontières intérieures entre les pays membres."}, {"question": "Combien de pays entrent dans l'UE en 2004 ?", "options": ["3", "6", "10", "13"], "correcte": 2, "explication": "En 2004, dix pays, principalement d'Europe de l'Est (Pologne, Hongrie, pays baltes...), rejoignent l'UE après la chute du communisme."}, {"question": "Qu'est-ce que le Brexit ?", "options": ["L'entrée du Royaume-Uni dans l'UE", "La sortie du Royaume-Uni de l'UE", "Une crise monétaire", "Un traité commercial"], "correcte": 1, "explication": "Le Brexit est la sortie du Royaume-Uni de l'UE, votée par référendum en 2016 et effective en 2020."}, {"question": "Combien de membres compte l'UE aujourd'hui ?", "options": ["12", "25", "27", "28"], "correcte": 2, "explication": "Depuis le Brexit (2020), l'Union européenne compte 27 États membres."}, {"question": "Quel traité scelle l'amitié franco-allemande en 1963 ?", "options": ["Le traité de Rome", "Le traité de l'Élysée", "Le traité de Paris", "Le traité de Maastricht"], "correcte": 1, "explication": "Le traité de l'Élysée (1963), signé par de Gaulle et Adenauer, scelle la réconciliation franco-allemande."}, {"question": "Quel pays est durement touché par la crise de la zone euro ?", "options": ["L'Allemagne", "La Grèce", "La Suède", "La Pologne"], "correcte": 1, "explication": "La Grèce, surendettée, est frappée par une grave crise à partir de 2010 et doit être aidée par l'UE en échange de mesures d'austérité."}], "activite3_etude": {"document_type": "Texte fondateur", "document_titre": "La déclaration Schuman (9 mai 1950)", "document_texte": "« La paix mondiale ne saurait être sauvegardée sans des efforts créateurs à la mesure des dangers qui la menacent. [...] L'Europe ne se fera pas d'un coup, ni dans une construction d'ensemble : elle se fera par des réalisations concrètes créant d'abord une solidarité de fait. Le rassemblement des nations européennes exige que l'opposition séculaire de la France et de l'Allemagne soit éliminée. [...] Le gouvernement français propose de placer l'ensemble de la production franco-allemande de charbon et d'acier sous une Haute Autorité commune, dans une organisation ouverte à la participation des autres pays d'Europe. La mise en commun des productions de charbon et d'acier [...] changera le destin de ces régions longtemps vouées à la fabrication des armes de guerre. [...] La solidarité de production qui sera ainsi nouée manifestera que toute guerre entre la France et l'Allemagne devient non seulement impensable, mais matériellement impossible. »", "document_source": "Robert Schuman, ministre français des Affaires étrangères, déclaration du 9 mai 1950, salon de l'Horloge, Quai d'Orsay, Paris", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Quelle méthode Schuman propose-t-il pour construire l'Europe ?", "Pourquoi choisir le charbon et l'acier ?", "Quel est l'objectif final de cette proposition ?", "Rédigez 6 à 8 lignes expliquant pourquoi cette déclaration est considérée comme l'acte de naissance de la construction européenne"], "corrections": ["Ce document est une déclaration politique prononcée par Robert Schuman, ministre français des Affaires étrangères, le 9 mai 1950 à Paris. Cinq ans après la fin de la Seconde Guerre mondiale, alors que la guerre froide divise l'Europe, la France propose à l'Allemagne, son ennemie d'hier, un projet de coopération inédit.", "Schuman propose une méthode progressive et concrète : l'Europe ne se fera pas d'un coup mais par des réalisations concrètes créant une solidarité de fait. Il s'agit de commencer par un domaine précis, l'économie du charbon et de l'acier, plutôt que de vouloir tout unifier immédiatement.", "Le charbon et l'acier sont les matières premières de l'armement : ce sont elles qui permettent de fabriquer canons et chars. Les placer sous une autorité commune empêche tout réarmement secret et rend la guerre matériellement impossible. Ce sont aussi des industries essentielles à la reconstruction économique.", "L'objectif final est la paix, en particulier entre la France et l'Allemagne qui se sont affrontées trois fois en 70 ans (1870, 1914, 1939). En créant une solidarité économique concrète, Schuman veut rendre la guerre entre les deux pays non seulement impensable mais matériellement impossible.", "Cette déclaration est l'acte de naissance de la construction européenne car elle définit la méthode qui sera suivie pendant des décennies : unir les pays par des réalisations économiques concrètes plutôt que par de grands projets politiques. Elle aboutit dès 1951 à la création de la CECA, première organisation européenne supranationale, puis aux traités de Rome en 1957 qui créent la CEE. Elle réussit son pari fondamental : la réconciliation franco-allemande, qui devient le moteur de l'Europe. Soixante-dix ans plus tard, le 9 mai est célébré comme la journée de l'Europe, et l'Union européenne compte 27 membres vivant en paix : l'objectif de Schuman a été atteint."]}, "activite4_developpement": {"sujet": "Racontez les grandes étapes de la construction européenne depuis 1950 et montrez qu'elle a d'abord été un projet de paix", "plan": {"introduction": "Contexte : Europe ruinée et divisée après 1945, volonté d'empêcher une nouvelle guerre franco-allemande. Problématique : comment l'Europe s'est-elle construite et dans quel but ? Plan : un projet de paix par l'économie (1950-1957) / élargissements et approfondissement (1957 à nos jours)", "partie1": "I. UN PROJET DE PAIX FONDÉ SUR L'ÉCONOMIE : déclaration Schuman (9 mai 1950), CECA (1951, les Six), traités de Rome (1957, CEE et marché commun), réconciliation franco-allemande (traité de l'Élysée 1963)", "partie2": "II. UNE UNION QUI S'ÉLARGIT ET S'APPROFONDIT : élargissements successifs (1973, 1981, 1986, 2004), Maastricht (1992, naissance de l'UE et décision de l'euro), euro (2002), Schengen, mais aussi des crises (zone euro, Brexit 2016-2020)", "conclusion": "Bilan : pari de la paix réussi, première puissance commerciale mondiale. Ouverture : défis actuels (place dans le monde, écologie, adhésion des citoyens)."}, "correction_complete": "En 1945, l'Europe sort ruinée et meurtrie de la Seconde Guerre mondiale, le troisième conflit en soixante-dix ans entre la France et l'Allemagne. Pour briser ce cycle de guerres, des dirigeants visionnaires lancent un projet sans précédent : unir les nations européennes. Comment l'Europe s'est-elle construite depuis 1950, et en quoi est-elle d'abord un projet de paix ? Nous verrons que la construction européenne naît comme un projet de paix fondé sur l'économie, puis qu'elle s'élargit et s'approfondit jusqu'à devenir l'Union européenne actuelle.\n\nLa construction européenne naît le 9 mai 1950, lorsque Robert Schuman, ministre français des Affaires étrangères, propose de placer la production franco-allemande de charbon et d'acier sous une autorité commune. L'idée, inspirée par Jean Monnet, est révolutionnaire : en mettant en commun les industries qui servent à fabriquer les armes, on rend la guerre entre la France et l'Allemagne matériellement impossible. En 1951, le traité de Paris crée la CECA entre six pays : la France, la RFA, l'Italie, la Belgique, les Pays-Bas et le Luxembourg. Le succès de cette première communauté encourage les Six à aller plus loin : les traités de Rome, signés le 25 mars 1957, créent la Communauté économique européenne, un marché commun où circulent librement les marchandises, les capitaux et les travailleurs. La réconciliation franco-allemande, cœur du projet, est scellée en 1963 par le traité de l'Élysée signé par le général de Gaulle et le chancelier Adenauer. Le pari des pères fondateurs est gagné : les ennemis d'hier deviennent les moteurs de l'Europe.\n\nÀ partir des années 1970, la communauté s'élargit progressivement. Le Royaume-Uni, l'Irlande et le Danemark entrent en 1973, puis la Grèce en 1981 et l'Espagne et le Portugal en 1986, après la chute de leurs dictatures : l'Europe des Six devient l'Europe des Douze. L'intégration s'approfondit également : le Parlement européen est élu au suffrage universel direct à partir de 1979. L'étape décisive est le traité de Maastricht en 1992 : la CEE devient l'Union européenne, une citoyenneté européenne est créée et la monnaie unique est décidée. L'euro entre en circulation le 1er janvier 2002 et l'espace Schengen permet de voyager sans contrôle aux frontières intérieures. Après la chute du communisme, l'UE accueille en 2004 dix nouveaux pays d'Europe de l'Est, réunifiant ainsi le continent. Mais l'Union connaît aussi des crises : la crise de la zone euro frappe durement la Grèce à partir de 2010, et en 2016 les Britanniques votent le Brexit, la sortie de leur pays de l'UE, effective en 2020. L'Union compte aujourd'hui 27 membres.\n\nLa construction européenne a donc pleinement réussi son objectif initial : depuis 1950, plus aucune guerre n'a opposé ses États membres, et la réconciliation franco-allemande est devenue exemplaire. Devenue la première puissance commerciale mondiale, l'Union européenne doit désormais relever de nouveaux défis : affirmer sa place face aux grandes puissances, réussir la transition écologique et convaincre ses citoyens de la valeur d'un projet né il y a plus de soixante-dix ans."}, "activite5_vocabulaire": {"termes": [{"mot": "CECA", "definition": "Communauté européenne du charbon et de l'acier (1951) : première organisation européenne, créée entre six pays."}, {"mot": "CEE", "definition": "Communauté économique européenne, créée par les traités de Rome (1957) : un marché commun entre les pays membres."}, {"mot": "Marché commun", "definition": "Espace économique où les marchandises, les capitaux et les travailleurs circulent librement entre pays membres."}, {"mot": "Traité de Maastricht", "definition": "Traité de 1992 qui transforme la CEE en Union européenne et décide la création de la monnaie unique."}, {"mot": "Union européenne", "definition": "Organisation créée en 1992 regroupant aujourd'hui 27 États européens unis par des politiques et des institutions communes."}, {"mot": "Euro", "definition": "Monnaie unique européenne, en circulation depuis le 1er janvier 2002, utilisée par 20 pays (zone euro)."}, {"mot": "Espace Schengen", "definition": "Espace de libre circulation des personnes, sans contrôle aux frontières intérieures entre les pays membres."}, {"mot": "Élargissement", "definition": "Entrée de nouveaux États membres dans la communauté européenne (1973, 1981, 1986, 2004, 2007, 2013)."}, {"mot": "Brexit", "definition": "Sortie du Royaume-Uni de l'Union européenne, votée par référendum en 2016 et effective en 2020."}, {"mot": "Pères fondateurs", "definition": "Hommes politiques à l'origine de la construction européenne : Robert Schuman, Jean Monnet, Konrad Adenauer, Alcide De Gasperi."}], "notions_essentielles": ["La déclaration Schuman (9 mai 1950) lance la construction européenne pour garantir la paix", "La CECA (1951) puis la CEE (traités de Rome, 1957) unissent six pays par l'économie", "La réconciliation franco-allemande est le moteur de l'Europe (traité de l'Élysée, 1963)", "Le traité de Maastricht (1992) crée l'Union européenne et décide l'euro (en circulation en 2002)", "L'UE compte 27 membres depuis le Brexit (2020)"]}}, {"id": 7, "titre": "Enjeux et conflits dans le monde après 1989", "activite1_fiche": {"introduction": "La chute du mur de Berlin (9 novembre 1989) et la disparition de l'URSS (décembre 1991) mettent fin à la guerre froide et au monde bipolaire. Les États-Unis apparaissent comme la seule superpuissance : on parle d'hyperpuissance. Beaucoup espèrent alors un nouvel ordre mondial pacifique. Mais le monde d'après 1989 reste instable : nouveaux conflits régionaux, montée du terrorisme international, émergence de nouvelles puissances. Le monde devient progressivement multipolaire.", "partie1_titre": "I. L'HYPERPUISSANCE AMÉRICAINE ET SES LIMITES", "partie1_contenu": "Après 1991, les États-Unis dominent le monde dans tous les domaines : militaire (premier budget de défense au monde), économique (première économie, dollar monnaie mondiale), technologique et culturel (cinéma, musique, internet : c'est le soft power). Ils se posent en gendarmes du monde : lors de la guerre du Golfe (1990-1991), une coalition internationale menée par les États-Unis, avec l'accord de l'ONU, libère le Koweït envahi par l'Irak de Saddam Hussein. Mais cette domination est contestée. Le 11 septembre 2001, les attentats d'Al-Qaïda contre les tours du World Trade Center à New York et le Pentagone font près de 3 000 morts : c'est la première attaque massive sur le sol américain. Les États-Unis répliquent par la guerre contre le terrorisme : intervention en Afghanistan (2001) contre les talibans qui abritent Ben Laden, puis invasion de l'Irak (2003) sans l'accord de l'ONU. Ces guerres longues et coûteuses s'enlisent et affaiblissent l'image des États-Unis.", "partie2_titre": "II. DE NOUVELLES FORMES DE CONFLITS", "partie2_contenu": "La fin de la guerre froide libère des conflits régionaux longtemps gelés. En Europe même, la Yougoslavie éclate dans les années 1990 : les guerres entre Serbes, Croates et Bosniaques font plus de 100 000 morts et s'accompagnent d'épurations ethniques, comme le massacre de Srebrenica (1995) où environ 8 000 hommes bosniaques sont exécutés. Le génocide des Tutsi au Rwanda (1994) fait environ 800 000 morts en cent jours, dans l'indifférence de la communauté internationale. Le terrorisme islamiste devient une menace mondiale : après Al-Qaïda, l'organisation État islamique (Daech) proclame en 2014 un califat à cheval sur l'Irak et la Syrie et organise des attentats dans le monde entier. La France est durement frappée : attentats de janvier 2015 (Charlie Hebdo, Hyper Cacher), du 13 novembre 2015 (Bataclan, Stade de France, terrasses parisiennes : 130 morts), de Nice le 14 juillet 2016 (86 morts). Ces conflits asymétriques opposent des États à des groupes armés non étatiques, difficiles à combattre.", "partie3_titre": "III. VERS UN MONDE MULTIPOLAIRE", "partie3_contenu": "Depuis les années 2000, de nouvelles puissances émergent et contestent la domination américaine. La Chine est devenue la deuxième économie mondiale : atelier du monde, elle investit massivement à l'étranger (nouvelles routes de la soie) et modernise son armée. La Russie de Vladimir Poutine cherche à retrouver son rang : annexion de la Crimée (2014), puis invasion de l'Ukraine (février 2022), qui provoque la guerre la plus grave en Europe depuis 1945. L'Inde, le Brésil et d'autres pays émergents pèsent de plus en plus dans l'économie mondiale. Les organisations internationales (ONU) peinent à réguler ces tensions : le Conseil de sécurité est souvent paralysé par les vétos. De nouveaux défis mondiaux exigent pourtant une coopération : réchauffement climatique, pandémies (Covid-19 en 2020), migrations, cybersécurité. Le monde du XXIe siècle est ainsi multipolaire, interdépendant mais instable.", "conclusion": "Depuis 1989, le monde est passé de la confrontation bipolaire à une instabilité multipolaire. L'hyperpuissance américaine des années 1990 est aujourd'hui contestée par la Chine et la Russie, tandis que le terrorisme et les conflits régionaux ont remplacé l'affrontement Est-Ouest. Face aux défis globaux comme le climat ou les pandémies, la coopération internationale reste fragile mais indispensable."}, "activite2_quiz": [{"question": "Quel événement symbolise la fin de la guerre froide en 1989 ?", "options": ["La crise de Cuba", "La chute du mur de Berlin", "La guerre du Golfe", "Le 11 septembre"], "correcte": 1, "explication": "La chute du mur de Berlin, le 9 novembre 1989, symbolise la fin de la division de l'Europe et annonce la fin de la guerre froide."}, {"question": "Que signifie le terme hyperpuissance ?", "options": ["Une puissance régionale", "Une puissance dominant dans tous les domaines", "Une alliance militaire", "Une organisation internationale"], "correcte": 1, "explication": "Le terme hyperpuissance désigne les États-Unis après 1991 : ils dominent dans tous les domaines (militaire, économique, technologique, culturel)."}, {"question": "Que se passe-t-il le 11 septembre 2001 ?", "options": ["La guerre du Golfe", "Les attentats d'Al-Qaïda aux États-Unis", "L'invasion de l'Irak", "La chute de l'URSS"], "correcte": 1, "explication": "Le 11 septembre 2001, Al-Qaïda détourne des avions et frappe le World Trade Center et le Pentagone : près de 3 000 morts."}, {"question": "Qui dirige Al-Qaïda lors des attentats de 2001 ?", "options": ["Saddam Hussein", "Oussama Ben Laden", "Kadhafi", "Al-Baghdadi"], "correcte": 1, "explication": "Oussama Ben Laden, chef d'Al-Qaïda, organise les attentats du 11 septembre. Il est tué par les Américains en 2011 au Pakistan."}, {"question": "Quel pays les États-Unis envahissent-ils en 2003 ?", "options": ["L'Afghanistan", "L'Irak", "La Syrie", "L'Iran"], "correcte": 1, "explication": "En 2003, les États-Unis envahissent l'Irak sans l'accord de l'ONU, accusant Saddam Hussein de détenir des armes de destruction massive."}, {"question": "Quel génocide a lieu au Rwanda en 1994 ?", "options": ["Le génocide des Tutsi", "Le génocide arménien", "La Shoah", "Le génocide cambodgien"], "correcte": 0, "explication": "Le génocide des Tutsi au Rwanda (avril-juillet 1994) fait environ 800 000 morts en cent jours."}, {"question": "Que se passe-t-il à Srebrenica en 1995 ?", "options": ["Un traité de paix", "Un massacre de Bosniaques", "Une élection", "Un attentat"], "correcte": 1, "explication": "À Srebrenica, environ 8 000 hommes et adolescents bosniaques sont exécutés par les forces serbes : pire massacre en Europe depuis 1945."}, {"question": "Qu'est-ce que Daech ?", "options": ["Une ONG", "L'organisation État islamique", "Un parti politique", "Une alliance militaire"], "correcte": 1, "explication": "Daech (État islamique) est une organisation terroriste qui proclame un califat en Irak et en Syrie en 2014 et commet des attentats dans le monde entier."}, {"question": "Que se passe-t-il en France le 13 novembre 2015 ?", "options": ["L'attentat de Nice", "Les attentats de Paris (Bataclan)", "L'attentat de Charlie Hebdo", "La COP21"], "correcte": 1, "explication": "Le 13 novembre 2015, des attentats coordonnés frappent Paris (Bataclan, Stade de France, terrasses) : 130 morts. Ils sont revendiqués par Daech."}, {"question": "Qu'est-ce qu'un conflit asymétrique ?", "options": ["Une guerre entre deux États égaux", "Un conflit entre un État et un groupe armé non étatique", "Une guerre nucléaire", "Une guerre commerciale"], "correcte": 1, "explication": "Un conflit asymétrique oppose des forces très inégales, par exemple une armée régulière à des groupes terroristes ou des guérillas."}, {"question": "Quelle est la deuxième économie mondiale aujourd'hui ?", "options": ["Le Japon", "L'Allemagne", "La Chine", "L'Inde"], "correcte": 2, "explication": "La Chine est devenue la deuxième économie mondiale derrière les États-Unis, et conteste leur domination."}, {"question": "Quel territoire la Russie annexe-t-elle en 2014 ?", "options": ["La Géorgie", "La Crimée", "Les pays baltes", "La Tchétchénie"], "correcte": 1, "explication": "En 2014, la Russie de Poutine annexe la Crimée, territoire ukrainien, en violation du droit international."}, {"question": "Que se passe-t-il en février 2022 ?", "options": ["Le Brexit", "L'invasion de l'Ukraine par la Russie", "La pandémie de Covid", "La chute de Daech"], "correcte": 1, "explication": "Le 24 février 2022, la Russie envahit l'Ukraine : c'est la guerre la plus grave en Europe depuis 1945."}, {"question": "Pourquoi le Conseil de sécurité de l'ONU est-il souvent paralysé ?", "options": ["Il n'existe plus", "À cause du droit de veto des membres permanents", "Il n'a pas de budget", "Il ne se réunit jamais"], "correcte": 1, "explication": "Les cinq membres permanents (États-Unis, Russie, Chine, France, Royaume-Uni) possèdent un droit de veto qui bloque souvent les décisions."}, {"question": "Qu'est-ce qu'un monde multipolaire ?", "options": ["Un monde dominé par une seule puissance", "Un monde organisé autour de plusieurs pôles de puissance", "Un monde sans conflits", "Un monde divisé en deux blocs"], "correcte": 1, "explication": "Un monde multipolaire est organisé autour de plusieurs grandes puissances (États-Unis, Chine, Russie, UE...) qui rivalisent et coopèrent."}], "activite3_etude": {"document_type": "Article de presse", "document_titre": "Le 11 septembre 2001 vu par la presse française", "document_texte": "« Dans cette journée du 11 septembre 2001, l'Amérique a basculé dans l'horreur et le monde dans une ère nouvelle. Deux avions de ligne détournés par des terroristes se sont encastrés dans les tours jumelles du World Trade Center, à Manhattan, provoquant leur effondrement. Un troisième appareil a frappé le Pentagone, à Washington, cœur de la puissance militaire américaine. [...] L'Amérique, qui se croyait invulnérable, protégée par deux océans, découvre que la guerre peut désormais frapper son propre territoire. Ce ne sont plus des États qui la menacent, mais des réseaux terroristes sans frontières, prêts à mourir pour tuer. Rien ne sera plus comme avant : ni la sécurité des Américains, ni l'ordre du monde. »", "document_source": "Article de presse français, 12 septembre 2001 (synthèse de la presse du lendemain des attentats)", "questions": ["Présentez le document (nature, date, contexte)", "Quels sont les faits décrits dans ce document ?", "Pourquoi l'Amérique se croyait-elle invulnérable ?", "Que signifie la phrase : « Ce ne sont plus des États qui la menacent, mais des réseaux terroristes sans frontières » ?", "Rédigez 6 à 8 lignes expliquant pourquoi le 11 septembre 2001 marque une rupture dans l'histoire des relations internationales"], "corrections": ["Ce document est un article de presse français publié le 12 septembre 2001, au lendemain des attentats commis aux États-Unis. Il décrit et analyse à chaud l'événement, dans un contexte de sidération mondiale.", "L'article décrit les attentats du 11 septembre 2001 : deux avions de ligne détournés s'écrasent sur les tours jumelles du World Trade Center à New York, provoquant leur effondrement, et un troisième frappe le Pentagone à Washington. Ces attaques, organisées par Al-Qaïda, font près de 3 000 morts.", "L'Amérique se croyait invulnérable car son territoire, protégé par deux océans (Atlantique et Pacifique), n'avait jamais subi d'attaque massive. Superpuissance victorieuse de la guerre froide, première armée du monde, elle se pensait à l'abri de toute agression directe.", "Cette phrase signifie que la menace a changé de nature : pendant la guerre froide, l'ennemi était un État identifié (l'URSS). Désormais, la menace vient de réseaux terroristes transnationaux comme Al-Qaïda, sans territoire fixe, sans armée régulière, difficiles à localiser et à combattre. C'est l'émergence des conflits asymétriques.", "Le 11 septembre 2001 marque une rupture majeure dans les relations internationales. Pour la première fois, l'hyperpuissance américaine est frappée massivement sur son propre sol, révélant sa vulnérabilité face à une nouvelle menace : le terrorisme international. Cet événement transforme la politique mondiale : les États-Unis lancent la guerre contre le terrorisme, interviennent en Afghanistan dès 2001 puis en Irak en 2003, sans l'accord de l'ONU pour cette dernière. La sécurité devient une obsession mondiale (contrôles renforcés, surveillance). Enfin, le 11 septembre inaugure une ère de conflits asymétriques où des groupes non étatiques défient les plus grandes puissances, redéfinissant durablement la notion même de guerre."]}, "activite4_developpement": {"sujet": "Montrez que le monde depuis 1989 est marqué par de nouvelles formes de conflits", "plan": {"introduction": "Contexte : fin de la guerre froide (1989-1991), espoir d'un monde pacifique. Problématique : quelles nouvelles formes de conflits marquent le monde après 1989 ? Plan : le terrorisme international / les conflits régionaux et le retour de la guerre entre États", "partie1": "I. LE TERRORISME INTERNATIONAL, UNE MENACE MONDIALE : attentats du 11 septembre 2001 (Al-Qaïda, 3 000 morts), guerre contre le terrorisme (Afghanistan 2001, Irak 2003), Daech et le califat (2014), attentats en France (2015 : Charlie Hebdo, Bataclan ; 2016 : Nice), conflits asymétriques", "partie2": "II. CONFLITS RÉGIONAUX ET RETOUR DE LA GUERRE EN EUROPE : guerres de Yougoslavie (Srebrenica 1995), génocide des Tutsi au Rwanda (1994, 800 000 morts), annexion de la Crimée (2014), invasion de l'Ukraine (2022), impuissance fréquente de l'ONU (vétos)", "conclusion": "Bilan : l'espoir d'un monde pacifique après 1989 a été déçu ; les conflits ont changé de forme. Ouverture : les défis globaux (climat, pandémies) exigent pourtant une coopération internationale."}, "correction_complete": "La chute du mur de Berlin en 1989 et la disparition de l'URSS en 1991 mettent fin à la guerre froide. Beaucoup espèrent alors un nouvel ordre mondial pacifique, dominé par la coopération internationale. Mais cet espoir est rapidement déçu : le monde de l'après-guerre froide connaît de nouvelles formes de violence. Quelles nouvelles formes de conflits marquent le monde depuis 1989 ? Nous verrons que le terrorisme international devient une menace mondiale, puis que les conflits régionaux se multiplient jusqu'au retour de la guerre entre États en Europe.\n\nLa première nouveauté est l'essor du terrorisme international. Le 11 septembre 2001, l'organisation Al-Qaïda, dirigée par Oussama Ben Laden, frappe les États-Unis sur leur propre sol : des avions détournés détruisent les tours du World Trade Center à New York et endommagent le Pentagone, faisant près de 3 000 morts. L'hyperpuissance américaine découvre sa vulnérabilité face à un ennemi sans État ni frontières. Les États-Unis répliquent par la guerre contre le terrorisme : intervention en Afghanistan dès 2001 pour renverser les talibans, puis invasion de l'Irak en 2003 sans l'accord de l'ONU. Ces guerres longues s'enlisent. Le terrorisme se renouvelle avec l'organisation État islamique (Daech), qui proclame en 2014 un califat à cheval sur l'Irak et la Syrie et inspire des attentats dans le monde entier. La France est durement frappée : attentats de janvier 2015 contre Charlie Hebdo et l'Hyper Cacher, attentats du 13 novembre 2015 au Bataclan et dans Paris qui font 130 morts, attentat de Nice le 14 juillet 2016 avec 86 victimes. Ces conflits asymétriques, qui opposent des États à des groupes armés non étatiques, sont particulièrement difficiles à gagner.\n\nLa seconde caractéristique est la multiplication des conflits régionaux, jusqu'au retour de la guerre entre États. Dans les années 1990, l'éclatement de la Yougoslavie provoque des guerres meurtrières entre Serbes, Croates et Bosniaques, marquées par des épurations ethniques : au massacre de Srebrenica, en juillet 1995, environ 8 000 hommes bosniaques sont exécutés, pire crime commis en Europe depuis 1945. En Afrique, le génocide des Tutsi au Rwanda fait environ 800 000 morts en cent jours en 1994, dans l'indifférence de la communauté internationale. L'ONU, souvent paralysée par les vétos des membres permanents du Conseil de sécurité, peine à prévenir ces tragédies. Enfin, la guerre entre États fait son retour en Europe : après avoir annexé la Crimée ukrainienne en 2014, la Russie de Vladimir Poutine envahit l'Ukraine le 24 février 2022. C'est le conflit le plus grave sur le continent depuis la Seconde Guerre mondiale, qui ravive les tensions entre la Russie et les pays occidentaux.\n\nDepuis 1989, le monde n'a donc pas connu la paix espérée : le terrorisme international, les guerres civiles, les génocides et le retour des guerres d'agression ont remplacé l'affrontement bipolaire. Dans un monde devenu multipolaire et instable, les grands défis communs de l'humanité, du réchauffement climatique aux pandémies, rappellent pourtant l'urgence d'une véritable coopération internationale."}, "activite5_vocabulaire": {"termes": [{"mot": "Hyperpuissance", "definition": "Terme désignant les États-Unis après 1991 : une puissance qui domine dans tous les domaines (militaire, économique, culturel, technologique)."}, {"mot": "Monde multipolaire", "definition": "Monde organisé autour de plusieurs pôles de puissance (États-Unis, Chine, Russie, UE...) qui rivalisent et coopèrent."}, {"mot": "Terrorisme", "definition": "Usage de la violence (attentats, prises d'otages) contre des civils pour imposer des objectifs politiques ou religieux par la terreur."}, {"mot": "Al-Qaïda", "definition": "Organisation terroriste islamiste dirigée par Ben Laden, responsable des attentats du 11 septembre 2001."}, {"mot": "Daech", "definition": "Organisation État islamique, groupe terroriste qui proclame un califat en Irak et en Syrie en 2014 et organise des attentats mondiaux."}, {"mot": "Conflit asymétrique", "definition": "Conflit opposant des forces très inégales, par exemple une armée régulière d'État à des groupes terroristes ou des guérillas."}, {"mot": "Épuration ethnique", "definition": "Élimination ou expulsion forcée d'une population en raison de son appartenance ethnique ou religieuse (guerres de Yougoslavie)."}, {"mot": "Génocide des Tutsi", "definition": "Extermination d'environ 800 000 Tutsi au Rwanda entre avril et juillet 1994."}, {"mot": "ONU", "definition": "Organisation des Nations unies, créée en 1945 pour maintenir la paix. Son Conseil de sécurité est souvent paralysé par les vétos."}, {"mot": "Soft power", "definition": "Capacité d'un État à influencer les autres par la séduction culturelle (cinéma, musique, technologie) plutôt que par la force."}], "notions_essentielles": ["La fin de la guerre froide (1989-1991) fait des États-Unis une hyperpuissance", "Le 11 septembre 2001 révèle la menace du terrorisme international", "Les conflits asymétriques opposent des États à des groupes armés (Al-Qaïda, Daech)", "Des tragédies marquent les années 1990 : Srebrenica (1995), génocide des Tutsi (1994)", "Le monde devient multipolaire : montée de la Chine, retour de la guerre en Europe (Ukraine 2022)"]}}, {"id": 8, "titre": "1944-1947 : refonder la République, redéfinir la démocratie", "activite1_fiche": {"introduction": "À la Libération, en 1944, la France sort de quatre années d'Occupation et du régime de Vichy, qui avait aboli la République. Le pays doit être reconstruit matériellement, mais aussi politiquement et moralement. Sous l'impulsion du général de Gaulle et du programme du Conseil national de la Résistance (CNR), la République est refondée sur des bases nouvelles : la démocratie est élargie (droit de vote des femmes) et un État-providence est créé (Sécurité sociale, nationalisations). Ces années fondatrices façonnent durablement la France contemporaine.", "partie1_titre": "I. RÉTABLIR LA RÉPUBLIQUE ET LA LÉGALITÉ (1944-1945)", "partie1_contenu": "Dès la libération de Paris (25 août 1944), le Gouvernement provisoire de la République française (GPRF), dirigé par le général de Gaulle, rétablit la légalité républicaine. Les lois de Vichy sont annulées : la République n'a juridiquement jamais cessé d'exister, comme l'affirme de Gaulle. L'épuration frappe les collaborateurs : environ 10 000 exécutions (dont beaucoup sommaires à la Libération), des procès comme celui du maréchal Pétain (condamné à mort, peine commuée en détention perpétuelle) et de Pierre Laval (exécuté en 1945). La presse de collaboration est interdite et de nouveaux journaux naissent (Le Monde, 1944). Le GPRF associe toutes les forces de la Résistance : gaullistes, communistes, socialistes et démocrates-chrétiens gouvernent ensemble pour reconstruire le pays.", "partie2_titre": "II. ÉLARGIR LA DÉMOCRATIE : LE DROIT DE VOTE DES FEMMES", "partie2_contenu": "L'ordonnance du 21 avril 1944 accorde le droit de vote et d'éligibilité aux femmes : les femmes sont électrices et éligibles dans les mêmes conditions que les hommes. C'est l'aboutissement d'un long combat mené depuis le XIXe siècle par les suffragettes, et la reconnaissance du rôle des femmes dans la Résistance. Les Françaises votent pour la première fois aux élections municipales du 29 avril 1945, puis aux élections nationales d'octobre 1945. La démocratie devient ainsi réellement universelle, près d'un siècle après l'instauration du suffrage universel masculin (1848). En octobre 1945, les Français approuvent par référendum la fin de la IIIe République et élisent une Assemblée constituante. La Constitution de la IVe République est adoptée en octobre 1946. Son préambule proclame des droits nouveaux : droit au travail, droit de grève, égalité hommes-femmes, droit à la protection sociale.", "partie3_titre": "III. CONSTRUIRE UN ÉTAT-PROVIDENCE : LE PROGRAMME DU CNR", "partie3_contenu": "Le programme du Conseil national de la Résistance, adopté en mars 1944 et intitulé Les Jours heureux, prévoit d'instaurer une véritable démocratie économique et sociale. Il est largement appliqué à la Libération. Les ordonnances de 1945 créent la Sécurité sociale : tous les travailleurs sont désormais protégés contre les risques de la vie (maladie, accidents, vieillesse) et les familles reçoivent des allocations familiales. C'est la naissance de l'État-providence, un État qui protège les citoyens. De grandes entreprises sont nationalisées : l'État prend le contrôle des secteurs clés de l'économie, considérés comme des services publics : énergie (création d'EDF-GDF en 1946, houillères), transports (Air France), banques (Banque de France) et l'entreprise Renault, dont le patron est accusé de collaboration. Les comités d'entreprise sont créés (1945), donnant aux salariés un droit de regard sur la gestion. Ces réformes, fruit du consensus de la Résistance, fondent le modèle social français.", "conclusion": "Entre 1944 et 1947, la France a refondé sa République et redéfini sa démocratie : démocratie politique élargie aux femmes, démocratie sociale avec la Sécurité sociale et les nationalisations. Ce moment fondateur, porté par l'esprit de la Résistance, a construit le modèle social français qui demeure aujourd'hui, malgré les débats sur son financement. La IVe République, née en 1946, sera cependant fragilisée par l'instabilité ministérielle et les guerres coloniales, jusqu'à la crise de 1958."}, "activite2_quiz": [{"question": "Qui dirige le GPRF à la Libération ?", "options": ["Pétain", "De Gaulle", "Blum", "Laval"], "correcte": 1, "explication": "Le général de Gaulle dirige le Gouvernement provisoire de la République française (GPRF) qui rétablit la légalité républicaine."}, {"question": "Quand Paris est-elle libérée ?", "options": ["6 juin 1944", "25 août 1944", "8 mai 1945", "21 avril 1944"], "correcte": 1, "explication": "Paris est libérée le 25 août 1944 par la 2e DB du général Leclerc et la Résistance, avec l'appui des Alliés."}, {"question": "Quand les femmes obtiennent-elles le droit de vote en France ?", "options": ["1936", "21 avril 1944", "1945", "1958"], "correcte": 1, "explication": "L'ordonnance du 21 avril 1944 accorde le droit de vote et d'éligibilité aux femmes."}, {"question": "Quand les Françaises votent-elles pour la première fois ?", "options": ["Avril 1944", "29 avril 1945", "Octobre 1946", "Mai 1958"], "correcte": 1, "explication": "Les Françaises votent pour la première fois aux élections municipales du 29 avril 1945."}, {"question": "Qu'est-ce que l'épuration ?", "options": ["La reconstruction des villes", "La punition des collaborateurs", "Une réforme agricole", "Un plan économique"], "correcte": 1, "explication": "L'épuration désigne les poursuites et sanctions contre ceux qui ont collaboré avec l'occupant allemand."}, {"question": "Quel sort connaît le maréchal Pétain en 1945 ?", "options": ["Il est acquitté", "Condamné à mort, peine commuée en prison à vie", "Il s'enfuit", "Il redevient ministre"], "correcte": 1, "explication": "Pétain est condamné à mort en 1945 ; de Gaulle commue sa peine en détention perpétuelle en raison de son âge."}, {"question": "Qu'est-ce que le CNR ?", "options": ["Un parti politique", "Le Conseil national de la Résistance", "Une entreprise nationalisée", "Un journal"], "correcte": 1, "explication": "Le Conseil national de la Résistance, fondé par Jean Moulin en 1943, unit les mouvements de Résistance et adopte en 1944 un programme de réformes."}, {"question": "Comment s'intitule le programme du CNR ?", "options": ["Les Trente Glorieuses", "Les Jours heureux", "La France libre", "Le Front populaire"], "correcte": 1, "explication": "Le programme du CNR, adopté en mars 1944, s'intitule Les Jours heureux. Il prévoit la Sécurité sociale et les nationalisations."}, {"question": "Que créent les ordonnances de 1945 ?", "options": ["Le SMIC", "La Sécurité sociale", "L'impôt sur le revenu", "Les congés payés"], "correcte": 1, "explication": "Les ordonnances d'octobre 1945 créent la Sécurité sociale, qui protège les travailleurs contre la maladie, les accidents et la vieillesse."}, {"question": "Qu'est-ce que l'État-providence ?", "options": ["Un État policier", "Un État qui protège socialement ses citoyens", "Un État religieux", "Un État sans impôts"], "correcte": 1, "explication": "L'État-providence intervient dans l'économie et la société pour protéger les citoyens contre les risques de la vie (maladie, chômage, vieillesse)."}, {"question": "Qu'est-ce qu'une nationalisation ?", "options": ["La vente d'une entreprise publique", "Le passage d'une entreprise privée sous contrôle de l'État", "Une fusion d'entreprises", "Une faillite"], "correcte": 1, "explication": "Nationaliser, c'est transférer une entreprise privée à l'État. En 1944-1946 : énergie (EDF-GDF), Renault, banques, Air France."}, {"question": "Pourquoi Renault est-elle nationalisée ?", "options": ["Elle est en faillite", "Son patron est accusé de collaboration", "Elle est étrangère", "Elle est trop petite"], "correcte": 1, "explication": "Louis Renault est accusé d'avoir collaboré avec l'occupant en produisant pour l'Allemagne : son entreprise est nationalisée en 1945."}, {"question": "Quand la Constitution de la IVe République est-elle adoptée ?", "options": ["1944", "Octobre 1946", "1947", "1958"], "correcte": 1, "explication": "La Constitution de la IVe République est adoptée par référendum en octobre 1946. Son préambule proclame de nouveaux droits sociaux."}, {"question": "Quels droits nouveaux proclame le préambule de 1946 ?", "options": ["Le droit de propriété seulement", "Droit au travail, droit de grève, égalité hommes-femmes", "Le droit de vote censitaire", "Aucun droit"], "correcte": 1, "explication": "Le préambule de la Constitution de 1946 proclame le droit au travail, le droit de grève, l'égalité hommes-femmes et la protection sociale."}, {"question": "Depuis quand les hommes votaient-ils au suffrage universel en France ?", "options": ["1789", "1848", "1875", "1936"], "correcte": 1, "explication": "Le suffrage universel masculin date de 1848 (IIe République). Les femmes attendront donc presque un siècle de plus, jusqu'en 1944."}], "activite3_etude": {"document_type": "Texte officiel", "document_titre": "Extraits du programme du Conseil national de la Résistance (15 mars 1944)", "document_texte": "« Unis quant au but à atteindre, unis quant aux moyens nécessaires pour atteindre ce but qui est la libération rapide du territoire, les représentants des mouvements, groupements, partis ou tendances politiques groupés au sein du CNR proclament qu'ils sont décidés à rester unis après la libération afin de promouvoir les réformes indispensables : [...] l'instauration d'une véritable démocratie économique et sociale ; [...] le retour à la nation des grands moyens de production monopolisés, des sources d'énergie, des richesses du sous-sol, des compagnies d'assurances et des grandes banques ; [...] un plan complet de sécurité sociale, visant à assurer à tous les citoyens des moyens d'existence, dans tous les cas où ils sont incapables de se les procurer par le travail ; [...] le droit au travail et le droit au repos ; [...] la possibilité effective pour tous les enfants français de bénéficier de l'instruction. »", "document_source": "Programme du Conseil national de la Résistance, dit Les Jours heureux, adopté le 15 mars 1944 dans la clandestinité", "questions": ["Présentez le document (nature, auteur, date, contexte)", "Qui compose le CNR et qu'est-ce qui unit ses membres ?", "Quelles réformes économiques le programme prévoit-il ?", "Quelles réformes sociales le programme prévoit-il ?", "Rédigez 6 à 8 lignes montrant comment ce programme a été appliqué à la Libération et a fondé le modèle social français"], "corrections": ["Ce document est un extrait du programme du Conseil national de la Résistance, adopté le 15 mars 1944 dans la clandestinité, sous l'Occupation allemande. Le CNR, fondé par Jean Moulin en 1943, réunit tous les mouvements de Résistance. Ce texte, surnommé Les Jours heureux, prépare les réformes de la France libérée.", "Le CNR rassemble les mouvements de Résistance, les partis politiques (communistes, socialistes, démocrates-chrétiens) et les syndicats. Ses membres sont unis par deux objectifs : libérer le territoire de l'occupant, puis rester unis après la Libération pour mener des réformes profondes.", "Le programme prévoit le retour à la nation des grands moyens de production : c'est-à-dire la nationalisation des sources d'énergie, des richesses du sous-sol, des assurances et des grandes banques. L'État doit contrôler les secteurs clés de l'économie pour la mettre au service de tous.", "Le programme prévoit un plan complet de sécurité sociale garantissant des moyens d'existence à tous ceux qui ne peuvent pas travailler, le droit au travail et au repos, et l'accès de tous les enfants à l'instruction. C'est le projet d'une véritable démocratie sociale.", "Le programme du CNR a été largement appliqué à la Libération par le GPRF du général de Gaulle. Les ordonnances de 1945 créent la Sécurité sociale, qui protège tous les travailleurs contre la maladie, les accidents et la vieillesse, conformément au plan voulu par la Résistance. Les nationalisations prévues sont réalisées : l'énergie avec la création d'EDF-GDF en 1946, les grandes banques, Air France et Renault passent sous le contrôle de l'État. Le préambule de la Constitution de 1946 inscrit ces droits sociaux dans la loi fondamentale. Né de l'union de la Résistance, ce programme a ainsi fondé l'État-providence et le modèle social français, qui structure encore notre société actuelle."]}, "activite4_developpement": {"sujet": "Montrez comment la République est refondée en France entre 1944 et 1947", "plan": {"introduction": "Contexte : Libération de la France en 1944 après quatre ans d'Occupation et le régime de Vichy. Problématique : comment la République est-elle refondée ? Plan : rétablir la République et élargir la démocratie / construire une démocratie sociale", "partie1": "I. RÉTABLIR LA RÉPUBLIQUE ET ÉLARGIR LA DÉMOCRATIE : le GPRF de de Gaulle rétablit la légalité républicaine (annulation des lois de Vichy), épuration des collaborateurs (procès de Pétain), droit de vote des femmes (21 avril 1944, premier vote en avril 1945), nouvelle Constitution (IVe République, octobre 1946)", "partie2": "II. CONSTRUIRE UNE DÉMOCRATIE SOCIALE : application du programme du CNR (Les Jours heureux), création de la Sécurité sociale (ordonnances de 1945), nationalisations (EDF-GDF, Renault, banques), préambule de 1946 (droit au travail, droit de grève, égalité hommes-femmes)", "conclusion": "Bilan : entre 1944 et 1947, la France refonde une République démocratique et sociale qui fonde le modèle français. Ouverture : la IVe République sera fragilisée par l'instabilité et les guerres coloniales jusqu'en 1958."}, "correction_complete": "En août 1944, la France est libérée après quatre années d'Occupation allemande et de régime de Vichy, qui avait aboli la République et collaboré avec l'ennemi. Le pays doit alors se reconstruire matériellement, mais aussi refonder sa démocratie sur des bases nouvelles. Comment la République est-elle refondée entre 1944 et 1947 ? Nous verrons d'abord que la légalité républicaine est rétablie et la démocratie élargie, puis qu'une véritable démocratie sociale est construite selon le programme de la Résistance.\n\nDès la libération de Paris, le 25 août 1944, le Gouvernement provisoire de la République française, dirigé par le général de Gaulle, rétablit la légalité républicaine. Toutes les lois de Vichy sont annulées : pour de Gaulle, la République n'a juridiquement jamais cessé d'exister. L'épuration sanctionne les collaborateurs : le maréchal Pétain est condamné à mort en 1945, peine commuée en détention perpétuelle, tandis que Pierre Laval est exécuté. Surtout, la démocratie est élargie de manière décisive : l'ordonnance du 21 avril 1944 accorde enfin le droit de vote et d'éligibilité aux femmes, près d'un siècle après l'instauration du suffrage universel masculin en 1848. Les Françaises votent pour la première fois aux élections municipales du 29 avril 1945. Cette conquête récompense aussi le rôle majeur des femmes dans la Résistance. En octobre 1946, une nouvelle Constitution fonde la IVe République : son préambule proclame des droits nouveaux comme le droit au travail, le droit de grève et l'égalité entre les hommes et les femmes.\n\nLa refondation est également sociale. Le programme du Conseil national de la Résistance, adopté en mars 1944 sous le titre Les Jours heureux, prévoyait une véritable démocratie économique et sociale : il est largement appliqué à la Libération. Les ordonnances d'octobre 1945 créent la Sécurité sociale, qui protège désormais tous les travailleurs contre les grands risques de la vie : maladie, accidents du travail, vieillesse, charges familiales. C'est la naissance de l'État-providence à la française. Parallèlement, l'État nationalise les secteurs clés de l'économie : l'énergie avec la création d'EDF et de GDF en 1946, les grandes banques, Air France, ainsi que Renault, dont le patron est accusé de collaboration. Les comités d'entreprise, créés en 1945, donnent aux salariés un droit de regard sur la gestion de leur entreprise. Ces réformes profondes, menées dans un esprit d'union nationale héritée de la Résistance, transforment durablement la société française.\n\nEntre 1944 et 1947, la France a donc refondé sa République en profondeur : démocratie politique enfin universelle avec le vote des femmes, démocratie sociale avec la Sécurité sociale et les nationalisations. Ce moment fondateur a construit le modèle social français qui structure encore notre pays. La IVe République, née de cette refondation, sera cependant fragilisée par l'instabilité ministérielle et les guerres coloniales, jusqu'à la crise de mai 1958 qui ramènera le général de Gaulle au pouvoir."}, "activite5_vocabulaire": {"termes": [{"mot": "GPRF", "definition": "Gouvernement provisoire de la République française (1944-1946), dirigé par de Gaulle, qui rétablit la légalité républicaine."}, {"mot": "Libération", "definition": "Période de 1944-1945 durant laquelle le territoire français est libéré de l'occupation allemande."}, {"mot": "Épuration", "definition": "Ensemble des poursuites et sanctions contre les personnes ayant collaboré avec l'occupant allemand."}, {"mot": "CNR", "definition": "Conseil national de la Résistance, fondé par Jean Moulin en 1943, qui unit la Résistance et adopte en 1944 un programme de réformes."}, {"mot": "Les Jours heureux", "definition": "Nom du programme du CNR (mars 1944) prévoyant la Sécurité sociale, les nationalisations et la démocratie sociale."}, {"mot": "Droit de vote des femmes", "definition": "Accordé par l'ordonnance du 21 avril 1944. Les Françaises votent pour la première fois le 29 avril 1945."}, {"mot": "Sécurité sociale", "definition": "Système créé par les ordonnances de 1945 protégeant les travailleurs contre la maladie, les accidents, la vieillesse."}, {"mot": "État-providence", "definition": "État qui intervient dans l'économie et la société pour protéger ses citoyens contre les risques de la vie."}, {"mot": "Nationalisation", "definition": "Transfert d'une entreprise privée sous le contrôle de l'État (EDF-GDF, Renault, banques en 1944-1946)."}, {"mot":
